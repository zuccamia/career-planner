# Career Planner Configuration

# CLI interface language ("en" or "vi")
language: en

# LLM Provider (optional — the tool works without this).
# Run `career config llm` for an interactive walkthrough.
llm:
  provider: anthropic              # "anthropic" or "openai-compatible"
  base_url: https://api.anthropic.com/v1
  api_key_env: ANTHROPIC_API_KEY   # env var name; keys are never stored in this file
  model: claude-sonnet-4-20250514

# Data preferences
data:
  taxonomy: esco                 # "esco" (default) or "onet"
  language: en                   # ESCO language code

# MCP Server
mcp:
  enabled: false
  transport: stdio               # "stdio", "sse", or "streamable-http"
  port: 8000

# Editor command for opening files. Defaults to $EDITOR, fallback to vim.
editor: $EDITOR
