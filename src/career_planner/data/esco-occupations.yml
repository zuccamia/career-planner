    safety of the participants and the equipment and explain safety measures for the
    participants to understand themselves as well. Outdoor activities instructors
    should be prepared to deal with the consequences of bad weather conditions, accidents
    and should responsibly manage possible anxiety from participants concerning certain
    activities.
