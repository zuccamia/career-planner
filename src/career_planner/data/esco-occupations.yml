  isco_code: '2269'
  code: 2269.13.1
  description: Cytotechnologists examines under a miscrocope samples of human cells
    obtained from various body parts such as the female reproductive tract, the lung
    or gastrointestinal tract, assist in identifying cell abnormality and disease
    such as cancer or infectious agents under supervision, following the orders of
    the doctor of medicine. The abnormal cells are being transferred to the pathologist
    for medical diagnosis. They may also work under the supervision of a biomedical
    scientist. They do not treat patients or assist in medical treatments.
