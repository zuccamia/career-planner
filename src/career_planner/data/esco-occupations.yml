    field of study, physical education, which is predominantly practical in nature.
    They provide theoretical instruction in service of the practical skills and techniques
    the students must subsequently master for a physical education-related profession,
    such as health specialist or outdoor activities organiser. They induce students
    in the convenient social frameworks of their field of study and teach the appropriate
    attitudes and values. Physical education vocational teachers monitor the students'
    progress, assist individually when necessary, and evaluate their knowledge and
    performance on the subject of physical education through assignments, tests and
    examinations.
