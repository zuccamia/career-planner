  code: '2353.2'
  description: Sign language teachers educate non-age-specific students in sign language.
    They teach sign language to both students with or without special educational
    needs such as deafness. They organise their classes using a variety of lesson
    materials, work interactively with the group, and assess and evaluate their individual
    progress through assignments and examinations.
- uri: http://data.europa.eu/esco/occupation/9711dcfc-d9a8-4fba-9c5e-8428d8bcb53e
  preferred_label: language school teacher
  alt_labels:
