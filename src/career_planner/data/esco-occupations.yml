- uri: http://data.europa.eu/esco/occupation/1b38a27d-ef98-4d9f-b1b2-8c109bf47e79
  preferred_label: event manager
  isco_code: '3332'
  code: '3332.2'
  description: Event managers plan and oversee events such as festivals, conferences,
    ceremonies, cultural events, exhibitions, formal parties, concerts, or conventions.
    They organise every stage of the events planning the venues, staff, suppliers,
    media, insurances all within the allocated budgetary and time limits. Event managers
    ensure the legal obligations are followed and the expectations of the target audience
    are met. They work together with the marketing team in promoting the event, searching
    new clients and gathering constructive feedback after the events took place.
- uri: http://data.europa.eu/esco/occupation/35bedc78-1c15-4db7-9c6d-c55e9b5c7b54
  preferred_label: venue programmer
  isco_code: '3332'
  code: '3332.3'
  description: Venue programmers are in charge of the artistic programme of a venue
    (theatres, cultural centers, concert halls etc.) or of temporary settings (festivals).
    They follow artistic trends and up-coming artists, keep in contact with bookers
    and agents to build a consistent programme and encourage artistic creation. All
    of this happens within the boundaries of the artistic and financial scope of the
    organisation they are involved in.
- uri: http://data.europa.eu/esco/occupation/6662e56e-bc3d-4d9b-bed2-79d510d7c4ff
  preferred_label: wedding planner
  isco_code: '3332'
  code: 3332.2.2
  description: Wedding planners assist with all logistical details required concerning
    their client's wedding ceremony. Based on their client's requirements, they make
    arrangements for floral decorations, wedding venue and catering, guest invitations,
    etc., coordinating activities both before and during the wedding.
- uri: http://data.europa.eu/esco/occupation/84931290-ad27-45ad-b611-9556c5facbdb
  preferred_label: event assistant
  isco_code: '3332'
  code: '3332.1'
  description: Event assistant implement and follow plans detailed by event managers
    and planners. They specialise in a part of the planning either the coordination
    of the catering, transportation, or the facilities.
- uri: http://data.europa.eu/esco/occupation/be54b8da-bc71-40f0-b150-45c5e0769375
  preferred_label: venue director
  isco_code: '3332'
  code: 3332.2.1
  description: Venue directors plan and manage conference, banqueting and venue operations
    in a hospitality establishment to reflect clients' needs. They are responsible
    for promotional events, conferences, seminars, exhibitions, business events, social
    events and venues.
- uri: http://data.europa.eu/esco/occupation/42a96d07-1e1d-49ae-9399-c1f4be27ddea
