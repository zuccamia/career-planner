    job seekers with advertised job vacancies and provide advice on job search activities.
- uri: http://data.europa.eu/esco/occupation/0f5b4653-50b2-413a-826d-39d447480c21
  preferred_label: real estate manager
  isco_code: '3334'
  code: '3334.5'
  description: Real estate managers handle and oversee the operational aspects of
    commercial or residential properties such as private apartments, office buildings
    and retail stores. They negotiate contracts for lease, identify and plan new real
    estate projects and construction of new buildings by partnering with a developer
    to identify the appropriate site for new buildings, coordinate the feasibility
    study for new constructions and supervise all the administrative and technical
    aspects involved in expanding the business. They maintain the premises and aim
    to increase its value. They hire, train and supervise personnel.
- uri: http://data.europa.eu/esco/occupation/7e46c066-2b98-4eaf-bed6-9848c79902e0
  preferred_label: real estate investor
  isco_code: '3334'
  code: 3334.3.2
  description: Real estate investors buy and sell own real estate such as appartements,
    dwellings, land and non-residential buildings to make a profit. They might actively
    invest in these properties to increase its value by repairing, renovating or improving
    the facilities available. Their other tasks may include researching the real estate
    market prices and undertaking property research.
- uri: http://data.europa.eu/esco/occupation/8ec8df02-e9dd-43b7-b416-5846ae0414ab
  preferred_label: real estate agent
  isco_code: '3334'
  code: '3334.3'
  description: Real estate agents administer the sales or letting process of residential,
    commercial properties or land on behalf of their clients. They investigate the
    property's condition and assess its value in order to offer the best price to
    their clients. They negotiate, compose a sales contract or a rental contract and
    liaise with third parties in order to realize the stated objectives during transactions.
    They undertake research to determine the legality of a property sale before it
    is sold and make sure the transaction is not subject to any disputes or restrictions.
- uri: http://data.europa.eu/esco/occupation/b42d8731-386b-4d34-a824-4b736feee1e5
  preferred_label: title closer
  isco_code: '3334'
  code: 3334.2.1
  description: Title closers handle and investigate all documentation needed for a
    property sale including the contracts, settlement statements, mortgages, title
    insurance policies, etc. They ensure compliance with legal requirements and review
    all the fees related to the real estate sales process.
- uri: http://data.europa.eu/esco/occupation/b915ab4a-f7b1-44bc-a5a4-585e91d31dfd
  preferred_label: property acquisitions manager
  isco_code: '3334'
  code: '3334.2'
  description: Property acquisitions managers ensure land or property acquisitions
    transactions. They liaise with relevant stakeholders concerning financial aspects
    and risks arising from the acquisition of property. Property acquisitions managers
    ensure compliance with legal requirements for purchasing property and take care
    of all documentation and closure techniques needed.
- uri: http://data.europa.eu/esco/occupation/cee31c49-abe9-4f29-ad10-5eefe63f2a57
  preferred_label: real estate leasing manager
  isco_code: '3334'
  code: '3334.4'
  description: Real estate leasing managers set up the lease or rental efforts of
    an apartment community and properties not in co-ownership and also manage the
    leasing staff. They produce, track and manage file leasing deposits and documents.
    They oversee the lease administration and prepare tenancy budgets on an annual
    and monthly basis. They also actively promote the vacancies available in order
    to get new residents, show properties to potential tenants and are present to
    conclude contracts between landlords and tenants when dealing with private property.
- uri: http://data.europa.eu/esco/occupation/d261a6a4-7ea7-4295-a84e-f4b1a56990d7
  preferred_label: letting agent
  isco_code: '3334'
  code: 3334.3.1
  description: Letting agents schedule appointments with clients in order to show
    and lease real estate to prospective residents. They assist in marketing the property
    for rent through advertising and community out-reach. They are also involved in
    daily communication and administrative tasks.
- uri: http://data.europa.eu/esco/occupation/dd935705-d703-40ba-9ba7-2a8a2b7651b4
  preferred_label: housing manager
  isco_code: '3334'
  code: '3334.1'
  description: Housing managers oversee housing services for tenants or residents.
    They work for housing associations or private organisations for which they collect
    rental fees, inspect properties, suggest and implement improvements concerning
    repairs or neighbour nuissance issues, maintain communication with tenants, handle
    housing applications and liaise with local authorities and property managers.
    They hire, train and supervise personnel.
- uri: http://data.europa.eu/esco/occupation/1da55a33-09b3-4ac7-818e-2a0fea68cecc
  preferred_label: publishing rights manager
  isco_code: '3339'
  code: '3339.5'
  description: Publishing rights managers are responsible for the copyrights of books.
    They organise the sale of these rights so books can be translated, made into movies,
    etc.
- uri: http://data.europa.eu/esco/occupation/2049d7ef-9ebe-41ae-b8b5-e97b77ee58a2
  preferred_label: relocation officer
  isco_code: '3339'
  code: '3339.6'
  description: Relocation officers help businesses and organisations with the move
    of employees. They are responsible for managing all moving activities including
    the planning of moving services and the provision of advises on real estate. They
    look after the general well-being of the employees and their family.
- uri: http://data.europa.eu/esco/occupation/21ae429f-a152-46a6-a73c-9ec65c7803f0
  preferred_label: promoter
  isco_code: '3339'
  code: '3339.4'
  description: Promoters work with artists (or their agents) and venues on to arrange
    a show. They liaise with bands and agents to agree on a date for a performance
    and negotiate a deal. They book a venue and promote the upcoming gig. They make
    sure everything the band needs is in place and set up soundcheck times and the
    running order of the show. Some promoters work freelance, but they may also be
    tied to a single venue or festival.
- uri: http://data.europa.eu/esco/occupation/3ae4fd99-814a-4d06-a7db-5ee680c22e26
  preferred_label: tourism contract negotiator
  isco_code: '3339'
  code: '3339.8'
  description: Tourism contract negotiators negotiate tourism-related contracts between
    a tour operator and tourism service providers.
- uri: http://data.europa.eu/esco/occupation/5a8835bf-65c7-48e3-ab2f-7ad98b3fdb59
  preferred_label: intellectual property consultant
  isco_code: '3339'
  code: '3339.3'
  description: Intellectual property consultants provide advice on the usage of intellectual
    property assests such as patents, copyrights, and trademarks. They help clients
    to value, in monetary terms, intellectual property portfolios, to follow adequate
    legal procedures for protecting of such property, and to perform patent brokerage
    activities.
- uri: http://data.europa.eu/esco/occupation/c85e39a4-2c40-413f-a171-45907ecdd599
  preferred_label: talent agent
  isco_code: '3339'
  code: '3339.7'
  description: Talent agents represent actors, authors, broadcast journalists, film
    directors, musicians, models, professional athletes, screenwriters, writers, and
    other professionals in various entertainment or broadcast businesses. They promote
    their clients in order to attract prospective employers. Talent agents set up
    public appearances, auditions and performances. They take care of contract negotiations.
- uri: http://data.europa.eu/esco/occupation/f1ecc3c4-8212-4386-871a-6fda1b5b4d91
  preferred_label: auctioneer
  isco_code: '3339'
  code: '3339.2'
  description: Auctioneers conduct auctions by accepting bids and declaring goods
    sold.
- uri: http://data.europa.eu/esco/occupation/f5332f2d-3119-4194-8b5c-d0a5d97f55ef
  preferred_label: advertising sales agent
  isco_code: '3339'
  code: '3339.1'
  description: Advertising sales agents sell advertising space and media time to businesses
    and individuals. They make sales pitches to potential clients and follow up on
    after-sales.
- uri: http://data.europa.eu/esco/occupation/0deaceea-69d8-4304-bc80-0b3d0491a241
  preferred_label: field survey manager
  isco_code: '3341'
  code: '3341.6'
  description: Field survey managers organise and supervise investigations and surveys
    on the request of a sponsor. They monitor their implementation according to production
    requirements and lead a team of field investigators.
- uri: http://data.europa.eu/esco/occupation/30ca97f4-a4fd-4189-a781-ac08f6b09b78
  preferred_label: call centre analyst
  isco_code: '3341'
  code: '3341.1'
  description: Call centre analysts examine data regarding incoming or outgoing customer
    calls. They prepare reports and visualisation.
- uri: http://data.europa.eu/esco/occupation/580c98d4-fb97-4597-864c-54140f058f1b
  preferred_label: call centre quality auditor
  isco_code: '3341'
  code: '3341.2'
  description: Call centre quality auditors listen to calls from the call centre operators,
    recorded or live, in order to assess compliance with protocols and quality parameters.
    They grade the employees and provide feedback on the issues that require improvement.
    They interpret and spread quality parameters received by the management.
- uri: http://data.europa.eu/esco/occupation/6aa78e46-ce22-421f-8a75-e915ac63c9d0
  preferred_label: call centre supervisor
  isco_code: '3341'
  code: '3341.3'
  description: Call centre supervisors oversee call centre employees, manage projects
    and understand technical aspects of the call centre activities.
- uri: http://data.europa.eu/esco/occupation/6e6839b6-099c-4802-906e-7f2c8203ee69
  preferred_label: office manager
  isco_code: '3341'
  code: '3341.7'
  description: Office managers oversee the administrative work that clerical workers
    are commissioned to perform in various types of organisations or associations.
    They perform micromanagement and maintain a close view of administrative processes
    such as such as controlling correspondence, designing filing systems, reviewing
    and approving supply requisitions, assigning and monitoring clerical functions.
    They report to managers within the same department or to general managers in companies,
    depending on their size.
- uri: http://data.europa.eu/esco/occupation/9d2aae3e-cbfe-409f-86cc-7cef9cd0435a
  preferred_label: contact centre supervisor
  isco_code: '3341'
  code: '3341.4'
  description: Contact centre supervisors oversee and coordinate the activities of
    contact centre employees. They ensure that daily operations run smoothly through
    resolving issues, instructing and training employees and supervising tasks.
- uri: http://data.europa.eu/esco/occupation/af355ac4-dd89-44df-99a6-bba70202d6fe
  preferred_label: data entry supervisor
  isco_code: '3341'
  code: '3341.5'
  description: Data entry supervisors manage the day-to-day operations of data entry
    staff. They organise the workflow and tasks.
- uri: http://data.europa.eu/esco/occupation/0264b794-3771-47aa-a675-78bf13b62ee7
  preferred_label: legal administrative assistant
  isco_code: '3342'
  code: '3342.2'
  description: Legal administrative assistants carry out the daily administrative
    activities of firms, offices of notaries, and companies. They perform activities
    such as writing mails, phone-answering and typing/keyboarding. They combine these
    activities with specific knowledge and understanding of the procedures and codes
    managed in legal business affairs.
- uri: http://data.europa.eu/esco/occupation/578470d7-1848-44cd-a769-96cdd64b2c37
  preferred_label: civil registrar
  isco_code: '3342'
  code: '3342.1'
  description: Civil registrars collect and record acts of birth, marriage, civil
    partnership and death.
- uri: http://data.europa.eu/esco/occupation/044d78cc-f62f-4532-83a5-8e04f2889652
  preferred_label: administrative assistant
  isco_code: '3343'
  code: '3343.1'
  description: Administrative assistants provide administrative and office support
    for supervisors. They perform a variety of tasks, such as answering telephone
    calls, receiving and directing visitors, ordering office supplies, maintaining
    the office facilities running smoothly, and ensuring that equipment and appliances
    work properly.
- uri: http://data.europa.eu/esco/occupation/1d6fbb43-f4c7-4839-8099-55eae5d424a5
  preferred_label: fundraising assistant
  isco_code: '3343'
  code: 3343.1.3
  description: Fundraising assistants provide administrative support for fundraising
    managers. They target potential donators or sponsors by applying surveys. They
    process donations and grant payments, maintain electronic and paper filing systems
    for all grants and donations, acknowledge donations and write thank you letters
    and maintain fundraising records.
- uri: http://data.europa.eu/esco/occupation/2a04a1df-a3b9-403e-a245-e7f93fdddd44
  preferred_label: executive assistant
  isco_code: '3343'
  code: '3343.3'
  description: Executive assistants are advanced administrative professionals who
    work with top-level executives or in international facilities in various industries.
    They organise meetings, organise and maintain files, arrange travel, train staff
    members, communicate in other languages, and manage the day-to-day operations
    of the office.
- uri: http://data.europa.eu/esco/occupation/42c769cd-4c60-4bac-94d2-29a492b82b74
  preferred_label: scopist
  isco_code: '3343'
  code: '3343.5'
  description: Scopists edit the transcripts created by court reporters in order to
    make of them a readable professional legal document. They listen or read to the
    reports given to them in order to apply punctuation, missing words, format, and
    improve the accuracy of the document.
- uri: http://data.europa.eu/esco/occupation/55b4faa3-286f-4fc8-ac67-8bbb97d08820
  preferred_label: education administrator
  isco_code: '3343'
  code: 3343.1.2
  description: Education administrators organise and manage the administration, support
    systems and (student) activities of an education institution. They perform a range
    of administrative, secretarial, financial and otherwise supportive tasks to enable
    the efficient and cost-effective running of the school. They may assist in student
    recruitment, alumni relations, funding, work on committees including academic
    boards and quality insurance.
- uri: http://data.europa.eu/esco/occupation/5ccb2c34-e860-43a5-9869-342487518115
  preferred_label: project support officer
  isco_code: '3343'
  code: 3343.1.6
  description: Project support officers provide different types of services for the
    successful execution of a project as part of a horizontal project management office.
    They offer administrative support, assistance and training to project managers
    and other staff members, manage the project’s documentation and assist the project
    manager with project scheduling, resource planning, coordination and reporting.
    Project support officers are responsible for quality assurance activities and
    for monitoring the adherence to methodology guidelines and other organisational
    standards. They also offer advice on project management tools and related administrative
    services.
- uri: http://data.europa.eu/esco/occupation/8cce40c1-4479-47e7-b5fc-c976631d919f
  preferred_label: management assistant
  isco_code: '3343'
  code: '3343.4'
  description: Management assistants perform varied types of jobs, usually under general
    supervision. They carry out administrative tasks and support managers to ensure
    the entire department functions smoothly.
- uri: http://data.europa.eu/esco/occupation/ac60ed89-da6d-4f1a-93ee-1031789c7796
  preferred_label: court reporter
  isco_code: '3343'
  code: 3343.1.1
  description: Court reporters type in word processors or any other software each
    one of the words mentioned in the courtroom. They transcript the hearings that
    take place in court in order to issue the official hearings of the legal case.
    They allow that the case can be further studied by the parties in an accurate
    fashion.
- uri: http://data.europa.eu/esco/occupation/bcba793e-44fe-45eb-b0fb-56772529cbab
  preferred_label: editorial assistant
  isco_code: '3343'
  code: '3343.2'
  description: Editorial assistants support the editorial staff at all stages of the
    publication process of newspapers, websites, online newsletters, books and journals.
    They collect, verify and process information, acquire permits and deal with rights.
    Editorial assistants act as point of contact for the editorial staff, schedule
    appointments and interviews. They proofread and give recommendations on the content.
- uri: http://data.europa.eu/esco/occupation/c8b296be-54ae-48cf-be21-031fa8457937
  preferred_label: supply chain assistant
  isco_code: '3343'
  code: 3343.1.7
  description: Supply chain assistants work closely together with managers in the
    operations processes, namely purchasing, manufacturing, and distribution processes.
    They help with administrative and pragmatic follow up of actions such as invoicing,
    drafting and preparation of contracts and purchasing orders, reconciliation of
    inventory against documents, and communication with distribution channels.
- uri: http://data.europa.eu/esco/occupation/c9b2b0a7-0adc-4ca7-bf7c-dc95e18aeac7
  preferred_label: procurement support officer
  isco_code: '3343'
  code: 3343.1.5
  description: Procurement support officers assist the staff of the procurement team
    throughout the procurement processes, making sure all procurement documents are
    compliant with procedural, technical and legal requirements, and that meetings
    and other contacts are well organised.
- uri: http://data.europa.eu/esco/occupation/fcaab37b-ada2-4832-a2fd-9d64362e0280
  preferred_label: international student exchange coordinator
  isco_code: '3343'
  code: 3343.1.4
  description: International student exchange coordinators lead the entire process
    of an international exchange study for the exchange students. They manage the
    students' applications and admissions, arrange accommodation, be it on a college
    or university campus or with guest families, and handle all the administration
    regarding these activities, including the student's grades and official departing.
    They function as guides for the (young) international students through their cultural
    adjustment.
- uri: http://data.europa.eu/esco/occupation/045f05f2-4ff8-46b2-9d08-e12a81657498
  preferred_label: medical administrative assistant
  isco_code: '3344'
  code: '3344.1'
  description: Medical administrative assistants work very closely with health professionals.
    They provide office support such as correspondence, fixing appointments and answering
    queries of patients.
- uri: http://data.europa.eu/esco/occupation/5d5fde2c-47ce-4dcd-99f0-ba651b7b908f
  preferred_label: medical transcriptionist
  isco_code: '3344'
  code: '3344.3'
  description: Medical transcriptionists interpret dictated information from the doctor
    or other healthcare professionals and convert it into documents. They create,
    format and edit medical records for patients based on the provided data and take
    care to apply punctuation and grammar rules.
- uri: http://data.europa.eu/esco/occupation/8c8b5cba-14b2-4728-b22c-eb90f1786e00
  preferred_label: medical practice manager
  isco_code: '3344'
  code: '3344.2'
  description: Medical practice managers manage the day-to-day operations of a medical
    practice. They oversee the staff and business side of the practice.
- uri: http://data.europa.eu/esco/occupation/5f16819d-50b9-475b-a2d8-607ee6d99a9d
  preferred_label: customs officer
  isco_code: '3351'
  code: '3351.1'
  description: Customs officers combat the importation of illegal goods, firearms,
    drugs or other dangerous or illegal items while checking the legality of items
    brought across national borders. They are government officials who control the
    documents to ensure entry criteria and custom laws are complied with and control
    if the custom taxes are paid correctly.
- uri: http://data.europa.eu/esco/occupation/6296faea-1909-4943-b0e0-662b43ad855d
  preferred_label: immigration officer
  isco_code: '3351'
  code: '3351.3'
  description: Immigration officers monitor the eligibility of people, food, electronic
    devices and merchandise entering a country via an entry point. They use surveillance
    methods and check identification and documents to ensure entry criteria and custom
    laws are complied with. They can also conduct interviews with prospective immigrants
    to verify eligibility and inspect cargo to identify and detect violations.
- uri: http://data.europa.eu/esco/occupation/933d02c0-3dfa-418f-9c2d-470b525cc42c
  preferred_label: hand luggage inspector
  isco_code: '3351'
  code: '3351.2'
  description: Hand luggage inspectors check individuals' luggage to detect potential
    threatening objects. They comply with public safety regulations and company's
    procedure.
- uri: http://data.europa.eu/esco/occupation/4a39fddb-17e7-4431-be03-613edab8d1c8
  preferred_label: tax compliance officer
  isco_code: '3352'
  code: '3352.1'
  description: Tax compliance officers collect fees, debt, and taxes on behalf of
    government institutions in cities, municipalities and other jurisdictions. They
    perform administrative duties and communicate with other officials and institutions
    to ensure operations are correct and compliant with policies.
- uri: http://data.europa.eu/esco/occupation/c766198e-5b9c-4c85-9fef-be27c783ab19
  preferred_label: tax inspector
  isco_code: '3352'
  code: '3352.2'
  description: Tax inspectors are responsible for the calculation of taxation and
    the ensurance of its timely payment by individuals and organisations. They provide
    information and guidance concerning taxation legislation and examine financial
    documents and accounts to ensure compliance with legislation. They also examine
    records to investigate fraud.
- uri: http://data.europa.eu/esco/occupation/2c83f279-a1d1-4c9f-a6aa-5e5ee1850e46
  preferred_label: social security inspector
  isco_code: '3353'
  code: '3353.1'
  description: Social security inspectors investigate fraudulent activities in social
    security that affect workers' rights. They audit and examine applications for
    benefits and investigate company actions based on employee complaints. Inspections
    include labour-related activities such as non-payment of wages or expenses. Social
    security inspectors ensure that employees are treated fairly and in accordance
    to laws. They record and make reports on their findings to ensure validity of
    the claims they are investigating.
- uri: http://data.europa.eu/esco/occupation/4d750b7f-f40d-447c-ba90-f5fb0ee9ef27
  preferred_label: social security officer
  isco_code: '3353'
  code: '3353.2'
  description: Social security officers advise clients on social security benefits
    and ensure they claim the benefits they are eligible for, as well as providing
    advice on promotions and other available support services such as employment benefits.
    They aid clients in applications for benefits such as sickness, maternity, pensions,
    invalidity, unemployment and family benefits. They investigate the client's right
    to benefits by reviewing their case and researching legislation and the claim,
    and suggest an appropriate course of action. Social security advisers also determine
    the aspects of a specific benefit.
- uri: http://data.europa.eu/esco/occupation/6724e558-2d75-4116-a473-91a4c14d4c69
  preferred_label: pensions administrator
  isco_code: '3353'
  code: 3353.2.1
  description: Pensions administrators perform administrative duties in the management
    of pension schemes, ensuring the correct calculation of client's pension benefits,
    compliance with legal requirements, drafting reports and communicating relevant
    information to customers. They work either in the private or the public sector.
- uri: http://data.europa.eu/esco/occupation/39c89133-bd2a-45db-b3eb-529b94daeeaf
  preferred_label: licensing officer
  isco_code: '3354'
  code: '3354.2'
  description: Licensing officers process licence applications and provide advice
    on licensing legislation. They also perform investigative duties to ensure the
    applicant is eligible for the requested licence, ensure licence fees are paid
    in a timely manner, and ensure compliance with legislation.
- uri: http://data.europa.eu/esco/occupation/aaf732b5-ee19-4c82-a08f-700fb98f5ca7
  preferred_label: passport officer
  isco_code: '3354'
  code: '3354.3'
  description: Passport officers provide passports and other travel documents such
    as certificates of identity and refugee travel documents. They also keep record
    of all provided passports.
- uri: http://data.europa.eu/esco/occupation/e19fe26f-0759-4bb1-af71-5bbecf3df69f
  preferred_label: immigration adviser
  isco_code: '3354'
  code: '3354.1'
  description: Immigration advisers aid people seeking to move from one nation to
    another by advising them on immigration legislation, and assisting them in obtaining
    the necessary documentation to ensure the immigration process occurs in accordance
    with immigration laws.
- uri: http://data.europa.eu/esco/occupation/3880e9e8-bc2b-48d9-8afc-a0f258c1c4b0
  preferred_label: police detective
  isco_code: '3355'
  code: '3355.2'
  description: Police detectives gather and compile evidence which assists them in
    the solution of crimes. They use investigative techniques to gather evidence,
    and interview all parties connected to their line of enquiry, and cooperate with
    other police department divisions to gather the evidence.
- uri: http://data.europa.eu/esco/occupation/3cee6bea-4a19-4511-9bbb-fdf820857555
  preferred_label: criminal investigator
  isco_code: '3355'
  code: '3355.1'
  description: Criminal investigators examine and process the scenes of crimes and
    the evidence found in them. They handle and protect the evidence compliant with
    rules and regulations, and isolate the scene from outside influence. They photograph
    the scene, ensure the maintenance of the evidence, and write reports.
- uri: http://data.europa.eu/esco/occupation/ce2b8609-34c7-40d3-a4f7-581c76bd258a
  preferred_label: police inspector
  isco_code: '3355'
  code: '3355.3'
  description: Police inspectors coordinate and supervise a division in a police department.
    They ensure the division's compliance with rules and regulations, and monitor
    the performance of personnel as well as assigning tasks to them. They perform
    administrative duties to ensure the maintenance of records and reports, and may
    also develop regulatory guidelines.
- uri: http://data.europa.eu/esco/occupation/27c5097e-a2a3-4b2e-82a6-3b874ebfb092
  preferred_label: marine cargo inspector
  isco_code: '3359'
  code: 3359.5.1
  description: Marine cargo inspectors investigate all baggage and freight listed
    on the ship's manifest. They are responsible for checking the condition of the
    cargo and verifying the cargo's documentation and compliance with rules and regulations.
    Marine cargo inspectors analyse the vessels' capabilities, the fuel compartments,
    the safety equipment and the specific licenses required.
- uri: http://data.europa.eu/esco/occupation/379a4f3f-4985-4764-8b2f-037946da855d
  preferred_label: gaming inspector
  isco_code: '3359'
  code: '3359.6'
  description: Gaming inspectors, have the ability to deal and inspect all the respective
    games and carry out all gaming operations to the highest possible standards of
    efficiency, security and customer service in accordance with company procedures
    and current legislation. Their responsibility is to oversee all the irrespective
    games played, and ensure that rules are adhered to and players don't cheat. They
    are responsible for the maintenance of the equipment and handle all customer questions
    and complaints.
- uri: http://data.europa.eu/esco/occupation/50609eb5-9957-4cbf-9b91-6f46ce49cfad
  preferred_label: freight inspector
  isco_code: '3359'
  code: '3359.5'
  description: Freight inspectors determine if freight is secure and comes with the
    proper documentation. They inspect, manage and document freight shipments while
    verifying that the content comply with local, national and international regulations.
- uri: http://data.europa.eu/esco/occupation/6c7d333a-b2a9-4325-b25b-566d1ecc956d
  preferred_label: forestry inspector
  isco_code: '3359'
  code: '3359.4'
  description: Forestry inspectors monitor forestry operations to ensure that workers
    and their activities comply with proper legislation and standards. They perform
    inspections to examine operations, wages, costs and health and safety measures.
    Forestry inspectors also analyse and report on their findings.
- uri: http://data.europa.eu/esco/occupation/715b902f-b1b6-4366-afc6-ddb8ab715229
  preferred_label: agricultural inspector
  isco_code: '3359'
  code: '3359.1'
  description: Agricultural inspectors monitor agricultural operations in farms and
    other agricultural facilities. They inspect activities such as health and safety
    measures, costs and production processes to ensure that workers and their activities
    comply with proper legislation and standards. Agricultural inspectors also analyse
    and report on their findings.
- uri: http://data.europa.eu/esco/occupation/c3fc5265-6333-483f-9339-b4b860efa08d
  preferred_label: fisheries observer
  isco_code: '3359'
  code: '3359.3'
  description: Fisheries observers record and report on fishing activity and the level
    of compliance and enforcement of conservation measures in force in the work area
    by controlling the position of the vessel, the use of the fishing gear and the
    catch. They provide the reports required for the scientific monitoring of the
    fishing area, provide policy advice and plan and coordinate activities.
- uri: http://data.europa.eu/esco/occupation/cb60beab-7afb-4e99-8162-221abea68e6d
  preferred_label: consumer rights advisor
  isco_code: '3359'
  code: '3359.2'
  description: Consumer rights advisors aid consumers with complaints and provide
    advice and information on rights as a consumer after purchase of products or services.
    They monitor organisations to ensure compliance to consumer rights standards,
    and aid consumers in handling disputes.
- uri: http://data.europa.eu/esco/occupation/d9f67d41-5e35-49c1-82a4-05ed94fbc3ab
  preferred_label: weights and measures inspector
  isco_code: '3359'
  code: '3359.8'
  description: Weights and measures inspectors ensure adherance to regulations and
    agreements pertaining to the weights and measures of packaged goods. They investigate
    and document compliance issues and violations to promote best practice. Weights
    and measures inspectors confirm that packaged goods are in accordance to agreements
    such as quantity, content and packaging.
- uri: http://data.europa.eu/esco/occupation/0f63619d-63ea-4345-81f5-4673353fe8d2
  preferred_label: court clerk
  isco_code: '3411'
  code: '3411.5'
  description: Court clerks provide assistance to judges in a court institution. They
    handle enquiries on court proceedings, and assist judges in various tasks such
    as performing legal research in preparation of cases or writing opinion pieces.
    They also contact parties involved in cases and brief judges and other court officials.
- uri: http://data.europa.eu/esco/occupation/5e175ee2-6b07-4f1d-8f5e-962c36ab7bb6
  preferred_label: court bailiff
  isco_code: '3411'
  code: '3411.4'
  description: Court bailiffs maintain order and security in courtrooms. They transport
    offenders to and from the courtroom, ensure necessary supplies are present in
    the courtroom, and investigate the premises and examine individuals to ensure
    there are no threats. They also open and close court, and call witnesses.
- uri: http://data.europa.eu/esco/occupation/71c3a49a-e55e-42ce-bd3f-31f37d3cfab6
  preferred_label: store detective
  isco_code: '3411'
  code: 3411.8.1
  description: Store detectives monitor the activities in the store in order to prevent
    and detect shoplifting. Once the individual is caught red-handed, they take all
    the legal measures, including announcing the police.
- uri: http://data.europa.eu/esco/occupation/771a47c9-9cf4-4368-9752-2a1ea5a783d7
  preferred_label: private detective
  isco_code: '3411'
  code: '3411.8'
  description: Private detectives research and analyse information to uncover facts
    for personal, corporate or legal reasons, depending on their clients. They conduct
    surveillance activities, which includes taking photos, doing background checks
    and interviewing individuals. Private detectives may help in criminal and civil
    cases, child custody, financial fraud, on-line harassment and may search for missing
    people. They compile all the information into a file and hand it to their clients
    for further action.
- uri: http://data.europa.eu/esco/occupation/929ef41d-afd0-4d5a-b85b-69eab68fa368
  preferred_label: legal assistant
  isco_code: '3411'
  code: '3411.7'
  description: Legal assistants work closely together with lawyers and legal representatives
    in the research and preparation of cases brought to courts. They assist in the
    paper work of cases and management of the administrative side of court affairs.
- uri: http://data.europa.eu/esco/occupation/a7f63810-a21a-4e7e-8aa2-6637d14ea3c1
  preferred_label: court administrative officer
  isco_code: '3411'
  code: '3411.3'
  description: Court administrative officers perform administrative and assisting
    duties for the court and judges. They are designated to accept or reject applications
    for informal probate and informal appointment of a personal representative. They
    manage case accounts and handle official documents. Court administrative officers
    perform assisting duties during a court trial, such as calling out the cases and
    identification of parties, keeping notes, and recording orders from the judge.
- uri: http://data.europa.eu/esco/occupation/a9411821-4f54-406e-ba37-4c6e5a39f9fe
  preferred_label: conveyance clerk
  isco_code: '3411'
  code: '3411.2'
  description: Conveyance clerks provide services for the legal transference of legal
    titles and properties from one party to another. They exchange the necessary contracts
    and ensure all properties, titles and rights are transfered.
- uri: http://data.europa.eu/esco/occupation/b471350e-23ce-4789-a821-5500b28cffe1
  preferred_label: court enforcement officer
  isco_code: '3411'
  code: '3411.6'
  description: Court enforcement officers enforce orders of court judgements such
    as managing the recovery of money owed, seizing of goods, and selling goods in
    public auctions to obtain the money owed. They also send summons and arrest warrants
    to ensure attendance in court or other judicial procedures.
- uri: http://data.europa.eu/esco/occupation/bac62d45-bb74-45fa-9b38-a3ebf2095212
  preferred_label: case administrator
  isco_code: '3411'
  code: '3411.1'
  description: Case administrators supervise the progress of criminal and civil cases
    from the point of opening to closing. They review the case files and case progression
    to ensure proceedings occur compliant with legislation. They also ensure the proceedings
    occur in a timely manner and that everything has been concluded before closing
    cases.
- uri: http://data.europa.eu/esco/occupation/f634ce9b-68a5-4a8a-af4a-ed13fc0deba9
  preferred_label: justice of the peace
  isco_code: '3411'
  code: '3411.9'
  description: Justices of the peace deal with small claims and disputes, and minor
    offences. They ensure the keeping of the peace within their jurisdiction, and
    provide mediation between disputing parties.
- uri: http://data.europa.eu/esco/occupation/021663ca-a367-472e-a1f0-6d8ab5b2d860
  preferred_label: legal guardian
  isco_code: '3412'
  code: '3412.2'
  description: Legal guardians legally assist and support minor children, mentally
    disabled persons or incapacitated older adults in their personal life. They can
    manage their property, help with daily financial administration and assist with
    the ward's medical or social needs.
- uri: http://data.europa.eu/esco/occupation/1f13d8c3-f601-4d3b-adc8-c8d52e0c15d5
  preferred_label: volunteer mentor
  isco_code: '3412'
  code: '3412.6'
  description: Volunteer mentors guide volunteers through the integration process,
    introducing them to the host culture, and supporting them in responding to administrative,
    technical and practical needs of the community. They support volunteers' learning
    and personal development process connected to their volunteering experience.
- uri: http://data.europa.eu/esco/occupation/1f5932eb-b36d-44e1-a063-7aa9e228af51
  preferred_label: foster care support worker
  isco_code: '3412'
  code: 3412.4.6
  description: Foster care support workers assist and support mentally or physically
    abused children to be legally separated from their parents. They help them to
    recover by placing them in appropriate families and making sure that the children
    welfare is a priority.
- uri: http://data.europa.eu/esco/occupation/2ae76ccc-f02e-4eb6-b693-fff70ba8f409
  preferred_label: child welfare worker
  isco_code: '3412'
  code: 3412.4.3
  description: Child welfare workers provide early intervention and support to children
    and their families in order to improve their social and psychological functioning.
    They aim to maximise the family well-being and protect children from abuse and
    neglect. They advocate for children so that their rights are respected within
    and outside the family. They may assist single parents or find foster homes for
    abandoned or abused children.
- uri: http://data.europa.eu/esco/occupation/4c89c65c-4e35-44e3-8fa0-5d73e9e15325
  preferred_label: family support worker
  isco_code: '3412'
  code: 3412.4.5
  description: Family support workers provide actionable advice and emotional support
    to families that go through difficulties such as addictions, disabilities, sickness,
    imprisoned parents, marital and financial difficulties. They provide advice on
    the best solution for the children in relation to their stay with their families
    or not, based on the assessment of the family situation. Family support worker
    also provide information on the available services based on the family's specific
    needs and the recommendations of the social worker.
- uri: http://data.europa.eu/esco/occupation/4d7d2628-1405-4ff2-b5b5-bd0d57ed9bbd
  preferred_label: residential childcare worker
  isco_code: '3412'
  code: 3412.4.10
  description: Residential childcare workers counsel and support children who have
    physical or mental disabilities. They monitor their progress and provide them
    with care in a positive living environment. They liaise with the families in order
    to arrange their visits.
- uri: http://data.europa.eu/esco/occupation/4edbde9f-218e-49c7-812f-c45262fb4128
  preferred_label: housing support worker
  isco_code: '3412'
  code: 3412.4.7
  description: Housing support workers provide support and assistance to elderly,
    people with a physical impairment or learning disability, homeless people, ex-drug
    addicts, ex-alcohol addicts or ex-offenders.
- uri: http://data.europa.eu/esco/occupation/4fa660b3-ab97-4a99-ad73-ce3c2612f2c3
  preferred_label: social work assistant
  isco_code: '3412'
  code: '3412.5'
  description: Social work assistants are practice-based professionals who promote
    social change and development, social cohesion, and the empowerment and liberation
    of people. Social work assistants assist guiding staff, helping clients to use
    services to claim benefits, access community resources, find jobs and training,
    obtain legal advice or deal with other local authority departments. They assist
    and work together with social workers.
- uri: http://data.europa.eu/esco/occupation/50743f62-3d5b-4ef6-b706-00d2b1adfcc3
  preferred_label: residential home older adult care worker
  isco_code: '3412'
  code: 3412.4.12
  description: Residential home older adult care workers counsel and support elderly
    who have physical or mental disabilities. They monitor their progress and provide
    them with care in a positive living environment. They liaise with the clients'
    families in order to arrange their visits.
- uri: http://data.europa.eu/esco/occupation/5a9acd29-666c-4ca1-b10e-e086584a526b
  preferred_label: mental health support worker
  isco_code: '3412'
  code: 3412.4.8
  description: Mental health support workers assist and provide treatment to people
    with mental, emotional, or substance abuse problems. They focus on personalised
    cases and monitor the recovery process of their clients, providing also therapy,
    crisis intervention, client advocacy and education.
- uri: http://data.europa.eu/esco/occupation/6667bf29-a3e3-4513-a71b-82c67206045b
  preferred_label: residential home young people care worker
  isco_code: '3412'
  code: 3412.4.13
  description: Residential home young people care workers provide assistance and support
    to young people who face complex emotional needs expressed in challenging behaviours.
    They support young adults with learning disabilities coping with school, encourage
    them to household activities and help them to take responsibility.
- uri: http://data.europa.eu/esco/occupation/78f474ae-c154-4206-ad0f-d8a00e9c541e
  preferred_label: residential home adult care worker
  isco_code: '3412'
  code: 3412.4.11
  description: Residential home adult care workers counsel and support vulnerable
    adults who have physical or mental disabilities or addiction issues. They monitor
    their progress and provide them with care in a positive living environment. They
    work with families to support individuals' development and meet their needs.
- uri: http://data.europa.eu/esco/occupation/8d703e8f-1e57-4246-8a6b-cb87a760d4ab
  preferred_label: social care worker
  isco_code: '3412'
  code: '3412.4'
  description: Social care workers provide support and help people with care services.
    They help people to live full and valued lives in the community. They assist babies,
    young children, adolescents, adults and older adults.They attend to the psychological,
    social, emotional and physical needs of service users. They work in a large variety
    of settings with individuals, families, groups, organisations and communities.
- uri: http://data.europa.eu/esco/occupation/92df4ee3-bce3-45f6-a693-597df1b96f43
  preferred_label: crisis helpline operator
  isco_code: '3412'
  code: '3412.1'
  description: Crisis helpline operators provide advice and support to distraught
    callers via the telephone. They have to deal with a diverse range of issues such
    as abuse, depression and financial problems. Helpline operators maintain records
    of the phone calls according to regulations and privacy policies.
- uri: http://data.europa.eu/esco/occupation/9c55aa23-e3f2-4c00-8c90-5ed5204951a3
  preferred_label: disability support worker
  isco_code: '3412'
  code: 3412.4.4
  description: Disability support workers provide personal assistance and support
    to individuals of all ages with disability conditions, either intellectual or
    physical disabilities. They work with other health professionals to maximise individuals
    physical and mental well being. Their duties include bathing, lifting, moving,
    dressing or feeding people with disability.
- uri: http://data.europa.eu/esco/occupation/c6239b9e-5973-4b0a-a2ed-4c4b41331e04
  preferred_label: adult community care worker
  isco_code: '3412'
  code: 3412.4.1
  description: Adult community care workers perform assessment and care management
    of communities of adults who live with physical impairments or convalescing states.
    They aim to improve their life in the community and enable them to live safely
    and independently at their own home.
- uri: http://data.europa.eu/esco/occupation/f4525ed8-54eb-4a3b-90db-55cc01b0d9fd
  preferred_label: care home worker
  isco_code: '3412'
  code: 3412.4.2
  description: Care home workers provide domiciliary services to vulnerable adults
    including frail elderly or disabled people who are living with physical impairment
    or convalescing, following a specific plan to provide day-to-day care to clients.
    They look after the physical and mental wellbeing of clients by providing them
    social care. These services could be developed in residential homes, care homes
    or in the patient's home. In relation to this last case, they aim to improve patients'
    lives in the community and assure patients can live safely and independently in
    their own home.
- uri: http://data.europa.eu/esco/occupation/fc85156e-4f0b-46c4-ba66-a3b17318d932
  preferred_label: life coach
  isco_code: '3412'
  code: '3412.3'
  description: Life coaches help clients set clear objectives for their personal development
    and help them achieve their goals and personal vision. They provide counselling
    and guidance and establish progress reports in order to keep track of their clients'
    achievements.
- uri: http://data.europa.eu/esco/occupation/33ae2ba9-9835-410f-8ea6-e5ac991f5975
  preferred_label: monk/nun
  isco_code: '3413'
  code: '3413.1'
  description: Monks/nuns dedicate themselves to a monastic lifestyle. They vow to
    take part in sprititual works as part of their religious community. Monks/nuns
    take part in daily prayer and often live in self-sufficient monasteries or convents
    alongside other monks/nuns.
- uri: http://data.europa.eu/esco/occupation/665266cb-50dd-44a5-a920-ab04c67e251a
  preferred_label: pastoral worker
  isco_code: '3413'
  code: '3413.2'
  description: Pastoral workers support religious communities. They provide spiritual
    education and guidance and implement programmes such as charity works and religious
    rites. Pastoral workers also assist ministers and help participants in the religious
    community with social, cultural or emotional problems.
- uri: http://data.europa.eu/esco/occupation/082c234c-0dda-490a-b5af-757c3e48da90
  preferred_label: professional athlete
  isco_code: '3421'
  code: '3421.1'
  description: Professional athletes compete in sports and athletic events. They train
    on a regular basis and exercise with professional coaches and trainers.
- uri: http://data.europa.eu/esco/occupation/09c2b506-cefa-4ba3-b868-a9c2bc4fc6f1
  preferred_label: golf instructor
  isco_code: '3422'
  code: 3422.4.2
  description: Golf instructors train and teach golf to individuals or groups. They
    train their clients by demonstrating and explaining techniques such as the correct
    posture and swinging techniques. They give feedback on how a student can do exercises
    better and improve the skill level. The golf instructor advises what equipment
    is best suited for the student.
- uri: http://data.europa.eu/esco/occupation/0af6fc82-8e5e-46c6-a4ca-a672ecf7704c
  preferred_label: boxing instructor
  isco_code: '3422'
  code: 3422.4.1
  description: Boxing instructors train individuals or groups in boxing. They instruct
    clients during training and teach students the techniques of boxing such as stance,
    defense and different kind of punches.
- uri: http://data.europa.eu/esco/occupation/11695786-9fb7-4895-b161-0480419107e4
  preferred_label: sports instructor
  isco_code: '3422'
  code: '3422.4'
  description: Sports instructors introduce people to a sport and teach them the skills
    required for the performance of sport. They have a strong grip on one or more
    sports, which are often adventure sports, and know how to motivate others and
    share with them the enjoyment of the activity.
- uri: http://data.europa.eu/esco/occupation/29df0797-c66d-4e54-a5e1-45b18cecf052
  preferred_label: ice-skating coach
  isco_code: '3422'
  code: 3422.4.3
  description: Ice-skating coaches teach and train individuals or groups in ice skating
    and related sports such as figure skating and speed skating. They teach their
    clients theoretical knowledge and train fitness, strength and physical coordination.
    Ice-skating instructors prepare and conduct training sessions. They will support
    their clients if they participate in competitions.
- uri: http://data.europa.eu/esco/occupation/388155cc-7ab8-46c7-8051-aefc7b276c84
  preferred_label: sports official
  isco_code: '3422'
  code: '3422.5'
  description: Sports officials are responsible for administering the rules and laws
    of a sport and for ensuring fair play according to the rules and laws. The role
    includes applying rules during the sport or activity, contributing to health,
    safety and protection of participants and others during the sport or activity,
    organising sport events, establishing and maintaining effective working relationships
    with competitors and others, and communicating effectively.
- uri: http://data.europa.eu/esco/occupation/3b43dafb-8c6b-4906-9fe5-bc218aacad55
  preferred_label: football coach
  isco_code: '3422'
  code: 3422.3.1
  description: Football coaches train amateur or professional football teams of either
    youths or adults. Football coaches develop and execute training plans and improve
    or maintain their players physical condition, football technique and tactical
    abilities. They prepare their team for competitions and choose the line-up and
    tactics for a game. During a game coaches may give instructions from the sidelines
    and are in charge of substituting players.
- uri: http://data.europa.eu/esco/occupation/3e9c1262-4fe2-4eb1-bf94-4fe64498393a
  preferred_label: sports coach
  isco_code: '3422'
  code: '3422.3'
  description: Sports coaches provide instruction in the sport of their specialisation
    in a recreational context to non-age-specific and age specific participants. They
    identify already acquired skills and implement suitable training programmes for
    the groups or individuals they teach in order to develop participants' physical
    and psychological fitness. They create the most optimal environment for the growth
    of participant skills and enable them to maximise their performance, while fostering
    good sportsmanship and character in all participants. Sports coaches also track
    the participant progress and provide personalised instruction where needed. They
    supervise sports facilities and changing rooms and maintain uniforms and equipment.
- uri: http://data.europa.eu/esco/occupation/58f3f9fc-c9f6-4e14-bedf-a71ace5f27c5
  preferred_label: artistic coach
  isco_code: '3422'
  code: '3422.1'
  description: Artistic coaches research, plan, organise and lead arts activities
    for sport practitioners in order to provide them with artistic abilities such
    as dance, acting, expression and transmission that are important for their sport
    performance. Artistic coaches make technical, performance or artistic abilities
    accessible to sports practitioners with the goal of improving their sport performance.
- uri: http://data.europa.eu/esco/occupation/5a80044b-9b2f-40eb-a210-0c1c3c958e0e
  preferred_label: lifeguard instructor
  isco_code: '3422'
  code: '3422.2'
  description: Lifeguard instructors teach future (professional) lifeguards the necessary
    programmes and methods needed to become a licensed lifeguard. They provide training
    on safety supervision of all swimmers, assessment of potentially hazardous situations,
    rescue-specific swimming and diving techniques, first aid treatment for swimming-related
    injuries, and they inform students on preventative lifeguard responsibilities.
    They ensure students are aware of the importance of checking safe water quality,
    heeding risk management and being aware of the necessary protocols and regulations
    regarding lifeguarding and rescuing. They monitor the students' progress, evaluate
    them through theoretical and practical tests and award the lifeguard licenses
    when obtained.
- uri: http://data.europa.eu/esco/occupation/62975936-0853-4a5d-9f59-bf943aca3cc6
  preferred_label: swimming teacher
  isco_code: '3422'
  code: 3422.4.6
  description: Swimming teachers train and advise groups or individuals on swimming.
    They plan trainings and teach different swimming styles such as front crawl, breaststroke
    and butterfly. They help to improve their students performance.
- uri: http://data.europa.eu/esco/occupation/776837b1-6f6b-4014-8330-d56918303e93
  preferred_label: snowboard instructor
  isco_code: '3422'
  code: 3422.4.5
  description: Snowboard instructors teach groups or individuals how to ride a snowboard.
    They instruct students of all ages and skill level individually or in groups.
    Snowboard instructors teach basic and advanced techniques of snowboarding by demonstrating
    exercises and giving feedback to students. They give advice on safety and on snowboarding
    equipment.
- uri: http://data.europa.eu/esco/occupation/812276dd-95ea-428b-b05e-a61c4089063c
  preferred_label: ski instructor
  isco_code: '3422'
  code: 3422.4.4
  description: Ski instructors teach individuals or groups to ski and advanced skiing
    techniques. They advise their students on the choice of equipment, instruct skiers
    in alpine safety rules and plan and prepare ski instruction. Ski instructors demonstrate
    exercises and techniques during ski lessons and give feedback to their students
    on how to improve their level.
- uri: http://data.europa.eu/esco/occupation/b3086ad2-1f3c-4a60-9bdb-8b4746989d4b
  preferred_label: tennis coach
  isco_code: '3422'
  code: 3422.4.7
  description: Tennis coaches advise and guide individuals and groups on playing tennis.
    They conduct lessons and teach the rules and techniques of the sport such as grips,
    strokes and serves. They motivate their clients and help improve their performance.
- uri: http://data.europa.eu/esco/occupation/0c3672ed-450b-4fcd-a3d0-579a10004486
  preferred_label: horse riding instructor
  isco_code: '3423'
  code: '3423.3'
  description: Horse riding instructors advise and guide individuals and groups on
    riding horses. They conduct lessons and teach the techniques of horse riding including
    stopping, making turns, show-riding and jumping. They motivate their clients and
    help improve their performance.
- uri: http://data.europa.eu/esco/occupation/234be692-befb-41df-bdf0-e1b2f4eaf5e7
  preferred_label: activity leader
  isco_code: '3423'
  code: '3423.1'
  description: Activity leaders provide recreational services to people and children
    on vacation. They organise activities such as games for children, sport competitions,
    cycling tours, shows and museum visits. Recreational animators also advertise
    their activities, manage the available budget for each event and consult their
    colleagues.
- uri: http://data.europa.eu/esco/occupation/394bdd9b-3ee8-43a9-b943-442ce146bb21
  preferred_label: sport therapist
  isco_code: '3423'
  code: 3423.2.4
  description: Sport therapists program and supervise rehabilitation exercises for
    individuals and groups. They work with individuals that have chronic health conditions
    or are at high risk of developing them. They communicate with medical and healthcare
    professionals about participants' conditions using correct medical terminology,
    and with an understanding of the standard treatment options for an individual’s
    condition. Sport therapists take a holistic approach to the wellness of their
    clients that includes advising on lifestyle, food or time management. They do
    not have a medical background and do not require medical qualifications.
- uri: http://data.europa.eu/esco/occupation/3e6488b6-3ca5-46b9-b380-5cd251d24824
  preferred_label: pilates teacher
  isco_code: '3423'
  code: 3423.2.3
  description: Pilates teachers plan, teach, and adapt exercises based on the work
    and principles of Joseph Pilates. They collect and analyse information for each
    client to ensure that programmes are safe, appropriate and effective. They apply
    the principles of Pilates through the planning and teaching of supportive, non-competitive
    lesson. They motivate and encourage clients to ensure their adherence to regular
    sessions.
- uri: http://data.europa.eu/esco/occupation/4dceca8d-9faf-487b-b342-c9d7dc209533
  preferred_label: assistant outdoor animator
  isco_code: '3423'
  code: 3423.1.2.1
  description: Assistant outdoor animators assist in planning outdoor activities,
    outdoor risk assessment and equipment monitoring. They manage the outdoor resources
    and groups. Assistant outdoor animators may help with office administration and
    maintenance hence they may work indoors.
- uri: http://data.europa.eu/esco/occupation/52a769ab-c899-4e8c-b31d-e5c2a01f32e3
  preferred_label: survival instructor
  isco_code: '3423'
  code: 3423.1.2.2.1
  description: Survival instructors guide groups into vast, natural areas, and assist
    them in a self-directed instruction of basic survival needs without any comfort
    facilities or modern gear to fall back on. They coach the participants into mastering
    survival skills such as fire making, producing primitive equipment, shelter construction
    and procurement of water and nourishment. They ensure the participants are aware
    of certain safety measures without diminishing the level of adventure, of environment
    protection and of risk management. They encourage efforts of leadership from the
    group and mentor the participants individually so as to push their limits responsibly
    and help overcome potential fears.
- uri: http://data.europa.eu/esco/occupation/55af6be8-039a-419c-b278-55b3f7d9ef92
  preferred_label: outdoor activities instructor
  isco_code: '3423'
  code: 3423.1.2.2
  description: Outdoor activities instructors organise and lead recreational outdoor
    trips through which the participants learn skills such as hiking, climbing, skiing,
    snowboarding, canoeing, rafting, rope course climbing etc. They also provide team-building
    exercises and activity workshops for disadvantaged participants. They ensure the
    safety of the participants and the equipment and explain safety measures for the
    participants to understand themselves as well. Outdoor activities instructors
    should be prepared to deal with the consequences of bad weather conditions, accidents
    and should responsibly manage possible anxiety from participants concerning certain
    activities.
- uri: http://data.europa.eu/esco/occupation/67d8c64f-e0d9-4e0b-be8b-510f9e20e698
  preferred_label: outdoor animator
  isco_code: '3423'
  code: 3423.1.2
  description: Outdoor animators are responsible for planning and organising outdoor
    activities. They may at times be involved in aspects of administration, front
    office tasks and tasks related to the activity base and maintenance of equipment.
    The workplace of an outdoor animator is mostly “in the field”, but can also take
    place indoors.
- uri: http://data.europa.eu/esco/occupation/6e298596-882b-4687-a0cf-3eb37f8fd328
  preferred_label: outdoor activities coordinator
  isco_code: '3423'
  code: 3423.1.1
  description: Outdoor activities coordinators organise and manage work programmes
    and resources (especially staff) to deliver the organisation’s products and services.
    They supervise and manage staff. They might train and develop the staff, or the
    planning and management of this process through others. They are highly aware
    of their responsibilities towards clients, technical issues, environmental issues,
    and safety issues. The role of an outdoor animation coordinator/supervisor is
    often “in the field”, but there may also be aspects of management and administration.
- uri: http://data.europa.eu/esco/occupation/86e8e172-234d-4e85-b9ae-6a4aecc2c321
  preferred_label: mountain guide
  isco_code: '3423'
  code: '3423.4'
  description: Mountain guides assist visitors, interpret natural heritage and provide
    information and guidance to tourists on mountain expeditions. They support visitors
    with activities such as hiking, climbing and skiing in addition to ensuring their
    safety through monitoring both weather and health conditions.
- uri: http://data.europa.eu/esco/occupation/88c55070-444a-45db-abe3-7b95c40bc9ec
  preferred_label: leisure attendant
  isco_code: '3423'
  code: 3423.2.1
  description: Leisure attendants promote health and fitness participation for new
    and existing members. They provide a clean, safe and friendly environment that
    promotes regular member attendance and satisfaction. They are source of information
    and encouragement for all members and actively assist fitness instructors and
    other workers wherever possible.
- uri: http://data.europa.eu/esco/occupation/a1b32703-a2e5-4e0a-910f-7cdd0293b52d
  preferred_label: specialised outdoor animator
  isco_code: '3423'
  code: 3423.1.2.3
  description: Specialised outdoor animators plan, organise, and safely deliver outdoor
    animator activities. They may also support one or more assistant outdoor animators,
    and be involved in aspects of administration, front office tasks and tasks related
    to activity base and equipment maintenance. They work with demanding clients,
    in terms of either their particular needs, abilities or disabilities or at the
    higher levels of skill and hazardous environments or conditions.
- uri: http://data.europa.eu/esco/occupation/c784c2db-e636-429f-8492-3191790a58d7
  preferred_label: fitness instructor
  isco_code: '3423'
  code: '3423.2'
  description: Fitness instructors build fitness participation of new and existing
    members through fitness experiences that meet their needs. They deliver fitness
    instruction to individuals, with the use of equipment, or to a group, through
    fitness classes. Both individual and group instructors have the purpose of promoting
    and delivering safe and effective exercise. Depending on the specific situation,
    some additional knowledge, skills and competences may be required.
- uri: http://data.europa.eu/esco/occupation/f7177f79-63e7-4944-8896-044056b62523
  preferred_label: personal trainer
  isco_code: '3423'
  code: 3423.2.2
  description: Personal trainers design, implement and evaluate exercise or physical
    activity programmes for one or more individual clients by collecting and analysing
    client information. They strive to ensure the effectiveness of personal exercise
    programmes. A personal trainer should also actively encourage potential clients
    to participate in and adhere to regular programmes, employing appropriate motivational
    strategies.
- uri: http://data.europa.eu/esco/occupation/480d2853-db07-43d4-847f-7ffdd8d368f5
  preferred_label: photojournalist
  isco_code: '3431'
  code: '3431.2'
  description: Photojournalists cover all kinds of news events by taken informative
    images. They tell stories by taking, editing and presenting images for newspapers,
    journals, magazines, television and other media.
- uri: http://data.europa.eu/esco/occupation/66542dd6-05a6-4d9e-97ff-3f4858c31ff9
  preferred_label: photographer
  isco_code: '3431'
  code: '3431.1'
  description: Photographers take pictures using digital or film cameras and equipment.
    Photographers may develop negatives or use computer software in order to produce
    finished images and prints.
- uri: http://data.europa.eu/esco/occupation/34e1c889-0fd1-4d1f-aba9-3b6263ae667a
  preferred_label: set builder
  isco_code: '3432'
  code: '3432.4'
  description: Set builders construct, build, prepare, adapt and maintain scenic elements
    used on stage and for filming movies or television programs. They use a wide variety
    of materials like wood, steel, aluminium and plastics. Their work is based on
    artistic vision, scale models, sketches and plans. They work in close cooperation
    with the designers and may build exibition stands for fairs, carnavals and other
    events.
- uri: http://data.europa.eu/esco/occupation/35eb0aa6-b40d-449d-9390-719be8912277
  preferred_label: visual merchandiser
  isco_code: '3432'
  code: '3432.6'
  description: Visual merchandisers are specialised in the promotion of the sale of
    goods, especially their presentation in retail outlets.
- uri: http://data.europa.eu/esco/occupation/4ed36f4c-9d5b-4a01-bf59-7f3c7844ce95
  preferred_label: scenic painter
  isco_code: '3432'
  code: 3432.4.1
  description: Scenic painters decorate sets for live performances. They employ a
    broad variety of crafting and painting techniques such as figurative painting,
    landscape painting and Trompe-l'œil to create convincing scenes. Their work is
    based on artistic vision, sketches and pictures. They work in close cooperation
    with the designers.
- uri: http://data.europa.eu/esco/occupation/73e776fb-4d99-4031-bad4-7716f121155d
  preferred_label: interior designer
  isco_code: '3432'
  code: '3432.1'
  description: Interior designers design or renovate of internal spaces, including
    structural alterations, fixtures and fittings, lighting and colour schemes, furnishings.
    They combine the efficient and functional use of space with an understanding of
    aesthetics.
- uri: http://data.europa.eu/esco/occupation/773e5ea3-235b-4e72-afc5-290dd841eed8
  preferred_label: interior planner
  isco_code: '3432'
  code: 3432.1.1
  description: Interior planners help clients in planning their interiors for commercial
    and private use.
- uri: http://data.europa.eu/esco/occupation/874a2080-a9b6-46a9-8662-c9b7d4208f73
  preferred_label: set designer
  isco_code: '3432'
  code: '3432.5'
  description: Set designers develop a set concept for a performance and supervise
    the execution of it. Their work is based on research and artistic vision. Their
    design is influenced by and influences other designs and must be conform with
    these designs and the overall artistic vision. Therefore, the designers work closely
    with artistic directors, operators and the artistic team. During rehearsals and
    performance they coach the operators to obtain optimal timing and manipulation.
    Set designers develop sketches, design drawings, models, plans or other documentation
    to support the workshop and performance crew. They may also design exhibition
    stands for fairs and other events.
- uri: http://data.europa.eu/esco/occupation/88760821-9df4-47a6-a1c2-ac08b9759396
  preferred_label: miniature set designer
  isco_code: '3432'
  code: '3432.3'
  description: Miniature set designers design and build miniature props and sets of
    motion pictures. They build models used for visual effects that meet the look
    and requirements of the production. Miniature set designers cut material using
    hand tools to construct three-dimensional props and sets.
- uri: http://data.europa.eu/esco/occupation/f1fcad3b-fdf0-444a-81b0-e50e96f8966a
  preferred_label: merchandiser
  isco_code: '3432'
  code: '3432.2'
  description: Merchandisers are responsible for positioning goods following standards
    and procedures.
- uri: http://data.europa.eu/esco/occupation/4e4a1aa1-ca53-406e-9ca6-889d4621a0ed
  preferred_label: big data archive librarian
  isco_code: '3433'
  code: '3433.2'
  description: Big data archive librarians classify, catalogue and maintain libraries
    of digital media. They also evaluate and comply with metadata standards for digital
    content and update obsolete data and legacy systems.
- uri: http://data.europa.eu/esco/occupation/6040c941-ab83-44b2-84e7-5cbfa1eafcdc
  preferred_label: art handler
  isco_code: '3433'
  code: '3433.1'
  description: Art handlers are trained individuals who work directly with objects
    in museums and art galleries. They work in coordination with exhibition registrars,
    collection managers, conservator-restorers and curators, among others, to ensure
    that objects are safely handled and cared for. Often they are responsible for
    packing and unpacking art, installing and deinstalling art in exhibitions, and
    moving art around the museum and storage spaces.
- uri: http://data.europa.eu/esco/occupation/a78d8e2b-fe31-447f-8694-38ed7198d143
  preferred_label: taxidermist
  isco_code: '3433'
  code: '3433.3'
  description: Taxidermists mount and reproduce deceased animals or parts of animals
    such as trophy heads for the purpose of public display and education, such as
    in a museum or monument, or for other sources of scientific study, or for a private
    collection.
- uri: http://data.europa.eu/esco/occupation/01484951-15e6-4b88-a20f-1201868d36a0
  preferred_label: head chef
  isco_code: '3434'
  code: 3434.1.1
  description: Head chefs manage the kitchen to oversee the preparation, cooking and
    service of food.
- uri: http://data.europa.eu/esco/occupation/1009be17-7efd-45f1-a033-566bf179c588
  preferred_label: chef
  isco_code: '3434'
  code: '3434.1'
  description: Chefs are culinary professionals with a flair for creativity and innovation
    to provide a unique gastronomic experience.
- uri: http://data.europa.eu/esco/occupation/8f10ea9b-bfdf-4a4c-9fa7-b6e02daa93e5
  preferred_label: pastry chef
  isco_code: '3434'
  code: 3434.1.2
  description: Pastry chefs are responsible for preparing, cooking and presenting
    desserts, sweet products and bakery products.
- uri: http://data.europa.eu/esco/occupation/a256838b-0843-4ad2-a2fb-4531f94e63d8
  preferred_label: private chef
  isco_code: '3434'
  code: 3434.1.3
  description: Private chefs comply with food and sanitation rules to prepare meals
    for their employers. They take into consideration the employer’s intolerances
    to specific ingredients or their preferences and cook the meals in the employer's
    home. Private chefs may also be asked to organise small dinner parties or other
    types of celebrations for special occasions.
- uri: http://data.europa.eu/esco/occupation/b10dc548-10e1-4447-8406-5101ff170bbf
  preferred_label: head pastry chef
  isco_code: '3434'
  code: 3434.1.2.1
  description: Head pastry chefs manage pastry staff and ensure the preparation, cooking
    and presentation of desserts, sweet products and pastry products.
- uri: http://data.europa.eu/esco/occupation/08edf4c5-3551-4690-9d09-f9b8b9194c90
  preferred_label: automated fly bar operator
  isco_code: '3435'
  code: '3435.4'
  description: Automated fly bar operators control the movements of sets and other
    elements in a performance based on the artistic or creative concept, in interaction
    with the performers. Their work is influenced by and influences the results of
    other operators. Therefore, the operators work closely together with the designers,
    operators and performers. Automated fly bar operators prepare and supervise the
    setup, program the equipment and operate automated fly bar systems, rigging systems
    or systems for horizontal movement. Their work is based on plans, instructions
    and calculations. The manipulation of heavy loads close to or above performers
    and audience makes this a high risk occupation.
- uri: http://data.europa.eu/esco/occupation/0eebf6d2-af43-4a18-b4b7-668fb6433b42
  preferred_label: intelligent lighting engineer
  isco_code: '3435'
  code: 3435.15.1
  description: Intelligent lighting engineers set up, prepare, check and maintain
    digital and automated lighting equipment in order to provide optimal lighting
    quality for a live performance. They cooperate with road crew to unload, set up
    and operate lighting equipment and instruments.
- uri: http://data.europa.eu/esco/occupation/1aa4bb15-c527-4a3b-9270-b3c71c4be111
  preferred_label: stage manager
  isco_code: '3435'
  code: '3435.22'
  description: Stage managers coordinate and supervise the preparation and execution
    of the show to ensure the scenic image and the actions on stage comply with the
    artistic vision of the director and the artistic team. They identify needs, monitor
    the technical and artistic processes during rehearsals and performances of live
    shows and events, according to the artistic project, the characteristics of the
    stage and technical, economic, human and security terms.
- uri: http://data.europa.eu/esco/occupation/1bb7c072-38c8-430a-b943-76bfa312a5f4
  preferred_label: stand-in
  isco_code: '3435'
  code: '3435.23'
  description: Stand-ins replace actors before the filming starts. They perform the
    actions of the actors during the lighting and audiovisual setup, so everything
    is in the right place during the actual shooting with the actors.
- uri: http://data.europa.eu/esco/occupation/22585d1e-48aa-45a6-a8c3-d072b4ff1b31
  preferred_label: media integration operator
  isco_code: '3435'
  code: '3435.13'
  description: Media Integration operators control the overall image, media content
    and/or the synchronisation and distribution of communication signals between the
    execution of different disciplines of a performance based on the artistic or creative
    concept, in interaction with the performers. Their work is influenced by and influences
    the results of other operators. Therefore, the operators work closely together
    with the designers, operators and performers. Media Integration operators prepare
    the connections between the different operation boards, supervise the setup, steer
    the technical crew, configure the equipment and operate the media integration
    system. Their work is based on plans, instructions and other documentation.
- uri: http://data.europa.eu/esco/occupation/2a6784d7-c457-413d-ba99-e320de11fc98
  preferred_label: dresser
  isco_code: '3435'
  code: '3435.7'
  description: Dressers assist and support artists before, during and after the performance
    to ensure the performers costumes are in line with the artistic vision of the
    director and the artistic team. They ensure the costume quality, maintain, check
    and repair costumes and assist with quick costume changes.
- uri: http://data.europa.eu/esco/occupation/2cbb23b0-0bf1-4871-9e6d-18f005987310
  preferred_label: audio production technician
  isco_code: '3435'
  code: '3435.3'
  description: Audio production technicians set up, prepare, check and maintain equipment
    in order to provide optimal sound quality for a live performance. They cooperate
    with road crew to unload, set up and operate sound equipment and instruments.
- uri: http://data.europa.eu/esco/occupation/30739eb6-218b-4e8a-9209-e2f36b9446cd
  preferred_label: costume attendant
  isco_code: '3435'
  code: 3435.7.1
  description: Costume attendant help dress actors and extras. They make sure everything
    is as the costume designer envisioned and ensure the continuity of appearance
    of the performers. Costume attendants maintain and repair these costumes. They
    store them correctly and safely after shooting.
- uri: http://data.europa.eu/esco/occupation/40da2fc6-8cb4-4cd3-8fe3-899715905070
  preferred_label: body artist
  isco_code: '3435'
  code: '3435.5'
  description: Body artists decorate clients' skin temporarily or permanently. They
    use various techniques such as tattooing or piercing. Body artists follow clients'
    preferences in terms of tattoo's or piercing's design and body surface and apply
    it safely. They also advise on methods to avoid infection following the procedures
    on clients' bodies.
- uri: http://data.europa.eu/esco/occupation/50b41847-6dad-4a2e-9427-a0374c2963fd
  preferred_label: stage machinist
  isco_code: '3435'
  code: 3435.25.4
  description: Stage machinists manipulate sets and other elements in a performance
    based on the artistic or creative concept, in interaction with the performers.
    Their work is influenced by and influences the results of other operators. Therefore,
    the stage machinists work closely together with the designers, operators and performers.
    Stage machinists prepare and perform the setup, execute changeovers and operate
    manual fly bar systems. Their work is based on plans, instructions and calculations.
- uri: http://data.europa.eu/esco/occupation/59cfa27b-874f-48b7-8880-b65420239559
  preferred_label: pyrotechnician
  isco_code: '3435'
  code: '3435.20'
  description: Pyrotechnicians control the pyrotechnical elements of a performance
    based on the artistic or creative concept, in interaction with the performers.
    Their work is influenced by and influences the results of other operators. Therefore,
    the operators work closely together with the designers, operators and performers.
    Pyrotechnicians prepare the pyrotechnics, supervise the setup, steer the technical
    crew, program the equipment and operate the pyro system. The use of explosive
    and combustible material close to performers and audience makes this a high risk
    occupation.
- uri: http://data.europa.eu/esco/occupation/5a0ff408-e1df-424b-a2d6-4b475a516f2a
  preferred_label: scenery technician
  isco_code: '3435'
  code: 3435.25.3
  description: Scenery technicians setup, prepare, check and maintain pre-assembled
    sets in order to provide optimal scenery quality for a live performance. They
    cooperate with road crew to unload, set up and move equipment and sets.
- uri: http://data.europa.eu/esco/occupation/71898b81-fc2f-4a97-826d-f45e49a8160a
  preferred_label: assistant video and motion picture director
  isco_code: '3435'
  code: '3435.2'
  description: Assistant video and motion picture directors are responsible for the
    organisation, scheduling and planning of the cast, crew and activities on a set.
    They assist the video and motion picture directors, maintain budgets and ensure
    that all production activities go according to schedule.
- uri: http://data.europa.eu/esco/occupation/7a18e959-44fe-49ae-9757-124f46a7487c
  preferred_label: prop maker
  isco_code: '3435'
  code: '3435.17'
  description: Prop makers construct, build, prepare, adapt and maintain props used
    on stage and for filming movies or television programs. Props may be simple imitations
    of real life objects, or may include electronic, pyrotechnical, or other effects.
    Their work is based on artistic vision, sketches and plans. They work in close
    cooperation with the designers involved in the production.
- uri: http://data.europa.eu/esco/occupation/7d27600b-5cff-4ebc-b259-cc2d47572035
  preferred_label: head of workshop
  isco_code: '3435'
  code: '3435.10'
  description: Heads of workshop coordinate specialised workshops that construct,
    build, prepare, adapt and maintain elements used on stage. Their work is based
    on artistic vision, schedules and overall production documentation. They liaise
    with the designers involved in the production, the production team and other services
    of the organisation.
- uri: http://data.europa.eu/esco/occupation/7f0d69cf-8b02-4a84-865a-37585dea9b43
  preferred_label: broadcasting programme director
  isco_code: '3435'
  code: '3435.6'
  description: Broadcasting programme directors make the programme schedule. They
    decide how much broadcast time a programme gets and when it is aired, based on
    a few factors like, ratings, viewer demographics, etc.
- uri: http://data.europa.eu/esco/occupation/84f20f5d-149a-4512-b319-18a81d3d6026
  preferred_label: stunt performer
  isco_code: '3435'
  code: '3435.24'
  description: Stunt performers execute actions that are too dangerous for actors
    to perform, that they are not physically able to do or require specialised skills
    such as fight scenes, jumping from building, dancing and others.
- uri: http://data.europa.eu/esco/occupation/87e644b2-8bc1-42d4-bb14-cc4abb0bc715
  preferred_label: light board operator
  isco_code: '3435'
  code: 3435.25.2
  description: Light board operators control the lighting of a performance based on
    the artistic or creative concept, in interaction with the performers. Their work
    is influenced by and influences the results of other operators. Therefore, the
    operators work closely together with the designers, operators and performers.
    Light board operators prepare and supervise the setup, steer the technical crew,
    program the equipment and operate the lighting system. They may be responsible
    for conventional or automated lighting fixtures and, in some instances, controlling
    video as well. Their work is based on plans, instructions and other documentation.
- uri: http://data.europa.eu/esco/occupation/89a0af2a-edf4-4d1a-8526-f4a8f476cea2
  preferred_label: location manager
  isco_code: '3435'
  code: '3435.11'
  description: Location managers are responsible for procuring locations for filming
    outside of the studio and all the logistics this includes. They negotiate site
    use, and manage and maintain the site during shooting. Location managers manage
    the safety and security of the film crew on site.
- uri: http://data.europa.eu/esco/occupation/949f1dc9-fb19-4212-8ac6-35ce83c88921
  preferred_label: prompter
  isco_code: '3435'
  code: '3435.16'
  description: Prompters prompt or cue performers when they forget their lines or
    neglect to move to the right position on the stage.
- uri: http://data.europa.eu/esco/occupation/99b096eb-a628-4e69-a79b-0563f2ed1b93
  preferred_label: script supervisor
  isco_code: '3435'
  code: '3435.21'
  description: Script supervisors are responsible for the continuity of the movie
    or television program. They watch every shot to make sure that it's according
    to the script. Script supervisors ensure that during editing the story makes visual
    and verbal sense and does not contain any continuity errors.
- uri: http://data.europa.eu/esco/occupation/9ac10bde-93a0-4570-afc2-e2b6cf46d8d2
  preferred_label: performance lighting technician
  isco_code: '3435'
  code: '3435.15'
  description: Performance lighting technicians setup, prepare, check and maintain
    equipment in order to provide optimal lighting quality for live performances.
    They cooperate with road crew to unload, set up and operate lighting equipment
    and instruments.
- uri: http://data.europa.eu/esco/occupation/a0ebd342-8f89-4947-893d-fee9468cf001
  preferred_label: pyrotechnic designer
  isco_code: '3435'
  code: '3435.19'
  description: Pyrotechnic designers develop a pyrotechnical design concept for a
    performance and supervise the execution of it. Their work is based on research
    and artistic vision. Their design is influenced by and influences other designs
    and must be conform with these designs and the overall artistic vision. Therefore,
    the pyrotechnic designers work closely with artistic directors, operators and
    the artistic team. During rehearsals and performance they coach the operators
    to obtain optimal timing and manipulation. Pyrotechnic designers develop plans,
    cue lists and other documentation to support the operators and production crew.
    Pyrotechnic designers sometimes also work as autonomous artists, creating pyrotechnical
    art outside a performance context.
- uri: http://data.europa.eu/esco/occupation/acb6b99a-6c13-482a-81b1-8b5614e0153e
  preferred_label: stage technician
  isco_code: '3435'
  code: 3435.25.5
  description: Stage technicians control different aspects of a performance based
    on the artistic or creative concept, in interaction with the performers. They
    prepare and perform the setup, program the equipment and operate various systems.
    Stage technicians take care of lighting, sound, video, sets and/or fly systems.
    Their work is based on plans, instructions and calculations. They can work in
    small venues, theatres and other small artistic productions.
- uri: http://data.europa.eu/esco/occupation/bd94312f-05c8-455d-a2f6-5490489ac4a4
  preferred_label: prop master/prop mistress
  isco_code: '3435'
  code: '3435.18'
  description: Prop masters/mistresses setup, prepare, check and maintain objects
    used on stage by actors or other small movable objects called props. They cooperate
    with road crew to unload, set up and prepare the props. During a performance they
    position props, hand them over or take them back from the actors.
- uri: http://data.europa.eu/esco/occupation/bfc1b4e9-624c-4fba-89f2-d218bba9e257
  preferred_label: performance flying director
  isco_code: '3435'
  code: '3435.14'
  description: Performance flying directors design people flying effects for a performance
    and supervise or perform the execution of it. Their work is based on research
    and artistic vision. Their design is influenced by and influences other designs
    and must be conform with these designs and the overall artistic vision. They train
    the actors for the flying choreography and manipulate them during the performance.
    Performance flying directors prepare and supervise the setup, perform security
    checks and operate the person fly systems. The manipulation of persons on height,
    close to or above performers and audience makes this a high risk occupation.
- uri: http://data.europa.eu/esco/occupation/c05090e2-d599-46c8-a47b-3d52a893ca55
  preferred_label: mask maker
  isco_code: '3435'
  code: '3435.12'
  description: Mask makers construct, adapt and maintain masks for live performances.
    They work from sketches, pictures and artistic visions combined with knowledge
    of the human body to ensure the wearer maximum range of movement. They work in
    close cooperation with the designers.
- uri: http://data.europa.eu/esco/occupation/d6a395eb-6664-47f1-9be5-91aa2e8ba87d
  preferred_label: fight director
  isco_code: '3435'
  code: '3435.9'
  description: Fight directors coach performers to safely execute fight sequences.
    They direct fights for performances such as dance, movies and television, circus,
    variety, and others. Fight directors may have a background in sports such as fencing,
    shooting or boxing, martial arts such as judo, wushu or karate, or military training.
- uri: http://data.europa.eu/esco/occupation/d71eb4f9-2de3-4955-ba79-7b82ea3fe32c
  preferred_label: followspot operator
  isco_code: '3435'
  code: 3435.25.1
  description: Followspot operators control follow spots based on the artistic or
    creative concept, in interaction with the performers. Follow spots are specialized
    lighting instruments, designed to follow performers or movements on stage. Movement,
    size, beam width and color are controlled manually. Therefore, the operators work
    closely together with the light board operators and performers. Their work is
    based on instructions and other documentation. Their work can include working
    on heights, in bridges or above an audience.
- uri: http://data.europa.eu/esco/occupation/e1106f6d-81fc-44f8-af94-8b7d2763065c
  preferred_label: assistant stage director
  isco_code: '3435'
  code: '3435.1'
  description: Assistant stage directors support the needs of the stage director and
    the production for each assigned stage production, and serve as a liaison between
    performers, theatre staff and stage directors. They take notes, provide feedback,
    coordinate the rehearsal schedule, take blocking, rehearse or review scenes, prepare
    or distribute actor notes, and facilitate communication between designers, production
    staff, and stage director.
- uri: http://data.europa.eu/esco/occupation/e4fca489-4c79-4392-874f-9ea1051c05c8
  preferred_label: extra
  isco_code: '3435'
  code: '3435.8'
  description: Extras perform actions in the background or in crowds during filming.
    They do not contribute to the plot directly but they are important to create a
    certain atmosphere.
- uri: http://data.europa.eu/esco/occupation/f09b6100-28a6-4be5-9726-ecf5b24f74f6
  preferred_label: theatre technician
  isco_code: '3435'
  code: '3435.25'
  description: Theatre technicians execute all technical tasks to support live performances.
    They build and break down stages and decors, install and operate sound, light,
    recording and video equipment and organise the transport of decors and technical
    equipment for performances on displacement.
- uri: http://data.europa.eu/esco/occupation/9729c0f3-c9bc-482e-ac59-a82ec3b67ba3
  preferred_label: data centre operator
  isco_code: '3511'
  code: '3511.1'
  description: Data centre operators maintain computer operations within the data
    centre. They manage daily activities within the centre to solve problems, maintain
    the system availability, and evaluate the system's performance.
- uri: http://data.europa.eu/esco/occupation/1242d99a-47f1-4a62-b884-33746db8a6ca
  preferred_label: ICT help desk manager
  isco_code: '3512'
  code: '3512.2'
  description: ICT help desk managers monitor the delivery of technical support services
    to clients according to the predefined deadlines. They plan and organise the user
    support actions and troubleshoot ICT problems and issues. ICT help desk managers
    supervise the help desk team ensuring that the customers get the appropriate feedback
    and support. They also participate in developing customer service guidelines and
    in reinforcing the team.
- uri: http://data.europa.eu/esco/occupation/3e7bf729-4442-4b9f-ad5e-83111963795c
  preferred_label: ICT technician
  isco_code: '3512'
  code: '3512.4'
  description: ICT technicians install, maintain, repair and operate information systems
    and any ICT related equipment (laptops, desktops, servers, tablets, smart phones,
    communications equipment, printers and any piece of computer related peripheral
    networks), and any type of software (drivers, operating systems, applications).
- uri: http://data.europa.eu/esco/occupation/a44a1dc5-be08-4840-8bd5-770c4ac1ca6d
  preferred_label: ICT security technician
  isco_code: '3512'
  code: '3512.3'
  description: ICT security technicians propose and implement necessary security updates
    and measures whenever is required. They advise, support, inform and provide training
    and security awareness.
- uri: http://data.europa.eu/esco/occupation/aaeec9a7-dc57-4485-890c-86b3eef735f9
  preferred_label: ICT help desk agent
  isco_code: '3512'
  code: '3512.1'
  description: ICT help desk agents provide technical assistance to computer users,
    answer questions or solve computer problems for clients via telephone or electronically.
    They provide assistance concerning the use of computer hardware and software.
- uri: http://data.europa.eu/esco/occupation/591c5063-69ce-4551-ba60-e2304111130f
  preferred_label: aviation data communications manager
  isco_code: '3513'
  code: '3513.1'
  description: Aviation data communications managers perform the planning, implementation
    and maintenance of data transmission networks. They support data processing systems
    linking participant user agencies to central computers.
- uri: http://data.europa.eu/esco/occupation/64c7d461-152c-477f-a8e2-c2c537e9d617
  preferred_label: ICT network technician
  isco_code: '3513'
  code: '3513.2'
  description: ICT network technicians install, maintain and troubleshoot networks,
    data communications equipment and network installed devices such as printers and
    storage area networks. They also analyse and fix network-related problems reported
    by users.
- uri: http://data.europa.eu/esco/occupation/dc8ef7da-d2c0-4474-96a0-6d0385eeec1e
  preferred_label: webmaster
  isco_code: '3514'
  code: '3514.1'
  description: Webmasters deploy, maintain, monitor and support a web server to meet
    service requirements. They ensure optimum system integrity, security, backup and
    performance. They coordinate the content, quality and style of websites, execute
    the website strategy and update and add new features to websites.
- uri: http://data.europa.eu/esco/occupation/061f56c6-36eb-4aa7-b5ef-98b7a569da1c
  preferred_label: performance video operator
  isco_code: '3521'
  code: 3521.1.4
  description: Performance video operators control the (projected) images of a performance
    based on the artistic or creative concept, in interaction with the performers.
    Their work is influenced by and influences the results of other operators. Therefore,
    the operators work closely together with the designers, operators and performers.
    Performance video operators prepare media fragments, supervise the setup, steer
    the technical crew, program the equipment and operate the video system. Their
    work is based on plans, instructions and other documentation.
- uri: http://data.europa.eu/esco/occupation/0da2ee5c-b480-498f-97a8-a292a0f4c54c
  preferred_label: sound operator
  isco_code: '3521'
  code: 3521.1.10
  description: Sound operators control the sound of a performance based on the artistic
    or creative concept, in interaction with the performers. Their work is influenced
    by and influences the results of other operators. Therefore, the operators work
    closely together with the designers and performers. They prepare audio fragments,
    supervise the setup, steer the technical crew, program the equipment and operate
    the sound system. Their work is based on plans, instructions and other documentation.
- uri: http://data.europa.eu/esco/occupation/239707a0-4754-4f4b-80b6-6b1ef5657aed
  preferred_label: sound mastering engineer
  isco_code: '3521'
  code: 3521.1.9
  description: Sound mastering engineers convert finished recordings to the desired
    format such as CD, vinyl and digital. They ensure the quality of the sound on
    all formats.
- uri: http://data.europa.eu/esco/occupation/36095ccd-c62d-4f1f-8af7-1fd10618b044
  preferred_label: sound editor
  isco_code: '3521'
  code: 3521.1.8
  description: Sound editors create the soundtrack and sound effects for motion pictures,
    television series or other multimedia productions. They are responsible for all
    the music and sound featured in the movie, series or videogames. Sound editors
    use equipment to edit and mix image and sound recordings and make sure that the
    music, sound and dialogue is synchronised with and fits in the scene. They work
    closely together with the video and motion picture editor.
- uri: http://data.europa.eu/esco/occupation/47e4135b-95d1-4462-920c-afcbd7c4d9be
  preferred_label: performance rental technician
  isco_code: '3521'
  code: 3521.1.3
  description: Performance rental technicians prepare, maintain, issue, transport,
    set‐up, program, operate, take in, check, clean and store audiovisual, performance
    and event equipment. Their work is based on plans, instructions and order forms.
- uri: http://data.europa.eu/esco/occupation/4d102082-8d43-4c59-81ab-08a7509f3c40
  preferred_label: boom operator
  isco_code: '3521'
  code: 3521.1.1
  description: Boom operators set up and operate the boom microphone, either by hand,
    on an arm or on a moving platform. They make sure that every microphone is correctly
    stationed on set and in the best position to capture the dialogues. Boom operators
    are also responsible for the microphones on the actors clothing.
- uri: http://data.europa.eu/esco/occupation/6fed206a-ac4d-492b-a81a-5a3a0f2b67bc
  preferred_label: camera operator
  isco_code: '3521'
  code: 3521.1.2
  description: Camera operators setup and operate digital film cameras to shoot domestic
    motion pictures or television programs. They work together with the video and
    motion picture director, the director of photography, or the private client. Camera
    operators give advice on how to shoot scenes to actors, the video and motion picture
    director and other camera operators.
- uri: http://data.europa.eu/esco/occupation/7642cbcc-9839-47fb-b2cf-d4bb831d6c93
  preferred_label: audio-visual technician
  isco_code: '3521'
  code: '3521.1'
  description: Audio-visual technicians set up, operate and maintain equipment to
    record and edit images and sound for radio and television broadcasts, at live
    events and for telecommunication signals.
- uri: http://data.europa.eu/esco/occupation/790c8dca-f624-4bdc-ac16-27bc13ead188
  preferred_label: sound designer
  isco_code: '3521'
  code: 3521.1.7
  description: Sound designers develop a sound design concept for a performance and
    supervise the execution of it. Their work is based on research and artistic vision.
    Their design is influenced by and influences other designs and must be conform
    with these designs and the overall artistic vision. Therefore, the designers work
    closely with artistic directors, operators and the artistic team. Sound designers
    prepare audio fragments to be used in a performance, which can involve recording,
    composing, manipulating and editing. Sound designers develop plans, cue lists
    and other documentation to support the operators and production crew. Sound designers
    sometimes also work as autonomous artists, creating sound art outside a performance
    context.
- uri: http://data.europa.eu/esco/occupation/a59feab2-9bc9-4b25-97cf-995998164502
  preferred_label: video technician
  isco_code: '3521'
  code: 3521.1.11
  description: Video technicians set up, prepare, check and maintain equipment in
    order to provide optimal projected image quality for a live performance. They
    cooperate with road crew to unload, set up and operate video equipment and instruments.
- uri: http://data.europa.eu/esco/occupation/aa50ae49-1e40-4ba9-959f-22a11ff172b4
  preferred_label: recording studio technician
  isco_code: '3521'
  code: 3521.1.6
  description: Recording studio technicians operate and maintain microphones and headsets
    in recording booths in recording studios. They operate mixing panels. Recording
    studio technicians manage all sound production requirements. They advise singers
    on the use of their voice. Recording studio technicians edit recordings into a
    finished product.
- uri: http://data.europa.eu/esco/occupation/dce6a68c-8a05-4c26-85d4-6fbc43e7d822
  preferred_label: projectionist
  isco_code: '3521'
  code: 3521.1.5
  description: Projectionists operate and maintain projection equipment in cinema
    theatres. They inspect the movie films before loading them into the projector.
    Projectionist make sure that everything runs smoothly during the projection of
    the movie. They also are responsible for the proper storage of movie films.
- uri: http://data.europa.eu/esco/occupation/fe4a72af-6206-4d86-90c1-b5fb4b5ba2b2
  preferred_label: broadcast technician
  isco_code: '3521'
  code: '3521.2'
  description: Broadcast technicians install, start up, maintain, monitor and repair
    equipment used for the transmission and reception of television and radio broadcast
    signals. They ensure that all materials are available in a suitable format of
    transmittable quality according to the transmission deadline. Broadcast technicians
    also maintain and repair this equipment.
- uri: http://data.europa.eu/esco/occupation/d84bf1d7-ef99-40c4-a407-3791d6531b44
  preferred_label: telecommunications engineering technician
  isco_code: '3522'
  code: '3522.1'
  description: Telecommunications engineering technician deploy, maintain and monitor
    a telecommunication system that provides interactions between data and voice communications,
    such as telephone, video conferencing, computer, and voicemail systems. They are
    also involved in the design, manufacturing, construction, maintenance and repair
    of telecommunication systems. Telecommunications engineering technicians provide
    technical assistance in the research and development of telecommunication equipment.
