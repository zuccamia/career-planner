    in order to buy and sell stocks and other securities. They are in close contact
    with their clients and ensure that what they buy or sell through the stock exchange
    market is according to their clients' wishes. Stock brokers undertake analyst
    research to make recommendations to their clients and expand their client base
    through various methods.
- uri: http://data.europa.eu/esco/occupation/c01cdf85-3ce0-4d12-ae86-e4e63493fafa
