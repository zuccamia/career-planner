# Source: ESCO classification v1.2.1 (European Commission)
# This is a modified/adapted subset. See THIRD_PARTY_NOTICES.md.
version_date: '2026-05-11'
source: ESCO v1.2.1 English CSV package (https://esco.ec.europa.eu)
occupations:
- uri: http://data.europa.eu/esco/occupation/0ee67d5e-8de9-48f0-97c5-ba23d486b1e9
  preferred_label: secretary of state
  isco_code: '1111'
  code: '1111.6'
  description: Secretaries of state assist heads of government departments, such as
    ministers, and aid in the supervision of proceedings in the department. They assist
    in the direction of policies, operations, and department staff, and perform planning,
    resource allocation, and decision-making duties.
- uri: http://data.europa.eu/esco/occupation/404a50e9-61ce-448d-a695-bbfc697a0727
  preferred_label: government minister
  isco_code: '1111'
  code: '1111.2'
  description: Government ministers function as decision-makers in national or regional
    governments, and head government ministries. They perform legislative duties and
    supervise the operation of their department.
- uri: http://data.europa.eu/esco/occupation/5bca96fd-4203-400b-be58-9e9b50bc98da
  preferred_label: member of parliament
  isco_code: '1111'
  code: '1111.5'
  description: Members of parliament represent their political party's interests in
    parliaments. They perform legislative duties, developing and proposing new laws,
    and communicate with government officials to assess current issues and government
    operations. They oversee the implementation of laws and policies and function
    as government representatives to the public to ensure transparency.
- uri: http://data.europa.eu/esco/occupation/6cee3765-2b3b-48b0-af2b-1eb512d071fd
  preferred_label: mayor
  isco_code: '1111'
  code: '1111.4'
  description: Mayors chair their jurisdiction's council meetings and act as main
    supervisor of the local government's administrative and operational policies.
    They also represent their jurisdiction in ceremonial and official events and promote
    activities and events. They, together with the council, hold the local or regional
    legislative power and oversee development and implementation of policies. They
    also supervise staff and perform administrative duties.
- uri: http://data.europa.eu/esco/occupation/7226c10f-701b-4711-8843-140aace12c6f
  preferred_label: city councillor
  isco_code: '1111'
  code: '1111.1'
  description: City councillors represent residents of a city in the city's council
    and perform local legislative duties. They examine the concerns of the residents
    and respond to them in an appropriate manner, and represent their political party's
    policies and programs in the city council as well. They communicate with governmental
    officials to ensure the city and its agenda are represented and supervise all
    operations which fall under the city council's responsibility.
- uri: http://data.europa.eu/esco/occupation/73c3f018-71ce-4dc1-abdd-14cea7873717
  preferred_label: senator
  isco_code: '1111'
  code: '1111.7'
  description: Senators perform legislative duties on a central government level,
    such as working on constitutional reforms, negotiating on bills of law, and settling
    conflicts between other governmental institutions.
- uri: http://data.europa.eu/esco/occupation/d63789ac-74b5-40e3-b890-685513c38e12
  preferred_label: governor
  isco_code: '1111'
  code: '1111.3'
  description: Governors are the main legislators of a nation's unit such as a state
    or province. They supervise staff, perform administrative and ceremonial duties,
    and function as the main representative for their governed region. They regulate
    local governments in their region.
- uri: http://data.europa.eu/esco/occupation/0752ed49-03e7-4d75-8314-a051b3771a1d
  preferred_label: public administration manager
  isco_code: '1112'
  code: '1112.6'
  description: Public administration managers direct, monitor and evaluate the implementation
    of government policies. They supervise staff and manage resources used for implementation,
    and write reports on the implementation process. They also communicate with government
    officials and the public to inform them on the policies. Public administration
    managers may also participate in the design and creation of public policies.
- uri: http://data.europa.eu/esco/occupation/190ec9a5-938c-45a5-bd9c-c12b1af33353
  preferred_label: ambassador
  isco_code: '1112'
  code: 1112.3.1
  description: Ambassadors represent their own government in foreign countries for
    diplomatic and peace-keeping purposes. They deal with political negotiation between
    the country of origin and the country where they are stationed and ensure the
    protection of citizens from their home nation in the nation they are stationed.
    They facilitate communication between the two nations and perform advisory functions
    to the home government to help develop foreign policy.
- uri: http://data.europa.eu/esco/occupation/1fb92021-9576-4c85-8759-f6918e9f0ad4
  preferred_label: diplomat
  isco_code: '1112'
  code: '1112.3'
  description: Diplomats represent their home nation and government in international
    organisations. They negotiate with the organisation's officials to ensure the
    home nation's interests are protected, as well as facilitate productive and friendly
    communication between the home nation and the international organisation.
- uri: http://data.europa.eu/esco/occupation/2ae275fe-4f11-4a38-9e95-d466d74b42a3
  preferred_label: police commissioner
  isco_code: '1112'
  code: '1112.5'
  description: Police commissioners supervise an entire police department by monitoring
    and regulating the administrative and operational activities of a police department,
    as well as developing policies and procedural methods. They are responsible for
    the cooperation between the various divisions in the department, and overseeing
    the employees' performance.
- uri: http://data.europa.eu/esco/occupation/5c5b153e-4bf8-4f3d-973d-12fabf306d12
  preferred_label: secretary general
  isco_code: '1112'
  code: '1112.7'
  description: Secretaries general head international governmental or nongovernmental
    organisations. They supervise staff, direct policy and strategy development, and
    function as main representative of the organisation.
- uri: http://data.europa.eu/esco/occupation/9e4269d5-e10e-4f49-ac99-65c833f933a2
  preferred_label: central bank governor
  isco_code: '1112'
  code: '1112.1'
  description: Central bank governors set the monetary and regulatory policy, determine
    interest rates, maintain price stability, control the national money supply and
    issuance and foreign exchange currency rates and gold reserves. They oversee and
    control the banking industry.
- uri: http://data.europa.eu/esco/occupation/a2494c65-11a8-4853-9371-c89333c33be1
  preferred_label: embassy counsellor
  isco_code: '1112'
  code: 1112.3.2
  description: Embassy counsellors supervise specific sections in an embassy, such
    as economics, defence or political affairs. They perform advisory functions for
    the ambassador, and perform diplomatic functions in their section or specialty.
    They develop policies and implementation methods and supervise the embassy section's
    staff.
- uri: http://data.europa.eu/esco/occupation/a8d05b64-f60b-4dd9-91c2-e2e63d82f2f5
  preferred_label: consul
  isco_code: '1112'
  code: '1112.2'
  description: Consuls represent governments in foreign institutions such as embassies
    in order to facilitate economic and political cooperation between the two nations.
    They protect the interests of their home nation and provide bureaucratic assistance
    to citizens living as expatriates or travelling in the host country.
- uri: http://data.europa.eu/esco/occupation/f2413988-f76a-4636-a4b1-9952517aa21f
  preferred_label: fire commissioner
  isco_code: '1112'
  code: '1112.4'
  description: Fire commissioners oversee the activity of the fire department making
    sure the services supplied are effective and the necessary equipment is provided.
    They develop and manage the business policies ensuring the legislation in the
    field is followed. Fire commissioners perform safety inspections and promotes
    fire prevention education.
- uri: http://data.europa.eu/esco/occupation/e9cf8b24-6b8b-47cc-9dd3-b601aa135960
  preferred_label: special-interest groups' official
  isco_code: '1114'
  code: '1114.1'
  description: Special-interest groups' officials represent and act on behalf of special-interest
    groups such as trade unions, employer organisations, trade and industry associations,
    sports associations and humanitarian organisations. They develop policies and
    ensure their implementation. Special-interest groups' officials speak for their
    members in negotiations about topics such as working conditions and safety.
- uri: http://data.europa.eu/esco/occupation/070e94a8-a933-4557-9b95-fefe7f4f1763
  preferred_label: public employment service manager
  isco_code: '1120'
  code: '1120.5'
  description: Public employment service managers supervise the operations of a public
    employment agency. They oversee the staff that helps people find employment or
    provide occupational guidance.
- uri: http://data.europa.eu/esco/occupation/4be4ea31-1211-4f0c-82bb-f6fe10791f4d
  preferred_label: airport chief executive
  isco_code: '1120'
  code: 1120.3.1
  description: Airport chief executives lead a group of airport directors who are
    responsible for all areas of the airport. They envision and make decisions on
    the strategic direction of the airport based on the information provided by their
    team of managers.
- uri: http://data.europa.eu/esco/occupation/6c3fd65e-2d24-47d8-bc22-9e93512bdcc2
  preferred_label: chief executive officer
  isco_code: '1120'
  code: '1120.3'
  description: Chief executive officers hold the highest ranking in a pyramidal corporate
    structure. They are able to hold a complete idea of the functioning of the business,
    its departments, risks, and stakeholders. They analyse different kinds of information
    and create links among them for decision-making purposes. They serve as a communication
    link with the board of directors for reporting and implementation of the overall
    strategy.
- uri: http://data.europa.eu/esco/occupation/73b10c97-b003-45dc-a36d-c1d585c04be1
  preferred_label: social entrepreneur
  isco_code: '1120'
  code: '1120.6'
  description: Social entrepreneurs create innovative products or service models to
    tackle social and environmental challenges, pursuing through their profits a social
    mission that benefits a wider community or the environment. They often use a more
    democratic decision-making system by involving closely their stakeholders, and
    strive to achieve change at a systems level, by influencing policies, market evolutions
    and even mentalities.
- uri: http://data.europa.eu/esco/occupation/93dfef83-579c-4bef-b0ba-d41ee9cbda85
  preferred_label: animal facility manager
  isco_code: '1120'
  code: '1120.1'
  description: Animal facility managers coordinate and plan all activities of a zoo.
    They formulate policies, manage daily operations, and plan the use of materials
    and human resources. They are the driving force and public face of their institution.
    This often involves representing their institution on a national, regional and
    global scale and taking part in coordinated zoo activities.
- uri: http://data.europa.eu/esco/occupation/c64a6e4e-5b38-4f93-b26d-aded817aeaf3
  preferred_label: chief operating officer
  isco_code: '1120'
  code: '1120.4'
  description: Chief operating officers are the right hand and second in command of
    a company's chief executive officer. They ensure that the daily operations of
    the company run smoothly. Chief operating officers also develop company policies,
    rules and goals.
- uri: http://data.europa.eu/esco/occupation/04f39bfa-bc03-4480-98bc-b18ce4fe4b4b
  preferred_label: accounting manager
  isco_code: '1211'
  code: 1211.1.1
  description: Accounting managers assume responsibility for all accounting activities
    relating to financial reporting. They develop and maintain accounting principles
    and procedures to ensure timely and accurate financial statements, supervise accounting
    staff and manage the accounting activities within the appropriate time frame and
    budget.
- uri: http://data.europa.eu/esco/occupation/30f3ea93-882a-4525-841c-1d5b4b64076f
  preferred_label: financial manager
  isco_code: '1211'
  code: '1211.1'
  description: Financial managers handle all the matters in reference to the finance
    and investments of a company. They manage financial operations of companies such
    as the assets, liabilities, equity and cash flow aiming to maintain the financial
    health of the company and operative viability. Financial managers evaluate the
    strategic plans of the company in financial terms, maintain transparent financial
    operations for taxation and auditing bodies, and create the financial statements
    of the company at the end of the fiscal year.
- uri: http://data.europa.eu/esco/occupation/3e1a2f3c-20d6-4d33-aa6f-63cd2a32698d
  preferred_label: corporate treasurer
  isco_code: '1211'
  code: 1211.1.4
  description: Corporate treasurers determine and oversee the financial strategic
    policies of a company or organisation. They use cash management techniques like
    account organisation, cash flow monitoring, liquidity planning and control, risk
    management including currency and commodity risks and maintain close connection
    with banks and rating agencies.
- uri: http://data.europa.eu/esco/occupation/44e0c015-309d-4f67-98a3-1e036966ed7f
  preferred_label: budget manager
  isco_code: '1211'
  code: 1211.1.3
  description: Budget managers assess financial proposals of different departments
    before granting financial resources to projects. They monitor the implementation
    of budget policies and procedures. They work closely with other departments in
    the evaluation of programs, their impact in the organisation, the revenue that
    they can yield, and the financial efforts required.
- uri: http://data.europa.eu/esco/occupation/b680251e-b3c7-4029-9849-66a95081801c
  preferred_label: bank treasurer
  isco_code: '1211'
  code: 1211.1.2
  description: Bank treasurers oversee all aspects of the financial management of
    a bank. They manage the liquidity and solvency of the bank. They manage and present
    current budgets, revise financial forecasts, prepare accounts for audit, manage
    the bank's accounts and maintain accurate record-keeping of financial documentation.
- uri: http://data.europa.eu/esco/occupation/3d999108-f37a-4087-a936-b2911240b8c2
  preferred_label: volunteer manager
  isco_code: '1212'
  code: '1212.3'
  description: Volunteer managers work across the non-profit sector to recruit, train,
    motivate and supervise volunteers. They are in charge of designing volunteer assignments,
    recruiting volunteers, reviewing the tasks undertaken and impact made, providing
    feedback and managing their overall performance against the objectives of the
    organisation. Volunteer coordinators might also manage online volunteering activities,
    sometimes known as cyber-volunteering or e-volunteering.
- uri: http://data.europa.eu/esco/occupation/949ab84f-5d76-4139-a568-45691b7ebc53
  preferred_label: equality and inclusion manager
  isco_code: '1212'
  code: 1212.2.1
  description: Equality and inclusion managers develop policies to improve affirmative
    action, diversity and equality matters. They inform staff in corporations on the
    importance of the policies, and implementation and advise senior staff on corporate
    climate. They also perform guidance and support duties for employees.
- uri: http://data.europa.eu/esco/occupation/96e88e86-f2c7-42e6-a2b2-17e4f08d4ee0
  preferred_label: employee volunteering programme coordinator
  isco_code: '1212'
  code: '1212.1'
  description: Employee volunteering programme coordinators work across sectors and
    fields to coordinate and manage the employee volunteering (sometimes called corporate
    volunteering) programme for their employer. They are in charge of connecting with
    local community organisations to determine needs and arrange for volunteers from
    within the staff of the company to engage with local entities, such as local authorities
    or local civil society organisations, to meet those needs. Employee volunteering
    programme coordinators might also arrange for volunteers to undertake their duties
    online in collaboration with civil society initiatives meeting identified needs.
    These roles can exist in the company or setting where the employees are based
    and also in the civil society organisation who receives the volunteers from the
    employee or corporate volunteering scheme.
- uri: http://data.europa.eu/esco/occupation/a14e96a7-6c4d-4d69-8c6f-7ccadf77bac5
  preferred_label: corporate training manager
  isco_code: '1212'
  code: '1212.4'
  description: Corporate training managers coordinate all the training activities
    and development programmes in a company. They also design and develop new training
    modules and supervise all the activities related to the planning and delivery
    of these programmes.
- uri: http://data.europa.eu/esco/occupation/a6e8a6bf-9209-4d19-a131-a8b6431e0f75
  preferred_label: talent acquisition manager
  isco_code: '1212'
  code: '1212.5'
  description: Talent acquisition managers plan, develop, manage and oversee talent
    acquisition and recruitment processes. Interview candidates, check applicants'
    references and manage posts on online job boards.
- uri: http://data.europa.eu/esco/occupation/f605bcd2-90b6-45a0-a558-d05016d68a77
  preferred_label: human resources manager
  isco_code: '1212'
  code: '1212.2'
  description: Human resources managers plan, design and implement processes related
    to the human capital of companies. They develop programs for recruiting, interviewing,
    and selecting employees based on a previous assessment of the profile and skills
    required in the company. Moreover, they manage compensation and development programs
    for the company's employees comprising trainings, skill assessment and yearly
    evaluations, promotion, expat programs, and general assurance of the well-being
    of the employees in the workplace.
- uri: http://data.europa.eu/esco/occupation/0917ab6b-18a8-4cfd-8e7a-843b88cf9457
  preferred_label: branch manager
  isco_code: '1213'
  code: 1213.5.1
  description: Branch managers are responsible for the management of all the affairs
    related with a company in a specific geographic region or business branch. They
    receive indications from the headquarters, and depending on the structure of the
    company, they aim to implement the strategy of the company while adapting it to
    the market where the branch operates. They envision management of employees, communications,
    marketing efforts, and follow up to results and objectives.
- uri: http://data.europa.eu/esco/occupation/1c85eee2-a8ca-4750-a889-10a3e6c17b80
  preferred_label: EU funds manager
  isco_code: '1213'
  code: '1213.6'
  description: EU funds managers administer EU funds and financial resources in public
    administrations. They are involved in the definition of investment priorities
    and are responsible for drafting the Operational Programs, liaising with national
    authorities for determining the programs ’objectives and priority axes. EU funds
    managers supervise projects financed through EU funds, monitoring their implementation
    and the results achieved and are involved in certification and auditing activities.
    They might also be responsible for managing the relations with the European institutions
    for issues related to state aids and the grant management.
- uri: http://data.europa.eu/esco/occupation/2cf2b905-3308-4b5d-8e8d-633fc7a3f3ce
  preferred_label: sustainability manager
  isco_code: '1213'
  code: '1213.8'
  description: Sustainability managers are responsible for ensuring the sustainability
    of business processes. They provide assistance in the design and implementation
    of plans and measures to ensure that the manufacturing processes and products
    comply with given environmental regulations and social responsibility standards
    and they monitor and report on the implementation of sustainability strategies
    within the company supply chain and business process. They analyse issues linked
    to manufacturing processes, use of materials, waste reduction, energy efficiency
    and products traceability to improve environmental and social impacts and integrate
    sustainability aspects into the company culture.
- uri: http://data.europa.eu/esco/occupation/4f49df98-98b8-4a9e-98ad-9c5557817eba
  preferred_label: strategic planning manager
  isco_code: '1213'
  code: 1213.2.2
  description: Strategic planning managers create, together with a team of managers,
    the strategic plans of the company as a whole, and provide coordination in the
    implementation per department. They help to interpret the overall plan and create
    a detailed plan for each one of the departments and branches. They ensure consistency
    in the implementation.
- uri: http://data.europa.eu/esco/occupation/544cd9cf-e2ee-4ac0-8a02-7147af6b97d7
  preferred_label: business manager
  isco_code: '1213'
  code: '1213.5'
  description: Business managers are responsible for setting the objectives of the
    business unit of a company, creating a plan for the operations, and facilitating
    the achievement of the objectives and implementation of the plan together with
    employees of the segment and stakeholders. They keep an overview of the business,
    understand detailed information of the business unit and support the department,
    and make decisions based on the information at hand.
- uri: http://data.europa.eu/esco/occupation/57e87533-e523-4ee5-bf21-94a39fcc279b
  preferred_label: health safety and environmental manager
  isco_code: '1213'
  code: '1213.7'
  description: Health, safety and environmental managers design and execute corporate
    policies and procedures related to occupational health and safety and environmental
    protection. They analyse business processes to ensure compliance with government
    and environment legislation, conduct risk assessment in the domain of occupational
    health and safety, evaluate the environmental impact of economic activities and
    design the appropriate measures for the improvement of work environments and cultures.
    They coordinate the implementation of an integrated health, safety and environmental
    management system, defining effective indicators, organizing audits and eventually
    participating in accident investigation and reporting. They promote an integrated
    approach to sustainability and occupational health within business organisations,
    liaising with corporate and line managers and training employees. They are responsible
    for drafting technical documentation related to the compliance with health and
    safety and environmental legislation.
- uri: http://data.europa.eu/esco/occupation/64e38ce7-3901-4261-bfee-77c7a77397f2
  preferred_label: policy manager
  isco_code: '1213'
  code: '1213.2'
  description: Policy managers are responsible for managing the development of policy
    programs and ensuring that the strategic objectives of the organization are met.
    They oversee the production of policy positions, as well as the organization's
    campaign and advocacy work in fields such as environmental, ethics, quality, transparency,
    and sustainability.
- uri: http://data.europa.eu/esco/occupation/7a3996d8-b90d-4b81-bd5e-e37f005b2683
  preferred_label: director of compliance and information security in gambling
  isco_code: '1213'
  code: 1213.9.1
  description: Directors of compliance and information security in gambling follow
    the regulatory compliance for gambling and oversee information security to ensure
    secure and safe use of all information technology associated with gambling.
- uri: http://data.europa.eu/esco/occupation/91f93dc4-1b71-4053-b6fb-c579ec19303a
  preferred_label: procurement department manager
  isco_code: '1213'
  code: '1213.3'
  description: Procurement department managers ensure that the organisation's policy
    goals are transformed into concrete actions and support their teams to achieve
    the best results for their clients and the public. They oversee the public procurement
    professionals in the organisation to deliver on their objectives.
- uri: http://data.europa.eu/esco/occupation/b1ed68f8-8d51-4bcc-8825-bd554859480f
  preferred_label: director of compliance and information security
  isco_code: '1213'
  code: '1213.9'
  description: Directors of compliance and information security follow the regulatory
    compliance and oversee information security to ensure security of all information
    technology associated.
- uri: http://data.europa.eu/esco/occupation/c94f3565-d987-431f-a46b-6f4e018e0bd7
  preferred_label: programme manager
  isco_code: '1213'
  code: '1213.4'
  description: Programme managers coordinate and oversee several projects working
    simultaneously. They ensure workability and compatibility among projects ensuring
    that overall, each one of the projects under the management of project managers,
    turn out profitable and leveraging one to the other.
- uri: http://data.europa.eu/esco/occupation/d00b4607-c4fe-4f3e-8974-29401e23223c
  preferred_label: social security administrator
  isco_code: '1213'
  code: 1213.2.1
  description: Social security administrators direct and develop government-provided
    social security programmes in order to aid public welfare, as well as promote
    social security programmes. They supervise staff working in governmental social
    security, and investigate existing policies in order to assess issues and develop
    improvement proposals.
- uri: http://data.europa.eu/esco/occupation/e246eca2-2cec-45b4-ae76-aa1f37d07bc5
  preferred_label: tourism policy director
  isco_code: '1213'
  code: 1213.2.3
  description: Tourism policy directors develop and implement policies to improve
    tourism to their region. They develop marketing plans to promote the region in
    foreign regions, and monitor the operation of the tourism industry. They conduct
    research to investigate how tourism policies could be improved and implemented
    and investigate the benefits of the tourism industry to the government.
- uri: http://data.europa.eu/esco/occupation/0552ff45-b282-455c-b431-fb05a0e00801
  preferred_label: foundry manager
  isco_code: '1219'
  code: 1219.5.2
  description: Foundry managers coordinate and implement short and medium term casting
    production schedules, and coordinate the development, support and improvement
    of casting processes, and the reliability efforts of the maintenance and engineering
    departments. They also partner with ongoing remediation initiatives.
- uri: http://data.europa.eu/esco/occupation/109e0a5d-203d-4af6-8f70-692111335ec3
  preferred_label: quality services manager
  isco_code: '1219'
  code: '1219.7'
  description: Quality services managers manage the quality of services in business
    organisations. They ensure the quality of in-house company operations such as
    customer requirements and service quality standards. Quality services managers
    monitor the company's performance and implement changes where necessary.
- uri: http://data.europa.eu/esco/occupation/1313aeea-63a9-4b4d-82d1-dbe00ff9ed10
  preferred_label: corporate social responsibility manager
  isco_code: '1219'
  code: '1219.2'
  description: Corporate social responsibility managers monitor the practices of organisations
    and companies with regard to ethics and impact on the larger community. They advise
    on social responsibility and sustainability matters depending on the company's
    needs. Corporate social responsibility managers promote actions that are environmentally
    conscious, philanthropic or related to human rights.
- uri: http://data.europa.eu/esco/occupation/3c136897-4e0e-41ef-bb57-d8152323b93a
  preferred_label: business service manager
  isco_code: '1219'
  code: '1219.1'
  description: Business service managers are reponsible for the provision of professional
    services to companies. They organise the provision of services tailored to the
    needs of the client and liaise with clients to agree on the contractual obligations
    for both parties.
- uri: http://data.europa.eu/esco/occupation/546ec458-e2a4-4cb1-ac17-553d314ac2e2
  preferred_label: water treatment plant manager
  isco_code: '1219'
  code: 1219.5.4
  description: Water treatment plant managers supervise water treatment, storage and
    distribution in a water plant. They ensure the plant's operations are compliant
    with regulation, and supervise staff. They also implement new policies, and oversee
    equipment maintenance.
- uri: http://data.europa.eu/esco/occupation/680831bb-64fc-4fc8-ae58-c450327d9700
  preferred_label: manufacturing facility manager
  isco_code: '1219'
  code: '1219.5'
  description: Manufacturing facility managers foresee the maintenance and routine
    operational planning of buildings intended to be used for manufacturing activities.
    They control and manage health and safety procedures, supervise the work of contractors,
    plan and handle buildings maintenance operations, fire safety and security issues,
    and oversee buildings' cleaning activities.
- uri: http://data.europa.eu/esco/occupation/81cc1583-3614-4207-8e54-00b8cd4ddf09
  preferred_label: chemical plant manager
  isco_code: '1219'
  code: 1219.5.1
  description: Chemical plant managers coordinate the day-to-day production of chemical
    products ensuring the quality of products and equipment, the safety of personnel
    and protection of the environment. They define and implement the investment budget,
    deploy industrial objectives and manage the unit as a profit center representing
    the company in its economic and social environment.
- uri: http://data.europa.eu/esco/occupation/8b26eec6-7497-4218-8364-9b5983b04ae7
  preferred_label: defence administration officer
  isco_code: '1219'
  code: '1219.3'
  description: Defence administration officers perform managerial duties and administrative
    tasks in defense institutions, such as maintenance of records, management of staff,
    and handling of accounts.
- uri: http://data.europa.eu/esco/occupation/94e0bedd-e56e-42be-a5a4-b74a260f437c
  preferred_label: department manager
  isco_code: '1219'
  code: '1219.4'
  description: Department managers are responsible for the operations of a certain
    division or department of a company. They ensure objectives and goals are reached
    and manage employees.
- uri: http://data.europa.eu/esco/occupation/b42c5ed4-c6e4-4694-934f-96127719cc43
  preferred_label: facilities manager
  isco_code: '1219'
  code: 1219.1.1
  description: Facilities managers perform strategic planning as well as routine operational
    planning related to buildings' administration and maintenance. They control and
    manage health and safety procedures, supervise the work of contractors, plan and
    handle buildings maintenance operations and fire safety and security issues, oversee
    buildings' cleaning activities and utilities infrastructure and are in charge
    of space management.
- uri: http://data.europa.eu/esco/occupation/b633af32-c8c0-4481-9971-7932ea4b16b5
  preferred_label: wood factory manager
  isco_code: '1219'
  code: 1219.5.5
  description: Wood factory managers realise planning, commercial and advisory tasks
    of wood factory and timber trade. They also manage purchasing, sales, customer
    service and marketing of wood and wood products.
- uri: http://data.europa.eu/esco/occupation/bea99fea-0383-4c63-b944-70d4799de2c5
  preferred_label: project manager
  isco_code: '1219'
  code: '1219.6'
  description: Project managers oversee the project on a daily basis and are responsible
    for delivering high-quality results within the identified objectives and constraints,
    ensuring the effective use of the allocated resources. They are responsible for
    risk and issue management, project communication and stakeholder management. Project
    managers perform the activities of planning, organising, securing, monitoring
    and managing the resources and work necessary to deliver specific project goals
    and objectives in an effective and efficient way.
- uri: http://data.europa.eu/esco/occupation/cb446db8-e8b3-418c-a21c-2d10faea42a5
  preferred_label: power plant manager
  isco_code: '1219'
  code: 1219.5.3
  description: Power plant managers supervise operations in power plants which produce
    and transport energy. They coordinate the production of energy in the plant, and
    supervise the construction, operation and maintenance of energy transmission and
    distribution networks and systems.
- uri: http://data.europa.eu/esco/occupation/e9507d34-c70f-474f-a4a3-d2cbfe50f6e9
  preferred_label: security manager
  isco_code: '1219'
  code: 1219.1.2
  description: Security managers ensure security for people, such as customers and
    employees, and company’s assets either fixed, movable, machines, vehicles, and
    real state. They ensure safety and security by enforcing security policies, keeping
    track of different events, implementing security protocols, creating emergency
    response procedures, conducting security evaluations, and supervising security
    staff members.
- uri: http://data.europa.eu/esco/occupation/04b52c04-0620-4558-8f89-e252de2963ff
  preferred_label: auction house manager
  isco_code: '1221'
  code: '1221.1'
  description: Auction house managers are responsible for the staff and activities
    in an auction house. Moreover, they manage the finances and marketing aspects
    of the auction house.
- uri: http://data.europa.eu/esco/occupation/0ddbf393-38f1-4c22-b14c-fe775008f321
  preferred_label: chief marketing officer
  isco_code: '1221'
  code: '1221.3'
  description: Chief marketing officers manage the high level marketing operations
    in a company. They coordinate all the efforts related to the marketing, promotional,
    and advertising activities across units or geographical areas. They make sure
    that different activities aimed at creating awareness of products are profitable
    for the company. They take decisions and prepare reports on marketing projects
    and the costs they entail.
- uri: http://data.europa.eu/esco/occupation/1663e9d9-857b-4efa-9ab6-886c7fc763f6
  preferred_label: motor vehicle aftersales manager
  isco_code: '1221'
  code: 1221.3.2.1.3
  description: Motor vehicle aftersales managers maximise sales by closing business
    on an ongoing basis. They negotiate with existing clients for contract renewals.
    They maintain contracts, deal with claims, manage warranty, and investigate damages
    on products.
- uri: http://data.europa.eu/esco/occupation/1dd7c3cb-2d58-4dad-ae15-c9081174ab7e
  preferred_label: online sales channel manager
  isco_code: '1221'
  code: 1221.3.2.1.4
  description: Online sales channel managers define the sales programme for e-commerce
    such as goods sold via e-mail, internet and social media. They also assist in
    planning the online sales strategy and identifying marketing opportunities. Online
    sales channel managers also analyse competitor sites, review the site performance
    and analytics.
- uri: http://data.europa.eu/esco/occupation/2d3d7188-47ab-49b9-9045-e452d9db06f1
  preferred_label: commercial director
  isco_code: '1221'
  code: '1221.4'
  description: Commercial directors are responsible for the income generation for
    the commercial sector of their company. They manage several commercial tasks such
    as setting targets, overseeing the development of products, planning and developing
    selling efforts, managing sales agents, and determining product prices.
- uri: http://data.europa.eu/esco/occupation/425ed170-bf90-42c9-b5bd-148282ed96ff
  preferred_label: destination manager
  isco_code: '1221'
  code: 1221.3.1
  description: Destination managers are in charge of managing and implementing the
    national/regional/local tourism strategies (or policies) for destination development,
    marketing and promotion.
- uri: http://data.europa.eu/esco/occupation/53a362a4-4c83-4ce2-837f-d1faba4cd247
  preferred_label: bid manager
  isco_code: '1221'
  code: '1221.7'
  description: Bid managers are responsible for researching and selecting tenders,
    analysing tenders and submitting tenders. They take into account the requirements
    of the tendering company and the possibilities for implementation. They take care
    of both the calculation of costs and the estimation of possible risks. Bid managers
    are responsible for communication with the contracting company or institutions.
    They work together with project managers serve as an interface to customers in
    larger companies. They are often the primarily responsible for the offers (proposals)
    and their presentation.
- uri: http://data.europa.eu/esco/occupation/6ce3c372-408b-4c46-86d8-ad6b9255d686
  preferred_label: tourism product manager
  isco_code: '1221'
  code: '1221.6'
  description: Tourism product managers analyse the market, research potential offers,
    develop products, plan and organise the distribution and marketing processes.
- uri: http://data.europa.eu/esco/occupation/6fcf4638-e7c7-4978-9302-9a7b63a3d57c
  preferred_label: marketing manager
  isco_code: '1221'
  code: 1221.3.2
  description: Marketing managers carry out the implementation of efforts related
    to the marketing operations in a company. They develop marketing strategies and
    plans by detailing cost and resources needed. They analyse the profitability of
    these plans, develop pricing strategies, and strive to raise awareness on products
    and companies among targeted customers.
- uri: http://data.europa.eu/esco/occupation/7a031723-2b2c-4fdd-8ed5-30d67088b8b8
  preferred_label: licensing manager
  isco_code: '1221'
  code: 1221.3.2.1.2
  description: Licensing managers oversee licenses and rights of a company regarding
    use of its products or intellectual property. They ensure that third parties comply
    with specified agreements and contracts, and negotiate with and maintain relationships
    between both parties.
- uri: http://data.europa.eu/esco/occupation/a2ade835-81c2-452e-a4d8-a90348bbe378
  preferred_label: aftersales service manager
  isco_code: '1221'
  code: 1221.3.2.1.5
  description: Aftersales service managers are responsible for the lifecycle of the
    products delivered to customers for at least the warranty period, after which,
    in accordance with customer needs, for the sale of spare parts and technical support.
    They recruit the staff and collaborators, exercise leadership, and follow KPIs
    for products stocks, margins and orders. Ensure that safety rules and procedures
    are followed by the whole team. Manage the claims and guarantee-related processes.
- uri: http://data.europa.eu/esco/occupation/a7594892-ff23-4e2a-aedf-2f967ebca15c
  preferred_label: sales manager
  isco_code: '1221'
  code: 1221.3.2.1
  description: Sales managers develop sales and targeting strategies for a company.
    They manage sales teams, allocate sales resources based on the plans, prioritise
    and follow up on critical leads, develop sales pitches and adjust them over time,
    and maintain a sales platform to track all leads and sales.
- uri: http://data.europa.eu/esco/occupation/c530b0ee-46f8-40fb-818c-d9b44b891cb9
  preferred_label: banking products manager
  isco_code: '1221'
  code: '1221.2'
  description: Banking products managers study the market of banking products and
    adapt the existing ones to the characteristics of this evolution or create new
    products to suit clients needs. They monitor and evaluate the performance indicators
    of these products and suggest improvements. Banking products managers assist with
    the sales and marketing strategy of the bank.
- uri: http://data.europa.eu/esco/occupation/d954fd71-0e2f-4cf9-85f0-c040fa6cbda9
  preferred_label: promotion manager
  isco_code: '1221'
  code: 1221.3.3
  description: Promotion managers plan and implement promotional programs in the point-of-sale
    of products. They coordinate all efforts from personnel, below-the-line (BTL)
    advertising material, and conventional advertising efforts in order to raise awareness
    of a specific promotion.
- uri: http://data.europa.eu/esco/occupation/dab60fc6-c16e-4de7-b969-b323784f5a49
  preferred_label: category manager
  isco_code: '1221'
  code: 1221.3.2.1.1
  description: Category managers define the sales programme for specific product groups.
    They research market demands and newly supplied products.
- uri: http://data.europa.eu/esco/occupation/dc97adbe-f807-4ad8-8f3c-c24b3416cdef
  preferred_label: digital marketing manager
  isco_code: '1221'
  code: '1221.5'
  description: Digital marketing managers are responsible for the elaboration of the
    company's digital marketing strategy with the goal of improving brand recognition
    and brand awareness, in line with the company's mission and vision. They oversee
    the execution of digital marketing and communication strategies involving the
    use of social media, email marketing, marketing automation, search engine optimisation,
    online events and online advertisement through data driven methodologies and by
    measuring and monitoring digital marketing KPIs in order to promptly implement
    corrective action plan. They manage and interpret competitors and consumers' data
    and conduct research on market conditions.
- uri: http://data.europa.eu/esco/occupation/4ebf2dae-c326-4627-befe-fbc91410f432
  preferred_label: advertising manager
  isco_code: '1222'
  code: 1222.1.1
  description: Advertising managers perform the implementation of the advertising
    initiatives planned in the strategic marketing plan. They organise and prepare
    the resources needed to launch advertising campaigns and operations in advertising
    agencies. They prepare and align the communication channels, negotiate contracts,
    and ensure that operations adhere to budgets.
- uri: http://data.europa.eu/esco/occupation/6cc19251-763b-4de1-b4f7-526c9ff732d2
  preferred_label: public relations manager
  isco_code: '1222'
  code: 1222.1.2
  description: Public relations managers strive to convey and maintain a desired image
    or reputation of a company, individual, governmental institution, or organisation
    in general to the public and stakeholders at large. They use all sorts of media
    and events to promote the positive image of products, humanitarian causes or organisations.
    They attempt to ensure that all public communications portray clients the way
    they want to be perceived.
- uri: http://data.europa.eu/esco/occupation/cd7b838c-51f6-41ec-9067-bb974c0f991b
  preferred_label: communication manager
  isco_code: '1222'
  code: '1222.1'
  description: Communication managers are responsible for developing communication
    strategies in order to promote the organization's mission, services or product.
    They coordinate communication projects and manage the communications issued by
    the company for both the internal and the external clients. They supervise internal
    communications, ensuring that communications reach each one of the employees and
    further questions can be answered. For external communications, they coordinate
    coherence among the messages transmitted in mails, printed materials, press articles,
    and corporate promotional materials. They strive to maintain truthful communications.
- uri: http://data.europa.eu/esco/occupation/01bcac9f-7881-4664-bd63-dea700e3b117
  preferred_label: clothing development manager
  isco_code: '1223'
  code: 1223.2.1.1
  description: Clothing development managers define product concepts that are consistent
    with target consumers and overall marketing strategy. They receive scientific
    findings and specifications in order to lead the briefing and implementation of
    all relevant seasonal and strategic concepts, including distribution by channel,
    product, colour introductions, and merchandised assortments. They ensure realisation
    and execution within budget. They manage and execute the product line and category
    life cycle from concept determination through sales and distribution, contribution
    in market research and industry trends to influence category concepts and products.
- uri: http://data.europa.eu/esco/occupation/1488589a-7b83-471d-b094-492f5616f4e0
  preferred_label: product development manager
  isco_code: '1223'
  code: 1223.2.1
  description: Product development managers coordinate the development of new products
    from beginning to end. They receive briefings and start envisioning the new product
    considering design, technical and cost criteria. They conduct research on market
    needs and create prototypes of new products for untapped market opportunities.
    Product development managers also improve and boost technological quality.
- uri: http://data.europa.eu/esco/occupation/62001bb7-4611-4b61-903e-d98589c0821a
  preferred_label: games development manager
  isco_code: '1223'
  code: 1223.2.1.3
  description: Games development managers supervise and coordinate the creation, development,
    distribution, and selling of games. They communicate with manufacturers to ensure
    the production of games.
- uri: http://data.europa.eu/esco/occupation/73856e9e-eca2-44c2-bb3c-aaedf4b25979
  preferred_label: insurance product manager
  isco_code: '1223'
  code: 1223.1.1
  description: Insurance product managers set and direct the development of new insurance
    products, following the product lifecycle policy and the general insurance strategy.
    They also coordinate the marketing and sales activities related to the specific
    insurance products of the company. Insurance product managers inform their sales
    managers (or the sales department) about their newly developed insurance products.
- uri: http://data.europa.eu/esco/occupation/73ceb2f9-18e3-4cfe-9c06-e9fb31ece440
  preferred_label: research and development manager
  isco_code: '1223'
  code: '1223.2'
  description: Research and development managers coordinate the efforts of scientists,
    academical researchers, product developers, and market researchers towards the
    creation of new products, the improvement of current ones or other research activities,
    including scientific research. They manage and plan research and development activities
    of an organisation, specify goals and budget requirements and manage the staff.
- uri: http://data.europa.eu/esco/occupation/8a0afc76-4a09-449a-9e7b-a33495889f95
  preferred_label: chief product officer
  isco_code: '1223'
  code: '1223.3'
  description: Chief Product Officers conduct the product strategy of a company, define
    the product vision, prioritise customer needs and design the product roadmap.
    Key drivers of innovation product processes and revenue growth, they are responsible
    for the entire product development process and product-related activities which
    involve design, elaboration, product strategy setting, creating multi-functional
    partnerships, and new products launch. Moreover, they lead the organisation’s
    product management team and closely work with the marketing department.
- uri: http://data.europa.eu/esco/occupation/9db7d74c-b46d-45c0-b611-6bcb7456ecc6
  preferred_label: ICT research manager
  isco_code: '1223'
  code: 1223.2.2.1
  description: ICT research managers plan, manage and monitor research activities
    and evaluate emerging trends in the information and communication technology field
    to assess their relevance. They also design and oversee staff training on the
    use of new technology and recommend ways to implement new products and solutions
    that will maximise benefits for the organisation.
- uri: http://data.europa.eu/esco/occupation/9f1d546b-1b4e-4b64-97e8-600fc502304b
  preferred_label: innovation officer
  isco_code: '1223'
  code: 1223.2.3
  description: Innovation officers are the link between industrial production and
    innovation strategies for a company. They work to improve the company responses
    to sudden change in the markets through innovation with the aim of prevent and
    deal with business disruptions. They manage and train a team of workers who focus
    on innovative projects or ideas. They supervise and plan changes in products and
    process to achieve better organizational efficiency and help the company to be
    more competitive. They work side-by-side with other executives to make sure they
    would support initiatives aimed at fostering innovation.
- uri: http://data.europa.eu/esco/occupation/9f508305-80ce-4111-8722-f2c9b4a44890
  preferred_label: product manager
  isco_code: '1223'
  code: '1223.1'
  description: Product managers are responsible for managing the lifecycle of a product.
    They research and develop new products in addition to managing existing ones through
    market research and strategic planning. Product managers perform marketing and
    planning activities to increase profits.
- uri: http://data.europa.eu/esco/occupation/ada3fc30-c205-4279-90b8-ed5c7c467626
  preferred_label: leather goods product development manager
  isco_code: '1223'
  code: 1223.2.1.4
  description: Leather goods product development managers coordinate the leather goods
    design and product development process in order to comply with marketing specifications,
    deadlines, strategic requirements and policies of the company. They communicate
    and collaborate with other cross functional teams or professionals involved in
    leather goods production, such as logistics and marketing, costing, planning,
    production and quality assurance. They are responsible for the leather goods product
    collections development which involve activities, such as tracking style development
    and reviewing design specification in order to meet the design vision. They are
    also responsible for the manufacturing environment and the rent-ability of the
    companies.
- uri: http://data.europa.eu/esco/occupation/c02ee787-c30b-4f0d-9d7f-6eb36fc44a5d
  preferred_label: research manager
  isco_code: '1223'
  code: 1223.2.2
  description: Research managers oversee the research and development functions of
    a research facility or program or university. They support the executive staff,
    coordinate work activities, and monitor staff and research projects. They may
    work in a wide array of sectors, such as the chemical, technical and life sciences
    sector. Research managers can also advise on research and execute research themselves.
- uri: http://data.europa.eu/esco/occupation/ef6020f9-11b4-4d1a-96e0-903331594121
  preferred_label: footwear product development manager
  isco_code: '1223'
  code: 1223.2.1.2
  description: Footwear product development managers coordinate the footwear design
    and the product and collection development process in order to comply with design
    specifications, deadlines, strategic requirements and policies of the company.
    They track style development and review design specifications in order to meet
    the design vision, the manufacturing environment, and the company’s financial
    goals.
- uri: http://data.europa.eu/esco/occupation/f04eaeff-52f5-4d52-93ad-6f846884827f
  preferred_label: forester
  isco_code: '1311'
  code: '1311.1'
  description: Foresters are responsible for monitoring the natural and economic viability
    of a woodland or forest and for activities related to its management and conservation.
- uri: http://data.europa.eu/esco/occupation/4fe4b1f1-e84d-4056-b062-83d5a64fc571
  preferred_label: aquaculture harvesting manager
  isco_code: '1312'
  code: '1312.1'
  description: Aquaculture harvesting managers control harvesting operations of aquatic
    organisms which entails understanding and knowledge of techniques and equipment
    used in harvesting processes.
- uri: http://data.europa.eu/esco/occupation/5945cba8-19a4-4632-8a8f-4186e2bad1a3
  preferred_label: aquaculture production manager
  isco_code: '1312'
  code: '1312.3'
  description: Aquaculture production managers plan, direct and coordinate the production
    of fish, shellfish or other forms of aquatic life such as cash crops, in large-scale
    aquaculture operations to culture and harvest or for release into fresh, brackish
    or salt water.
- uri: http://data.europa.eu/esco/occupation/a5826284-14fb-4866-b9be-69ce69db1b71
  preferred_label: aquaculture husbandry manager
  isco_code: '1312'
  code: '1312.2'
  description: Aquaculture husbandry managers specialise in the husbandry of ongrowing
    aquatic species, especially in the feeding, growth, and stock management processes.
- uri: http://data.europa.eu/esco/occupation/02f26b2f-879c-4811-8381-65e8dd3f4a16
  preferred_label: footwear quality manager
  isco_code: '1321'
  code: 1321.2.2.1
  description: Footwear quality managers implement, manage and promote the quality
    systems in the company, using adequate tools and methodologies based on national,
    international or company standards. They are in charge of establishing requirements
    and objectives, as well as preparing documents. They analyse complaints, and promote
    and coordinate corrective and preventive measures. They promote an effective internal
    and external communication and ensure the consumer's demands are met. They are
    responsible for the definition of instruments which monitor and control the quality
    systems, namely internal or external auditing, and they participate in the internal
    auditing.
- uri: http://data.europa.eu/esco/occupation/0368c4d4-94cf-4168-a84d-283a25880e0d
  preferred_label: metal production manager
  isco_code: '1321'
  code: 1321.2.1.8
  description: Metal production managers organise and manage the day-to-day and long-term
    project work in a metal fabrication factory, to process basic metals into fabricated
    metals. They create and schedule production plans, recruit new staff, enforce
    safety and company policies, and strive for customer satisfaction through guaranteeing
    the product's quality.
- uri: http://data.europa.eu/esco/occupation/0d21a30d-25d9-427b-b8e4-339408425ff5
  preferred_label: chemical production manager
  isco_code: '1321'
  code: 1321.2.1.1
  description: Chemical production managers are responsible for the technical coordination
    and control of the chemical production processes. They steer one or more manufacturing
    units and oversee the implementation of technical and human means, within the
    framework of objectives of volume, quality and planning. Chemical production managers
    design and ensure that the production plans and schedules are met. They are responsible
    for implementation of the processes designed to ensure quality of the manufactured
    product, good working conditions and environmental practices, and safety of the
    workplace.
- uri: http://data.europa.eu/esco/occupation/1f8967ce-9faa-4d56-a656-50e041f7d07e
  preferred_label: leather goods quality manager
  isco_code: '1321'
  code: 1321.2.2.2
  description: Leather goods quality managers manage and promote the systems of quality
    assurance implemented in the organisations. They carry out tasks in order to achieve
    predefined requirements and objectives and foster the internal and external communication,
    while aiming for the continuous improvement and the customer satisfaction.
- uri: http://data.europa.eu/esco/occupation/262d4e45-0cf7-4399-be6f-3d5e96826ef2
  preferred_label: leather wet processing department manager
  isco_code: '1321'
  code: 1321.2.1.6.2
  description: Leather wet processing department managers plan and organise the work,
    the staff and equipment of the department involving the washing of the raw hides
    or skins. They remove unwanted elements and they weigh and prepare them for tanning.
    They coordinate supply of chemicals and raw materials. They perform elaboration
    of manufacturing recipes and monitor quality.
- uri: http://data.europa.eu/esco/occupation/316309e4-5fce-4dca-85d1-07702217ea19
  preferred_label: leather production manager
  isco_code: '1321'
  code: 1321.2.1.6
  description: Leather production managers plan all aspects of the leather production
    process. They ensure the required output of the factory in terms of quality and
    quantity of the leather. They organise the production staff. They monitor and
    ensure the operation of machinery and equipment. They cooperate with managers
    of each production department.
- uri: http://data.europa.eu/esco/occupation/3afd6af4-0c34-4311-ad73-65adc2571f0c
  preferred_label: clothing operations manager
  isco_code: '1321'
  code: 1321.2.1.2
  description: Clothing operations managers schedule orders and delivery times in
    order to ensure the efficient flow of the production system.
- uri: http://data.europa.eu/esco/occupation/45517bc3-0887-416d-95fe-6ace1b90bddd
  preferred_label: metallurgical manager
  isco_code: '1321'
  code: 1321.2.1.7
  description: Metallurgical managers coordinate and implement short and medium term
    metallurgical or steel-making production schedules, and coordinate the development,
    support and improvement of steel-making processes, and the reliability efforts
    of the maintenance and engineering departments. They also partner with ongoing
    remediation initiatives.
