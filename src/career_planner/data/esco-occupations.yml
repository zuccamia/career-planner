  preferred_label: camping ground manager
  isco_code: '1439'
  code: '1439.2'
  description: Camping ground managers plan, direct, or coordinate all campsite facilities
    and manage employees.
- uri: http://data.europa.eu/esco/occupation/9358775a-3769-4327-bf25-6c0d9d69d192
  preferred_label: travel agency manager
  isco_code: '1439'
  code: '1439.8'
  description: Travel agency managers are in charge of managing employees and activities
    of a travel agency. They organise, advertise and sell tourist offers and travel
    deals for specific regions.
- uri: http://data.europa.eu/esco/occupation/dd25a2b0-add0-4ae2-bd85-bb644e0d0c39
  preferred_label: call centre manager
  isco_code: '1439'
  code: '1439.1'
  description: Call centre managers set the objectives of the service per month, week,
    and day. They perform micromanagement of the results obtained in the centre in
    order to proactively react with plans, trainings, or motivational plans depending
    on the problems faced by the service. They strive for achievement of KPIs such
    as minimum operating time, sales per day, and compliance with quality parameters.
- uri: http://data.europa.eu/esco/occupation/f4e3dd1c-f86b-4a69-8887-547255eadc79
  preferred_label: tourist information centre manager
  isco_code: '1439'
  code: '1439.6'
  description: Tourist information centre managers are in charge of managing employees
    and activities of a centre which provides information and advice to travellers
    and visitors about local attractions, events, travelling and accommodation.
- uri: http://data.europa.eu/esco/occupation/f5166c6b-3467-4fc4-9343-d12e870d9def
  preferred_label: contact centre manager
  isco_code: '1439'
  code: '1439.3'
  description: Contact centre managers coordinate and plan the daily operations of
    contact centres. They ensure that customer inquiries are satisfied efficiently
    and according to policies. They manage employees, resources and procedures to
    improve best practices and achieve high levels of customer satisfaction.
- uri: http://data.europa.eu/esco/occupation/57a12047-4f1e-40ed-add5-9736923f231b
  preferred_label: astronomer
  isco_code: '2111'
  code: '2111.1'
  description: Astronomers research the formation, structures, properties, and development
    of celestial bodies and interstellar matter. They use ground-based equipment and
    space-based equipment to collect data about the space for research purposes.
- uri: http://data.europa.eu/esco/occupation/7f2761eb-4edc-48ad-9fbf-eed0a0db9a21
  preferred_label: physicist
  isco_code: '2111'
  code: '2111.3'
  description: Physicists are scientists who study physical phenomena. They focus
    their research depending on their specialisation, which can range from atomic
    particle physics to the study of phenomena in the universe. They apply their findings
    for the improvement of society by contributing to the development of energy supplies,
    treatment of illness, game development, cutting-edge equipment, and daily use
    objects.
- uri: http://data.europa.eu/esco/occupation/bc659adc-f42c-4ef6-89fe-fd030033f446
  preferred_label: cosmologist
  isco_code: '2111'
  code: '2111.2'
  description: Cosmologists focus on the study of the universe as a whole, which is
    made up by its origin, evolution and ultimate fate. They use tools and scientific
    instruments to observe and study other galaxies and astronomical objects such
    as stars, black holes, planets and other celestial bodies.
- uri: http://data.europa.eu/esco/occupation/0809ea8a-4f77-4351-a7f1-b9a7b99b6c0b
  preferred_label: weather forecaster
  isco_code: '2112'
  code: 2112.1.3
  description: Weather forecasters gather meteorological data. They predict the weather
    according to these data. Weather forecasters present these forecasts to the audience
    via radio, television or online.
- uri: http://data.europa.eu/esco/occupation/1c862e14-80f8-4aa8-8f1c-fd2ca95b63ad
  preferred_label: meteorologist
  isco_code: '2112'
  code: '2112.1'
  description: Meteorologists study climate processes, measure and predict weather
    patterns and provide consultancy services to a variety of weather information
    users. They work out models for weather forecasting, develop instruments to collect
    meteorological data and compile statistics and databases.
- uri: http://data.europa.eu/esco/occupation/2960c96e-7228-4327-b0a1-85fc13691844
  preferred_label: aviation meteorologist
  isco_code: '2112'
  code: 2112.1.1
  description: Aviation meteorologists forecast weather conditions in airports. They
    provide day-to-day, hour-to-hour observations, analysis, forecasts, warnings,
    and advice to pilots, airport operators and airlines in meteorological matters.
    They report weather conditions expected at airports, current conditions, and en
    route forecasts.
- uri: http://data.europa.eu/esco/occupation/3dbd758c-6dc0-41fe-8248-2250c9bfa4ab
  preferred_label: climatologist
  isco_code: '2112'
  code: 2112.1.2
  description: Climatologists study the average change in weather and climate from
    a long-term perspective. They research and analyse historic weather conditions
    in order to forecast climatic conditions trends such as changes in temperature,
    global warming, or regional evolutive weather conditions. They use these findings
    for advising on environmental policy, construction, agricultural projects, and
    societal matters.
- uri: http://data.europa.eu/esco/occupation/fa5b9075-3796-4e86-be0a-b5e6d725c25a
  preferred_label: metrologist
  isco_code: '2112'
  code: '2112.2'
  description: Metrologists study and practice the science of measurement. They develop
    quantity systems, units of measurement and measuring methods to be used in science.
    Metrologists establish new methods and tools to quantify and better understand
    information.
- uri: http://data.europa.eu/esco/occupation/0d93706d-32fd-4de3-aa08-be1003e325da
  preferred_label: chemist
  isco_code: '2113'
  code: '2113.1'
  description: Chemists perform laboratory research by testing and analysing the chemical
    structure of substances.They translate the research results into industrial production
    processes which are further used in the development or improvement of products.
    Chemists are also testing the quality of the manufactured products and their environmental
    impact.
- uri: http://data.europa.eu/esco/occupation/11b6390b-1e48-4903-a5df-d3e04b451a19
  preferred_label: cosmetic chemist
  isco_code: '2113'
  code: 2113.1.4
  description: Cosmetic chemists develop formulas in order to create and test new
    cosmetic products and improve existing cosmetic products such as perfumes and
    fragrances, lipstick, waterproof lotions and makeup, hair dye, soaps and detergents
    with special properties, topical medicines or health supplements.
- uri: http://data.europa.eu/esco/occupation/1b123879-8f0d-4793-8069-3dc21a08921a
  preferred_label: chemical application specialist
  isco_code: '2113'
  code: 2113.1.2
  description: Chemical application specialists develop chemical products according
    to the needs and expectation of the clients. They conduct development of formulas
    and processes of formulation as well as evaluation of the efficiency and performances
    of the formulations.
- uri: http://data.europa.eu/esco/occupation/55076d82-52a7-47eb-b882-f12322c42ecd
  preferred_label: textile chemist
  isco_code: '2113'
  code: 2113.1.6
  description: Textile chemists coordinate and supervise chemical processes for textiles
    like yarn and fabric forming such as dyeing and finishing.
- uri: http://data.europa.eu/esco/occupation/574f3232-1d07-4034-8cac-c57ddbfff192
  preferred_label: analytical chemist
  isco_code: '2113'
  code: 2113.1.1
  description: Analytical chemists research and describe the chemical composition
    of substances. Moreover, they draw conclusions related to the behaviour of such
    substances in different conditions. Analytical chemists play an important role
    in looking at the relationship between chemistry and the environment, food, fuel,
    and medicine. They use a range of techniques such as electro-chromatography, gas
    and high performance liquid chromatography and spectroscopy.
- uri: http://data.europa.eu/esco/occupation/8606c0fd-c7cb-404d-887f-3a30ef7a81b4
  preferred_label: sensory scientist
  isco_code: '2113'
  code: '2113.2'
  description: Sensory scientists carry out sensory analysis in order to compose or
    improve flavours and fragrances for the food, beverage and cosmetics industry.
    They base their flavour and fragrance development on sensory and consumer research.
    Sensory scientists carry out research and analyse statistical data to meet customers
    expectations.
- uri: http://data.europa.eu/esco/occupation/a8ccc522-f57d-4800-a821-2e5c910e8301
  preferred_label: chemical tester
  isco_code: '2113'
  code: 2113.1.3
  description: Chemical testers are responsible for the rapid on-the-spot analysis
    of steel test pieces incoming from the metal production shop for the purpose of
    timely corrections of the chemical composition of the liquid metal.
- uri: http://data.europa.eu/esco/occupation/e027434f-8aa4-4d87-a070-b1d5c57749e6
  preferred_label: fragrance chemist
  isco_code: '2113'
  code: 2113.1.5
  description: Fragrance chemists develop and improve fragrance chemicals by formulating,
    testing and analysing fragrances and their ingredients so that the end product
    meets the expectations and the needs of customers.
- uri: http://data.europa.eu/esco/occupation/1790c821-c582-4944-8597-d2d4a66f6a6d
  preferred_label: mine geologist
  isco_code: '2114'
  code: 2114.1.6
  description: Mine geologists locate, identify, quantify and classify mineral resources
    and their geological characteristics and structure. They provide advice to mine
    managers and engineers at existing and prospective mineral operations.
- uri: http://data.europa.eu/esco/occupation/4b759f0e-8fec-4cf5-80d4-d112a9fd4e51
  preferred_label: oceanographer
  isco_code: '2114'
  code: 2114.1.8
  description: Oceanographers study and perform research on matters related to the
    sea and oceans. Oceanographers divide their expertise in different branches of
    research which are physical oceanographers whose research focus on waves and tides,
    chemical oceanographers whose study address the chemical constitution of sea waters,
    and geological oceanographer whose research refers to the bottom of seas and their
    plaques.
- uri: http://data.europa.eu/esco/occupation/55167849-82cf-484e-b818-fa702a4e69e9
  preferred_label: hydrologist
  isco_code: '2114'
  code: 2114.1.5
  description: Hydrologists research and study the quality, current challenges, and
    distribution of water in the Earth. They study water supply from rivers, streams,
    and springs to determine their adequate and sustainable use. Together with a cross
    functional team of professionals, they plan and develop how water can be supplied
    to cities and urban areas while ensuring efficiency and resource conservation.
- uri: http://data.europa.eu/esco/occupation/6336c205-46bd-42f6-9e67-6b0be6e7618c
  preferred_label: hydrogeologist
  isco_code: '2114'
  code: 2114.1.4
  description: Hydrogeologists study the distribution, quality and flow of water in
    order to keep mine workings free of nuisance water and to ensure an adequate supply
    of process water. They supply and evaluate information which will protect ground
    and surface water from contamination.
- uri: http://data.europa.eu/esco/occupation/82e37849-30ec-4461-a40e-263d4c984f88
  preferred_label: palaeontologist
  isco_code: '2114'
  code: 2114.1.9
  description: Palaeontologists research and analyse forms of life that existed in
    ancient eras of the planet Earth. They strive to define the evolutionary path
    and the interaction with different geological areas of all kinds of once organisms
    and such plants, pollen and spores, invertebrate and vertebrate animals, humans,
    traces such as footprints, and ecology and climate.
- uri: http://data.europa.eu/esco/occupation/86a0c9ab-c3fa-41a3-ad3e-d0083036b3d6
  preferred_label: mineralogist
  isco_code: '2114'
  code: '2114.3'
  description: Mineralogists study the composition, structure and other physical aspects
    of the earth. They analyse various minerals and use scientific equipment to determine
    their structure and properties. Their work mostly focuses on the classification
    and identification of minerals by taking samples and performing further tests,
    analysis and examinations.
- uri: http://data.europa.eu/esco/occupation/92efb42f-6b0a-44d8-94ea-0141555e6c3b
  preferred_label: environmental geologist
  isco_code: '2114'
  code: 2114.1.1
  description: Environmental geologists study how mineral operations may impact the
    composition and physical characteristics of the earth and its resources. They
    provide advice on issues such as land reclamation and environmental pollution.
- uri: http://data.europa.eu/esco/occupation/a92a3e24-93f0-42b3-9ebb-d2d7d8a72cc5
  preferred_label: geophysicist
  isco_code: '2114'
  code: '2114.2'
  description: Geophysicists study the physical characteristics of the earth and apply
    physical measurements to geological situations. Geophysicists use the principles
    of gravity, seismicity and electromagnetics to identify the structure and composition
    of the earth.
- uri: http://data.europa.eu/esco/occupation/ad14ec64-128c-4a72-9c1a-257a5f3b180c
  preferred_label: exploration geologist
  isco_code: '2114'
  code: 2114.1.2
  description: Exploration geologists examine and prospect for mineral deposits. They
    identify, define and obtain legal title to an economically viable mineral deposit.
    They are responsible for design, management and execution of the exploration programme.
- uri: http://data.europa.eu/esco/occupation/b79cfd33-6e46-4b71-b180-c9a84422f047
  preferred_label: seismologist
  isco_code: '2114'
  code: 2114.1.10
  description: Seismologists study the movement of tectonic plaques in the Earth which
    causes the propagation of seismic waves and earthquakes. They study and observe
    the various sources causing earthquakes such as volcanic activity, atmospheric
    phenomena, or the behaviour of oceans. They provide their scientific observations
    to prevent dangers in construction and infrastructure.
- uri: http://data.europa.eu/esco/occupation/c6196b21-20f9-4608-83fb-6f143afc740d
  preferred_label: geologist
  isco_code: '2114'
  code: '2114.1'
  description: Geologists research the materials that form the earth. Their observations
    depend on the purpose of the research. Depending on their specialisation, geologists
    study how the Earth has been shaped over time, its geological layers, the quality
    of minerals for mining purposes, earthquakes and volcanic activity for private
    services, and similar phenomena.
- uri: http://data.europa.eu/esco/occupation/c8e6cdcc-824e-4887-8ee2-197e7d794258
  preferred_label: geochemist
  isco_code: '2114'
  code: 2114.1.3
  description: Geochemists study the characteristics and chemical elements in minerals,
    rocks and soils, and how they interact with hydrological systems. They coordinate
    the collection of samples and indicate the suite of metals to be analysed.
- uri: http://data.europa.eu/esco/occupation/d8ff83c0-be8b-47f9-93e3-b13e261e7da5
  preferred_label: mud logger
  isco_code: '2114'
  code: 2114.1.7
  description: Mud loggers analyse the drilling fluids after they have been drilled
    up. They analyse the fluids in a laboratory. Mud loggers determine the position
    of hydrocarbons with respect to depth. They also monitor natural gas and identify
    lithology.
- uri: http://data.europa.eu/esco/occupation/068c2787-58ff-468e-bbb6-c4e5dd6ee482
  preferred_label: actuarial consultant
  isco_code: '2120'
  code: '2120.1'
  description: Actuarial consultants analyse, manage and provide guidance on financial
    impact of risks. They can work in fields related to insurance, pension, investment,
    banking, healthcare etc. Actuarial consultants apply technical and statistical
    models and theories to give strategic, commercial, and financial advice.
- uri: http://data.europa.eu/esco/occupation/18552245-3c36-4a52-b4c6-295cabb5c93b
  preferred_label: gambling games developer
  isco_code: '2120'
  code: '2120.3'
  description: Gambling games developers create, develop and produce content for lottery,
    betting and similar gambling games for large audiences.
- uri: http://data.europa.eu/esco/occupation/491cf76d-eb0d-4f15-90f0-3f5c9b11472a
  preferred_label: gambling quality assurance engineer
  isco_code: '2120'
  code: '2120.4'
  description: Gambling quality assurance engineers design and plan methods to test
    the gambling, the lottery or betting games. They execute the tests. These games
    can be both for public or for private audience, and the tests are for both online
    and land-based gaming.
- uri: http://data.europa.eu/esco/occupation/72628f3a-fd49-499a-9741-870b0a1fcef2
  preferred_label: mathematician
  isco_code: '2120'
  code: '2120.5'
  description: Mathematicians study and deepen existing mathematical theories in order
    to expand the knowledge and find new paradigms within the field. They can apply
    this knowledge to challenges presented in engineering and scientific projects
    in order to assure that measurements, quantities, and mathematic laws prove their
    viability.
- uri: http://data.europa.eu/esco/occupation/ac8b3cd1-a127-4e6a-8208-5cfcf7111955
  preferred_label: statistician
  isco_code: '2120'
  code: '2120.6'
  description: Statisticians collect, tabulate, and, most importantly, analyse quantitative
    information coming from a varied array of fields. They interpret and analyse statistical
    studies on fields such as health, demographics, finance, business, etc. and advise
    based on patterns and drawn analysis.
- uri: http://data.europa.eu/esco/occupation/b0f3f595-4965-4f13-ba5c-f6049b62469f
  preferred_label: biometrician
  isco_code: '2120'
  code: 2120.6.1
  description: Biometricians perform research in the field of biometrics. They carry
    statistical or biological research projects by measuring fingerprints, retinas,
    and human shapes for medical or industrial applications.
- uri: http://data.europa.eu/esco/occupation/ff656b3a-65a8-4b4f-b04e-9db12936519b
  preferred_label: demographer
  isco_code: '2120'
  code: '2120.2'
  description: Demographers study a variety of parameters related with population.
    They develop, based on their observations, statistical analyses on the evolutions
    and changes of births, elderly, marriage and divorce, employment, mortality, immigration
    and related matters.
- uri: http://data.europa.eu/esco/occupation/10291962-c0c7-4e5b-a7ed-0762b4d9b010
  preferred_label: pharmacologist
  isco_code: '2131'
  code: '2131.7'
  description: Pharmacologists study the manner in which drugs and medicaments interact
    with organisms, living systems, and their parts (i.e. cells, tissues, or organs).
    Their research aims at identifying substances that can be ingested by humans and
    that exert adequate biochemical functions for curing illnesses.
- uri: http://data.europa.eu/esco/occupation/1738173e-ef9c-4222-88c8-b6aa9bad3cf7
  preferred_label: biophysicist
  isco_code: '2131'
  code: 2131.4.4
  description: Biophysicists study the existing relation between living organisms
    and physics. They conduct research on living organisms based on the methods of
    physics that aim to explain the complexity of life, predict patterns, and draw
    conclusions about aspects of life. Biophysicists' research fields cover DNA, proteins,
    molecules, cells, and environments.
- uri: http://data.europa.eu/esco/occupation/25829508-63f3-41c3-affc-ddbb5c077930
  preferred_label: physiologist
  isco_code: '2131'
  code: 2131.4.11
  description: Physiologists study and exert research on the functioning of different
    living organisms, the parts they are composed of, and their interactions. They
    understand the fashion in which living systems react to factors such as diseases,
    physical activity, and stress, and use that information to develop methods and
    solutions to even out the effect that those stimuli have in living bodies.
- uri: http://data.europa.eu/esco/occupation/3f7b7ce5-94b6-4e0c-98e7-a4ee5a6accf4
  preferred_label: toxicologist
  isco_code: '2131'
  code: 2131.4.13
  description: Toxicologists study the effects that chemical substances or biological
    and physical agents have in living organisms, more specifically, on the environment
    and on the animal and human health. They determine doses of the exposure to substances
    for arising toxic effects in environments, people, and living organisms, and also
    perform experiments on animals and cell cultures.
- uri: http://data.europa.eu/esco/occupation/55f001af-fa48-4c0c-a7e5-fc69babe3d45
  preferred_label: botanist
  isco_code: '2131'
  code: 2131.4.6
  description: Botanists are occupied with the maintenance of a range of plants from
    around the world, often in a botanic garden. They conduct scientific studies and
    travel in order to study plants growing in the wild. Botanists are responsible
    for the maintenance and development of the botanic garden.
- uri: http://data.europa.eu/esco/occupation/6140be85-2d45-44b2-b0ba-412aadcead1e
  preferred_label: geneticist
  isco_code: '2131'
  code: 2131.4.8
  description: Geneticists study and focus their research on genetics. They analyse
    the fashion in which genes interact, operate, and inherit traits and characteristics.
    Based on their research, they attend patients with inherited diseases and conditions,
    congenital malformations, and genetic matters at large.
- uri: http://data.europa.eu/esco/occupation/68d973df-bf10-4bf7-9a1b-fbd9f604b9db
  preferred_label: bioinformatics scientist
  isco_code: '2131'
  code: '2131.3'
  description: Bioinformatics scientists analyse biological processes using computer
    programmes. They maintain or construct databases containing biological information.
    Bioinformatics scientists gather and analyse biological data and may also assist
    scientists in various fields, including in biotechnology and pharmaceutics. They
    perform scientific research and statistical analyses, and report on their findings.
    Bioinformatics scientists may also collect DNA samples, discover data patterns
    and conduct genetic research.
- uri: http://data.europa.eu/esco/occupation/68f4fdd9-182c-4c0d-a73d-f767b8a8355e
  preferred_label: aquaculture biologist
  isco_code: '2131'
  code: 2131.4.1
  description: Aquaculture biologists apply knowledge gained from research about aquatic
    animals and plant life and their interactions with each other and the environment,
    in order to improve aquaculture production, prevent animal health and environmental
    problems and to provide solutions if necessary.
- uri: http://data.europa.eu/esco/occupation/68ffc53b-6067-4fe7-bd85-c96f4a6c1e45
  preferred_label: food biotechnologist
  isco_code: '2131'
  code: '2131.5'
  description: Food biotechnologists study the life cycle of food from its preservation
    up to the spoilage and the food-borne pathogens. They research and understand
    food-borne diseases in order to prevent them. They ensure that food products abide
    by government regulations regarding food health and safety.
- uri: http://data.europa.eu/esco/occupation/6df6c5cb-c1a2-42c8-acd0-1ee5563c36c1
  preferred_label: biochemist
  isco_code: '2131'
  code: 2131.4.2
  description: Biochemists study and perform research on the reactions caused by chemicals
    in living organisms. This includes performing research for the development or
    improvement of chemical-based products (e.g. medicine) aimed at improving the
    health of living organisms and at better understanding their reactions.
- uri: http://data.europa.eu/esco/occupation/7daa8fed-9a78-4fe2-afc2-153fc423040b
  preferred_label: animal behaviourist
  isco_code: '2131'
  code: '2131.1'
  description: Animal behaviourists work with animals and people to study, observe,
    assess and understand animal behaviour in relation to specific factors and to
    prevent or address inappropriate or problematic behaviours within individual animals
    through the development of suitable environments and management regimes, in accordance
    with national legislation.
- uri: http://data.europa.eu/esco/occupation/a7a74a05-3dd0-46c6-99af-92df8042520c
  preferred_label: microbiologist
  isco_code: '2131'
  code: 2131.4.10
  description: Microbiologists study and research the life forms, characteristics,
    and processes of microscopic organisms. They study microorganisms such as bacteria,
    protozoa, fungi, etc. in order to diagnose and counteract the effects that these
    microorganisms might have in animals, in the environment, in the food industry,
    or in the health care industry.
- uri: http://data.europa.eu/esco/occupation/b5d1912e-89c7-4a66-ab96-0dc5f4f6c426
  preferred_label: immunologist
  isco_code: '2131'
  code: '2131.6'
  description: Immunologists research the immune system of living organisms (e.g.
    human body) and the way it reacts to external infections or invasive harmful agents
    (e.g. virus, bacteria, parasites). They focus their study on those diseases that
    affect the immunology of living organisms in order to classify them for treatment.
- uri: http://data.europa.eu/esco/occupation/b73c752b-9858-4f53-82de-f3a340cbcae9
  preferred_label: epidemiologist
  isco_code: '2131'
  code: 2131.4.7
  description: Epidemiologists centre their research on origin and causes for illness
    eruption in humans. They determine the way in which diseases are spread out and
    propose risk preventive measures to health policy organisms.
- uri: http://data.europa.eu/esco/occupation/c5328083-eda0-4ca8-b9cb-99a46e73a9bc
  preferred_label: botanicals specialist
  isco_code: '2131'
  code: 2131.4.5
  description: Botanicals specialists bring a deep knowledge in the science of plants
    and botanicals to the production of alcoholic beverages based on herbs. These
    professionals combine knowledge of flavour chemistry, biological sciences and
    technology process. They may operate botanical milling machines ensuring that
    the crushing process retains as much flavour and aroma as possible.
- uri: http://data.europa.eu/esco/occupation/cc9fcab5-a5c6-4cc9-9606-cbcc2852537f
  preferred_label: curator of horticulture
  isco_code: '2131'
  code: 2131.4.6.1
  description: Curators of horticulture develop and maintain the botanical collections,
    exhibits and landscapes of a botanical garden.
- uri: http://data.europa.eu/esco/occupation/e97ce81a-cf24-4012-b39e-f87bedc5b450
  preferred_label: animal feed nutritionist
  isco_code: '2131'
  code: '2131.2'
  description: Animal feed nutritionists analyse the nutritional value of animal feeds
    in order to provide dietary advice to agricultural, manufacturing, zoological
    and public sector staff. They undertake research on nutritionally balanced food
    stuffs and maintain awareness of technical and scientific developments on the
    subject.
- uri: http://data.europa.eu/esco/occupation/eee68e13-8248-43bb-a9fb-959832a6c217
  preferred_label: biologist
  isco_code: '2131'
  code: '2131.4'
  description: Biologists study living organisms and life in its broader extent in
    combination with its environment. Through research, they strive to explain the
    functional mechanisms, interactions, and evolution of organisms.
- uri: http://data.europa.eu/esco/occupation/f0296b9c-764d-42ab-8de9-2a3729a9b67a
  preferred_label: marine biologist
  isco_code: '2131'
  code: 2131.4.9
  description: Marine biologists study marine living organisms and ecosystems and
    their interaction underwater. They research on the physiology, the interactions
    between organisms, their interactions with their habitats, the evolution of marine
    species, and the role of the environment in their adaptations. Marine biologists
    also perform scientific experiments in controlled conditions to understand these
    processes. They also focus on the effects of human activities on the life in the
    oceans and seas.
- uri: http://data.europa.eu/esco/occupation/3b018148-8e92-4177-9267-5f090386f6a3
  preferred_label: fisheries adviser
  isco_code: '2132'
  code: '2132.4'
  description: Fisheries advisers provide consultancy on fish stocks and their habitats.
    They manage the costal fishing business modernisation and provide improvement
    solutions. Fisheries advisers develop plans and policies for fisheries management.
    They may provide advice on protected farms and wild fish stock.
- uri: http://data.europa.eu/esco/occupation/a330b7b6-696e-455c-b6d5-f39f82c1489f
  preferred_label: aquaculture recirculation manager
  isco_code: '2132'
  code: '2132.3'
  description: Aquaculture recirculation managers control the production of aquatic
    organisms in land-based recirculation systems, manage water re-use processes and
    supervise complex circulation, aeration and biofilter systems.
- uri: http://data.europa.eu/esco/occupation/c25b3700-6095-42b7-99fc-b87dc326c044
  preferred_label: agricultural scientist
  isco_code: '2132'
  code: '2132.1'
  description: Agricultural scientists research and study soil, animals and plants
    with the objective of improving agricultural processes, the quality of agricultural
    products or the impact of agricultural processes on the environment. They plan
    and implement projects such as development projects on behalf of clients or institutions.
- uri: http://data.europa.eu/esco/occupation/c40ef517-d4ab-4932-b184-9c2ea5b24fe2
  preferred_label: agronomist
  isco_code: '2132'
  code: '2132.2'
  description: Agronomists provide consulting services to companies, agricultural
    cooperatives, agronomical crop growers and horticultural crop growers on the cultivation
    of food crops. They study the science, technology and business related to growing
    plants. They examine crops and perform experiments in order to improve crop yields
    and farms' production. Agronomists also examine the most effective ways to harvest
    and cultivate plants.
- uri: http://data.europa.eu/esco/occupation/e1fdca51-a0e1-4bea-822f-82a090ece780
  preferred_label: livestock advisor
  isco_code: '2132'
  code: '2132.6'
  description: Livestock advisors provide complex specialist advice to farmers and
    livestock breeders to ensure that their business and production is optimised.
- uri: http://data.europa.eu/esco/occupation/fa32eb3f-5c9f-4668-8f85-5eefb3badab8
  preferred_label: forestry adviser
  isco_code: '2132'
  code: '2132.5'
  description: Forestry advisers provide services and advice on economic and environmental
    issues related to timber and forestry management in compliance with laws and regulations.
- uri: http://data.europa.eu/esco/occupation/11d72bd6-779a-4643-9962-313833740094
  preferred_label: environmental scientist
  isco_code: '2133'
  code: '2133.7'
  description: Environmental scientists identify problems and find solutions in order
    to minimize environmental hazards by performing analysis on samples such as air,
    water or soil. They advise on or develop environmental policies and aim to improve
    water supplies preservation and manage waste disposal sites. Environmental scientists
    perform environmental risk assessments and analyse the environmental impact of
    new solutions, construction sites or environmental changes ensuring the environmental
    regulations are followed.
- uri: http://data.europa.eu/esco/occupation/28742973-c452-4996-b070-440e437306dc
  preferred_label: water quality analyst
  isco_code: '2133'
  code: '2133.13'
  description: Water quality analysts safeguard the quality of water through scientific
    analysis, ensuring quality and safety standards are met. They take samples of
    the water and perform laboratory tests, and develop purification procedures so
    it can serve as drinking water, for irrigation purposes, and other water supply
    purposes.
- uri: http://data.europa.eu/esco/occupation/351a0eb0-a1d0-49bd-a2f8-6dc447ddf316
  preferred_label: pipeline environmental project manager
  isco_code: '2133'
  code: '2133.10'
  description: Pipeline environmental project managers ensure the accomplishment of
    environmental preservation within pipeline transport projects. They, together
    with a group of managers and specialists, analyse the sites and routes of pipelines
    in order to advice on environmental issues to be considered and addressed.
- uri: http://data.europa.eu/esco/occupation/59883630-45f9-40e7-9732-9e5ff9758d2b
  preferred_label: environmental programme coordinator
  isco_code: '2133'
  code: '2133.6'
  description: Environmental programme coordinators develop programmes for the improvement
    of environmental sustainability and efficiency within a organisation or institution.
    They inspect sites in order to monitor an organisation's or institution's compliance
    with environmental legislation. They also ensure education for the public on environmental
    concerns.
- uri: http://data.europa.eu/esco/occupation/69e6db0b-30b4-4e0e-b95b-173f8bc3da73
  preferred_label: airport environment officer
  isco_code: '2133'
  code: '2133.1'
  description: Airport environment officers monitor environmental issues such as emissions,
    contamination, and wildlife activity in the premises of airports. They report
    environmental attractors for animals such as nearby rubbish dumps or wetland areas.
    They can engage in studying the environmental impact that airports have in the
    surrounding communities in reference to the diverse contamination that airports
    produce. They implement the rules to ensure the sustainable development of the
    airport.
- uri: http://data.europa.eu/esco/occupation/6a3d3d28-0ab6-49b0-9a32-697e5e104bf1
  preferred_label: soil scientist
  isco_code: '2133'
  code: '2133.11'
  description: Soil scientists research and study scientific disciplines concerning
    soil. They advise on how to improve soil quality to support nature, food production
    or human infrastructure using surveying techniques, irrigation techniques and
    erosion reduction measures. They make sure to conserve and restore land suffering
    from intense farming or human interaction.
- uri: http://data.europa.eu/esco/occupation/7af81505-6681-49b5-b65e-401884a71f1f
  preferred_label: groundwater monitoring technician
  isco_code: '2133'
  code: 2133.15.1
  description: Groundwater monitoring technician monitor the environment, gathering
    data in the form of samples and performing tests in a laboratory or field, to
    investigate potential sources of pollution. They also perform maintenance tasks
    on the monitoring equipment.
- uri: http://data.europa.eu/esco/occupation/80d880ec-3bae-45a2-a2d3-41345ee0b319
  preferred_label: nature conservation officer
  isco_code: '2133'
  code: '2133.9'
  description: Nature conservation officers manage and improve the local environment
    within all the sectors of a local community. They promote awareness of and understanding
    about the natural environment. This work can be very varied and involve projects
    related to species, habitats and communities. They educate people and raise overall
    awareness of environmental issues.
- uri: http://data.europa.eu/esco/occupation/89b87aa2-4008-4cc7-96f8-e2b5ffe59f28
  preferred_label: ecologist
  isco_code: '2133'
  code: '2133.5'
  description: Ecologists carry out assessments of the health and distribution of
    organisms, namely people, plants, and animals, and the relationship between organisms
    and their environment. Ecologists usually have a specialisation area, e.g. freshwater,
    marine, terrestrial, fauna, and flora about which they conduct research and perform
    related tasks.
- uri: http://data.europa.eu/esco/occupation/bff716c9-42c7-471e-8af0-582f799fb29a
  preferred_label: aquaculture environmental analyst
  isco_code: '2133'
  code: '2133.2'
  description: Aquaculture environmental analysts assess, plan and implement programmes
    to recognise, monitor and control environmental factors that can potentially affect
    the health of aquatic animals and plants.
- uri: http://data.europa.eu/esco/occupation/e011f10f-e172-43ce-bfd9-fb56e426c0c9
  preferred_label: countryside officer
  isco_code: '2133'
  code: '2133.4'
  description: Countryside officers are responsible for a range of activities that
    manage and maintain the natural environment and associated public access and recreation.
    They encourage visitors to open spaces/the countryside, promote awareness of the
    natural environment and protect and preserve the open space/countryside for future
    enjoyment.
- uri: http://data.europa.eu/esco/occupation/e3cc09ba-7ad5-4411-940c-20613000863a
  preferred_label: conservation scientist
  isco_code: '2133'
  code: '2133.3'
  description: Conservation scientists manage the quality of specific forests, parks
    and other natural resources. They protect the wildlife habitat, biodiversity,
    scenic value, and other unique attributes of preserves and conservation lands.
    Conservation scientists perform field work.
- uri: http://data.europa.eu/esco/occupation/e8461d2e-3d75-477c-93a2-ea8d342bb55b
  preferred_label: environmental technician
  isco_code: '2133'
  code: '2133.15'
  description: Environmental technicians investigate sources of pollution and aid
    in the development of pollution prevention and environment protection plans. They
    take samples of soil, water or other materials and perform tests to analyse the
    pollution level and identify its source.
- uri: http://data.europa.eu/esco/occupation/fab474ea-a4a9-4c11-9548-1d50ad594a34
  preferred_label: natural resources consultant
  isco_code: '2133'
  code: '2133.8'
  description: Natural resources consultant provide advice on the protection and management
    of natural resources, namely fauna, flora, soil and water to companies and governments
    which exploit these resources. They strive to guide companies on an appropriate
    policy for exploiting natural resources in industrial contexts, raise awareness
    on health issues, and ensure the conservation of ecosystems for sustainable interventions
    in natural habitats.
- uri: http://data.europa.eu/esco/occupation/febd4100-9a9b-46a0-b964-8623d79d0f32
  preferred_label: air pollution analyst
  isco_code: '2133'
  code: '2133.14'
  description: Air pollution analysts conduct field and lab tests to examine the pollution
    of air in different areas. They also identify sources of pollution.
- uri: http://data.europa.eu/esco/occupation/2bf5169b-2c89-451a-9274-e2b4bc1f9487
  preferred_label: clothing technologist
  isco_code: '2141'
  code: '2141.1'
  description: Clothing technologists work on the design, development and production
    of textile and apparel products. They carry out a range of technical, investigative
    and quality control work to ensure the end product (from clothing to household
    up to industrial textiles). They perform to specifications, improve production
    efficiency and quality while liaising with those involved in the production process.
    They liaise with designers, adapt designs to suit production methods, make and
    size pre-production garments, source fabrics and accessories, undertake quality
    evaluations of materials, check the quality of the final product, and consider
    ecological aspects.
- uri: http://data.europa.eu/esco/occupation/2f26a52b-cf45-4282-9138-478252161f00
  preferred_label: food production engineer
  isco_code: '2141'
  code: 2141.4.2.2
  description: Food production engineers oversee the electrical and mechanical needs
    of the equipment and machinery required in the process of manufacturing food or
    beverages. They strive to maximise plant productivity by engaging in preventive
    actions in reference to health and safety, good manufacturing practices (GMP),
    hygiene compliance, and performance of routine maintenance of machines and equipment.
- uri: http://data.europa.eu/esco/occupation/53d2052f-edc0-4f44-8be1-164526412bfe
  preferred_label: industrial engineer
  isco_code: '2141'
  code: '2141.4'
  description: Industrial engineers design a vast array of production systems aiming
    to present efficient and effective solutions. They integrate a varied number of
    variables such as workers, technology, ergonomics, production flows, and product
    specifications for the design and implementation of production systems. They can
    specify and design for microsystems as well.
- uri: http://data.europa.eu/esco/occupation/615920c5-4f63-4eb3-8b60-afaaed3ab1ff
  preferred_label: maintenance and repair engineer
  isco_code: '2141'
  code: '2141.8'
  description: Maintenance and repair engineers focus on the optimization of equipment,
    procedures, machineries and infrastructure. They ensure their maximum availability
    at minimum costs.
- uri: http://data.europa.eu/esco/occupation/6818c837-072a-4120-b913-bd360b7b14d0
  preferred_label: manufacturing engineer
  isco_code: '2141'
  code: 2141.4.1
  description: Manufacturing engineers design manufacturing processes for different
    kinds of production processes. They integrate those specificities and constraints
    posed by the industry or the product being produced with general and wide-spread
    manufacturing engineering principles into the design and planification of manufacturing
    processes.
- uri: http://data.europa.eu/esco/occupation/85acc7e9-1fac-4e91-962b-8b8031f39487
  preferred_label: textile technologist
  isco_code: '2141'
  code: '2141.11'
  description: 'Textile technologists are in charge of the optimisation of the textile
    manufacturing system management, both traditional and innovative. They develop
    and supervise the textile production system according to the quality system: processes
    of spinning, weaving, knitting, finishing namely dyeing, finishes, printing with
    appropriate methodologies of organisation, management and control and using emerging
    textile technologies.'
- uri: http://data.europa.eu/esco/occupation/8a925aca-f636-437c-8962-5deae170e246
  preferred_label: food and beverage packaging technologist
  isco_code: '2141'
  code: '2141.2'
  description: Food and beverage packaging technologists assess appropiate packaging
    for various food products. They manage matters in relation to packaging while
    ensuring customer specifications and company targets. They develop packaging projects
    as required.
- uri: http://data.europa.eu/esco/occupation/8de99659-5b10-4825-ac67-0c50189bcc3c
  preferred_label: packaging production manager
  isco_code: '2141'
  code: '2141.9'
  description: Packaging production managers define and analyse package units in order
    to avoid damages or loss of quality of the goods packed. They also design the
    packaging according the specifications of the product and offer solutions to solve
    packaging problems.
- uri: http://data.europa.eu/esco/occupation/91d0f74b-8612-49cc-a7da-83ee3c4b94d9
  preferred_label: leather goods industrial engineer
  isco_code: '2141'
  code: '2141.5'
  description: Leather goods industrial engineers analyse product technical specifications,
    define productive operations and their sequence, refine working methods and calculate
    operative times by using time measurement techniques. They address human and technological
    resources to each operation and define distribution of work according to production
    capacity. All their activities and tasks have the objective of maximising productivity
    and reducing production costs, assuring the functionality and quality of product
    and customer satisfaction.
- uri: http://data.europa.eu/esco/occupation/97d65832-3817-4ded-946b-cfc4a0237b9a
  preferred_label: leather production planner
  isco_code: '2141'
  code: '2141.6'
  description: Leather production planners are responsible for planning and following
    production planning. They work with the production manager to follow progress
    of the schedule. They work together with the warehouse to ensure optimum level
    and quality of materials are provided, and also with the marketing and sales department
    to meet customer order requirements.
- uri: http://data.europa.eu/esco/occupation/b5eaf231-77ad-4a86-8e54-15cc4398aad2
  preferred_label: process engineer
  isco_code: '2141'
  code: '2141.10'
  description: Process engineers apply engineering concepts in order to improve all
    kinds of production and manufacturing processes in terms of efficiency and productivity.
    They evaluate the variables and constraints present in given processes and present
    engineering solutions to optimise them.
- uri: http://data.europa.eu/esco/occupation/bb609566-3ab6-44dd-8f48-cf0b15b96827
  preferred_label: automation engineer
  isco_code: '2141'
  code: 2141.4.2.1
  description: Automation engineers research, design, and develop applications and
    systems for the automation of the production process. They implement technology
    and reduce, whenever applicable, human input to reach the full potential of industrial
    robotics. Automation engineers oversee the process and ensure all systems run
    safely and smoothly.
- uri: http://data.europa.eu/esco/occupation/d7380260-1386-4e36-98b5-8115ca4a3536
  preferred_label: production engineer
  isco_code: '2141'
  code: 2141.4.2
  description: Production engineers review and evaluate production performance, perform
    data analysis and identify under-performing production systems. They search for
    long or short term solutions, plan production enhancements and process optimizations.
- uri: http://data.europa.eu/esco/occupation/dca305c8-d665-462c-bdc9-c3a19734ba18
  preferred_label: surface engineer
  isco_code: '2141'
  code: 2141.4.3
  description: Surface engineers research and develop technologies for manufacturing
    processes that assist in altering the properties of the surface of bulk material,
    such as metal, in order to reduce degradation by corrosion or wear. They explore
    and design how to protect surfaces of (metal) workpieces and products utilising
    sustainable materials and testing with a minimum of waste.
- uri: http://data.europa.eu/esco/occupation/ec5a067f-6278-4e35-990f-c9b7205a9ff4
  preferred_label: homologation engineer
  isco_code: '2141'
  code: '2141.3'
  description: Homologation engineers are responsible for the homologation process
    of new types of vehicles, components and systems and for ensuring the compliance
    with regulatory requirements for the sales country. They develop and implement
    homologation programmes and facilitate type approval testing in accordance with
    the European legislation, ensuring the respect of homologation timings. They research
    on and interpret regulatory requirements and are the main contact point for homologation
    and certification purposes within the organisation and with external agencies.
    Homologation engineers draft technical documentation and support design and test
    engineers in the vehicle development process.
- uri: http://data.europa.eu/esco/occupation/1bdb7d70-1769-4338-aa90-d25a90fe8a6d
  preferred_label: geological engineer
  isco_code: '2142'
  code: 2142.1.4
  description: Geological engineers apply geological knowledge for the assessment
    of sites, soils, slope stability, sediments and other observable characteristics
    in the Earth. They integrate this information in the planning and development
    of projects in those places. They assess and answer questions concerning the geological
    characteristics of soils by performing research and experiments on the sites aimed
    to be intervened.
- uri: http://data.europa.eu/esco/occupation/2a914d26-42aa-46b5-acf3-097d51ba4617
  preferred_label: construction engineer
  isco_code: '2142'
  code: 2142.1.2
  description: Construction engineers interpret building designs and add technical
    specifications to construction projects. They integrate engineering principles
    into the designs to ensure that structures are safe and resistant. They work together
    with architects and engineers to transform design ideas into executable plans.
- uri: http://data.europa.eu/esco/occupation/3f3748a7-4bb3-40b4-9ae3-1c5040c70f52
  preferred_label: rail project engineer
  isco_code: '2142'
  code: 2142.1.8
  description: Rail project engineers maintain a safe, cost-effective, high-quality,
    and environmentally responsible approach across the technical projects in railway
    companies. They provide project management advice on all construction projects
    including testing, commissioning and site supervision. They audit contractors
    for safety, environment and quality of design, process and performance as to ensure
    that all projects follow in-house standards and relevant legislation.
- uri: http://data.europa.eu/esco/occupation/57ac359a-ae52-4aea-bc9c-93af7efa502e
  preferred_label: pipeline engineer
  isco_code: '2142'
  code: 2142.1.7
  description: Pipeline engineers design and develop the engineering aspects for the
    construction of pipeline infrastructures in various kinds of sites (e.g. inland,
    maritime). They envision and create the specifications for pumping systems and
    for the general transport of goods through pipelines.
- uri: http://data.europa.eu/esco/occupation/a377fafb-7e6e-4925-bc64-8099b58aafb8
  preferred_label: drainage engineer
  isco_code: '2142'
  code: 2142.1.3
  description: Drainage engineers design and construct drainage systems for sewers
    and storm water systems. They evaluate the options to design drainage systems
    that meet the requirements while ensuring compliance with legislation and environmental
    standards and policies. Drainage engineers choose the most optimal drainage system
    to prevent floods, control irrigation and direct sewage away from water sources.
- uri: http://data.europa.eu/esco/occupation/aad7819e-d62e-41de-a594-9f2be186a6c2
  preferred_label: transport engineer
  isco_code: '2142'
  code: 2142.1.9
  description: Transport engineers design and set the engineering specifications for
    the construction and development of roadways and transport infrastructure. They
    apply engineering concepts and knowledge for developing sustainable and efficient
    modes of transportation ranging from roads to canals, railways, and airports.
- uri: http://data.europa.eu/esco/occupation/bc1c82a5-0fc3-453f-8537-9d1a6e9e85aa
  preferred_label: airport planning engineer
  isco_code: '2142'
  code: 2142.1.1
  description: Airport planning engineers manage and coordinate the planning, design,
    and development programs in airports.
- uri: http://data.europa.eu/esco/occupation/d7d986e1-7333-431b-9719-0c5c6939e360
  preferred_label: civil engineer
  isco_code: '2142'
  code: '2142.1'
  description: Civil engineers design, plan, and develop technical and engineering
    specifications for infrastructure and construction projects. They apply engineering
    knowledge in a vast array of projects, from the construction of infrastructure
    for transportation, housing projects, and luxury buildings, to the construction
    of natural sites. They design plans that seek to optimise materials and integrate
    specifications and resource allocation within the time constraints.
- uri: http://data.europa.eu/esco/occupation/e12f08fb-4748-4388-9489-b647df60332a
  preferred_label: hydropower engineer
  isco_code: '2142'
  code: 2142.1.5
  description: Hydropower engineers research, design and plan the building of facilities
    that generate electricity from the movement of water. They search optimal locations,
    conduct trials and try different materials to achieve the best result. Hydropower
    engineers develop strategies for more efficient energy production and analyse
    environmental consequences.
- uri: http://data.europa.eu/esco/occupation/efc75d4e-dfbf-4178-929c-0ae198801c36
  preferred_label: mining geotechnical engineer
  isco_code: '2142'
  code: 2142.1.6
  description: Mining geotechnical engineers in mining perform engineering, hydrological
    and geological tests and analyses to improve the safety and efficiency of mineral
    operations. They oversee the collection of samples and the taking of measurements
    using geotechnical investigation methods and techniques. They model the mechanical
    behaviour of the rock mass and contribute to the design of the mine geometry.
- uri: http://data.europa.eu/esco/occupation/fcf9024e-277c-43c7-8ec8-8903e5c9c576
  preferred_label: water engineer
  isco_code: '2142'
  code: 2142.1.11
  description: Water engineers research and develop methods for the provision of clean
    water, water treatment and flood damage prevention and reaction. They research
    water needs in a location and develop methods for meeting those needs, such as
    designing and developing projects for managing water resources such as treatment
    plants, pipelines, pump systems, irrigation or draining systems and other water
    supply systems. Water engineers also ensure proper installation of these systems
    on construction sites. Water engineers also maintain, repair and build structures
    that control water resources, such as bridges, canals and dams.
- uri: http://data.europa.eu/esco/occupation/32548f7e-8c25-4c49-9f22-78dee3543704
  preferred_label: environmental mining engineer
  isco_code: '2143'
  code: 2143.1.1
  description: Environmental mining engineers oversee the environmental performance
    of mining operations. They develop and implement environmental systems and strategies
    to minimise environmental impacts.
- uri: http://data.europa.eu/esco/occupation/7a523273-9fff-4f11-beb6-110eeaec1436
  preferred_label: recycling specialist
  isco_code: '2143'
  code: 2143.1.3
  description: Recycling specialists research recycling policies and legislation,
    and supervise implementation in an organisation to ensure that waste management
    occurs according to regulations. They perform inspections, provide recycling equipment,
    and supervise recycling workers. They also advise organisations on ways they can
    improve their waste management procedures.
- uri: http://data.europa.eu/esco/occupation/9740933e-e04a-41f6-af1f-a6d58c7eb0ec
  preferred_label: wastewater engineer
  isco_code: '2143'
  code: '2143.3'
  description: Wastewater engineers design sewage systems and networks for the removal
    and treatment of wastewater from cities and other residential areas. They design
    systems which are compliant with environmental standards, and aim to minimise
    impact on the ecosystem and on citizens in the vicinity of the network.
- uri: http://data.europa.eu/esco/occupation/a7358961-46d4-4715-ac1e-6148fd042510
  preferred_label: environmental expert
  isco_code: '2143'
  code: '2143.2'
  description: Environmental experts search for technological solutions to tackle
    environmental problems. They detect and analyse environmental issues and develop
    new technological production processes to counter these problematic issues. They
    research the effect of their technological innovations and present their findings
    in scientific reports.
- uri: http://data.europa.eu/esco/occupation/ab4dd4f9-ee6c-41cc-8b72-42ad0b13d1e2
  preferred_label: waste treatment engineer
  isco_code: '2143'
  code: 2143.1.4
  description: Waste treatment engineers design processes, facilities and equipment
    used in the collection, treatment, and distribution of waste. They research environmental
    standards and policies in order to optimise waste treatment procedures and ensure
    minimal strain on the environment by analysing and classifying the processed waste.
- uri: http://data.europa.eu/esco/occupation/ac1fc6a9-70d2-475c-8fa0-82ef83830968
  preferred_label: environmental engineer
  isco_code: '2143'
  code: '2143.1'
  description: Environmental engineers integrate environmental and sustainable measures
    in the development of projects of various natures. They seek to preserve natural
    resources and natural sites. They work together with engineers from other fields
    to envision all the implications that projects might have in order to design ways
    to conserve natural reserves, prevent pollution, and deploy sanitary measures.
- uri: http://data.europa.eu/esco/occupation/0ba95ace-bdf5-4ee6-92af-32e1ec9c0de6
  preferred_label: steam engineer
  isco_code: '2144'
  code: 2144.1.21
  description: Steam engineers provide energy and utilities to facilities, such as
    steam, heat and refrigeration. They research and develop new methods and improvements
    for the provision of utilities.
- uri: http://data.europa.eu/esco/occupation/16cb1f72-3d8c-4404-84ec-9c31fbd7c86c
  preferred_label: welding engineer
  isco_code: '2144'
  code: 2144.1.23
  description: Welding engineers research and develop optimal effective welding techniques
    and design the corresponding, equally efficient equipment to aid in the welding
    process. They also conduct quality control and evaluate inspection procedures
    for welding activities. Welding engineers have advanced knowledge and critical
    understanding of welding technology application. They are able to manage high
    complex technical and professional activities or projects related to welding applications,
    while also taking responsibility for the decision making process.
- uri: http://data.europa.eu/esco/occupation/1c36dd08-f6a7-43f2-a889-beebedb71c25
  preferred_label: equipment engineer
  isco_code: '2144'
  code: 2144.1.6
  description: Equipment engineers design and maintain the machinery and equipment
    in manufacturing facilities. They design machinery that adjusts to the manufacturing
    requirements and processes. Moreover, they envision the maintenance of the machines
    and equipment for uninterrupted functioning.
- uri: http://data.europa.eu/esco/occupation/1f97f6e6-0ac7-4e77-88ab-2e3801c5a223
  preferred_label: heating, ventilation, air conditioning engineer
  isco_code: '2144'
  code: 2144.1.8
  description: Heating, ventilation, air conditioning engineers design and develop
    heating, ventilation, air conditioning and possibly refrigeration systems for
    usage in residences, manufacturing sites, offices, commercial buildings, etc.
    They strive for solutions that serve the needs of clients and respond to architectural
    restrictions of sites.
- uri: http://data.europa.eu/esco/occupation/24677ef2-512c-4f4a-bc1c-14bf374e9f22
  preferred_label: rotating equipment engineer
  isco_code: '2144'
  code: 2144.1.20
  description: Rotating equipment engineers develop designs and specifications for
    rotating equipment according to any applicable standards. They also provide technical
    expertise and help ensure that all new and existing equipment installations are
    completed.
- uri: http://data.europa.eu/esco/occupation/4d5bd738-9202-4fd7-bd8c-7dbe914048de
  preferred_label: agricultural engineer
  isco_code: '2144'
  code: 2144.1.2
  description: Agricultural engineers intervene in a variety of matters within the
    agriculture field in combination with engineering concepts. They design and develop
    machinery and equipment for an efficient and sustainable exploitation of the land.
    They advise on the use of resources in agricultural sites comprising the usage
    of water and soil, harvesting methods, and waste management.
- uri: http://data.europa.eu/esco/occupation/4e3fede9-5522-4624-91bc-b59c79fada02
  preferred_label: packing machinery engineer
  isco_code: '2144'
  code: 2144.1.16
  description: Packing machinery engineers are in charge of and responsible for packaging
    machinery. They maintain and improve technical standards, analyse results, set
    up improvement plans, and are responsible for machinery maintenance.
- uri: http://data.europa.eu/esco/occupation/579254cf-6d69-4889-9000-9c79dc568644
  preferred_label: mechanical engineer
  isco_code: '2144'
  code: '2144.1'
  description: Mechanical engineers research, plan and design mechanical products
    and systems and supervise the fabrication, operation, application, installation
    and repair of systems and products. They research and analyse data.
- uri: http://data.europa.eu/esco/occupation/5979893a-0a30-447b-8f33-1ea405600583
  preferred_label: powertrain engineer
  isco_code: '2144'
  code: 2144.1.17
  description: Powertrain engineer work on the design of propulsion mechanisms across
    the automotive sector. This includes technical implementation of powertrain components,
    such as mechanical engineering, the electronics and software used in modern vehicles,
    as well as coordination and optimisation of multiple energy sources in the powertrain
    context.
- uri: http://data.europa.eu/esco/occupation/5a58da2b-2fa0-40d4-a9f5-fead48e7de88
  preferred_label: naval architect
  isco_code: '2144'
  code: 2144.1.14
  description: Naval architects design, build, maintain and repair all types of boats
    from pleasure crafts to naval vessels, including submarines. They analyse floating
    structures and take various features into account for their designs such as the
    form, structure, stability, resistance, access and propulsion of hulls.
- uri: http://data.europa.eu/esco/occupation/79fed799-ab3a-43d9-bd91-414c2c3b2f57
  preferred_label: tooling engineer
  isco_code: '2144'
  code: 2144.1.22
  description: Tooling engineers design new tools for manufacturing equipment. They
    prepare tooling quotation requests. They estimate costs and delivery time, manage
    tooling construction follow-up and supervise the routine maintenance of tools.
    They also analyse data to determine the cause of major tooling difficulties and
    develop recommendations and action plans for solutions.
- uri: http://data.europa.eu/esco/occupation/7c2fbf7d-b934-4f62-8167-0ed90fb2a16f
  preferred_label: rolling stock engineer
  isco_code: '2144'
  code: 2144.1.19
  description: Rolling stock engineers design and oversee the manufacturing process
    and installation of rail vehicles, including locomotives, carriages, wagons and
    multiple units. They design new trains and electrical or mechanical parts, supervise
    modifications and resolve technical problems. They also supervise routine maintenance
    duties to ensure that trains are in good condition and meet quality and safety
    standards.
- uri: http://data.europa.eu/esco/occupation/811595cc-3100-4ca0-b860-3a77349342ae
  preferred_label: fluid power engineer
  isco_code: '2144'
  code: 2144.1.7
  description: Fluid power engineers supervise the assembly, installation, maintenance,
    and testing of fluid power equipment in accordance with specified manufacturing
    processes. They create designs with schematics and assembly models, make drawings
    and bills of materials for components, and analyse equipment.
- uri: http://data.europa.eu/esco/occupation/8bc48c43-d976-458a-9e3c-ee784572351d
  preferred_label: industrial tool design engineer
  isco_code: '2144'
  code: 2144.1.9
  description: Industrial tool design engineers design various industrial tools in
    accordance with customer needs, manufacturing requirements, and building specifications.
    They test the designs, look for solutions to any problems, and oversee production.
- uri: http://data.europa.eu/esco/occupation/8d410283-865d-4cbb-acae-ac7f69d9cf26
  preferred_label: automotive engineer
  isco_code: '2144'
  code: 2144.1.3
  description: Automotive engineers design and oversee the manufacturing process and
    operation of motor vehicles such as motorcycles, cars, trucks, buses and their
    respective engineering systems. They design new vehicles or mechanical parts,
    supervise modifications and resolve technical problems. They make sure the designs
    comply with cost specifications and other constraints. They also conduct research
    studying environmental, energy and safety aspects.
- uri: http://data.europa.eu/esco/occupation/93b11f0f-69af-4ece-b9da-f29aab7d38d3
  preferred_label: container equipment design engineer
  isco_code: '2144'
  code: 2144.1.4
  description: Container equipment design engineers design equipment to contain products
    or liquids, according to set specifications, such as boilers or pressure vessels.
    They test the designs, look for solutions to any problems and oversee production.
- uri: http://data.europa.eu/esco/occupation/994fe880-dc26-4f0f-a3cd-500709b6a665
  preferred_label: precision engineer
  isco_code: '2144'
  code: 2144.1.18
  description: Precision engineers design processes, machines, fixtures and other
    equipment that have exceptionally low engineering tolerances, are repeatable and
    stable over time. They ensure prototypes are built and tested and make sure the
    designs meet system specifications and operational requirements.
- uri: http://data.europa.eu/esco/occupation/9e47c727-5718-48f1-a567-6a4c09397a21
  preferred_label: aerodynamics engineer
  isco_code: '2144'
  code: 2144.1.1.1
  description: Aerodynamics engineers perform aerodynamics analysis to make sure the
    designs of transport equipment meet aerodynamics and performance requirements.
    They contribute to designing engine and engine components, and issue technical
    reports for the engineering staff and customers. They coordinate with other engineering
    departments to check that designs perform as specified. Aerodynamics engineers
    conduct research to assess adaptability of equipment and materials. They also
    analyse proposals to evaluate production time and feasibility.
- uri: http://data.europa.eu/esco/occupation/a5dc92b4-9712-4bc5-a08a-f6efa07b855f
  preferred_label: agricultural equipment design engineer
  isco_code: '2144'
  code: 2144.1.2.1
  description: Agricultural equipment design engineers apply knowledge of engineering
    and biological science to solve various agricultural problems such as soil and
    water conservation and the processing of agricultural products. They design agricultural
    structures, machinery, equipment and processes.
- uri: http://data.europa.eu/esco/occupation/ab360abd-32e2-4e03-967d-a10758efffa7
  preferred_label: mechatronics engineer
  isco_code: '2144'
  code: 2144.1.11
  description: Mechatronics engineers design and develop intelligent systems, such
    as robotic devices, smart home appliances, and aeroplanes, through combining technologies
    from mechanical, electronic, computer, and control engineering. They create blueprints
    or design documents for parts, assemblies or finished products using software
    programs, and also oversee and manage projects.
- uri: http://data.europa.eu/esco/occupation/ae8b19cc-8c6e-4a16-ada2-c15f97ded133
  preferred_label: optomechanical engineer
  isco_code: '2144'
  code: 2144.1.15
  description: Optomechanical engineers design and develop optomechanical systems,
    devices, and components, such as optical mirrors and optical mounts. Optomechanical
    engineering combines optical engineering with mechanical engineering in the design
    of these systems and devices. They conduct research, perform analysis, test the
    devices, and supervise the research.
- uri: http://data.europa.eu/esco/occupation/b3855886-bfee-4fd9-827e-2a0b6b4b4441
  preferred_label: mine ventilation engineer
  isco_code: '2144'
  code: 2144.1.13
  description: Mine ventilation engineers design and manage systems and equipment
    to ensure fresh air supply and air circulation in underground mines and the timely
    removal of noxious gases. They co-ordinate ventilation system design with mine
    management, mine safety engineer and mine planning engineer.
- uri: http://data.europa.eu/esco/occupation/c36fc197-1f5b-4563-acd8-6f1d06aa1c03
  preferred_label: marine engineer
  isco_code: '2144'
  code: 2144.1.10
  description: Marine engineers design, build, maintain and repair the hull, mechanical,
    electronic equipment and auxiliary systems such as engines, pumps, heating, ventilation,
    generator sets. They work on all types of boats from pleasure crafts to naval
    vessels, including submarines.
- uri: http://data.europa.eu/esco/occupation/d7e663b2-f042-47d8-9fda-b5b8ba30ca04
  preferred_label: aerospace engineer
  isco_code: '2144'
  code: 2144.1.1
  description: 'Aerospace engineers develop, test and oversee the manufacture of flight
    vehicles such as aircrafts, missiles, and spacecrafts. The field of engineering
    they are active in, can be divided into two branches: aeronautical engineering
    and astronautical engineering.'
- uri: http://data.europa.eu/esco/occupation/dbc88790-a8c1-4dc4-9507-8f9dcff9c990
  preferred_label: engine designer
  isco_code: '2144'
  code: 2144.1.5
  description: Engine designers carry out engineering duties in designing mechanical
    equipment such as machines and all types of engines. They also supervise their
    installation and maintenance.
- uri: http://data.europa.eu/esco/occupation/fcbb66f5-843b-4152-9ce4-e7b19c2a88d9
  preferred_label: mine mechanical engineer
  isco_code: '2144'
  code: 2144.1.12
  description: Mine mechanical engineers supervise the procurement, installation,
    removal and maintenance of mining mechanical equipment, using their knowledge
    of mechanical specifications. They organise the replacement and repair of mechanical
    equipment and components.
- uri: http://data.europa.eu/esco/occupation/497a65bf-04e5-48ed-939e-2a68419f8144
  preferred_label: oenologist
  isco_code: '2145'
  code: 2145.1.7
  description: Oenologists track the wine manufacturing process in its entirety and
    supervise the workers in wineries. They supervise and coordinate production to
    ensure the quality of the wine and also give advice by determining the value and
    classification of wines being produced.
- uri: http://data.europa.eu/esco/occupation/4b709f9e-6112-4d58-81b0-2d6e6a69d61b
  preferred_label: food technologist
  isco_code: '2145'
  code: 2145.1.4
  description: Food technologists develop processes for manufacturing foodstuffs and
    related products based on chemical, physical, and biological principles and technology.
    They design and plan layouts or equipment, oversee staff, engage in controlling,
    and improve food technologies in food production processes.
- uri: http://data.europa.eu/esco/occupation/654ce97c-9ed1-4614-bc76-36f4a1f67557
  preferred_label: synthetic materials engineer
  isco_code: '2145'
  code: '2145.3'
  description: Synthetic materials engineers develop new synthetic materials processes
    or improve existing ones. They design and construct installations and machines
    for the production of synthetic materials and examine samples of raw materials
    in order to ensure quality.
- uri: http://data.europa.eu/esco/occupation/7bc02fa7-7aaa-41a6-be5b-ab7a7b6684d3
  preferred_label: gas distribution engineer
  isco_code: '2145'
  code: 2145.1.5
  description: Gas distribution engineers design and construct transport systems for
    natural gas, connecting the gas distribution network to the consumer by designing
    piping works and mains. They research methods to ensure sustainability, and to
    decrease environmental impact, as well as optimising cost efficiency.
- uri: http://data.europa.eu/esco/occupation/89860c2a-d217-432a-8636-84aa17f09c15
  preferred_label: gas production engineer
  isco_code: '2145'
  code: 2145.1.6
  description: Gas production engineers develop methods to optimise the extraction
    and production of gas for energy and utilities. They design systems for gas production,
    supervise production operations and develop improvements on existing systems.
- uri: http://data.europa.eu/esco/occupation/95cd3d64-20d0-4681-857d-d6c63d07349f
  preferred_label: brewmaster
  isco_code: '2145'
  code: 2145.1.2
  description: Brewmasters ensure brewing quality of current products and create mixtures
    for the development of new products. For current products, they oversee the whole
    brewing process following one of many brewing processes. For new products, they
    develop new brewing formulas and processing techniques or modify existing ones
    as to come up with potential new products.
- uri: http://data.europa.eu/esco/occupation/b4e26d7f-475e-4ada-b287-d669de03fb21
  preferred_label: rubber technologist
  isco_code: '2145'
  code: '2145.2'
  description: Rubber technologists develop compound formulations to respond to specific
    needs and attain the required in-rubber properties, starting from technical specifications
    and application demands. They have knowledge of physical and chemical characteristics
    of raw rubber material and the process to convert it into market products.
- uri: http://data.europa.eu/esco/occupation/c44c078d-85e4-40a3-9598-2c333d7a24ca
  preferred_label: paper engineer
  isco_code: '2145'
  code: 2145.1.8
  description: Paper engineers ensure an optimal production process in the manufacture
    of paper and related products. They select primary and secondary raw materials
    and check their quality. In addition, they optimize machinery and equipment usage
    as well as the chemical additives for paper making.
- uri: http://data.europa.eu/esco/occupation/d2df16f3-87d7-4c6e-a640-95cee39a8f4e
  preferred_label: cider master
  isco_code: '2145'
  code: 2145.1.3
  description: Cider masters envision the manufacturing process of cider. They ensure
    brewing quality and follow one of several brewing processes. They modify existing
    brewing formulas and processing techniques in order to develop new cider products
    and cider-based beverages.
- uri: http://data.europa.eu/esco/occupation/e2a495fb-68a3-46f9-8753-6ce566a7a085
  preferred_label: pharmaceutical engineer
  isco_code: '2145'
  code: 2145.1.9
  description: Pharmaceutical engineers design and develop technologies used in pharmaceutical
    research and drugs manufacture, advising the pharmaceutical manufacturing plants
    to maintain and operate those technologies and ensuring the customers` and workers`
    safety requirements are met. They may also be involved in the conception and design
    of pharmaceutical manufacturing plants and research centers.
- uri: http://data.europa.eu/esco/occupation/ec21ce88-ce14-49b6-be0a-cc53cf5a3a67
  preferred_label: chemical engineer
  isco_code: '2145'
  code: '2145.1'
  description: Chemical engineers design and develop large-scale chemical and physical
    production processes and are involved in the entire industrial process required
    for transforming raw materials into products.
- uri: http://data.europa.eu/esco/occupation/f3e23761-0663-4ae0-97a2-0b2dd3fa38a1
  preferred_label: biochemical engineer
  isco_code: '2145'
  code: 2145.1.1
  description: Biochemical engineers research on the field of life science striving
    for new discoveries. They convert those findings into chemical solutions that
    can improve the wellbeing of society such as vaccines, tissue repair, crops improvement
    and green technologies advances such as cleaner fuels from natural resources.
- uri: http://data.europa.eu/esco/occupation/03b2f112-a891-461d-a8d4-effb9dcf2df6
  preferred_label: quarry engineer
  isco_code: '2146'
  code: '2146.11'
  description: Quarry engineers analyse which extraction methods such as excavating,
    drilling and blasting are most suited to extract raw materials from the ground.
    They develop plans before a new quarry is opened, assessing if the quarry is profitable.
    Quarry engineers manage the everyday operations in a quarry, create and maintain
    progress reports, oversee the staff, ensure health and safety and assess the environmental
    impact a quarry has on its environment.
- uri: http://data.europa.eu/esco/occupation/27eb624c-6171-4c71-aa71-bb21e83381d4
  preferred_label: chemical metallurgist
  isco_code: '2146'
  code: 2146.5.1
  description: Chemical metallurgists are involved in the extraction of useable metals
    from ores and recycleable material. They study the properties of metal, such as
    corrosion and fatigue.
- uri: http://data.europa.eu/esco/occupation/3f863faa-c045-4f05-a419-b19182aea866
  preferred_label: drilling engineer
  isco_code: '2146'
  code: '2146.2'
  description: Drilling engineers develop and supervise the drilling of gas and oil
    wells. They assist in the designing, testing and creation of wells and are employed
    on land or offshore platforms. Drilling engineers work with other mining professionals
    and oversee the drilling progress and safety of the site.
- uri: http://data.europa.eu/esco/occupation/40b77b1b-6f9c-4d25-8b08-8b3cb0aaf7e7
  preferred_label: explosives engineer
  isco_code: '2146'
  code: '2146.3'
  description: Explosives engineers design drilling patterns and determine the amount
    of explosives required. They organise and supervise controlled blasts and report
    and investigate misfires. They manage explosives magazines.
- uri: http://data.europa.eu/esco/occupation/47dd863b-b124-4bb1-bb42-a9498492a8cb
  preferred_label: liquid fuel engineer
  isco_code: '2146'
  code: '2146.4'
  description: Liquid fuel engineers evaluate liquid fuel extraction sites. They design
    and develop methods for extracting liquid fuels from underneath the earth surface,
    these fuels include petroleums, natural gas, liquefied petroleum gas, non-petroleum
    fossil fuels, biodiesel and alcohols. They maximise the recovery of hydrocarbon
    at a minimum cost, pursuing minimal impact on the environment.
- uri: http://data.europa.eu/esco/occupation/4efee3ed-de09-44c6-bd4a-d9eaafd04683
  preferred_label: process metallurgist
  isco_code: '2146'
  code: 2146.5.2
  description: Process metallurgists study the characteristics of ores including copper,
    nickel and iron ores and the performance of various metals and alloys.
- uri: http://data.europa.eu/esco/occupation/5fd69ee2-2042-4280-85e1-8f1462886987
  preferred_label: mine development engineer
  isco_code: '2146'
  code: '2146.6'
  description: Mine development engineers design and coordinate mine development operations
    such as crosscutting, sinking, tunnelling, in-seam drivages, raising, and removing
    and replacing overburden.
- uri: http://data.europa.eu/esco/occupation/62d3f108-ade2-44b5-beeb-d63d0b21268f
  preferred_label: mineral processing engineer
  isco_code: '2146'
  code: '2146.9'
  description: Mineral processing engineers develop and manage equipment and techniques
    to successfully process and refine valuable minerals from ore or raw mineral.
- uri: http://data.europa.eu/esco/occupation/7569f423-2c37-49aa-947e-41acb66ec909
  preferred_label: petroleum engineer
  isco_code: '2146'
  code: '2146.10'
  description: Petroleum engineers evaluate gas and oil fields. They design and develop
    methods for extracting oil and gas from underneath the earth's surface. They maximise
    the recovery of hydrocarbon at a minimum cost, pursuing minimal impact on the
    environment.
- uri: http://data.europa.eu/esco/occupation/7b99007f-c6bf-4703-85d3-f168bc6a9f28
  preferred_label: mine planning engineer
  isco_code: '2146'
  code: '2146.8'
  description: Mine planning engineers design future mine layouts capable of achieving
    production and mine development objectives, taking into account the geological
    characteristics and structure of the mineral resource. They prepare production
    and development schedules and monitor progress against these.
- uri: http://data.europa.eu/esco/occupation/808b5940-8092-4f08-bc37-9b60ee5761d8
  preferred_label: assayer
  isco_code: '2146'
  code: '2146.1'
  description: Assayers test and analyse precious metals such as silver and gold to
    determine the value and properties of components using chemical and physical techniques.
    They also seperate precious metals or other components from other materials.
- uri: http://data.europa.eu/esco/occupation/bcf8f332-c7e1-4a08-8651-28d668290eaf
  preferred_label: metallurgist
  isco_code: '2146'
  code: '2146.5'
  description: Metallurgists specialise in the extraction and processing of metals
    such as iron, steel, zinc, copper and aluminium. They work to mold or combine
    both pure and mixed metals (alloys) into new shapes and properties. Metallurgists
    handle the extraction of metal ores and develop their use in metal processing
    techniques. They may work in both manufacturing or do scientific research about
    the performance of metals.
- uri: http://data.europa.eu/esco/occupation/d6d1af75-7811-4914-b16f-50441bcb0e74
  preferred_label: mine health and safety engineer
  isco_code: '2146'
  code: '2146.7'
  description: Mine health and safety engineers develop and implement systems and
    procedures to prevent employee injury and sickness, improve mine working conditions,
    reduce health and safety risks and prevent damage to equipment and property.
- uri: http://data.europa.eu/esco/occupation/01989dd8-36c0-43cc-a82d-2bfc409de9c4
  preferred_label: dismantling engineer
  isco_code: '2149'
  code: '2149.8'
  description: Dismantling engineers research and plan the optimal way to dismantle
    industrial equipment, machinery and buildings that reached the end-of-life phase.
    They analyse the required work and schedule the various operations. They give
    team leaders instructions and supervise their work.
- uri: http://data.europa.eu/esco/occupation/01ffb917-98dc-48c1-91ad-93c4104e791d
  preferred_label: biomedical engineer
  isco_code: '2149'
  code: 2149.5.1
  description: Biomedical engineers combine knowledge of engineering principles and
    biological findings for the development of medical treatments, medicaments, and
    general healthcare purposes. They can develop solutions ranging from the improvement
    of the components in conventional medicaments up to implants developments, and
    tissue treatment.
- uri: http://data.europa.eu/esco/occupation/07dfff6d-a0d0-4202-a697-fe9176c15999
  preferred_label: dependability engineer
  isco_code: '2149'
  code: '2149.7'
  description: Dependability engineers ensure the reliability, availability and maintainability
    (RAM) of a production process or a system. They focus on improving the capability
    to function without interruption and operate when needed, and on increasing the
    easiness of repairing, replacing or upgrading the product.
- uri: http://data.europa.eu/esco/occupation/0cca32c2-9308-4927-adb2-14771ab787f0
  preferred_label: quantity surveyor
  isco_code: '2149'
  code: '2149.14'
  description: Quantity surveyors have under their helm complete management of the
    cost involved in building and construction projects from the inception of the
    project until the delivery. They strive for an efficient use of the resources
    whilst keeping an eye on quality, quality standards, and client's requirements.
- uri: http://data.europa.eu/esco/occupation/0e99c929-364f-4b0a-8a64-2aab42420f00
  preferred_label: renewable energy engineer
  isco_code: '2149'
  code: 2149.9.7
  description: Renewable energy engineers research alternative sources of energy in
    order to design systems for renewable energy production. They strive to optimise
    energy production from renewable sources, and reduce production expenses and environmental
    strain. They design systems which focus on energy sustainability and efficiency.
- uri: http://data.europa.eu/esco/occupation/1f958638-066f-470c-9549-a9070ba280a6
  preferred_label: component engineer
  isco_code: '2149'
  code: 2149.2.2
  description: Component engineers design and envision the engineering development
    of different small parts composing a bigger project, machine, or process. They
    ensure that parts are not conflicting from an engineering perspective.
- uri: http://data.europa.eu/esco/occupation/1ff61522-8947-4c95-b589-cb0e0539a62b
  preferred_label: energy systems engineer
  isco_code: '2149'
  code: 2149.9.2
  description: Energy systems engineers supervise the energy conversion and distribution
    processes. They analyse the energy supply and consumption efficiency developing
    new ways to improve the existing processes, taking into account both the technical
    and the financial aspects. They also study the environmental impact of energy
    usage and combine the production of renewable energy in the current power systems.
- uri: http://data.europa.eu/esco/occupation/29e8a27f-5e68-4d47-b991-5c41f835c72a
  preferred_label: innovation engineer
  isco_code: '2149'
  code: '2149.18'
  description: Innovation engineers participate in the planning, organisation and
    execution of innovation product projects. They design and develop new products
    and prototypes involving technologies, optimisation and automation processes that
    drive innovative growth within an organisation. Innovation engineers identify
    potential development areas, patent opportunities, innovation trends and the needs
    of customers.
- uri: http://data.europa.eu/esco/occupation/30c0943c-caa1-411d-b273-26f475971273
  preferred_label: quality engineer
  isco_code: '2149'
  code: 2149.2.7
  description: Quality engineers define quality standards for the creation of products
    or services. They check to make sure the products and services are in compliance
    with the quality standards and they coordinate quality improvements.
- uri: http://data.europa.eu/esco/occupation/35cf772d-bbc9-4eb4-9ca6-5f982649d436
  preferred_label: wood technology engineer
  isco_code: '2149'
  code: 2149.11.2
  description: Wood technology engineers develop materials and components made of
    wood, construct production facilities and control and monitor the production.
    They also examine products and materials and advise customers.
- uri: http://data.europa.eu/esco/occupation/3dab5c3f-84d0-4d52-901d-dd262eaea509
  preferred_label: research engineer
  isco_code: '2149'
  code: 2149.2.8
  description: Research engineers combine research skills and knowledge of engineering
    principles to assist in the development or design of new products and technology.
    They also improve existing technical processes, machines and systems and create
    new, innovative technologies. The duties of research engineers depend on the branch
    of engineering and the industry in which they work. Research engineers generally
    work in an office or laboratory, analysing processes and conducting experiments.
- uri: http://data.europa.eu/esco/occupation/42dbb769-4c91-47dc-bd16-ec8e70c4180f
  preferred_label: solar energy engineer
  isco_code: '2149'
  code: 2149.9.8
  description: Solar energy engineers design systems which generate electrical energy
    from sunlight, such as photovoltaic systems. They design and construct systems
    which optimise the energy output from solar power, and the sustainability of the
    production process of solar systems.
- uri: http://data.europa.eu/esco/occupation/4a375b68-88a0-4e5f-99ce-9b01341dfb81
  preferred_label: materials engineer
  isco_code: '2149'
  code: '2149.11'
  description: Materials engineers research and design new or improved materials for
    a diverse number of applications. They analyse the composition of materials, conduct
    experiments, and develop new materials for industry-specific use that can range
    from rubber, to textiles, glass, metals, and chemicals. They advise companies
    in damage assessments, quality assurance of materials, and recycling of materials.
- uri: http://data.europa.eu/esco/occupation/4be368e3-badb-4b9f-9d0a-4d0f7565540a
  preferred_label: fire prevention and protection engineer
  isco_code: '2149'
  code: 2149.10.1
  description: Fire prevention and protection engineers study, design, and developed
    innovative solutions aimed to the prevention of fire and the protection of people,
    natural sites, and urban areas. They propose suitable materials for construction,
    clothing, or other applications and they design detection systems aiming to prevent
    fire or the propagation of it.
- uri: http://data.europa.eu/esco/occupation/4daee8bd-8400-4da6-ba52-30d4c193d1a9
  preferred_label: aviation ground systems engineer
  isco_code: '2149'
  code: '2149.4'
  description: Aviation ground systems engineers are in charge of supervising the
    maintenance of the equipment of the airport, for example, the visual aids, airport
    electrical systems, luggage systems, security systems, pavements, drainage, maintenance
    of unpaved areas and equipment and vehicles.
- uri: http://data.europa.eu/esco/occupation/551a6797-3ca9-41fc-9dca-9a982a8fd8a6
  preferred_label: robotics engineer
  isco_code: '2149'
  code: '2149.15'
  description: Robotics engineers design and develop robotic devices and applications
    in combination with mechanical engineering principles. They use pre-established
    designs and current developments for improving or inventing systems, machinery
    and equipment. They combine several knowledge fields such as computing, engineering,
    and electronics in the development of new engineering applications.
- uri: http://data.europa.eu/esco/occupation/58c30193-d29f-4d22-8bf0-fd87346b91dd
  preferred_label: installation engineer
  isco_code: '2149'
  code: 2149.2.5
  description: Installation engineers oversee and manage the installing of structures,
    which take often many years to design and construct. They ensure safety, avoid
    risks and they aim to the optimalisation of costs. Installation engineers also
    create constructive designs of systems and perform installation system testing.
    They determine the material needed for the construction of these systems and the
    costs, and use CAD software to design these systems.
- uri: http://data.europa.eu/esco/occupation/6fc8f605-98b9-4218-b5e2-91c4c9c55c4d
  preferred_label: design engineer
  isco_code: '2149'
  code: 2149.2.4
  description: Design engineers develop new conceptual and detailed designs. They
    create the look for these concepts or products and the systems used to make them.
    Design engineers work with engineers and marketers to enhance the functioning
    and efficiency of existing devices.
- uri: http://data.europa.eu/esco/occupation/70182f44-e444-4bf3-940f-0c054c1d5917
  preferred_label: textile, leather and footwear researcher
  isco_code: '2149'
  code: '2149.17'
  description: Textile, leather and footwear researchers combine knowledge of material
    sciences, chemistry, physics, process technologies, management, and engineering
    to contribute to future innovations within the fields of textile, wearing apparel,
    leather, and footwear. They collaborate in multidisciplinary projects in order
    to combine findings from a diverse array of science fields for product development.
- uri: http://data.europa.eu/esco/occupation/76abbb82-c103-4d7a-a4c0-14dba4d6199a
  preferred_label: commissioning engineer
  isco_code: '2149'
  code: '2149.6'
  description: Commissioning engineers supervise the final stages of a project when
    systems are installed and tested. They inspect the correct functioning of the
    equipment, facilities and plants to make sure they meet the requirements and specifications.
    They perform the necessary verifications and give approval to finalise the project.
- uri: http://data.europa.eu/esco/occupation/778c1d37-69f2-4184-ac98-03b7dbfba332
  preferred_label: photonics engineer
  isco_code: '2149'
  code: 2149.12.1
  description: Photonics engineers are concerned with the generation, transmission,
    transformation, and detection of light. They conduct research, design, assemble,
    test and deploy photonic components or systems in multiple application fields,
    from optical communications to medical instrumentation, material processing or
    sensing technology.
- uri: http://data.europa.eu/esco/occupation/836f0a96-7546-4003-9fc8-714fc79199d4
  preferred_label: contract engineer
  isco_code: '2149'
  code: 2149.2.3
  description: Contract engineers combine technical knowledge of contracts and legal
    matters with understanding of engineering specifications and principles. They
    ensure that both parts are aligned in the development of a project and foresee
    the compliance of all the engineering specifications and matters as defined in
    contracts.
- uri: http://data.europa.eu/esco/occupation/949ed945-f697-415e-b4c5-51d8abf7cfdf
  preferred_label: nanoengineer
  isco_code: '2149'
  code: 2149.11.1
  description: Nanoengineers combine the scientific knowledge of atomic and molecular
    particles with engineering principles for applications in a varied array of fields.
    They apply findings in chemistry, biology, and materials engineering, etc. They
    use technological knowledge for the improvement of existing applications or the
    creation of micro objects.
- uri: http://data.europa.eu/esco/occupation/a1273779-d2d4-4708-a406-62f7cdd26aab
  preferred_label: health and safety engineer
  isco_code: '2149'
  code: '2149.10'
  description: Health and safety engineers design objects and programs by combining
    engineering principles and health and safety requirements. They envision the protection
    and well-being of the people using designed objects or performing work under designed
    health and safety programs. They assess facilities and the risks that they might
    pose (e.g. contaminant materials, ergonomics, handling of dangerous substances,
    etc.) in order to design and improve health and safety measures.
- uri: http://data.europa.eu/esco/occupation/a75c740c-d8d9-41a7-ab1a-e69a6eb6eac1
  preferred_label: alternative fuels engineer
  isco_code: '2149'
  code: 2149.9.1
  description: Alternative fuels engineers design and develop systems, components,
    motors, and equipment which replace the use of conventional fossil fuels as main
    power source for propulsion and power generation with the feature of using renewable
    energies and non-fossil fuels. They strive to optimise energy production from
    renewable sources and reduce production expenses and environmental strain. The
    alternative fuels employed mainly include Liquefied Natural Gas (LNG), Liquefied
    Petroleum Gas (LPG), biodiesel, bio-alcohol as well as electricity (i.e., batteries
    and fuel cells), hydrogen and fuels produced from biomass.
- uri: http://data.europa.eu/esco/occupation/a950e88b-cb5e-4a7d-8a94-3f9460b487d7
  preferred_label: compliance engineer
  isco_code: '2149'
  code: 2149.2.7.1
  description: Compliance engineers strive to keep the highest compliance of systems
    with engineering specifications. They can exert compliance in a varied array of
    engineering fields including mechanical, electrical, electronical systems. They
    ensure the engineering complies with regulations, safety measures, and internal
    directives.
- uri: http://data.europa.eu/esco/occupation/ab3c4d3e-3189-47ad-82af-57cdae3cb589
  preferred_label: optical engineer
  isco_code: '2149'
  code: '2149.12'
  description: Optical engineers design and develop different industrial applications
    with optics. They have knowledge of light, light transmission principles, and
    optics in order to design engineering specs of equipment such as microscopes,
    lenses, telescopes, and other optical devices.
- uri: http://data.europa.eu/esco/occupation/afbe50b0-6634-4677-a3e7-0aada10cb9a7
  preferred_label: thermal engineer
  isco_code: '2149'
  code: 2149.9.9
  description: Thermal engineers design systems which provide heating or cooling,
    using thermodynamics, that transfer heat or energy through liquids and gases.
    They also construct these systems, and perform test to ensure proper functionality.
- uri: http://data.europa.eu/esco/occupation/b065b637-5cb5-44d9-8c39-08004b51734e
  preferred_label: acoustical engineer
  isco_code: '2149'
  code: '2149.1'
  description: Acoustical engineers study and apply the science of sound to various
    applications. They work in a wide range of areas including the consultation of
    the acoustics and elements affecting the transmission of sound in spaces for performances
    or recording activities. They can also consult on the levels of noise contamination
    for those activities that require compliance with standards on that matter.
- uri: http://data.europa.eu/esco/occupation/b2cede50-82bb-4684-9f11-1930e12ad672
  preferred_label: energy engineer
  isco_code: '2149'
  code: '2149.9'
  description: Energy engineers design new, efficient and clean ways to produce, transform,
    and distribute energy to improve environmental sustainability and energy efficiency.
    They deal with the extraction of energy through natural resources, such as oil
    or gas, or renewable and sustainable sources, such as wind or solar power.
- uri: http://data.europa.eu/esco/occupation/ba490796-46f7-45b7-827b-db6882fca3e1
  preferred_label: onshore wind energy engineer
  isco_code: '2149'
  code: 2149.9.6
  description: Onshore wind energy engineers design, install and maintain wind energy
    farms and equipment. They research and test locations to find the most productive
    location, test equipment and components such as wind-turbine blades, and develop
    strategies for more efficient energy production, and environmental sustainability.
- uri: http://data.europa.eu/esco/occupation/be845b10-21d0-49a7-b5b9-095828c32515
  preferred_label: geothermal engineer
  isco_code: '2149'
  code: 2149.9.3
  description: Geothermal engineers research, design, plan and operate processes and
    equipment that convert thermal energy into electricity or heating and cooling.
    They use natural heat sources from underground to generate power, to cool in the
    summer and heat in the winter industrial, commercial and residential buildings.
    Geothermal engineers develop strategies for more efficient energy production and
    analyse environmental consequences.
- uri: http://data.europa.eu/esco/occupation/c4071145-a774-4cf4-aefa-ae18a385cca4
  preferred_label: logistics engineer
  isco_code: '2149'
  code: 2149.2.6
  description: Logistics engineers design and implement systems aimed to optimise
    the time and efforts invested in transportation activities. They ensure that systems
    allow for micro-tracking and smooth communication across transport methods and
    stages.
- uri: http://data.europa.eu/esco/occupation/c44c37a2-88c3-4ac2-9cf9-959f42deb02b
  preferred_label: offshore renewable energy engineer
  isco_code: '2149'
  code: 2149.9.5
  description: Offshore renewable energy engineers design and supervise the installation
    of offshore energy farms and equipment. They research and test locations to find
    the most productive location, ensure the successful execution of the design plan
    and make any necessary modifications or provide targeted advice. Offshore renewable
    energy engineers test equipment such as wind-turbine blades, tidal stream and
    wave generators. They develop strategies for more efficient energy production,
    and environmental sustainability.
- uri: http://data.europa.eu/esco/occupation/c8fa93eb-7c2c-42c3-b135-c2e825a6615e
  preferred_label: test engineer
  isco_code: '2149'
  code: '2149.16'
  description: Test engineers plan and perform detailed quality tests during various
    phases of the design process to make sure that the systems are properly installed
    and function correctly. They analyse the data collected during tests and produce
    reports. They are also responsible for the safety of the test operations.
- uri: http://data.europa.eu/esco/occupation/e047b8f5-9491-4da2-8816-7aa37ad2370d
  preferred_label: patent engineer
  isco_code: '2149'
  code: '2149.13'
  description: Patent engineers advise companies on different aspects of intellectual
    property law. They analyse inventions, and research their economic potential.
    They check if patent rights have already been given out for an invention and ensure
    that these rights have not been affected or violated.
- uri: http://data.europa.eu/esco/occupation/e8fca903-6590-48a8-8902-094bb41ee90c
  preferred_label: autonomous driving specialist
  isco_code: '2149'
  code: '2149.3'
  description: Autonomous driving specialists design and oversee the operation of
    an autonomous vehicle. They collect data on systems performance, conduct vehicle
    testing and analyse test data. Autonomous driving specialists are aware of different
    technologies employed in self-driving cars, automotive systems and automotive
    technologies.
- uri: http://data.europa.eu/esco/occupation/f14194e2-8e7f-4fc9-9c8c-78d9ae2e7284
  preferred_label: nuclear engineer
  isco_code: '2149'
  code: 2149.9.4
  description: Nuclear engineers plan and design engineering equipment and processes
    in nuclear plants and sites. They engage in engineering activities pertaining
    to nuclear power plants, and develop risk solutions.
- uri: http://data.europa.eu/esco/occupation/f9433fdb-dde1-46cf-9e91-b49d243946a7
  preferred_label: bioengineer
  isco_code: '2149'
  code: '2149.5'
  description: Bioengineers combine state of the art findings in the field of biology
    with engineering logics in order to develop solutions aimed at improving the well-being
    of society. They can develop improvement systems for natural resource conservation,
    agriculture, food production, genetic modification, and economic use.
- uri: http://data.europa.eu/esco/occupation/fbceeac6-798b-4307-a825-626707a753ad
  preferred_label: calculation engineer
  isco_code: '2149'
  code: 2149.2.1
  description: Calculation engineers draw conclusions about real systems, such as
    on strength, stability and durability, by performing experiments on virtual models.
    They test production processes as well.
- uri: http://data.europa.eu/esco/occupation/fde4372d-8293-42de-afbb-8b5a9b274fe7
  preferred_label: application engineer
  isco_code: '2149'
  code: '2149.2'
  description: Application engineers deal with the technical requirements, management,
    and design for the development of various engineering applications, such as systems,
    new product designs, or the improvements of processes. They are responsible for
    the implementation of a design or process improvement, they offer technical support
    for products, answer questions about the technical functionality and assist the
    sales team.
- uri: http://data.europa.eu/esco/occupation/2026adb2-62d7-4b92-9ccb-105abdebe37d
  preferred_label: electromagnetic engineer
  isco_code: '2151'
  code: 2151.1.2
  description: Electromagnetic engineers design and develop electromagnetic systems,
    devices, and components, such as electromagnets in loudspeakers, electromagnetic
    locks, conducting magnets in MRI's, and magnets in electric motors.
- uri: http://data.europa.eu/esco/occupation/58db3ac6-5217-4d46-8a4c-126598be1d13
  preferred_label: electric power generation engineer
  isco_code: '2151'
  code: 2151.1.1
  description: Electric power generation engineers design and develop systems which
    generate electrical power, and develop strategies for the improvement of existing
    electricity generation systems. They strive to conciliate sustainable solutions
    with efficient and affordable solutions. They engage in projects where supply
    of electrical energy is required.
- uri: http://data.europa.eu/esco/occupation/716df735-77eb-47c8-8c06-d86e46903989
  preferred_label: smart home engineer
  isco_code: '2151'
  code: '2151.2'
  description: Smart home engineers are responsible for the design, integration and
    acceptance testing of home automation systems (heating, ventilation and air conditioning
    (HVAC), lighting, solar shading, irrigation, security, safety, etc.), which integrate
    connected devices and smart appliances within residential facilities. They work
    with key stakeholders to ensure the desired project outcome is achieved including
    wire design, layout, appearance and component programming.
- uri: http://data.europa.eu/esco/occupation/7648d5d9-cfab-4981-ba82-b66a9a41d37e
  preferred_label: battery system engineer
  isco_code: '2151'
  code: '2151.4'
  description: Battery system engineers are professionals that design, test and develop
    battery systems for various applications. They create efficient cost-effective
    energy storage solutions, working with a team of engineers and scientists. Some
    of the solutions are for electric vehicles, consumer electronics, grid storage
    and other applications. They are responsible for the overall performance of the
    battery system, which includes the battery cells, control and management electronics,
    thermal management and safety systems.
- uri: http://data.europa.eu/esco/occupation/77abfaec-a250-4765-95fa-6091e8da1bba
  preferred_label: electromechanical engineer
  isco_code: '2151'
  code: 2151.1.3
  description: Electromechanical engineers design and develop equipment and machinery
    that use both electrical and mechanical technology. They make draughts and prepare
    documents detailing the material requisitions, the assembly process and other
    technical specifications. Electromechanical engineers also test and evaluate the
    prototypes. They oversee the manufacturing process.
- uri: http://data.europa.eu/esco/occupation/86ca306c-ab99-420a-9e2a-aa73c5c4de22
  preferred_label: electrical engineer
  isco_code: '2151'
  code: '2151.1'
  description: Electrical engineers design and develop electrical systems, electrical
    equipment, components, motors, and equipment with the feature of energy transmission.
    They engage in large scale projects such as the design and maintenance of power
    stations, and the distribution of power to smaller applications such as household
    appliances.
- uri: http://data.europa.eu/esco/occupation/ac37627c-a999-4779-997e-9795cc4f9a3d
  preferred_label: power distribution engineer
  isco_code: '2151'
  code: 2151.1.5
  description: Power distribution engineers design and operate facilities which distribute
    power from the distribution facility to the consumers. They research methods for
    the optimisation of power distribution, and ensure the consumers' needs are met.
    They also ensure compliance to safety regulations by monitoring the automated
    processes in plants and directing workflow.
- uri: http://data.europa.eu/esco/occupation/c2d36adb-ecf4-4823-980b-d84b0f11b2c8
  preferred_label: battery simulation engineer
  isco_code: '2151'
  code: '2151.3'
  description: Battery simulation engineers predict the performance of batteries and
    battery systems under different conditions using mathematical models and simulation
    tools. They work with a team of engineers and scientists to create accurate and
    reliable simulations of the battery systems, which can be used to analyze and
    optimize the design, performance, and safety of the batteries. They are responsible
    for developing and maintaining the simulation models, performing simulations and
    analyzing the results, and providing recommendations for design changes and improvements.
- uri: http://data.europa.eu/esco/occupation/e69697d0-2639-4aad-b73a-05e0b98357b1
  preferred_label: mine electrical engineer
  isco_code: '2151'
  code: 2151.1.4
  description: Mine electrical engineers supervise the procurement, installation and
    maintenance of mining electrical equipment, using their knowledge of electrical
    and electronic principles. They organise the replacement and repair of electrical
    equipment and components.
- uri: http://data.europa.eu/esco/occupation/f1b89616-5dfe-40d4-8b02-58a6982b1a01
  preferred_label: substation engineer
  isco_code: '2151'
  code: 2151.1.6
  description: Substation engineers design medium and high voltage substations used
    for the transmission, distribution, and generation of electrical energy. They
    develop methods for the efficient operation of the energy process, and ensure
    compliance to safety and environmental standards.
- uri: http://data.europa.eu/esco/occupation/0c7c9606-fde3-4658-8136-8fe0c9b8bd09
  preferred_label: medical device engineer
  isco_code: '2152'
  code: 2152.1.5
  description: Medical device engineers design and develop medical-technical systems,
    installations, and equipment such as pacemakers, MRI scanners, and X-ray machines.
    They monitor the whole manufacturing process from concept design to product implementation.
    activities undertaken include, among others, designing product improvements, developing
    methods and techniques to evaluate design suitability, coordinating initial production,
    developing test procedures, and designing manufacturing diagrams.
- uri: http://data.europa.eu/esco/occupation/24161923-e3e6-4096-b377-f1ee8a7ea31b
  preferred_label: satellite engineer
  isco_code: '2152'
  code: 2152.1.14
  description: Satellite engineers develop, test and oversee the manufacture of satellite
    systems and satellite programmes. They may also develop software programs, collect
    and research data, and test the satellite systems. Satellite engineers can also
    develop systems to command and control satellites. They monitor satellites for
    issues and report on the behaviour of the satellite in orbit.
- uri: http://data.europa.eu/esco/occupation/35d41f4f-334b-452e-9e31-99f376302493
  preferred_label: optoelectronic engineer
  isco_code: '2152'
  code: 2152.1.11
  description: Optoelectronic engineers design and develop optoelectronic systems
    and devices, such as UV sensors, photodiodes, and LEDs. Optoelectronic engineering
    combines optical engineering with electronic engineering in the design of these
    systems and devices. They conduct research, perform analysis, test the devices,
    and supervise the research.
- uri: http://data.europa.eu/esco/occupation/4874fa37-0cd1-4a68-aed8-a838851f242d
  preferred_label: language engineer
  isco_code: '2152'
  code: 2152.1.4
  description: Language engineers work within the field of computing science, and
    more specifically in the field of natural language processing. They aim to close
    the gap in translation between accurate human translations to machine-operated
    translators. They parse texts, compare and map translations, and improve the linguistics
    of translations through programming and code.
- uri: http://data.europa.eu/esco/occupation/4d34a9ee-2653-4da0-bef7-f59294577224
  preferred_label: electronics engineer
  isco_code: '2152'
  code: '2152.1'
  description: Electronics engineers research, design, and develop electronic systems
    such as circuits, semiconductor devices, and equipment that use electricity as
    a source of power. They work with capacitators, transistors, diodes or resistors
    to create electronic circuits and applications of use in fields such as telecommunications,
    acoustics, instruments, and control.
- uri: http://data.europa.eu/esco/occupation/4f4d33a1-0b41-4dd9-8a42-aeba5a3974ab
  preferred_label: sensor engineer
  isco_code: '2152'
  code: 2152.1.15
  description: Sensor engineers design and develop sensors, sensor systems and products
    that are equipped with sensors. They plan and monitor the manufacture of these
    products.
- uri: http://data.europa.eu/esco/occupation/608edf30-fe37-4ae5-bdd1-2d3a8fd347bd
  preferred_label: flight test engineer
  isco_code: '2152'
  code: 2152.1.2
  description: Flight test engineers work with other systems engineers to plan the
    tests in detail and to make sure that the recording systems are installed for
    the required data parameters. They analyse the data collected during test flights
    and produce reports for individual test phases and for the final flight test.
    They are also responsible for the safety of the test operations.
- uri: http://data.europa.eu/esco/occupation/7b4744a8-a4e3-4104-9b74-4ec54108af7b
  preferred_label: microelectronics designer
  isco_code: '2152'
  code: 2152.1.6
  description: Microelectronics designers focus on developing and designing microelectronic
    systems, from the top packaging level down to the integrated circuit level. Their
    knowledge incorporates system-level understanding with analogue and digital circuit
    knowledge, with integrating the technology processes and an overall outlook in
    microelectronic sensor basics. They work with other engineers, material science
    specialists and researchers, to enable innovations and continuous development
    of already existing devices.
- uri: http://data.europa.eu/esco/occupation/7f0fe7d3-54c6-41e9-88ba-9d4f0f1a46b4
  preferred_label: microsystem engineer
  isco_code: '2152'
  code: 2152.1.10
  description: Microsystem engineers research, design, develop, and supervise the
    production of microelectromechanical systems (MEMS), which can be integrated in
    mechanical, optical, acoustic, and electronic products.
- uri: http://data.europa.eu/esco/occupation/7f46db3a-754b-4bda-b287-5932fa062ee9
  preferred_label: power electronics engineer
  isco_code: '2152'
  code: 2152.1.12
  description: Power electronics engineers design and test circuits for use in power
    electronics systems. They find solutions for known flaws in mechanical designs
    and collaborate with other engineers to perform cross-functional tasks when testing
    designs.
- uri: http://data.europa.eu/esco/occupation/82616669-cc82-4455-9332-a2df209e9f3e
  preferred_label: microelectronics smart manufacturing engineer
  isco_code: '2152'
  code: 2152.1.9
  description: Microelectronics smart manufacturing engineers design, plan and supervise
    the manufacturing and assembly of electronic devices and products, such as integrated
    circuits, automotive electronics or smartphones, in an Industry 4.0 compliant
    environment.
- uri: http://data.europa.eu/esco/occupation/8c0f59c9-9a47-42e7-8287-aab19df4e6ab
  preferred_label: microelectronics engineer
  isco_code: '2152'
  code: 2152.1.7
  description: Microelectronics engineers design, develop, and supervise the production
    of small electronic devices and components such as micro-processors and integrated
    circuits.
- uri: http://data.europa.eu/esco/occupation/8edd8bff-cb59-4c9c-ab0f-59e77d18be48
  preferred_label: predictive maintenance expert
  isco_code: '2152'
  code: 2152.1.13
  description: Predictive maintenance experts analyse data collected from sensors
    located in factories, machineries, cars, railroads and others to monitor their
    conditions in order to keep users informed and eventually notify the need to perform
    maintenance.
- uri: http://data.europa.eu/esco/occupation/92bb3d8c-8a9f-4cd7-80ec-247bbf173004
  preferred_label: computer hardware engineer
  isco_code: '2152'
  code: 2152.1.1
  description: Computer hardware engineers design and develop computer hardware systems
    and components, such as circuit boards, modems, and printers. They draught blueprints
    and assembly drawings, develop and test the prototypes, and supervise the production
    process.
- uri: http://data.europa.eu/esco/occupation/e6800524-eec2-4c33-af0e-6f36d1d679bc
  preferred_label: instrumentation engineer
  isco_code: '2152'
  code: 2152.1.3
  description: Instrumentation engineers envision and design equipment used in manufacturing
    processes for controlling and monitoring various engineering processes remotely.
    They design equipment for the monitoring of production sites such as manufacturing
    systems, machinery uses and production processes.
- uri: http://data.europa.eu/esco/occupation/e6dfc67e-331e-4468-a249-347a08decbdb
  preferred_label: microelectronics materials engineer
  isco_code: '2152'
  code: 2152.1.8
  description: Microelectronics materials engineers design, develop and supervise
    the production of materials that are required for microelectronics and microelectromechanical
    systems (MEMS), and are able to apply them in these devices, appliances, products.
    They aid the design of microelectronics with physical and chemical knowledge about
    metals, semiconductors, ceramics, polymers, and composite materials. They conduct
    research on material structures, perform analysis, investigate failure mechanisms,
    and supervise research works.
- uri: http://data.europa.eu/esco/occupation/fd1c83b3-60d5-4a5f-86c5-94dc2842c246
  preferred_label: integrated circuit design engineer
  isco_code: '2152'
  code: 2152.1.7.1
  description: Integrated circuit design engineers design the layout for integrated
    circuits according to electronics engineering principles. They use software to
    create design schematics and diagrams.
- uri: http://data.europa.eu/esco/occupation/02eb0ae6-ecdd-4602-9c8e-60ffe6dbe1e2
  preferred_label: telecommunications engineer
  isco_code: '2153'
  code: '2153.1'
  description: 'Telecommunications engineers design, build, test and maintain telecommunication
    systems and networks, including radio and broadcasting equipment.

    They analyse customer needs and requirements, ensure that the equipment meets
    regulations, and prepare and present reports and proposals on telecommunication-related
    problems. Telecommunications engineers design and oversee the service delivery
    in all it''s phases, supervising the installation and use of telecommunications
    equipment and facilities, preparing documentation and providing training for company
    staff once new equipment has been installed.'
- uri: http://data.europa.eu/esco/occupation/c5d36eef-df20-47a8-a332-5b4358fa83e3
  preferred_label: telecommunications analyst
  isco_code: '2153'
  code: 2153.1.1
  description: Telecommunications analysts review, analyse and evaluate an organisation's
    telecommunications needs and systems. They provide training on the telecommunications
    system features and functionalities.
- uri: http://data.europa.eu/esco/occupation/8c3f536e-ba66-4321-ba40-363dc39f129b
  preferred_label: architect
  isco_code: '2161'
  code: '2161.1'
  description: Architects investigate, design, and oversee the construction and development
    of buildings, urban spaces, infrastructure projects, and social spaces. They design
    in accordance with the surroundings and regulations applicable in specific geographic
    areas, taking into account factors that include function, aesthetics, costs, and
    public health and safety. They are aware of social contexts and environmental
    factors, which include the relationships between people and buildings, and buildings
    and the environment. They engage in multidisciplinary projects aimed at developing
    the social fabric of a geographic area and advancing in social urbanism projects.
- uri: http://data.europa.eu/esco/occupation/efa81635-9125-4276-8902-9deb12170ea7
  preferred_label: interior architect
  isco_code: '2161'
  code: 2161.1.1
  description: Interior architects create plans of the interior of a home, building
    or other structure. They determine the specifications and distribution of the
    space. Interior architects combine an understanding of space with a sense for
    aesthetics in order to create a harmonious interior design. They draw architectural
    drawings using computer-aided equipment and software, or using conventional methods
    like paper and pen.
- uri: http://data.europa.eu/esco/occupation/52207284-2681-40d3-a317-ec81ca1b3e41
  preferred_label: landscape architect
  isco_code: '2162'
  code: '2162.1'
  description: Landscape architects plan and design the construction of gardens and
    natural spaces. They determine the specifications and distribution of the space.
    Moreover, landscape architects research and analyse the potential of the landscape
    at all stages, scales and contexts of the development process, combining, an understanding
    of the natural space with a sense of aesthetics in order to create a harmonious
    space.
- uri: http://data.europa.eu/esco/occupation/a424aa0f-b3f1-41fb-901f-85e05fed83ed
  preferred_label: landscape designer
  isco_code: '2162'
  code: 2162.1.1
  description: Landscape designers design and create outdoor public areas, landmarks,
    structures, parks, gardens and private gardens to achieve environmental, social-behavioral,
    or aesthetic outcomes.
- uri: http://data.europa.eu/esco/occupation/06f89f2c-c6e9-40c5-a4a5-0e34d5fbc184
  preferred_label: footwear designer
  isco_code: '2163'
  code: 2163.1.3.2
  description: Footwear designers perform fashion trends analysis, forecasting and
    market research, create footwear concepts and build collection lines by operating
    mood or concept boards, colour palettes, materials, drawings and sketches etc.
    They conduct the sampling process, make footwear prototypes and samples for presentations
    aimed to promoting the footwear concepts and collections. They identify the range
    of materials and components, define the design specifications by collaborating
    with the technical team and review the footwear samples, prototypes, and collections.
- uri: http://data.europa.eu/esco/occupation/07c2287f-3caa-4128-b7c8-59801084d931
  preferred_label: puppet designer
  isco_code: '2163'
  code: 2163.1.7
  description: Puppet designers design and create puppets and manipulable objects
    for performers. Their work is based on research and artistic vision. Their design
    is influenced by and influences other designs and must be conform with these designs
    and the overall artistic vision. Therefore, the designers work closely with artistic
    directors, operators and the artistic team. Puppet designers make puppets and
    manipulable objects out of a variety of materials, and may build robotic elements
    into them. Puppet designers sometimes also work as autonomous artists, creating
    outside a performance context.
- uri: http://data.europa.eu/esco/occupation/0f7c84c5-1c0d-4fc1-8949-07dbe8bd34ef
  preferred_label: textile designer
  isco_code: '2163'
  code: 2163.1.8
  description: Textile designers conceptualise textile products considering visual
    communication and functional performance.
- uri: http://data.europa.eu/esco/occupation/1d8f8111-79dd-41dc-aa2a-12f3192dde3c
  preferred_label: automotive designer
  isco_code: '2163'
  code: 2163.1.1
  description: Automotive designers create model designs in 2D or 3D and prepare isometric
    drawings and graphics. They work closely with computer hardware engineers to develop
    hardware designs for the next generation of automotive applications including
    advanced driver-assistance and vehicle-to-everything systems. They re-evaluate
    vehicle design, materials and manufacturing technologies, anticipating changes
    to vehicle architecture and power management, vehicle features and seating functionality
    and safety.
- uri: http://data.europa.eu/esco/occupation/34c57104-ff9b-4003-809e-56eece3cb4d5
  preferred_label: jewellery designer
  isco_code: '2163'
  code: 2163.1.5
  description: Jewellery designers use a variety of materials, including gold, silver
    and precious stones to design and plan pieces of jewellery that can have a wearable
    or decorative purpose. They are involved in the different stages of the making
    process and may design for individual clients or for mass production clients.
- uri: http://data.europa.eu/esco/occupation/3cbbdb83-7c36-4ae5-8c45-6c284186f477
  preferred_label: model maker
  isco_code: '2163'
  code: 2163.1.6
  description: Model makers create three-dimensional scale models or various designs
    or concepts and for various purposes, such as models of human skeletons or organs.
    They also mount the models on display stands so that they can be used for their
    final purpose such as inclusion in education activities.
- uri: http://data.europa.eu/esco/occupation/6833077e-e521-4605-bc1a-893f4b3d811c
  preferred_label: textile product developer
  isco_code: '2163'
  code: '2163.4'
  description: Textile product developers innovate and perform product design of apparel
    textiles, home textiles, and technical textiles (e.g. agriculture, safety, construction,
    medicine, mobile tech, environmental protection, sports, etc.). They apply scientific
    and technical principles to develop innovative textile products.
- uri: http://data.europa.eu/esco/occupation/6d765c21-267d-4d3d-a989-9b7596670477
  preferred_label: textile colourist
  isco_code: '2163'
  code: '2163.3'
  description: Textile colourists prepare, develop and create colours for textile
    applications.
- uri: http://data.europa.eu/esco/occupation/77bfd6e7-5598-4818-84cb-31e2651eb046
  preferred_label: fashion designer
  isco_code: '2163'
  code: 2163.1.3
  description: Fashion designers work on designs for the haute couture and/or ready-to-wear,
    high street fashion markets, and more generally on items of clothing and fashion
    ranges. Fashion designers can operate in a specialised area, such as sportswear,
    childrenswear, footwear or accessories.
- uri: http://data.europa.eu/esco/occupation/a142a645-6e9e-4d86-accd-9816df857c90
  preferred_label: leather goods designer
  isco_code: '2163'
  code: 2163.1.3.3
  description: Leather goods designers are in charge of the creative process of leather
    goods. They perform fashion trends analysis, accompany market researches and forecast
    needs, plan and develop collections, create concepts and build the collection
    lines. They additionally conduct the sampling, create prototypes or samples for
    presentation and promote concepts and collections. During the collection development,
    they define the mood and the concept board, the colour palettes, the materials
    and produce drawings and sketches. Leather goods designers identify the range
    of materials and components and define the design specifications. They collaborate
    with the technical team.
- uri: http://data.europa.eu/esco/occupation/ab7bccb2-6f81-4a3d-a0c0-fca5d47d2775
  preferred_label: industrial designer
  isco_code: '2163'
  code: '2163.1'
  description: Industrial designers work out ideas and develop them into designs and
    concepts for a wide variety of manufactured products. They integrate creativity,
    aesthetics, production feasibility, and market relevance in the design of new
    products.
- uri: http://data.europa.eu/esco/occupation/bc4d1659-6860-488e-bc13-e87eb0e36f67
  preferred_label: furniture designer
  isco_code: '2163'
  code: 2163.1.4
  description: Furniture designers work on items of furniture and related products.
    They design the product and are involved in its production as craftsmen and designers
    or makers. The conception of furniture combines innovative design, functional
    requirements and aesthetic appeal.
- uri: http://data.europa.eu/esco/occupation/d1a554d0-7ad6-4d42-897e-ed31d022fb0b
  preferred_label: clothing fashion designer
  isco_code: '2163'
  code: 2163.1.3.1
  description: Clothing fashion designers create concepts and make sketches of their
    creative ideas by hand or by using software. They analyse and interpret fashion
    trends in order to propose new ideas with high aesthetical value. They perform
    forecasting and market research to put together collections. They build collection
    lines by operating mood or concept boards, colour palettes, materials, drawings
    and sketches considering among others ergonomical criteria, etc.
- uri: http://data.europa.eu/esco/occupation/d1b1dfdf-7d60-430a-b569-7dd71b2ebeaa
  preferred_label: costume designer
  isco_code: '2163'
  code: 2163.1.2
  description: Costume designers develop a costume design concept for events, a performance,
    a movie or a television program. They supervise the execution of it. Their work
    is based on research and artistic vision. Their design is influenced by and influences
    other designs and must be conform with these designs and the overall artistic
    vision. Therefore, the designers work closely with artistic directors, operators
    and the artistic team. Costume designers develop sketches, design drawings, patterns
    or other documentation to support the workshop and performance crew.
- uri: http://data.europa.eu/esco/occupation/d515e82a-ca9f-4be4-9823-33694dff7304
  preferred_label: leather goods product developer
  isco_code: '2163'
  code: '2163.2'
  description: Leather goods product developers perform and interface between design
    and actual production. They analyse and study designer’s specifications and transform
    them into technical requirements, updating concepts to manufacturing lines, selecting
    or even designing components and selecting materials. Leather goods product developers
    also perform the pattern engineering, namely they make patterns manually and produce
    technical drawings for various range of tools, especially cutting. They evaluate
    prototypes, performing required tests for samples and confirming the customer’s
    quality requirements and pricing constrains.
- uri: http://data.europa.eu/esco/occupation/3b129d8d-268e-465a-b0c5-bf32cae59a41
  preferred_label: mobility services manager
  isco_code: '2164'
  code: '2164.2'
  description: Mobility services managers are responsible for the strategic development
    and implementation of programs that promote sustainable and interconnected mobility
    options, reduce mobility costs and meet the transportation needs of customers,
    employees and the community as a whole such as bike sharing, e-scooter sharing,
    carsharing and ride hailing and parking management. They establish and manage
    partnerships with sustainable transport providers and ICT companies and develop
    business models in order to influence the demand of the market and promote the
    concept of mobility as a service in urban areas.
- uri: http://data.europa.eu/esco/occupation/44508e7b-f56b-4bfb-9cd6-879838aecd94
  preferred_label: land planner
  isco_code: '2164'
  code: '2164.1'
  description: Land planners visit sites in order to create projects and plans for
    land usage and development. They collect and analyse data about the land. Land
    planners provide advice on the efficiency and safety of development plans.
- uri: http://data.europa.eu/esco/occupation/8d463763-5d38-4f47-903c-1c4df32141c1
  preferred_label: smart city consultant
  isco_code: '2164'
  code: '2421.8'
  description: Smart city consultants advise on sustainability solutions for the implementation
    of smart city initiatives. They execute environmental projects based on smart
    services, advanced technology, and digital transformation in urban areas. In addition,
    Smart city consultants develop business plans to attract investment resources,
    identify challenges and sustainable business opportunities, as well as synergies
    between public and private stakeholders or clients.
- uri: http://data.europa.eu/esco/occupation/93e4e70b-aae4-4fdc-8037-e48e7077564e
  preferred_label: transport planner
  isco_code: '2164'
  code: '2164.3'
  description: Transport planners develop and implement policies in order to improve
    transport systems, taking into account the social, environmental and economic
    factors. They collect and analyse traffic data using statistical modelling tools.
- uri: http://data.europa.eu/esco/occupation/e14548c8-c2b9-4ef8-8670-d5967d7ad804
  preferred_label: urban planner
  isco_code: '2164'
  code: '2164.4'
  description: Urban planners create development plans for towns, urban areas, cities,
    and regions. They research the needs of the community or the region (economic,
    social, transport) and evaluate other parameters such as sustainability in order
    to present solid programs aimed at the improvement of the site.
- uri: http://data.europa.eu/esco/occupation/00ab29a3-6d4a-4df9-b46d-de31069e36e8
  preferred_label: mine surveyor
  isco_code: '2165'
  code: 2165.4.2
  description: Mine surveyors prepare and maintain mining plans in line with statutory
    and management requirements. They keep records of the physical progress of mining
    operations and of ore or mineral production.
- uri: http://data.europa.eu/esco/occupation/2561879a-dd0a-454e-ae6e-9be6c488eb56
  preferred_label: cadastral technician
  isco_code: '2165'
  code: '2165.1'
  description: Cadastral technicians design and create maps and blue-prints, converting
    new measurement results into the real estate cadastre of a community. They define
    and indicate the property boundaries and ownerships, land use, and create city
    and district maps using measurement equipment and specialised software.
- uri: http://data.europa.eu/esco/occupation/439c52ae-23ce-4d1e-bea1-bac135497977
  preferred_label: hydrographic surveyor
  isco_code: '2165'
  code: 2165.4.1
  description: Hydrographic surveyors measure and map, by means of specialised equipment,
    marine environments. They collect scientific data in order to study the underwater
    topography and morphology of bodies of water.
- uri: http://data.europa.eu/esco/occupation/9af8907f-56a7-4170-83b1-3c6ba0997cfa
  preferred_label: geographic information systems specialist
  isco_code: '2165'
  code: '2165.3'
  description: Geographic information systems specialists use specialised computer
    systems, engineering measures, and geological concepts to process land, geographic,
    and geospatial information into visually detailed digital maps and geomodels of
    a reservoir. They convert technical information like soil density and properties
    into digital representations to be used by engineers, governments and interested
    stakeholders.
- uri: http://data.europa.eu/esco/occupation/ad8ab454-b506-46a5-afd3-66bbffd54115
  preferred_label: cartographer
  isco_code: '2165'
  code: '2165.2'
  description: Cartographers create maps by combining various scientific informations
    depending of the purpose of the map (e.g. topographic, urban, or political maps).
    They combine the interpretation of mathematical notes and measurements with the
    aesthetics and visual depiction of the site for developing the maps. They may
    also work on developing and improving geographic information systems and may perform
    scientific research within cartography.
- uri: http://data.europa.eu/esco/occupation/d8e502b4-1be6-4d10-a224-151688f8f0c8
  preferred_label: land surveyor
  isco_code: '2165'
  code: '2165.4'
  description: Land surveyors determine, by means of specialised equipment, the distances
    and positions of points at the surface of sites for construction purposes. They
    use measurements of the specific aspects of construction sites, such as electricity,
    distance measurements, and metal structure volumes to create architectural drawings
    and develop construction projects.
- uri: http://data.europa.eu/esco/occupation/068df7d1-516f-4829-b339-294cb0cf6318
  preferred_label: performance lighting designer
  isco_code: '2166'
  code: '2166.11'
  description: Performance lighting designers develop a lighting design concept for
    a performance and supervise the execution of it. Their work is based on research
    and artistic vision. Their design is influenced by and influences other designs
    and must be conform with these designs and the overall artistic vision. Therefore,
    the designers work closely with artistic directors, operators and the artistic
    team. During rehearsals and performance, they coach the operators to obtain optimal
    timing and manipulation. Performance lighting designers develop lighting plots,
    cue lists and other documentation to support the operators and production crew.
    They sometimes also work as autonomous artists, creating light art outside a performance
    context.
- uri: http://data.europa.eu/esco/occupation/11830794-108c-48fe-a282-2cd7a2945344
  preferred_label: gambling games designer
  isco_code: '2166'
  code: '2166.8'
  description: Gambling games designers design innovative gambling, betting and lottery
    games. They determine the design, gaming rules or structure of a game. Gambling
    games designers may also demonstrate the game to individuals.
- uri: http://data.europa.eu/esco/occupation/1b949bae-882f-40ff-9fe7-3c8ede5e38b5
  preferred_label: illustrator
  isco_code: '2166'
  code: '2166.10'
  description: Illustrators provide a visual representation that corresponds to the
    content of the associated text or idea. Illustrators can work for books, magazines,
    journals, comic books and other publications.
- uri: http://data.europa.eu/esco/occupation/30ed83ba-cc89-4d9f-a59d-5c783c1da56e
  preferred_label: web designer
  isco_code: '2166'
  code: '2166.15'
  description: Web designers are in charge of creating the visual elements, layout
    and other aspects such as the easiness of use of a website. They follow the different
    phases of a website creation from the design to the implementation until it goes
    live. They work side by side with front-end developers to design user interfaces
    that met the needs of customers and are also appealing. They are responsible of
    developing mock-ups and of confirming the technical feasibility of the product.
    They can use and put together various types of elements for the website including
    graphics, animations, text, videos and photos. They are in contact with clients
    and stakeholders of the company to ensure that the design of the website meets
    their needs.
- uri: http://data.europa.eu/esco/occupation/364d9e9f-b14c-4905-b9e5-5de623dba268
  preferred_label: stop-motion animator
  isco_code: '2166'
  code: '2166.14'
  description: Stop-motion animators create animations by using puppets or clay models.
- uri: http://data.europa.eu/esco/occupation/48c8eccb-4bd0-487e-a187-4953cbbe956e
  preferred_label: animator
  isco_code: '2166'
  code: '2166.3'
  description: Animators use software to create animations, these are rapidly sequenced
    together images to create an illusion of movement.
- uri: http://data.europa.eu/esco/occupation/52df9d56-efd4-48d0-ad93-59231943fc4c
  preferred_label: 3D animator
  isco_code: '2166'
  code: 2166.3.1
  description: 3D animators are in charge of animating 3D models of objects, virtual
    environments, layouts, characters and 3D virtual animated agents.
- uri: http://data.europa.eu/esco/occupation/69bcbb0a-8d80-4ecd-b0a4-9adea2a40de2
  preferred_label: graphic designer
  isco_code: '2166'
  code: '2166.9'
  description: Graphic designers create text and images to communicate ideas. They
    make visual concepts by hand or using computer software, intended for publishing
    in paper or online media such as advertisements, websites, and magazines.
- uri: http://data.europa.eu/esco/occupation/78216000-edc1-474b-9569-28ed6a657da2
  preferred_label: desktop publisher
  isco_code: '2166'
  code: '2166.4'
  description: Desktop publishers are responsible for the layout of publications.
    They use computer software to arrange texts, photographs and other materials in
    a pleasing and readable finished product.
- uri: http://data.europa.eu/esco/occupation/951b9d94-9bf1-4771-877d-3a26b75d9e53
  preferred_label: animation layout artist
  isco_code: '2166'
  code: '2166.2'
  description: Animation layout artists work with the cameramen and director to coordinate
    and create optimal 3D animation shots. They translate 2D storyboards into 3D animated
    shots and are responsible for camera angles, frames and lighting of animation
    scenes. Animation layout artists decide which action takes place in which animation
    scene.
- uri: http://data.europa.eu/esco/occupation/b1c0714d-77f1-4732-8fd8-9f0739fb9974
  preferred_label: special effects artist
  isco_code: '2166'
  code: '2166.13'
  description: Special effects artists create illusions for movies, videos and computer
    games. They use computer software.
- uri: http://data.europa.eu/esco/occupation/bab5fa79-7f96-4e21-87b6-1eba560b8d9a
  preferred_label: 3D modeller
  isco_code: '2166'
  code: '2166.1'
  description: 3D modellers design 3D models of objects, virtual environments, layouts,
    characters, and 3D virtual animated agents.
- uri: http://data.europa.eu/esco/occupation/c995fe34-0909-4ce3-b7b7-97945efede56
  preferred_label: performance video designer
  isco_code: '2166'
  code: '2166.12'
  description: Performance video designers develop a projected image design concept
    for a performance and supervise the execution of it. Their work is based on research
    and artistic vision. Their design is influenced by and influences other designs
    and must be conform with these designs and the overall artistic vision. Therefore,
    the designers work closely with artistic directors, operators and the artistic
    team. Performance video designers prepare media fragments to be used in a performance,
    which can involve recording, composing, manipulating and editing. They develop
    plans, mapping, cue lists and other documentation to support the operators and
    production crew. They sometimes also work as autonomous artists, creating video
    art outside a performance context.
- uri: http://data.europa.eu/esco/occupation/d5a43cd3-230e-46d0-ba05-d67d61e5cfbb
  preferred_label: digital media designer
  isco_code: '2166'
  code: '2166.7'
  description: Digital media designers create and edit graphics, animations, sound,
    text and video to assist in the creation of integrated multimedia products. They
    may perform activities related to the web, social networks, augmented reality
    and virtual reality but exclude the production of music using physical instruments
    and complex software sound synthesis tools. Digital media designers may program
    and build websites, mobile applications and other multimedia products.
- uri: http://data.europa.eu/esco/occupation/d5c4ab26-c293-4f4d-ad89-fe776f49a67f
  preferred_label: digital artist
  isco_code: '2166'
  code: '2166.5'
  description: Digital artists create art which applies digital technology as an essential
    part of the creative process. Digital art is usually created using computers or
    more specialised digital equipment. It may be enjoyed using the same instruments,
    shared over the internet, or presented using more traditional media.
- uri: http://data.europa.eu/esco/occupation/d68ff35f-e34d-4e32-88ab-d6c06a6c25b9
  preferred_label: digital games designer
  isco_code: '2166'
  code: '2166.6'
  description: Digital games designers develop the layout, logic, concept and gameplay
    of a digital game. They focus on playfield design, specification writing, and
    entry of numeric properties that balance and tune the gameplay.
- uri: http://data.europa.eu/esco/occupation/71f09c8b-a172-408c-b9e7-32e580e39ff6
  preferred_label: general practitioner
  isco_code: '2211'
  code: '2211.1'
  description: General practitioners promote health, prevent, identify ill health,
    diagnose and treat diseases and promote recovery of physical and mental illness
    and health disorders of all kinds for all persons regardless of their age, sex
    or type of health problem.
- uri: http://data.europa.eu/esco/occupation/9b889f07-c39c-464d-b9d9-b2daa650f9ac
  preferred_label: specialised doctor
  isco_code: '2212'
  code: '2212.1'
  description: Specialised doctors prevent, diagnose and treat diseases depending
    on their medical or surgical specialty.
- uri: http://data.europa.eu/esco/occupation/18e14e61-495b-44cc-a7c6-df4c625934ba
  preferred_label: specialist nurse
  isco_code: '2221'
  code: '2221.3'
  description: Specialist nurses promote and restore people's health, and diagnose
    and care within a specific branch of the nursing field. Examples of such specialist
    nursing jobs include but are not restricted to; ambulatory care nurse, advanced
    practice nurse, cardiac nurse, dental nurse, community health nurse, forensic
    nurse, gastroenterology nurse, hospice and palliative care nurse, paediatric nurse,
    public health nurse, rehabilitation nurse, renal nurse and school nurse. Specialist
    nurses are general care nurses prepared beyond the level of a nurse generalist
    and authorised to practice as specialists with specific expertise in a branch
    of the nursing field.
- uri: http://data.europa.eu/esco/occupation/36494988-69d2-4420-9db4-eb56605ac983
  preferred_label: advanced nurse practitioner
  isco_code: '2221'
  code: '2221.1'
  description: Advanced nurse practitioners are in charge of promoting and restoring
    patients` health, provide diagnosis and care in advanced settings, coordinating
    care within areas of chronic disease management, providing integrated care, and
    supervising assigned team members. Advanced nurse practitioners are general care
    nurses who have acquired an expert knowledge base, complex decision making skills
    and clinical competencies for expanded clinical practice on advanced level.
- uri: http://data.europa.eu/esco/occupation/8d3e8aaa-791b-4c75-a465-f3f827028f50
  preferred_label: nurse responsible for general care
  isco_code: '2221'
  code: '2221.2'
  description: Nurses responsible for general care are in charge of promoting and
    restoring patients` health by providing physical and psychological support to
    patients, friends, and families. They also supervise assigned team members.
- uri: http://data.europa.eu/esco/occupation/95cda6a9-a70a-4a93-9442-11d573cb4a02
  preferred_label: midwife
  isco_code: '2222'
  code: '2222.1'
  description: Midwives assist women in childbirth by providing the necessary support,
    care and advice during pregnancy, labour and the postpartum period, conduct births
    and provide care for the new-born. They advise on health, preventive measures,
    preparation for parenthood, detection of complications in mother and child, accessing
    of medical care, promoting normal birth and carrying out emergency measures.
- uri: http://data.europa.eu/esco/occupation/2dcb5dad-1902-4051-9023-d725485479a7
  preferred_label: acupuncturist
  isco_code: '2230'
  code: 2230.2.1
  description: Acupuncturists make use of thin needles and insert them into acupuncture
    points in the body in order to restore the imbalances of the human body and overall
    good health. Acupuncturists focus on energy meridians to treat various conditions.
- uri: http://data.europa.eu/esco/occupation/61704d4b-f54b-43e5-a7de-bfd7a76f2f0d
  preferred_label: homeopath
  isco_code: '2230'
  code: 2230.2.2
  description: Homeopaths treat clients based on the selection and prescription of
    homeopathic remedies using the homeopathy principle of “like cures like.”.
- uri: http://data.europa.eu/esco/occupation/754c349d-67d5-48e5-81c1-e84d2fab59d0
  preferred_label: aromatherapist
  isco_code: '2230'
  code: '2230.1'
  description: Aromatherapists use essential oils extracted from herbal products at
    the level of the interface skin and mucous membranes to improve the clients` well-being.
    They treat a variety of illnesses and physical or psychological conditions, under
    supervision and on a doctor's order.
- uri: http://data.europa.eu/esco/occupation/80a2aba7-ef7d-46ef-a8ec-15ff6131c0f1
  preferred_label: traditional chinese medicine therapist
  isco_code: '2230'
  code: 2230.2.3
  description: Traditional Chinese medicine therapists use alternative medicine approaches
    to cure illnesses in all its forms. They also use various therapies such as the
    use of herbal medicines, acupuncture, massages and dietary therapies, to increase
    the general health of the patient and to prevent a disease from occurring.
- uri: http://data.europa.eu/esco/occupation/c2a29b8d-1042-4766-a162-e174c7a77421
  preferred_label: complementary therapist
  isco_code: '2230'
  code: '2230.2'
  description: Complementary therapists use a range of complementary and alternative
    therapies to work simultaneously with the clients` body, mind, and spirit in a
    holistic approach. They offer practices and services for holistic wellbeing, health
    maintenance, health education, health promotion and prevention of illness, along
    with the sustainable treatment of certain illnesses, especially chronic illnesses.
    Their practices include but are not limited to acupuncture, aromatherapy, banotherapy,
    homeopathy, and herbal medicine.
- uri: http://data.europa.eu/esco/occupation/08984bec-31d8-4bb0-aa2f-d557761ff029
  preferred_label: specialised veterinarian
  isco_code: '2250'
  code: '2250.8'
  description: Specialised veterinarians are professionals with a comprehensive scientific
    education. They have the authority to carry out, in an independent, ethical and
    personally responsible capacity, all aspects of veterinary medicine, in the interest
    of the health and welfare of animals and public health in accordance with national
    and international legislation. In addition they need a recognized qualification
    and/or experience in a specific species and/or veterinary procedure.
- uri: http://data.europa.eu/esco/occupation/0abed785-00f8-4692-9f5f-f2b56efdb829
  preferred_label: animal massage therapist
  isco_code: '2250'
  code: 2250.4.2
  description: Animal massage therapists provide a therapeutic treatment following
    veterinary diagnosis or referral concentrating on manual and mechanical manipulation
    of soft tissues to promote healing and recovery in animals in accordance with
    national legislation.
- uri: http://data.europa.eu/esco/occupation/0b2d3242-22a3-4de5-bd29-efd39cdf2c31
  preferred_label: animal therapist
  isco_code: '2250'
  code: '2250.4'
  description: Animal therapists provide a therapeutic treatment following veterinary
    diagnosis or referral.
- uri: http://data.europa.eu/esco/occupation/4ce42c3c-8a46-40b6-9274-1f5cee3c5cba
  preferred_label: official veterinarian
  isco_code: '2250'
  code: '2250.7'
  description: Official veterinarians are professionals with a comprehensive scientific
    education. They have the authority to carry out, in an independent, ethical and
    personally responsible capacity all veterinary activities with particular focus
    on the health and welfare of animals and public health in accordance with national
    and international legislation. They are responsible for national animal disease
    eradication programmes, the protection of public health and food or animal inspection,
    animal movements, and import and export of live animals and their products.
- uri: http://data.europa.eu/esco/occupation/557f9ccc-4e46-4bb2-8d20-272cd978b152
  preferred_label: veterinary scientist
  isco_code: '2250'
  code: '2250.9'
  description: Veterinary scientist develop and do research in animal models, compare
    basic biology across animals, and translate research findings to different species,
    including humans.
- uri: http://data.europa.eu/esco/occupation/5beafebe-9211-4b3a-adf1-6161097a3975
  preferred_label: animal physiotherapist
  isco_code: '2250'
  code: '2250.3'
  description: Animal physiotherapists provide a therapeutic treatment following veterinary
    diagnosis or referral. They concentrate on the application of physical therapy
    and exercise procedures to support animal rehabilitation after a surgery or an
    injury, aiming to return the animals to normal function and/or maintain performance
    in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/8467dda9-34c6-4c6f-aa37-e7bddffac007
  preferred_label: aquatic animal health professional
  isco_code: '2250'
  code: '2250.5'
  description: Aquatic animal health professionals diagnose, prevent and treat diseases,
    injuries and dysfunctions of aquatic animals by implementing appropriate sampling
    protocols. They supervise the use of medicines, including vaccines, and collect
    data on fish health, making regular reports to the appropriate personnel. They
    may provide care to a wide range of aquatic animals or specialise in the treatment
    of a particular group or in a particular speciality area. They may provide advice,
    support and training to farm staff on best practice with regard to the health
    and welfare of the cultured organisms.
- uri: http://data.europa.eu/esco/occupation/be2896db-9ab7-4719-a558-96b18c93027d
  preferred_label: animal chiropractor
  isco_code: '2250'
  code: '2250.1'
  description: Animal chiropractors provide a therapeutic treatment following veterinary
    diagnosis or referral. They concentrate on spinal manipulation or manual therapy
    for animals in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/e81269d8-f301-4c82-9235-ba33ec9b0434
  preferred_label: animal osteopath
  isco_code: '2250'
  code: '2250.2'
  description: Animal osteopaths provide a therapeutic treatment following veterinary
    diagnosis or referral. They concentrate on the application of treatment techniques
    using manipulation of the body tissues to resolve strain and injury in animals
    in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/eb6efbb9-9216-4e86-bc3b-de2223cd4667
  preferred_label: general veterinarian
  isco_code: '2250'
  code: '2250.6'
  description: General veterinarians are professionals with a comprehensive scientific
    education. They have the authority to carry out, in an independent, ethical and
    personally responsible capacity, all aspects of veterinary medicine, in the interest
    of the health and welfare of animals and public health in accordance with national
    and international legislation. The generalist veterinarian can work with any species,
    however they may choose to work with a single species or types such as equine,
    companion or production animals.
- uri: http://data.europa.eu/esco/occupation/f4f671d5-208f-4423-a250-c049de8d9adc
  preferred_label: animal hydrotherapist
  isco_code: '2250'
  code: 2250.4.1
  description: Animal hydrotherapists provide a therapeutic treatment following veterinary
    diagnosis or referral. They concentrate on use of water-resistance to treat conditions,
    assist post-operative recovery, give pre-operative exercises and enhance general
    fitness in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/76bded28-876a-40b2-9efb-3123c8f14cf6
  preferred_label: dental technician
  isco_code: '2261'
  code: '2261.4'
  description: Dental technicians manufacture dental custom-made devices like bridges,
    crowns, dentures and appliances under the supervision of dental practitioners
    following their directions and specifications.
- uri: http://data.europa.eu/esco/occupation/a580e79a-b752-49c1-b033-b5ab2b34bfba
  preferred_label: specialist dentist
  isco_code: '2261'
  code: '2261.2'
  description: Specialist dentists prevent, diagnose and treat anomalies and diseases
    affecting the teeth, mouth, jaws and adjoining tissues specialised in oral surgery
    or orthodontics.
- uri: http://data.europa.eu/esco/occupation/d18deca3-3063-4970-9ddc-e3c70404a28c
  preferred_label: dental hygienist
  isco_code: '2261'
  code: '2261.3'
  description: Dental hygienists work in cleaning and polishing teeth, supra- and
    sub-gingival scaling of the teeth, application of prophylactic materials to the
    teeth, collecting data, administering comprehensive advice on oral hygiene and
    the care of the mouth, according to patients` needs under the supervision of dental
    practitioners following her/his directions.
- uri: http://data.europa.eu/esco/occupation/e52b5707-7097-4dbc-ac61-054e917da241
  preferred_label: dental practitioner
  isco_code: '2261'
  code: '2261.1'
  description: Dental practitioners prevent, diagnose and treat anomalies and diseases
    affecting the teeth, mouth, jaws and adjoining tissues.
- uri: http://data.europa.eu/esco/occupation/0f845e64-de8b-431e-9fe3-1bccf8e1c5b9
  preferred_label: pharmaceutical quality specialist
  isco_code: '2262'
  code: 2262.1.1
  description: Pharmaceutical quality specialists perform inspections and precision
    measurements in order to test and ensure the quality of pharmaceutical products.
    They are involved in the whole development phase of a pharmaceutical product until
    it is ready for the market. This includes the process of acquiring clinical trial
    licences, advising the pharmaceutical development staff on regulatory requirements
    and evaluating the content of the package leaflet and other documentation on the
    product. Moreover, pharmaceutical quality specialists collect and evaluate information
    on side effects of the product and communicate this knowledge both internally
    and to the relevant authorities.
- uri: http://data.europa.eu/esco/occupation/53cdcc84-e5ee-488c-aa09-88084e06d6d7
  preferred_label: industrial pharmacist
  isco_code: '2262'
  code: 2262.1.2.2
  description: Industrial pharmacists are involved in the research and creation of
    medications. They develop new medicines, perform tests, assure quality and ensure
    that medication complies with regulations.
- uri: http://data.europa.eu/esco/occupation/5fd099da-218a-460e-bd5b-b42f1b76c67c
  preferred_label: hospital pharmacist
  isco_code: '2262'
  code: 2262.1.2.1
  description: Hospital pharmacists prepare, dispense and provide medication to patients
    in hospitals. They collaborate with healthcare personnel such as doctors and nurses
    to treat patients and also offer advice and information on medications.
- uri: http://data.europa.eu/esco/occupation/7b74626d-b487-48a1-9e80-47faf9928210
  preferred_label: pharmacy technician
  isco_code: '2262'
  code: '2262.2'
  description: Pharmacy technicians, under the supervision of a pharmacist, check
    incoming goods, control stock, handle and store pharmaceuticals properly. Where
    permitted by national rules, they dispense medication and provide advice on their
    appropriate use.
- uri: http://data.europa.eu/esco/occupation/7c132147-428b-4ea3-87e1-70f7abb691ce
  preferred_label: pharmacist
  isco_code: '2262'
  code: '2262.1'
  description: Pharmacists prepare, dispense, and provide prescriptions for, over
    the counter medication. They offer clinical information on medicines, report suspected
    adverse reactions, and provide personalised support to patients. Pharmacists formulate
    and test medications in laboratories, and store, preserve, and distribute them.
- uri: http://data.europa.eu/esco/occupation/8db28ebf-8818-4639-aa49-30324901836e
  preferred_label: specialist pharmacist
  isco_code: '2262'
  code: 2262.1.2
  description: Specialist pharmacists provide specialist services for companies in
    the pharmacy industry and in hospital pharmacies. The role of the specialist pharmacist
    varies throughout Europe, subject to national rules and training.
- uri: http://data.europa.eu/esco/occupation/00ab5610-e715-428f-99f6-b1e5e469dbcd
  preferred_label: food safety specialist
  isco_code: '2263'
  code: '2263.2'
  description: Food safety specialists organise processes and implement procedures
    to avoid problems with food safety. They comply with regulations.
- uri: http://data.europa.eu/esco/occupation/1d75ea5a-f902-4b47-8d63-5c6d2a5c0bb5
  preferred_label: ergonomist
  isco_code: '2263'
  code: 2263.3.1
  description: Ergonomists analyse the design of equipment, furniture, and systems
    in order to improve it toward safer, healthier, and more efficient ones. They
    strive to improve the interaction of people with equipment and the environment.
- uri: http://data.europa.eu/esco/occupation/72913ee1-1696-4d74-b26f-681d17887c58
  preferred_label: emergency response coordinator
  isco_code: '2263'
  code: '2263.1'
  description: Emergency response coordinators analyse potential risks such as disasters
    and emergencies for a community or institution and develop a strategy for reacting
    to these risks. They outline guidelines for the response to an emergency in order
    to decrease the effects. They educate the parties at risk on these guidelines.
    They also test response plans and ensure that the necessary supplies and equipments
    are in place in compliance with health and safety regulations.
- uri: http://data.europa.eu/esco/occupation/789517fb-95ee-43d1-9530-c2860be1a439
  preferred_label: health and safety officer
  isco_code: '2263'
  code: '2263.3'
  description: Health and safety officers execute plans for the improvement of work
    environments and cultures. They assess risks and interview employees to ensure
    the work environment is compliant with health and safety rules, as well as ensuring
    the interaction within the workplace occurs in a positive and productive manner.
    If employed in a healthcare facility the health and safety officer has to investigate
    infections spreading across a facility and advice all employees how to combat
    and prevent infections. Furthermore health physics is applied at facilities where
    people are exposed to ionizing radiation such as nuclear power plants and research
    institutions.
- uri: http://data.europa.eu/esco/occupation/bf802371-4758-4268-a780-58e3d269831b
  preferred_label: radiation protection officer
  isco_code: '2263'
  code: '2263.5'
  description: Radiation protection officers are responsible for the protection from
    harmful effects caused by exposure to ionising radiation. They ensure compliance
    with legislation and regulations by enforcing safety measures. Furthermore they
    develop radiation protection plans in particular for nuclear plants and facilities.
- uri: http://data.europa.eu/esco/occupation/006cc1f9-2841-41c3-991a-dc3f2f3bd533
  preferred_label: physiotherapist
  isco_code: '2264'
  code: '2264.2'
  description: Physiotherapists are autonomous health professionals who are responsible
    for developing, maintaining or restoring motor function and movement throughout
    the lifespan using evidence-based practice. They relieve pain and treat or prevent
    physical conditions associated with injury, disease or other impairments. Physiotherapists
    empower patients and their carers to manage the condition outside clinical settings.
    They work within their scope of practice and their professional Code of Conduct.
- uri: http://data.europa.eu/esco/occupation/a317e9c2-62d5-4a24-8ad4-5cb7b9db3f3b
  preferred_label: advanced physiotherapist
  isco_code: '2264'
  code: '2264.1'
  description: Advanced physiotherapists are highly specialised. They make complex
    decisions and manage risks in unpredictable contexts and within a defined area.
    They may focus on a specific area of clinical practice, education, research or
    professional management.
- uri: http://data.europa.eu/esco/occupation/8a53f8d3-d995-4c7b-a70d-d79f76bdcb3f
  preferred_label: dietitian
  isco_code: '2265'
  code: '2265.1'
  description: Dietitians assess specific nutritional requirements of populations
    or individuals throughout their lives and translate this into advice which will
    maintain, reduce risk to, or restore people’s health. Using evidence-based approaches,
    dietitians work to empower individuals, families and groups to provide or select
    food which is nutritionally adequate, safe, tasty and sustainable. Beyond healthcare,
    dietitians improve the nutritional environment for all through governments, industry,
    academia and research.
- uri: http://data.europa.eu/esco/occupation/c37d0026-989b-4705-9bcb-30cccd8308fa
  preferred_label: prepared meals nutritionist
  isco_code: '2265'
  code: 2265.1.1
  description: Prepared meals nutritionists value ingredients, manufacturing processes,
    and foodstuffs in order to assure nutritional quality and suitability of prepared
    meals and dishes. They study nutritional value of foodstuffs and dishes and advise
    on the composition of different meals or dishes for human feed, allergenic items
    and macro and micronutrients.
- uri: http://data.europa.eu/esco/occupation/8021f3a2-e3de-43c0-b366-075da74dc5b7
  preferred_label: speech and language therapist
  isco_code: '2266'
  code: '2266.2'
  description: Speech and language therapists focus on the aetiology, assessment,
    diagnosis, treatment, and prevention of communication and swallowing disorders
    in people of all ages in order to help them maintain, promote, improve, initiate,
    or recover the ability to communicate both verbally and nonverbally. They address
    the development of language, speech, vocal and hearing functions, and disorders
    and disabilities in the cranial, facial, and oral area.
- uri: http://data.europa.eu/esco/occupation/c4d6d07a-ae90-40ce-bc5a-c952805a9bf3
  preferred_label: audiologist
  isco_code: '2266'
  code: '2266.1'
  description: Audiologists assess, diagnose and treat patients ( children or adults)
    with audiological and vestibular disorders caused by infectious, genetic, traumatic
    or degenerative conditions, such as hearing loss, tinnitus, dizziness, imbalance,
    hyperacusis and auditory processing difficulties. They can prescribe a hearing
    aid and have a role in assessing and managing patients who may benefit from cochlear
    implants.
- uri: http://data.europa.eu/esco/occupation/771244bf-b204-4e7f-8b25-ee523ae7b791
  preferred_label: orthoptist
  isco_code: '2267'
  code: '2267.2'
  description: Orthoptists diagnose and treat anomalies of binocular vision. They
    examine, assess and treat vision impairments, squint, amblyopia and eye motility
    disorders. Orthoptists apply these methods in particular in the fields of paediatrics,
    neurology, neuro-ophthalmology, ophthalmology, orthoptics, optometry, pleoptics
    and strabology assessing functional diseases of the eye for improving functional
    disorders of the visual system. They also provide counselling, preventive measures
    and training activities and may refract and prescribe glasses, such as prism corrective
    glasses.
- uri: http://data.europa.eu/esco/occupation/bffbe18a-cb8b-4f90-bd87-7505cd3b16f5
  preferred_label: optometrist
  isco_code: '2267'
  code: '2267.1'
  description: Optometrists examine and test eyes to identify abnormalities, visual
    problems, or disease. They prescribe and fit lenses such as spectacles and contacts,
    and offer advice on visual problems. They may also refer patients to a medical
    practitioner. Their scope of practice and title varies according to national regulations.
- uri: http://data.europa.eu/esco/occupation/047108c3-f987-40a4-bef0-f2b3407ec16a
  preferred_label: medical physics expert
  isco_code: '2269'
  code: '2269.3'
  description: Medical physics experts advice on matters related to radiation physics
    applied to medical exposure. They are responsible for dosimetry and the optimisation
    of the radiation protection of patients and other individuals subjected to medical
    exposure, including the application and use of diagnostic reference levels. Medical
    physics experts are involved in the selection of medical radiological equipment,
    the quality assurance including acceptance testing, the preparation of technical
    specifications, and the installation, design and surveillance of the medical radiological
    installations. They also analyse the events involving accidental or unintended
    medical exposures and are responsible for the training of practitioners and other
    staff in relevant aspects of radiation protection.
- uri: http://data.europa.eu/esco/occupation/11a6d0f6-e692-4774-aa5f-193b67d31022
  preferred_label: kinesiologist
  isco_code: '2269'
  code: '2269.2'
  description: Kinesiologists study and research the movement of the body; its muscles
    and parts. They analyse and use scientific data and methods to improve body motion,
    generally in humans, through an understanding of such areas as physiology, kinetics,
    neurology, and biology. They recognise the effects that some factors, such as
    body condition, have on motion and develop solutions to improve overall mechanics
    and mobility.
- uri: http://data.europa.eu/esco/occupation/2e8820ba-5b2d-4572-92a1-942dbd02a6d6
  preferred_label: biomedical scientist
  isco_code: '2269'
  code: '2269.13'
  description: Biomedical scientists perform all laboratory methods required as part
    of medical examination, monitoring, treatment, and research activities which involves
    designing, planning, organizing, applying, evaluating, interpreting and validating
    all analytical processes. They develop their activity in several fields of expertise
    such as haematology, microbiology, clinical immunology, cytopathology, histopathology,
    immunohistochemistry, and clinical biochemistry among others. This requires the
    application of qualitative and quantitative laboratory methods, including image
    analysis and digital pathology, to provide an investigative report and diagnostic
    opinion on products of a biological nature.
- uri: http://data.europa.eu/esco/occupation/33da5532-8c4e-4d1b-b52e-c201ee1bc7ab
  preferred_label: occupational therapist
  isco_code: '2269'
  code: '2269.4'
  description: Occupational therapists assist individuals or groups who have occupational
    limitations due to diseases, physical disorders, and temporary or permanent mental
    disabilities, in regaining their ability to perform daily activities. They provide
    treatment and rehabilitation to enable them to actively participate in society,
    to live their lives according to their wishes and to perform those activities
    that are meaningful to them. Occupational therapists work in public health and
    social care services, but can also be involved in supporting asylum seekers, refugees
    and/or homeless people.
- uri: http://data.europa.eu/esco/occupation/3d616092-b4fd-4c14-b0e9-a9119bbbd171
  preferred_label: music therapist
  isco_code: '2269'
  code: 2269.9.4
  description: Music therapists use music-therapeutic interventions to treat patients
    with behavioural disorders and pathogenic conditions to prevent, mitigate or eliminate
    symptoms and to change behaviours and attitudes requiring treatment. They promote
    and maintain or restore the development, maturity and health of the patient/client
    by music-therapeutic interventions. Music therapy especially provides help for
    people with with emotional, somatic, intellectually or socially induced behavioural
    disorders and pathogenic conditions, such as psychoses (schizophrenic disorders,
    bipolar disorders) and personality development disorders.
- uri: http://data.europa.eu/esco/occupation/49e4e358-8ba3-4a05-8ef9-abb73156f5f7
  preferred_label: chiropractor
  isco_code: '2269'
  code: '2269.1'
  description: Chiropractors are responsible for the diagnosis, treatment and prevention
    of disorders related to the neuromusculoskeletal system and the effects of these
    disorders on general health. They are independent primary health care professionals.
- uri: http://data.europa.eu/esco/occupation/4a5b3686-eea4-4ba0-b446-33f7b6a95aed
  preferred_label: anatomical pathology technician
  isco_code: '2269'
  code: '2269.12'
  description: Anatomical pathology technicians assist specialised doctors in pathology
    in conducting post-mortem examinations, keeping records of the samples, specimens,
    organs and the respective findings and taking care of their appropriate disposal
    under supervision, following the orders of the doctor of medicine.
- uri: http://data.europa.eu/esco/occupation/4f08cd74-71c6-43aa-88d4-841e5bb677f7
  preferred_label: podiatry assistant
  isco_code: '2269'
  code: '2269.7'
  description: Podiatry assistants help the podiatrist by carrying out supportive
    tasks such as assisting in diagnosing and treating the disorders, diseases and
    deformities of the feet, advising people on foot care techniques and the importance
    of foot care for promoting better mobility and general well-being. They also perform
    small tasks such as cutting toe nails, applying plasters and general clerical
    duties.
- uri: http://data.europa.eu/esco/occupation/500b7b14-507c-4c49-816d-c1d0b05b85e4
  preferred_label: prosthetic-orthotics technician
  isco_code: '2269'
  code: '2269.15'
  description: Prosthetic-orthotics technicians design, create, fit and repair supportive
    devices, such as braces, joints, arch supports, and other surgical and medical
    appliances.
- uri: http://data.europa.eu/esco/occupation/5efb4fff-8c5f-4697-9587-034d9f6af094
  preferred_label: nuclear medicine radiographer
  isco_code: '2269'
  code: 2269.8.2
  description: Nuclear medicine radiographers plan, prepare and perform nuclear medicine
    examinations, post-processing and treatment with a wide range of equipment and
    techniques using X-rays, magnetic resonance imaging and radiopharmaceuticals.
- uri: http://data.europa.eu/esco/occupation/7639a601-6db0-41ed-9fb0-813d9b8beb05
  preferred_label: radiographer
  isco_code: '2269'
  code: '2269.8'
  description: Radiographers use a range of technologies to examine, treat and care
    for patients. They work in the fields of Medical Imaging, Radiotherapy and Nuclear
    Medicine and apply ionising radiation, ultrasound, magnetic resonance imaging
    and radioactive sources.
- uri: http://data.europa.eu/esco/occupation/789d9781-8724-4367-936a-3a4cb7c54315
  preferred_label: dance therapist
  isco_code: '2269'
  code: 2269.9.3
  description: Dance therapists support individuals with their emotional, mental or
    physical health problems helping them to improve their body awareness, self-esteem,
    social integration and personal development through dance and movement patterns
    within a therapeutic environment.
- uri: http://data.europa.eu/esco/occupation/7d092380-1c2e-48fe-81de-0d191b4e96d6
  preferred_label: diagnostic radiographer
  isco_code: '2269'
  code: 2269.8.1
  description: Diagnostic radiographers plan, prepare and perform diagnostic imaging
    examinations and post processing, with a wide range of equipment and techniques
    using X-rays, strong magnetic fields or Magnetic Resonance Imaging (MRI) and high
    frequency sound (Ultrasound).
- uri: http://data.europa.eu/esco/occupation/82cbe20d-967c-4161-9ecd-eafc724d171c
  preferred_label: occupational therapy assistant
  isco_code: '2269'
  code: '2269.5'
  description: Occupational therapy assistants support occupational therapists by
    working with people and communities to enhance their ability to engage in the
    occupations they want to, need to, or are expected to do, or by modifying the
    occupation or the environment to better support their occupational engagement.
    They work under the supervision of an occupational therapist.
- uri: http://data.europa.eu/esco/occupation/a7198837-139d-49c7-8fd0-eb8d8c1ee844
  preferred_label: osteopath
  isco_code: '2269'
  code: '2269.11'
  description: Osteopaths provide therapeutic treatment of disorders in the musculoskeletal
    system to patients with physical issues such as back pain, joint pain and digestive
    disorders. They mainly use manipulation of the body tissues, touch, stretching
    and massage techniques to relieve the patients` pain and promote a healthy lifestyle.
- uri: http://data.europa.eu/esco/occupation/acbb7a20-c947-480d-a07e-868a0ab3eab8
  preferred_label: specialist biomedical scientist
  isco_code: '2269'
  code: '2269.16'
  description: Specialist biomedical scientists lead a department or specialist area,
    undertaking clinical research projects and working as a diagnostic partner within
    the health care team (investigating and diagnosing patient illnesses like, cancer,
    diabetes, haematological disorders and coagulation, in the areas of molecular
    biology or genomics, among others) using several methods, digital tools, and bioinformatics.
- uri: http://data.europa.eu/esco/occupation/b7b17a85-ccd0-4d2f-92f2-7e99839731b0
  preferred_label: biomedical scientist advanced
  isco_code: '2269'
  code: '2269.14'
  description: Biomedical scientists advanced undertake advanced translational research
    in the biomedical laboratory sciences field and perform as educators of their
    professions or as other professionals, as well as acting as consultants in the
    field.
- uri: http://data.europa.eu/esco/occupation/be235deb-6181-43ca-8127-7010a689643a
  preferred_label: specialist chiropractor
  isco_code: '2269'
  code: '2269.10'
  description: Specialist chiropractors have an advanced knowledge and understanding
    in a specific chiropractic area, acquiring complex decision making skills and
    clinical competency within the scope of the chiropractic profession. Specialist
    chiropractors may have undertaken an advanced course of studies to acquire the
    necessary skills and competency and qualification. Specialist chiropractors may
    be found in different specific fields such as education, functional neurology,
    orthopaedics, paediatrics, research, radiology, sport.
- uri: http://data.europa.eu/esco/occupation/cf9b6da9-3a59-4780-bec9-500b148b8878
  preferred_label: podiatrist
  isco_code: '2269'
  code: '2269.6'
  description: Podiatrists are foot specialists who study foot physiology and pathology
    from a structural and functional standpoint. They assess, diagnose, and treat
    physical, sporting injuries, rehabilitation, medical and surgical problems of
    the foot and lower limb in their clinical practice. Podiatrists are active outside
    the clinical environment in research, medico-legal, and forensic activities. Podiatrists
    act within the scope of their podiatry training, experience, and regulating authority
    of their member country.
- uri: http://data.europa.eu/esco/occupation/d117ef65-b253-4f04-bc85-353ef853443a
  preferred_label: cytotechnologist
  isco_code: '2269'
  code: 2269.13.1
  description: Cytotechnologists examines under a miscrocope samples of human cells
    obtained from various body parts such as the female reproductive tract, the lung
    or gastrointestinal tract, assist in identifying cell abnormality and disease
    such as cancer or infectious agents under supervision, following the orders of
    the doctor of medicine. The abnormal cells are being transferred to the pathologist
    for medical diagnosis. They may also work under the supervision of a biomedical
    scientist. They do not treat patients or assist in medical treatments.
- uri: http://data.europa.eu/esco/occupation/e6023abf-ced3-4ac9-9437-cc79e4396e3e
  preferred_label: animal assisted therapist
  isco_code: '2269'
  code: 2269.9.1
  description: Animal assisted therapists provide support to individuals with cognitive,
    motoric, or social-emotional disabilities through animal assisted intervention.
    They involve pets and domesticated animals in a specific intervention plan such
    as therapy, education, and human service, and aim to restore and maintain the
    patients` well-being and recovery.
- uri: http://data.europa.eu/esco/occupation/eb48ccbd-75f2-4799-81be-443034858473
  preferred_label: art therapist
  isco_code: '2269'
  code: 2269.9.2
  description: Art therapists help patients overcome psychological and emotional difficulties
    through an artistic process which reflects emotions and feelings, focusing on
    patients who suffer a variety of problems such as mental, psychological, and behavioural
    disorders in order to facilitate self-understanding and awareness.
- uri: http://data.europa.eu/esco/occupation/f9395e4d-d66f-49ce-a8f5-721991139e79
  preferred_label: recreational therapist
  isco_code: '2269'
  code: '2269.9'
  description: Recreational therapists offer treatment to persons who have behavioural
    disorders or conditions. They use techniques and interventions such as art, music,
    animals and dance to promote, maintain and restore the development and health
    of the patient.
- uri: http://data.europa.eu/esco/occupation/00747307-6341-4266-a061-25416f7c6a96
  preferred_label: performing arts theatre instructor
  isco_code: '2310'
  code: 2310.1.30
  description: Performing arts theatre instructors educate students in specific theory
    and, primarily, practice-based theatre courses at a specialised theatre, or acting,
    school or conservatory at a higher education level. They provide theoretical instruction
    in service of the practical skills and techniques the students must subsequently
    master in theatre. Performing arts theatre instructors monitor the students' progress,
    assist individually when necessary, and evaluate their knowledge and performance
    of theatre practice through assignments, tests and examinations.
- uri: http://data.europa.eu/esco/occupation/0959cd1d-f6c8-4362-939a-ad7d5f75d659
  preferred_label: economics lecturer
  isco_code: '2310'
  code: 2310.1.14
  description: Economics lecturers are subject professors, assistant professors, teachers,
    lectures, assistant lecturers, mentors who instruct students in their own specialised
    field of study, economics. They develop curriculum, prepare classes (lectures,
    practical classes, seminars, trainings etc.), monitor learning outcomes, supervise
    student study path. They conduct academic research in their field of economics
    and present their findings at the conferences and in publications. They are involved
    in some university management functions.
- uri: http://data.europa.eu/esco/occupation/0bf5d25a-2b4d-43b5-b053-beeb210fa43a
  preferred_label: medicine lecturer
  isco_code: '2310'
  code: 2310.1.25
  description: Medicine lecturers are subject professors, teachers, or lecturers,
    and often doctors who instruct students who have obtained an upper secondary education
    diploma in their own specialised field of study, medicine, which is predominantly
    academic in nature. They work with their university research assistants and university
    teaching assistants for the preparation of lectures and of exams, for grading
    papers and exams, for leading laboratory practices, and for leading review and
    feedback sessions for the students. They also conduct academic research in their
    respective field of medicine, publish their findings and liaise with other university
    colleagues.
- uri: http://data.europa.eu/esco/occupation/1092dd4c-b96b-4b3f-87fe-4a9e8d1937fb
  preferred_label: university teaching assistant
  isco_code: '2310'
  code: 2310.1.42
  description: University teaching assistants are graduate students or recent graduates
    employed on a temporary contract at a university or a college for teaching-related
    responsibilities. They assist the professor, lecturer or teacher of the specific
    course they are in charge of in the preparation of lectures and of exams, grading
    papers and exams and leading review and feedback sessions for the students.
- uri: http://data.europa.eu/esco/occupation/116b4c55-5bd0-41e9-9227-98d7ecffeaf6
  preferred_label: sociology lecturer
  isco_code: '2310'
  code: 2310.1.38
  description: Sociology lecturers are subject professors, teachers, or lecturers
    who instruct students who have obtained an upper secondary education diploma in
