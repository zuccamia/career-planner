- uri: http://data.europa.eu/esco/occupation/6b304370-0112-4881-a1bd-27d8df645d00
  preferred_label: police trainer
  isco_code: '2320'
  code: 2320.1.22
  description: Police trainers train probationary, new academy recruits, or cadets,
    and seasoned veterans on the theory and practice necessary to become a police
    officer. They conduct theoretical lectures on academic subjects such as law, government
    regulations, community relations and human diversity. Police academy instructors
    also provide more hands-on, practical instruction regarding physical training,
    the care of firearms, first aid, self defensive tactics and vehicle operations.
    They also prepare and develop lesson plans and new training programmes as new
    law enforcement-related regulations and issues arise. The instructors monitor
    the students' progress, evaluate them individually and prepare performance evaluation
    reports.
