- uri: http://data.europa.eu/esco/occupation/b8139469-92cc-4f57-9e69-a0d9f7fc3817
  preferred_label: firefighter instructor
  isco_code: '2320'
  code: 2320.1.12
  description: Firefighter instructors train probationary, new academy recruits, or
    cadets, on the theory and practice necessary to become a firefighter. They conduct
    theoretical lectures on academic subjects such as law, basic chemistry, safety
    regulations, risk management, fire prevention, reading blueprints etc. Fire academy
    instructors also provide more hands-on, practical instruction regarding the usage
    of assistive equipment and rescue tools such as a fire hose, fire axe, smoke mask
    etc., but also heavy physical training, breathing techniques, first aid, self
    defense tactics and vehicle operations. They also prepare and develop lesson plans
    and new training programmes as new public service-related regulations and issues
    arise. The instructors monitor the students' progress, evaluate them individually
    and prepare performance evaluation reports.
- uri: http://data.europa.eu/esco/occupation/d185c066-cddf-4a8c-a931-5eefc21fc2a1
  preferred_label: cabin crew instructor
  isco_code: '2320'
  code: 2320.1.8
  description: Cabin crew instructors teach trainees all the matters regarding the
    operations in aircraft cabins. They teach, depending on the type of airplane,
    the operation carried out in the aircraft, the pre and post flight checks, the
    safety procedures, the service equipment, and client service procedures and formalities.
- uri: http://data.europa.eu/esco/occupation/e777fb61-16f5-476b-8262-578edfdb4d9d
