  - biomedical researcher
  - researcher in biomedical science
  - medical scientist
  isco_code: '2269'
  code: '2269.13'
  description: Biomedical scientists perform all laboratory methods required as part
    of medical examination, monitoring, treatment, and research activities which involves
    designing, planning, organizing, applying, evaluating, interpreting and validating
    all analytical processes. They develop their activity in several fields of expertise
    such as haematology, microbiology, clinical immunology, cytopathology, histopathology,
    immunohistochemistry, and clinical biochemistry among others. This requires the
    application of qualitative and quantitative laboratory methods, including image
    analysis and digital pathology, to provide an investigative report and diagnostic
    opinion on products of a biological nature.
- uri: http://data.europa.eu/esco/occupation/33da5532-8c4e-4d1b-b52e-c201ee1bc7ab
