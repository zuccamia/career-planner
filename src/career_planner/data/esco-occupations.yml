- uri: http://data.europa.eu/esco/occupation/853698f5-0f1e-42ae-9301-e5411a26dae2
  preferred_label: armed forces training and education officer
  isco_code: '2320'
  code: 2320.1.3
  description: Armed forces training and education officers train probationary, new
    academy recruits, or cadets, on the theory and practice necessary to become a
    soldier or a military officer, and need experience as a military officer themselves
    as a requirement to instruct. They prepare and present theoretical courses and
    materials during training on subjects such as law, national and international
    regulations, defense and offense models, world affairs etc. They also conduct
    the physical training of the cadets, teaching them care and usage of weapon and
    machinery, first aid, self defense and offense techniques, military vehicle operations,
    and putting them through a series of heavy drills and physical training. Armed
    forces training and education officers manage training plans by developing and
    updating the curriculum and field training exercises when necessary. They also
    assist senior officers in preparation for a promotion and generally monitor the
    cadets' progress and evaluate their performance through a series of theoretical
    and physical tests. They prepare performance and evaluation reports for each cadet
    individually.
