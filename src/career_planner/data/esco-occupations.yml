    were sentenced to penalties outside of incarceration. They write reports providing
    advice on the offender's sentence and analysis concerning possibilities of reoffense.
    They aid the offenders during the rehabilitation and reintegration process and
    ensure the offenders carry out their community service sentence when necessary.
- uri: http://data.europa.eu/esco/occupation/738257d3-7e56-4745-9b2e-014e60d41d48
