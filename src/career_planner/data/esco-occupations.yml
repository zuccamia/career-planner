    of clients with the resources of the production plant. They organise the journey
    of incoming raw materials or semi finished products in the plant until a final
    product is delivered by coordinating inventories, warehouses, distribution, and
    support activities.
- uri: http://data.europa.eu/esco/occupation/fdb16700-109e-4d02-949e-3213f278df93
