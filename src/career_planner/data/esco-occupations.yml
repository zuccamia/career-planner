  code: '3422.2'
  description: Lifeguard instructors teach future (professional) lifeguards the necessary
    programmes and methods needed to become a licensed lifeguard. They provide training
    on safety supervision of all swimmers, assessment of potentially hazardous situations,
    rescue-specific swimming and diving techniques, first aid treatment for swimming-related
    injuries, and they inform students on preventative lifeguard responsibilities.
    They ensure students are aware of the importance of checking safe water quality,
    heeding risk management and being aware of the necessary protocols and regulations
    regarding lifeguarding and rescuing. They monitor the students' progress, evaluate
    them through theoretical and practical tests and award the lifeguard licenses
    when obtained.
