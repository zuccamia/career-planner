- uri: http://data.europa.eu/esco/occupation/4e8a5d3e-66de-4661-9927-ef3123cc79e9
  preferred_label: architecture lecturer
  isco_code: '2310'
  code: 2310.1.3
  description: Architecture lecturers are subject professors, teachers, or lecturers
