  - occupational health officer
  - occupational hygienist
  - environmental and occupational heath officer
  - workplace health and safety advisor
  isco_code: '2263'
  code: '2263.3'
  description: Health and safety officers execute plans for the improvement of work
    environments and cultures. They assess risks and interview employees to ensure
    the work environment is compliant with health and safety rules, as well as ensuring
    the interaction within the workplace occurs in a positive and productive manner.
    If employed in a healthcare facility the health and safety officer has to investigate
    infections spreading across a facility and advice all employees how to combat
    and prevent infections. Furthermore health physics is applied at facilities where
    people are exposed to ionizing radiation such as nuclear power plants and research
    institutions.
- uri: http://data.europa.eu/esco/occupation/bf802371-4758-4268-a780-58e3d269831b
