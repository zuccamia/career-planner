  isco_code: '1330'
  code: 1330.5.1
  description: Software managers oversee the acquisition and development of software
    systems in order to provide support to all organisational units. They also monitor
    the results and quality of the different software solutions and projects implemented
    in the organisation.
- uri: http://data.europa.eu/esco/occupation/526ba8e1-fc71-4657-8d27-52f03e8ca81d
  preferred_label: child care coordinator
  isco_code: '1341'
  code: '1341.1'
  description: Child care coordinators organise child care services, activities and
    events after the school hours and during school hoildays. They assist in the development
    of children by implementing care programmes. Child care coordinators also entertain
    children and maintain a safe environment for the children.
- uri: http://data.europa.eu/esco/occupation/c269387f-a652-4880-860a-e91ef105bfb7
  preferred_label: nursery school head teacher
  isco_code: '1341'
  code: '1341.3'
  description: Nursery school head teachers manage the day-to-day activities of a
    kindergarten or nursery school. They manage staff, make decisions concerning admissions
    and are responsible for meeting curriculum standards, which are age-appropriate
    for kindergarten students and facilitate social and behavioural development education.
    They also ensure the school meets the national education requirements set by law.
- uri: http://data.europa.eu/esco/occupation/fa6bd9e9-9631-4abe-b2f8-fad7bf8a819d
  preferred_label: child day care centre manager
  isco_code: '1341'
  code: '1341.2'
  description: Child day care centre managers provide social services to children
    and their families. They supervise and support child care workers and manage the
    childcare facilities. Child day care centre managers have the responsibility for
    strategic and operational leadership and management of staff teams and resources
    within and or across child care services.
- uri: http://data.europa.eu/esco/occupation/4a29eab1-5f02-4723-a863-e2d5a0614dfa
  preferred_label: healthcare institution manager
  isco_code: '1342'
  code: '1342.2'
  description: Healthcare institution managers supervise the operations of healthcare
    institutions, such as hospitals, rehabilitation facilities, home care services
    and elderly care institutions to ensure the organisation meets requirements, the
    patients and residents are cared for, the organisation is maintained and the necessary
    equipment present. They also supervise the staff and ensure record maintenance.
- uri: http://data.europa.eu/esco/occupation/ef909843-97c6-4c48-8038-2e7aefdfcad5
  preferred_label: clinical informatics manager
  isco_code: '1342'
  code: '1342.1'
  description: Clinical informatics managers oversee the daily operations of information
    systems used in a medical institutions. They also carry out research, using their
    understanding of clinical practices to find ways to improve healthcare services.
- uri: http://data.europa.eu/esco/occupation/eea2b5c6-48d1-4612-957e-585783b3c7bb
  preferred_label: elderly home manager
  isco_code: '1343'
  code: '1343.1'
  description: Elderly home managers oversee, plan, organise and evaluate the provision
    of elderly care services for people who are in need of these services due to the
    effects of ageing. They manage the elderly care home and supervise the activities
    of the staff.
- uri: http://data.europa.eu/esco/occupation/5cff1eee-9027-4064-8a26-35b1877e4eb3
  preferred_label: public housing manager
  isco_code: '1344'
  code: 1344.1.1
  description: Public housing managers develop strategies for the improvement of housing
    policy in a community, as well as providing social housing to those in need. They
    identify housing needs and issues, and supervise resource allocation. They also
    communicate with organisations involved in building public housing facilities,
    and social service organisations.
- uri: http://data.europa.eu/esco/occupation/a79e7622-2307-44e2-94cc-d1ff1caf655a
  preferred_label: youth programme director
  isco_code: '1344'
  code: 1344.1.3
  description: Youth programme directors develop and implement programmes and policies
    to improve and ensure youths' well-being. They facilitate communication with and
    between educational, recreational, counselling or other youth related institutions,
    organise events for youths and families, and promote social mobility and awareness.
- uri: http://data.europa.eu/esco/occupation/c18fddf5-cfc4-4f9c-94d6-86608faaa1dd
  preferred_label: social services manager
  isco_code: '1344'
  code: '1344.1'
  description: Social services managers have the responsibility for strategic and
    operational leadership and management of staff teams and resources within and
    or across social services. They are responsible for the implementation of legislation
    and policies relating to, for example, decisions about vulnerable people. They
    promote social work and social care values and ethics, equality and diversity,
    and relevant codes guiding practice. They are responsible for liaising with other
    professionals in criminal justice, education and health. They can be responsible
    for contributing to local and national policy development.
- uri: http://data.europa.eu/esco/occupation/f5576c5b-8d03-4a3d-9cb7-b8c4ac07a7ef
  preferred_label: youth centre manager
  isco_code: '1344'
  code: 1344.1.2
  description: Youth centre managers plan and supervise the operations of children
    and youth homes which provide care and counselling services. They assess the needs
    of youth in the community, develop and implement pedagogical methods, and develop
    programs for the improvement of youth care in the centre.
- uri: http://data.europa.eu/esco/occupation/01649ae9-22ee-4dba-83a8-3a2c51fbbe95
  preferred_label: head of higher education institutions
  isco_code: '1345'
  code: 1345.1.5
  description: Heads of higher education institutions manage the day-to-day activities
    of a higher education institution, such as a college or vocational school. Heads
    of higher education institutions make decisions concerning admissions and are
    responsible for meeting curriculum standards, which facilitate academic development
    for the students. They manage staff, the school's budget, campus programmes and
    oversee the communication between departments. They also ensure the institution
    meets the national education requirements set by law.
- uri: http://data.europa.eu/esco/occupation/13e30c08-8834-4e4f-b6f9-89fffed4e310
  preferred_label: special educational needs head teacher
  isco_code: '1345'
  code: 1345.1.9
  description: Special educational needs head teachers manage the day-to-day activities
    of a special education school. They supervise and support staff, as well as research
    and introduce programs that provide the necessary assistance for students with
    physical, mental or learning disabilities. They may make decisions concerning
    admissions, are responsible for meeting curriculum standards and ensure the school
    meets the national education requirements set by law. Special educational needs
    head teachers also manage the school's budget and are responsible for maximising
    the reception of subsidies and grants. They also review and adopt their policies
    in accordance to current research conducted in the special needs assessment field.
- uri: http://data.europa.eu/esco/occupation/2b7d34db-11b6-4c10-b227-3917752e28ac
  preferred_label: deputy head teacher
  isco_code: '1345'
  code: 1345.1.2
  description: Deputy head teachers support the management duties of their school's
    principals and are part of the school's administrative staff. They update the
    head teacher on the daily operations and developments of the school. They implement
    and follow up on school guidelines, policies and curriculum activities introduced
    by the specific head teacher. They enforce school board protocol, supervise students
    and maintain discipline.
- uri: http://data.europa.eu/esco/occupation/2c1ed9dd-9799-4882-8bfa-40b841f7d4a1
  preferred_label: further education principal
  isco_code: '1345'
  code: 1345.1.4
  description: Further education principals manage the day-to-day activities of a
    post-secondary education institute, such as technical institutes and other post-secondary
    schools. Further education principals make decisions concerning admissions and
    are responsible for meeting curriculum standards, which facilitate academic development
    for the students. They manage staff, the school's budget and programmes and oversee
    the communication between departments. They also ensure the school meets the national
    education requirements set by law.
- uri: http://data.europa.eu/esco/occupation/34852729-a2f6-4063-aa90-18b3d16754f7
  preferred_label: university department head
  isco_code: '1345'
  code: 1345.1.10
  description: University department heads lead and manage the department of their
    discipline in which they are academic leaders and work with the faculty dean and
    other heads of department to deliver the agreed faculty and university strategic
    objectives. They develop and support academic leadership in their department,
    and lead entrepreneurial activity for income-generating purposes as they promote
    the reputation and interests of their department within the university and to
    a wider community in their field.
- uri: http://data.europa.eu/esco/occupation/53db8c0d-7aed-47aa-a339-eb9d485d25dc
  preferred_label: secondary school head teacher
  isco_code: '1345'
  code: 1345.1.8
  description: Secondary school head teachers are responsible for meeting curriculum
    standards, which facilitate academic development for the students. They manage
    staff, working closely with the different department heads, and evaluate the subject
    teachers in a timely manner in order to secure optimal class performance. They
    also ensure the school meets the national education requirements set by law and
    cooperate with local communities and governments. They may also work in vocational
    schools.
- uri: http://data.europa.eu/esco/occupation/c9d89e09-d57f-4980-9164-880e60711e97
  preferred_label: primary school head teacher
  isco_code: '1345'
  code: 1345.1.6
  description: Primary school head teachers manage the day-to-day activities of a
    primary school or elementary school. They manage staff, make decisions concerning
    admissions and are responsible for meeting curriculum standards, which are age-appropriate
    for primary school students and facilitate social and academic development education.
    They also ensure the school meets the national education requirements set by law.
- uri: http://data.europa.eu/esco/occupation/d23f4d59-2bea-4bd8-bcdb-5e23b1c50552
  preferred_label: education programme coordinator
  isco_code: '1345'
  code: 1345.1.3
  description: Education programme coordinators supervise the development and implementation
    of educational programmes. They develop policies for the promotion of education
    and manage budgets. They communicate with education facilities to analyse problems
    and investigate solutions.
- uri: http://data.europa.eu/esco/occupation/d37cc820-15f5-4a81-88db-af48b0ee6a32
  preferred_label: secondary school department head
  isco_code: '1345'
  code: 1345.1.7
  description: Secondary school department heads manage and supervise their assigned
    departments to ensure that students are instructed and supported in a safe learning
    environment. They work closely with the secondary school principal to lead and
    assist school staff and to optimise communication between school management and
    teachers, parents, and other districts and schools. They facilitating meetings,
    develop and review curriculum programmes, observe staff when the principal delegates
    this work, and assume shared responsibility with the principal for financial resource
    management.
- uri: http://data.europa.eu/esco/occupation/e1587bbb-2d4e-4726-839a-7f4895c440e7
  preferred_label: headteacher
  isco_code: '1345'
  code: '1345.1'
  description: Headteachers manage the day-to-day activities of an educational institution.
    They make decisions concerning admissions and are responsible for meeting curriculum
    standards, which facilitate academic development for the students. They manage
    staff, working closely with the different department heads, and evaluate the subject
    teachers in a timely manner in order to secure optimal class performance. They
    also ensure the school meets the national education requirements set by law and
    cooperate with local communities and governments.
- uri: http://data.europa.eu/esco/occupation/e4ad2547-9188-4fbd-897a-c91b3c097779
  preferred_label: dean of faculty
  isco_code: '1345'
  code: 1345.1.1
  description: Deans of faculty lead and manage a collection of related academic departments
    and work with the post-secondary school principal and the different heads of department
    to deliver the agreed faculty and university strategic objectives. They promote
    the faculty in associated communities and market the faculty nationally as well
    as internationally. Deans of faculty also focus on achieving the faculty's financial
    mangement target.
- uri: http://data.europa.eu/esco/occupation/45a28fe1-30a4-4175-af19-e451ada60858
  preferred_label: credit union manager
  isco_code: '1346'
  code: '1346.3'
  description: Credit union managers oversee and manage member services, supervise
    staff and operations of credit unions. They inform staff about the latest credit
    union procedures and policies and prepare financial reports.
- uri: http://data.europa.eu/esco/occupation/594170bc-5663-40b0-97ef-c9f1ad51b2a0
  preferred_label: insurance agency manager
  isco_code: '1346'
  code: '1346.4'
  description: Insurance agency managers coordinate and oversee the operations of
    an institution or a branch of an institution that offers insurance services. They
    provide clients with advice on insurance products.
- uri: http://data.europa.eu/esco/occupation/754ce08f-b4d9-4b9c-b9d2-06f15258a3ce
  preferred_label: bank manager
  isco_code: '1346'
  code: '1346.1'
  description: Bank managers oversee the management of one or several bank activities.
    They set policies which promote safe banking operations, ensure the economic,
    social and commercial targets are met and that all the bank departments, activities
    and commercial policies are in compliance with legal requirements. They also manage
    employees and maintain an effective working relationship among the staff.
- uri: http://data.europa.eu/esco/occupation/942211c1-b534-4a14-ae85-38ea44c2d14b
  preferred_label: insurance claims manager
  isco_code: '1346'
  code: '1346.5'
  description: Insurance claims managers lead the team of insurance claims officers
    to ensure they handle insurance claims properly and efficiently. They deal with
    more complex customer complains and assist with fraudulent cases. Insurance claims
    managers work with insurance brokers, agents, loss adjusters and customers.
- uri: http://data.europa.eu/esco/occupation/ceda53cd-3f1f-425b-bd1b-c4fa17254680
  preferred_label: pension scheme manager
  isco_code: '1346'
  code: '1346.6'
  description: Pension scheme managers coordinate pension schemes in order to provide
    retirement benefits to individuals or organisations. They ensure the daily deployment
    of the pension fund and define the strategic policy for developing new pension
    packages.
- uri: http://data.europa.eu/esco/occupation/d0e85fe6-78e3-4218-b21a-99b75438b775
  preferred_label: brokerage firm director
  isco_code: '1346'
  code: '1346.2'
  description: Brokerage firm directors organise the activities and the people involved
    in securities trading. They envision strategies aimed at increasing the efficiency
    of asset trading with a focus on profitability. They may also advise clients on
    appropriate trades.
- uri: http://data.europa.eu/esco/occupation/20e39113-05f5-4184-94e2-f5e8e8c8d2ea
  preferred_label: sport administrator
  isco_code: '1349'
  code: '1349.22'
  description: Sport administrators act in a middle management role within sport organisations
    at all levels, in any sport or country in Europe (e.g. sport clubs, federations,
    and local authorities). They carry out organisational tasks across a wide range
    of functions in accordance with the strategy and policies set by management, boards
    of directors and committees. They play a crucial role in the overall delivery
    of sport and their work in sport organisations directly impact the unlocking of
    the potential of the sector in Europe towards health, social inclusion and economy.
- uri: http://data.europa.eu/esco/occupation/24d39e12-e104-49d3-8224-8b7a5f9b99d1
  preferred_label: library manager
  isco_code: '1349'
  code: '1349.16'
  description: Library managers supervise the correct usage of library equipment and
    items. They manage the provided services of a library and the operation of the
    departments within a library. Library managers also provide training for new staff
    members and manage the budget of the library.
- uri: http://data.europa.eu/esco/occupation/2c8a4b72-21f4-4ab1-9dbd-1cae779211b7
  preferred_label: commercial art gallery manager
  isco_code: '1349'
  code: '1349.8'
  description: Commercial art gallery managers manage the commercial and artistic
    success of the gallery.
- uri: http://data.europa.eu/esco/occupation/2f8acdc5-76f5-498b-9818-df075e324eaa
  preferred_label: aviation communications and frequency coordination manager
  isco_code: '1349'
  code: '1349.4'
  description: Aviation communications and frequency coordination managers are in
    charge of activities and projects aimed to enable the appropriate communication
    infrastructure that supports the exchange of information between airspace users.
- uri: http://data.europa.eu/esco/occupation/3f6fc9db-18c1-45e8-819e-baf7b6cfe372
  preferred_label: court administrator
  isco_code: '1349'
  code: '1349.10'
  description: Court administrators perform managerial tasks in a court institution,
    such as supervision of staff, administration, communicating with judges and reviewing
    procedures. They also manage the court's finances, and oversee maintenance of
    the facility and equipment.
- uri: http://data.europa.eu/esco/occupation/44ec4c04-c2d4-4b92-bb27-e56f5b096d97
  preferred_label: airside safety manager
  isco_code: '1349'
  code: '1349.1'
  description: Airside safety managers supervise the airside operations' safety and
    security and advise the civil aviation authorities on the airport information
    systems changes. They write safety analysis reports, ensure compliance with standards
    and regulations and improve the airside safety procedures.
- uri: http://data.europa.eu/esco/occupation/4b214899-ed00-4156-b269-a23df0fb1093
  preferred_label: environmental protection manager
  isco_code: '1349'
  code: '1349.13'
  description: Environmental protection managers provide advice on the development
    of environmental policies to governmental and official institutions. They analyse
    possible threats for the well being of the people and the environment in a region
    and manage campaigns aimed at tackling problems such as waste collection, landfills,
    and preservation of green areas.
- uri: http://data.europa.eu/esco/occupation/64b136da-aedf-48a2-96a0-72eb850bfcd0
  preferred_label: rescue centre manager
  isco_code: '1349'
  code: '1349.20'
  description: Rescue centre managers supervise operations of a rescue centre, performing
    administrative duties and supervision of staff. They ensure that the centre operates
    according to policies and staff perform rescue missions in a safe, efficient and
    compliant manner.
- uri: http://data.europa.eu/esco/occupation/6db9eeae-aef5-4f56-913d-4650e4c720c6
  preferred_label: correctional services manager
  isco_code: '1349'
  code: '1349.9'
  description: Correctional services managers manage the operations of a correctional
    facility. They supervise personnel, develop and oversee correctional procedures,
    and ensure the operation is compliant with legal regulations. They perform administrative
    duties and facilitate cooperation with external institutions and staff providing
    aid to the facility.
- uri: http://data.europa.eu/esco/occupation/7d7ea936-a1c6-499d-9aa7-054e943b019b
  preferred_label: interpretation agency manager
  isco_code: '1349'
  code: '1349.15'
  description: Interpretation agency managers oversee operations in the delivery of
    interpretation services. They coordinate the efforts of a team of interpreters
    who understand and convert spoken communication from one language to another.
    They ensure the quality of the service and the administration of the interpretation
    agency.
- uri: http://data.europa.eu/esco/occupation/83588a0e-b63d-4483-a884-06f1e3a1a4be
  preferred_label: translation agency manager
  isco_code: '1349'
  code: '1349.23'
  description: Translation agency managers oversee operations in the delivery of translation
    services. They coordinate the efforts of a team of translators who translate written
    material from one language to another. They ensure the quality of the service
    and the administration of the translation agency.
- uri: http://data.europa.eu/esco/occupation/8c8ec7a2-adbb-4d1a-9a56-a7048d66c00b
  preferred_label: aviation surveillance and code coordination manager
  isco_code: '1349'
  code: '1349.5'
  description: Aviation surveillance and code coordination manager ensure that all
    components of surveillance infrastructures, both ground and airborne, operate
    in a safe, cohesive and interoperable manner.
- uri: http://data.europa.eu/esco/occupation/a005f8a2-2d8a-433e-8d89-13575f822fd4
  preferred_label: energy manager
  isco_code: '1349'
  code: '1349.12'
  description: Energy managers coordinate the energy use in an organisation, and aim
    to implement policies for increased sustainability, and minimisation of cost and
    environmental impact. They monitor the energy demands and use, and develop improvement
    strategies, as well as researching the most beneficial source of energy for the
    organisation's needs.
- uri: http://data.europa.eu/esco/occupation/a05d0a6d-7b60-445a-8dcb-282c7d5a6852
  preferred_label: chief fire officer
  isco_code: '1349'
  code: '1349.7'
  description: Chief fire officers supervise a fire department. They coordinate the
    operations of the department, and supervise and lead the fire and rescue staff
    during firefighting and rescue activities to ensure the safety of the staff and
    limitation of risks. They perform administrative duties to ensure record maintenance,
    and implement policies to improve the department's operations.
- uri: http://data.europa.eu/esco/occupation/aab8009a-5759-4f52-8865-6cc657b1f099
  preferred_label: publications coordinator
  isco_code: '1349'
  code: '1349.19'
  description: Publications coordinators are responsible for the production of print
    and online materials such as news letters, company procedures, technical documents
    and other publications for institutions and businesses. They supervise the publishing
    teams and make sure the publications reach their target audience.
- uri: http://data.europa.eu/esco/occupation/bcc2c1db-f969-4355-bebf-4878ff6c2a94
  preferred_label: service manager
  isco_code: '1349'
  code: '1349.21'
  description: Service managers are responsible for the supervision and coordination
    of the provision of different professional and technical services to customers.
    They ensure a smooth interaction with clients and high levels of satisfaction
    post-service. This occupation includes the provision of policing, correctional,
    library, legal and fire services.
- uri: http://data.europa.eu/esco/occupation/cc937d5f-4072-4fe7-bc23-2c9a465b8754
  preferred_label: museum director
  isco_code: '1349'
  code: '1349.18'
  description: Museum directors oversee the management of the art collections, artefacts,
    and exposition facilities. They secure and sell works of art on the one hand,
    and strive to preserve and maintain the art collection of a museum on the other
    hand. Moreover, they also manage finances, employees, and marketing efforts of
    the museum.
- uri: http://data.europa.eu/esco/occupation/cfda19c9-c7e1-497d-a18b-66e29c773745
  preferred_label: airspace manager
  isco_code: '1349'
  code: '1349.2'
  description: Airspace managers control activities aimed at developing the European
    airspace into a continuum that is flexible and reactive to changes of users’ needs
    in airspace. They aim to optimise the network capacity and improve the performance.
- uri: http://data.europa.eu/esco/occupation/d2ff134e-b41a-4fa3-aceb-1b9f5f5cf015
  preferred_label: legal service manager
  isco_code: '1349'
  code: 1349.21.1
  description: Legal service managers oversee the general management of a legal service
    office. They not only strive for the highest efficiency and effectiveness when
    delivering legal services and advice, but they also coordinate a team of legally
    trained professionals. They manage different profiles of clients and adjust the
    legall services to their needs.
- uri: http://data.europa.eu/esco/occupation/db4057de-0c5a-4f68-8f81-2c0765978afb
  preferred_label: front of house manager
  isco_code: '1349'
  code: '1349.14'
  description: Front of house managers are responsible for those areas of a live event
    venue that are accessible to the public. They make sure interaction with the customers
    or visitors goes smoothly and professionally. Front of house managers are responsible
    for ticket sales, any refreshments, and make sure spaces accessible to the public
    are set out properly. They interact with the venue manager and the stage manager.
- uri: http://data.europa.eu/esco/occupation/db4f28ff-c208-4830-ab8b-4b07776db134
  preferred_label: artistic director
  isco_code: '1349'
  code: '1349.3'
  description: Artistic directors are in charge of the programme of an artistic project
    or a cultural organisation. They are responsible for the strategic vision, the
    visibility and the quality of all kind of artistic activities and services such
    as theatre and dance companies. Artistic directors also manage staff, finances
    and policies.
- uri: http://data.europa.eu/esco/occupation/e2ad6d3e-1736-466b-a2bf-9823f683c8ab
  preferred_label: book publisher
  isco_code: '1349'
  code: '1349.6'
  description: Book publishers are responsible for the selection of new materials.
    They decide which manuscripts, that the book editor has provided, are being published.
    Book publishers oversee the production, marketing and distribution of these texts.
- uri: http://data.europa.eu/esco/occupation/ef5b17a5-3ca8-4965-bd3d-61c4aca490d1
  preferred_label: document management officer
  isco_code: '1349'
  code: '1349.11'
  description: Document management officers ensure that the documents required for
    their organisation's functioning and daily operations are registered, classified
    and archived correctly and are made available to the different services or to
    the public upon request. They oversee the implementation of internal procedures
    and promote proper document management practices within the organisation, providing
    training to other employees on document management procedures. They may operate
    electronic records management systems (ERMS), electronic document management systems
    (EDMS) and archives management systems (AMS) and provide support in defining related
    technical requirements.
- uri: http://data.europa.eu/esco/occupation/f4de7e28-ca67-46cd-b760-30e02b3aa83b
  preferred_label: medical laboratory manager
  isco_code: '1349'
  code: '1349.17'
  description: Medical laboratory managers oversee the daily operations of a medical
    laboratory. They manage employees and communicate the schedule of activities.
    They monitor and ensure all laboratory operations are performed according to specifications,
    arrange the necessary laboratory equipment and assure that the appropriate health
    and safety standards are followed.
- uri: http://data.europa.eu/esco/occupation/02e19186-458f-40eb-9e78-31c656d12ac7
  preferred_label: rooms division manager
  isco_code: '1411'
  code: '1411.3'
  description: Rooms division managers are in charge of managing and coordinating
    a team of employees at front desk, reservations, housekeeping and maintenance
    departments.
- uri: http://data.europa.eu/esco/occupation/4887c8a5-35d3-44c3-be69-346027e485f0
  preferred_label: hospitality entertainment manager
  isco_code: '1411'
