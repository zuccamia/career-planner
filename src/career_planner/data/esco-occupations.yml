  - sound designer & music composer
  isco_code: '3521'
  code: 3521.1.7
  description: Sound designers develop a sound design concept for a performance and
    supervise the execution of it. Their work is based on research and artistic vision.
    Their design is influenced by and influences other designs and must be conform
    with these designs and the overall artistic vision. Therefore, the designers work
    closely with artistic directors, operators and the artistic team. Sound designers
    prepare audio fragments to be used in a performance, which can involve recording,
    composing, manipulating and editing. Sound designers develop plans, cue lists
    and other documentation to support the operators and production crew. Sound designers
    sometimes also work as autonomous artists, creating sound art outside a performance
    context.
