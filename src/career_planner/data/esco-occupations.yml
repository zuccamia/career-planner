    They aim to maximise the family well-being and protect children from abuse and
    neglect. They advocate for children so that their rights are respected within
    and outside the family. They may assist single parents or find foster homes for
    abandoned or abused children.
- uri: http://data.europa.eu/esco/occupation/4c89c65c-4e35-44e3-8fa0-5d73e9e15325
