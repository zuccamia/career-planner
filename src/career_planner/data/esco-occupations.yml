  isco_code: '1330'
  code: '1330.9'
  description: Telecommunications managers coordinate telecommunications staff activities
    for installing, troubleshooting, repairing and maintaining telecommunications
    equipment and infrastructure. They oversee the research, evaluation and implementation
    of new technologies and ensure a safe working environment for the employees. They
    supervise the inventory of supplies as well as user and customer assistance actions.
- uri: http://data.europa.eu/esco/occupation/5fd2980e-22c4-4ace-a394-190c76f4f539
  preferred_label: ICT documentation manager
  isco_code: '1330'
  code: '1330.4'
  description: ICT documentation managers are in charge of managing the documentation
    development process in accordance with legal requirements, standards, organisational
    policies and goals. They schedule, control and direct the resources, people, funding
    and facilities of the documentation department (including establishing budgets
    and timelines, risk analysis and quality management). They also develop documentation
    standards, structuring methods and media concepts to effectively communicate product
    concepts and usage.
- uri: http://data.europa.eu/esco/occupation/719f101d-1866-49d3-8d5c-2256f606a8b9
  preferred_label: digital transformation manager
  isco_code: '1330'
  code: 1330.1.1.1
  description: Digital transformation managers are professionals in charge of the
    acceleration of digital transformation in business by implementing emerging trends
    initiatives and digital strategies within an organisation. Additionally, they
    identify new business opportunities in sustainable innovation and develop guidance
    regarding to ensure a qualified transition to the latest technology business processes.
    Digital transformation managers translate business requirements and market needs
    into digital solutions.
- uri: http://data.europa.eu/esco/occupation/7b1b5da8-573a-49bb-a38e-68725a949f4f
  preferred_label: chief technology officer
  isco_code: '1330'
  code: '1330.3'
  description: Chief technology officers contribute to a company's technical vision
    and lead all aspects of technology development, according to its strategic direction
    and growth objectives. They match technology with business needs.
- uri: http://data.europa.eu/esco/occupation/810e5e67-acd5-499a-b307-cf5bea330859
  preferred_label: ICT information and knowledge manager
  isco_code: '1330'
  code: 1330.1.1
  description: ICT information and knowledge managers contribute to the definition
    of organisational information strategy and apply information and knowledge creation,
    editing, storage, and distribution policies. They manage the maintenance and evolution
    of structured and unstructured information. They create digital structures to
    enable exploitation and optimisation of information and knowledge, manage data
    analysis and enable business intelligence.
- uri: http://data.europa.eu/esco/occupation/82f90e87-de92-4678-adae-61d3e5f7e1e4
  preferred_label: chief information officer
  isco_code: '1330'
  code: '1330.2'
  description: Chief information officers define and implement the ICT strategy and
    governance. They determine necessary resources for the ICT strategy implementation,
    anticipate ICT market evolutions and company business needs. They contribute to
    the development of the organisation's strategic plan and ensure that the ICT infrastructure
    supports the organisation's overall operations and priorities.
- uri: http://data.europa.eu/esco/occupation/8b6388a4-4904-471b-9331-d3b1211f5525
  preferred_label: ICT project manager
  isco_code: '1330'
  code: '1330.7'
  description: ICT project managers schedule, control and direct the resources, people,
    funding and facilities to achieve the objectives of ICT projects. They establish
    budgets and timelines, perform risk analysis and quality management, and complete
    project closure reports.
- uri: http://data.europa.eu/esco/occupation/a79170ad-0b7b-4697-864f-1748359aa10a
  preferred_label: ICT product manager
  isco_code: '1330'
  code: '1330.6'
  description: ICT product managers analyse and define current and target status for
    ICT products, services or solutions. They estimate the cost effectiveness, points
    of risk, opportunities, strengths and weaknesses of products or services provided.
    ICT product managers create structured plans and establish time scales and milestones,
    ensuring optimisation of activities and resources.
- uri: http://data.europa.eu/esco/occupation/c90e5009-37f2-4dcd-aea2-362fc817bc98
  preferred_label: ICT environmental manager
  isco_code: '1330'
  code: '1330.10'
  description: ICT environmental managers know the green ICT legal framework, understand
    the role of the ICT network configurations in the economy and energy resources
    deployment and evaluate the impact of CO2 footprint of each ICT resource in the
    organisation's network. They plan and manage the implementation of environmental
    strategies for ICT networks and systems by conducting applied research, developing
    organisational policy, and devising strategies to meet sustainability targets.
    They ensure that the whole organisation uses ICT resources in a way that is as
    friendly as possible for the environment.
- uri: http://data.europa.eu/esco/occupation/e297ec12-4712-40a4-ad98-ba004cacb205
  preferred_label: chief data officer
  isco_code: '1330'
  code: '1330.1'
  description: Chief data officers manage companies' enterprise-wide data administration
    and data mining functions. They ensure data are used as a strategic business asset
    at the executive level and implement and support a more collaborative and aligned
    information management infrastructure for the benefit of the organisation at large.
- uri: http://data.europa.eu/esco/occupation/e8bbc7fd-cfa2-406f-a664-57e5024cfbc5
  preferred_label: ICT vendor relationship manager
  isco_code: '1330'
  code: '1330.8'
  description: ICT vendor relationship managers establish and maintain positive business
    relationships between stakeholders (external or internal), by deploying activities
    which are compliant with organisational processes. They also manage the outsourcing
    process for the organisation's ICT department and the supply chain communications.
- uri: http://data.europa.eu/esco/occupation/f0ca39a8-1e30-487c-95f9-ef2d5e734adc
  preferred_label: ICT operations manager
  isco_code: '1330'
  code: '1330.5'
  description: ICT operations managers coordinate ICT services and infrastructure
    ensuring that the organisation has the required infrastructural resources. They
    also plan and monitor stages of either a business process or a computer process,
    negotiate contracts and take mitigation action in case of non-fulfilment of agreements.
    They oversee the day-to-day tasks involving infrastructure components, ICT systems
    and software.
- uri: http://data.europa.eu/esco/occupation/f31f487b-4ce2-40f3-90e8-7d0011b4ef1d
