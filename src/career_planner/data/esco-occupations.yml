- uri: http://data.europa.eu/esco/occupation/03d79393-7b30-4159-945b-01963eddd302
  preferred_label: primary school teacher
  isco_code: '2341'
  code: '2341.1'
  description: Primary school teachers instruct students on a primary school level.
    They develop lesson plans in line with curriculum objectives for the variety of
    subjects they teach, including mathematics, languages, nature studies and music.
    They monitor the students' learning development and evaluate their knowledge and
    skills on the subjects taught through tests. They build their course content on
    the students' knowledge of previous learnings and encourage them to deepen their
    understanding on the subjects they are interested in. They use class resources
    and teaching methods to create an inspiring learning environment. Primary school
    teachers also contribute to school events and communicate with parents and administrative
    staff.
- uri: http://data.europa.eu/esco/occupation/3b755cda-c4b0-4fa1-8621-372f28ccc2e9
  preferred_label: Steiner school teacher
  isco_code: '2341'
  code: 2341.1.1
  description: Steiner school teachers educate students using approaches that reflect
    the (Waldorf) Steiner philosophy and principles. They focus on practical, hands-on
    activities in the curriculum and instruct their classes in a manner that emphasises
    the development of the students' social, creative and artistic capacities. Steiner
    school teachers instruct students in similar subjects to the ones in standardised
    education, although using a different approach, and with the exception of a higher
    amount of classes focused on creative and artistic practice and theory. They use
    teaching techniques that support the (Waldorf) Steiner school philosophy, evaluate
    students' learning progress and communicate with other school staff.
- uri: http://data.europa.eu/esco/occupation/55d60ead-0343-4008-b9e4-fb4b5a179c83
  preferred_label: early years teacher
  isco_code: '2342'
  code: '2342.1'
  description: Early years teachers instruct students, primarily young children, in
    basic subjects and creative play with the aim of developing their social and intellectual
    skills in an informal way in preparation for future formal learning. They create
    lesson plans, possibly in accordance with a fixed curriculum, for an entire class
    or smaller groups and test the students on the content. These lesson plans, based
    on basic subjects, can include the instruction of number, letter, and colour recognition,
    days of the week, categorisation of animals and transport vehicles etc. Early
    years teachers also supervise students outside the classroom on school grounds
    and enforce rules of behaviour there as well.
- uri: http://data.europa.eu/esco/occupation/76a950cb-3def-47f4-895d-555ad138657e
  preferred_label: Montessori school teacher
  isco_code: '2342'
  code: '2342.3'
  description: Montessori school teachers educate students using approaches that reflect
    the Montessori philosophy and principles. They focus on constructivist and "learning
    through discovery" teaching models, through which they encourage students to learn
    from first-hand experience rather than through direct instruction and thus provide
    the students with a relatively high level of freedom. They adhere to a specific
    curriculum that respects the students' natural, physical, social and psychological
    development. Montessori school teachers also teach classes with students differing
    up to three years in age in rather large groups, manage, and evaluate all the
    students separately according to the Montessori school philosophy.
- uri: http://data.europa.eu/esco/occupation/8befd482-70e2-4d1e-8a09-091e15fe85c3
  preferred_label: Freinet school teacher
  isco_code: '2342'
  code: '2342.2'
  description: Freinet school teachers educate students using approaches that reflect
    the Freinet philosophy and principles. They focus on enquiry-based, democracy-implementing
    and cooperative learning methods. They adhere to a specific curriculum that incorporates
    these learning methods through which students use trial and error practices in
    order to develop their own interests in a democratic, self-government context.
    Freinet school teachers also encourage students to practically create products
    and provide services in and outside of class, usually handcrafted or personally
    initiated, implementing the 'pedagogy of work' theory. They manage and evaluate
    all the students separately according to the Freinet school philosophy.
- uri: http://data.europa.eu/esco/occupation/5a282a39-5346-454a-b1ef-c1217c50e156
  preferred_label: educational researcher
  isco_code: '2351'
  code: '2351.2'
  description: Educational researchers perform research in the area of education.
    They strive to broaden the knowledge on how education processes, educational systems,
    and individuals (teachers and learners) work. They foresee areas of improvement
    and develop plans for the implementation of innovations. They advise legislators
    and policy makers on educational issues and assist in the planning of educational
    policies.
- uri: http://data.europa.eu/esco/occupation/9a26d76b-b9e3-46ae-ab4b-057a1262138b
  preferred_label: special educational needs coordinator
  isco_code: '2351'
  code: '2351.4'
  description: Special educational needs coordinators oversee programmes and activities
    that provide educational support to children with a variety of disabilities. They
    ensure they are up to date with the latest developments in the special needs research
    field with the objective of facilitating the special education processes needed
    to maximise the growth and learning potential of students with special learning
    needs, and advise the special education principal of these developments and new
    programme proposals.
- uri: http://data.europa.eu/esco/occupation/9b51a2d2-999a-43a6-a814-63dd30a585fa
  preferred_label: education inspector
  isco_code: '2351'
  code: '2351.3'
  description: Education inspectors visit schools to ensure that the staff perform
    their tasks compliant with educational rules and regulations, as well as overseeing
    that the school's administration, premises, and equipment conform to regulations.
    They observe lessons and examine records to assess the school's operation and
    write reports on their findings. They provide feedback and give advice on improvement,
    as well as report the results to higher officials. Sometimes they also prepare
    training courses and organize conferences that the subject teachers should attend.
- uri: http://data.europa.eu/esco/occupation/d89b23c2-d042-4ca6-a917-109fe5a0b30c
  preferred_label: curriculum administrator
  isco_code: '2351'
  code: '2351.1'
  description: Curriculum administrators develop and improve the curricula of education
    institutions. They analyse the quality of existing curricula and work towards
    improvement. They communicate with education professionals to ensure an accurate
    analysis. They report on curriculum developments and perform administrative duties.
- uri: http://data.europa.eu/esco/occupation/02f1ae71-f89c-47b7-af2c-50d7ab1d9b8a
  preferred_label: adult literacy teacher
  isco_code: '2352'
  code: 2352.1.1
  description: Adult literacy teachers instruct adult students, including recent immigrants
    and early school leavers, in basic reading and writing skills, usually on primary
    school level. Adult literacy teachers involve the students in the planning and
    executing of their reading activities, and assess and evaluate them individually
    through assignments and examinations.
- uri: http://data.europa.eu/esco/occupation/034cad59-e666-4770-a7ef-a337257f8072
  preferred_label: special educational needs teacher secondary school
  isco_code: '2352'
  code: 2352.1.6
  description: Special educational needs teachers at secondary schools provide specially-designed
    instruction to students on with a variety of disabilities on a secondary school
    level and ensure they reach their learning potential. Some special educational
    needs teachers at secondary schools work with children who have mild to moderate
    disabilities, implementing a modified curriculum to fit each student's specific
    needs. Other special educational needs teachers at secondary schools assist and
    instruct students with intellectual disabilities and autism, focusing on teaching
    them basic and advanced literacy, life and social skills. All teachers assess
    the students' progress, taking into account their strengths and weaknesses, and
    communicate their findings to parents, counselors, administrators and other parties
    involved.
- uri: http://data.europa.eu/esco/occupation/1044dedc-81d1-48b6-96b3-ced5393b2de1
  preferred_label: teacher of talented and gifted students
  isco_code: '2352'
  code: '2352.2'
  description: Teachers of talented and gifted students teach students who have strong
    skills in one or more areas. They monitor the students’ progress, suggest extra
    activities to stretch and stimulate their skills, introduce them to new topics
    and subjects, assign homework and grade papers and tests, and finally they provide
    emotional support when needed. Teachers working with talented and gifted students
    know how to foster their interest and make them comfortable with their intelligence.
- uri: http://data.europa.eu/esco/occupation/114c5a6c-1869-4a67-8ec0-660ec303f8cc
  preferred_label: learning support teacher
  isco_code: '2352'
  code: 2352.1.3
  description: Learning support teachers assist students who have general learning
    difficulties. Learning support teachers focus on basic skills such as numeracy
    and literacy and thus teach basic subjects such as writing, reading, math and
    languages and they work for an educational institution such as a primary or secondary
    school. They support students in their school work, plan learning strategies,
    identify their learning needs and progress, and act accordingly. They can work
    in various educational set-ups and act as support for other teachers or manage
    their own class.
- uri: http://data.europa.eu/esco/occupation/622ccd55-910f-483d-8661-44c6162156bf
  preferred_label: special educational needs itinerant teacher
  isco_code: '2352'
  code: 2352.1.4
  description: Special educational needs itinerant teachers instruct disabled or sick
    children in their homes. They are specialised teachers employed by (public) schools
    to teach those unable to physically attend school, but also to assist the student,
    the parents and the school in their communication. They also fulfil the function
    of a social school worker by helping the students and parents with a student's
    potential behavioural issues and enforce, if necessary, school attendance regulations.
    In case of a possible physical (re)admission to school, visiting teachers advise
    the school regarding suitable classroom guidance strategies and advisable teaching
    methods to support the student and make the transition as agreeable as possible.
- uri: http://data.europa.eu/esco/occupation/976cbfcc-8958-4800-a435-71d15405a42a
  preferred_label: special educational needs teacher
  isco_code: '2352'
  code: '2352.1'
  description: Special educational needs teachers work with and teach children, young
    people, and adults with an intellectual or physical disability. They use a range
    of specialised concepts, strategies and tools to optimise learners' communication,
    mobility, autonomy, and social integration. They select teaching methods and support
    resources to enable individual learners to maximise their potential for independent
    living.
- uri: http://data.europa.eu/esco/occupation/b6beb46d-9ed2-4a66-9117-7e3f21f234dd
  preferred_label: early years special educational needs teacher
  isco_code: '2352'
  code: 2352.1.2
  description: Early years special educational needs teachers provide specially-designed
    instruction to students with a variety of disabilities on a kindergarten level
    and ensure they reach their learning potential. Some early years special educational
    needs teachers work with children who have mild to moderate disabilities, implementing
    a modified curriculum to fit each student's specific needs. Other early years
    special educational needs teachers assist and instruct students with intellectual
    disabilities and autism, focusing on teaching them basic literacy and life skills.
    All teachers assess the students' progress, taking into account their strengths
    and weaknesses, and communicate their findings to parents, counselors, administrators
    and other parties involved.
- uri: http://data.europa.eu/esco/occupation/f89b12a1-689f-4a4f-8695-abb620810f1e
  preferred_label: special educational needs teacher primary school
  isco_code: '2352'
  code: 2352.1.5
  description: Special educational needs teachers at primary schools provide specially-designed
    instruction to students with a variety of disabilities on a primary school level
    and ensure they reach their learning potential. Some special educational needs
    teachers at primary schools work with children who have mild to moderate disabilities,
    implementing a modified curriculum to fit each student's specific needs. Other
    special educational needs teachers at primary schools assist and instruct students
    with intellectual disabilities and autism, focusing on teaching them basic and
    advanced literacy, life and social skills. All teachers assess the students' progress,
    taking into account their strengths and weaknesses, and communicate their findings
    to parents, counselors, administrators and other parties involved.
- uri: http://data.europa.eu/esco/occupation/59c724f9-0cfe-4d51-8a7f-9ee182d9e2c2
  preferred_label: sign language teacher
  isco_code: '2353'
  code: '2353.2'
  description: Sign language teachers educate non-age-specific students in sign language.
    They teach sign language to both students with or without special educational
    needs such as deafness. They organise their classes using a variety of lesson
    materials, work interactively with the group, and assess and evaluate their individual
    progress through assignments and examinations.
- uri: http://data.europa.eu/esco/occupation/9711dcfc-d9a8-4fba-9c5e-8428d8bcb53e
  preferred_label: language school teacher
  isco_code: '2353'
  code: '2353.1'
  description: Language school teachers educate non-age-specific students in a language
    that is not their native language at a specialised school, not bound by a level
    of education. They focus less on the academic aspect of language teaching, as
    opposed to language teachers in secondary or higher education, but instead on
    the theory and practice that will be most helpful to their students in real-life
    situations since most choose instruction for either business, immigration or leisure
    reasons. They organise their classes using a variety of lesson materials, work
    interactively with the group, and assess and evaluate their individual progress
    through assignments and examinations, putting emphasis on active language skills
    such as writing and speaking.
- uri: http://data.europa.eu/esco/occupation/f235bc5a-dbf6-4f9e-bbdb-cf313d32b75b
  preferred_label: music teacher
  isco_code: '2354'
  code: '2354.1'
  description: Music teachers instruct students in various musical genres and expression
    forms, such as classical, jazz, folk, pop, blues, rock, electronic etc. in a recreational
    context. They provide students with an overview of music history and repertoire,
    but primarily utilise a practice-based approach in their courses. In these courses,
    they assist students to experiment with different styles and techniques, in the
    musical instrument of their choice while encouraging them to develop their own
    style. They cast, direct, and produce musical performances, and coordinate the
    technical production.
- uri: http://data.europa.eu/esco/occupation/1eb56b85-af25-43d4-9e35-73d8ee78e228
  preferred_label: dance teacher
  isco_code: '2355'
  code: '2355.3'
  description: Dance teachers instruct students in a recreational context in the various
    dance genres and forms, such as ballet, jazz, tap, ballroom, hip-hop, latin, folk
    dance etc. They provide students with a notion of dance history and repertoire,
    but mainly focus on a practice-based approach in their courses, in which they
    assist students in experimenting with and mastering different dance and dramatic
    expression styles and techniques and encourage them to develop their own style.
    They cast, choreograph and produce performances, and coordinate the technical
    production and the set, props and costume usage on stage.
- uri: http://data.europa.eu/esco/occupation/46db7e2e-d44d-412a-9a80-02d43111aca8
  preferred_label: photography teacher
  isco_code: '2355'
  code: '2355.5'
  description: Photography teachers instruct students in the various techniques and
    styles of photography, such as (group) portrait, nature, travel, macro, underwater,
    black and white, panoramic, motion, etc. They provide students with a notion of
    photography history, but mainly focus on a practice-based approach in their courses,
    in which they assist students in experimenting with and mastering different photography
    techniques and encourage them to develop their own style. Photography teachers
    monitor students' progress and set up exhibitions to show of students' work to
    the public.
- uri: http://data.europa.eu/esco/occupation/72bcb223-da77-4ed5-a03a-796fd5ece728
  preferred_label: visual arts teacher
  isco_code: '2355'
  code: '2355.6'
  description: Visual arts teachers instruct students in various styles of visual
    arts, such as drawing, painting, and sculpting, in a recreational context. They
    provide students with an overview of art history, but primarily utilise a practice-based
    approach in their courses, in which they assist students to experiment with and
    master different artistic techniques, and encourage them to develop their own
    style.
- uri: http://data.europa.eu/esco/occupation/b6c851d1-bf09-40aa-aa50-47dde84e7d50
  preferred_label: circus arts teacher
  isco_code: '2355'
  code: '2355.2'
  description: Circus arts teachers instruct students in a recreational context in
    the various circus techniques and acts such as trapeze acts, juggling, mime, acrobatics,
    hooping, tightrope walking, object manipulation, unicycling tricks, etc. They
    provide students with a notion of circus history and repertoire, but mainly focus
    on a practice-based approach in their courses, in which they assist students in
    experimenting with and mastering different circus techniques, styles and acts
    and encourage them to develop their own style. They cast, direct and produce circus
    performances, and coordinate the technical production and possible set, props
    and costume usage on stage.
- uri: http://data.europa.eu/esco/occupation/c2efadc4-6f47-4f34-997b-dd80aba609dd
  preferred_label: arts education officer
  isco_code: '2355'
  code: '2355.1'
  description: Arts education officers deal with all the activities concerning the
    cultural venue and art facilities visitors, both current and prospective. They
    aim to deliver high quality and dynamic learning and participation programmes.
    Arts education officers develop, deliver and evaluate programmes and events for
    classes, groups or individuals, ensuring these events are a valuable learning
    resource for all ages.
- uri: http://data.europa.eu/esco/occupation/cbde2432-cb7f-451f-a686-b22cad3957a6
  preferred_label: drama teacher
  isco_code: '2355'
  code: '2355.4'
  description: Drama teachers instruct students in a recreational context in the various
    theatrical genres and dramatic expression forms, such as comedy, tragedy, prose,
    poetry, improvisation, monologues, dialogues etc. They provide students with a
    notion of theatre history and repertoire, but mainly focus on a practice-based
    approach in their courses, in which they assist students in experimenting with
    and mastering different dramatic expression styles and techniques and encourage
    them to develop their own style. They cast, direct and produce plays and other
    performances, and coordinate the technical production and the set, props and costume
    usage on stage.
- uri: http://data.europa.eu/esco/occupation/4588cd69-e6a5-4668-94c7-f02a3d86a649
  preferred_label: digital literacy teacher
  isco_code: '2356'
  code: 2356.1.1
  description: Digital literacy teachers instruct students in the theory and practice
    of (basic) computer usage. They teach students digital literacy and, optionally,
    more advanced principles of computer science. They prepare the students with knowledge
    of software programmes ensure that computer hardware equipment is properly used.
    Digital literacy teachers construct and revise course content and assignments,
    and update them according to technological developments.
- uri: http://data.europa.eu/esco/occupation/9e657046-67ce-4e16-ab2e-ddb918638910
  preferred_label: ICT trainer
  isco_code: '2356'
  code: '2356.1'
  description: ICT trainers conduct training-needs analysis and design programs to
    train students in the use of software packages and information systems accordingly.
    They produce and update existing training materials (content and method), deliver
    effective training in classroom, online or informally, monitor, evaluate and report
    effectiveness of training. They maintain and update expertise on specialised ICT
    subjects and evaluate and report on students' performance.
- uri: http://data.europa.eu/esco/occupation/20786e6d-36f0-4d1e-b033-05101fa71f3c
  preferred_label: assessor of prior learning
  isco_code: '2359'
  code: '2359.4'
  description: Assessors of prior learning measure the existing competences, skills
    and knowledge of a candidate against a given qualification or certificate, according
    to a pre-defined standard or procedure, and judge objectively if the candidate
    reaches the corresponding performance criteria.
- uri: http://data.europa.eu/esco/occupation/21f4eb29-f6e5-4623-acb9-f3ff9c2f525d
  preferred_label: public speaking coach
  isco_code: '2359'
  code: '2359.13'
  description: Public speaking coaches provide, often private, instruction to clients
    in theory and techniques on how to improve their public speaking skills. They
    identify each client's strengths and weaknesses and tailor their instruction to
    their specific needs, which may include improving the client's vocal delivery,
    articulation, presentation abilities and body language. Depending on the background
    of the client, be it business, education or otherwise, public speaking coaches
    also instruct clients or students in persuasive arguing, rhetorical delivery and
    other debating techniques.
- uri: http://data.europa.eu/esco/occupation/2412bbb1-29ca-4e17-a2b8-70694f0cb14f
  preferred_label: educational counsellor
  isco_code: '2359'
  code: '2359.8'
  description: Educational counsellors provide practical and emotional support to
    students in a educational institution, either in small groups, classrooms, or
    individually. They function as an accessible school official whom students may
    contact for a wide variety of issues. Educational counsellors may provide advice
    on personal problems such as social integration and behavioural issues, and on
    school-related matters such as composing adequate curriculum schedules, discussing
    test scores, and informing students on further education options. They may work
    closely with a school social worker and/or school psychologist and make referrals
    to other support services if necessary.
- uri: http://data.europa.eu/esco/occupation/2ddde737-28f3-444d-b1f8-ef12cc2df3c7
  preferred_label: academic support officer
  isco_code: '2359'
  code: '2359.2'
  description: Academic support officers provide assistance to students with learning
    problems and act as the main point of contact for these students. They make sure
    extra tuition and educational programmes are provided to under-represented students
    with academic or personal issues. They also organise several social activities
    throughout the academic year.
- uri: http://data.europa.eu/esco/occupation/3d0f86c1-9bdd-4e84-bc62-93a716128c8d
  preferred_label: learning mentor
  isco_code: '2359'
  code: '2359.11'
  description: Learning mentors support underperforming students both inside and outside
    of the classroom in order to increase their academic success. They assist students
    experiencing (multiple) disadvantages, such as learning difficulties, behavioural
    issues, and attendance problems, and also assist gifted students who are under-challenged.
    They may also work with adult students in the further education system. Learning
    mentors develop schedules and action plans with the students in order to plan
    the necessary mentoring activities and monitor progress. They also liaise with
    the students' teachers, educational psychologists, school social workers and,
    if necessary, with the student's parents, in order to improve the student's educational
    development.
- uri: http://data.europa.eu/esco/occupation/4e82464b-e9d7-4d51-9116-294ab40c5169
  preferred_label: assistive technologist
  isco_code: '2359'
  code: '2359.5'
  description: Assistive technologists work to improve access to learning or/and improving
    independence and participation for individuals with disabilities. They do this
    through learner support and staff support with activities such as assessments,
    training and guidance. Assistive technologists have a good understanding of learners’
    needs and a wide technology knowledge relevant to learning, living or work context.
    The role requires knowledge of assistive technology hardware and software such
    as text to speech, prediction, dictation, vision and physical access tools.
- uri: http://data.europa.eu/esco/occupation/59bce29f-5c8b-47cf-bfd4-6ec003f5323a
  preferred_label: tutor
  isco_code: '2359'
  code: '2359.14'
  description: Tutors provide personalised education to the children of employers
    or to adults, in addition to the main education system. They help students improve
    their knowledge and competence of a specific subject, at their own pace. Tutors
    will teach their students study techniques and strategies in order to ensure their
    academic development and will assess the student's progress throughout the tutoring
    sessions.
- uri: http://data.europa.eu/esco/occupation/653374a9-a96e-4c5b-849f-62ae67b0ed62
  preferred_label: prison instructor
  isco_code: '2359'
  code: '2359.12'
  description: Prison instructors educate legal offenders, including prisoners, on
    social rehabilitation and correctional behaviour. They assist prisoners in gaining
    skills which could facilitate their reintegration into society and increase their
    chances at finding employment after release. Prison instructors analyse the students'
    individual learning needs, plan and prepare teaching materials and sessions and
    update their learning records. They also ensure the working area and materials
    are safe from danger and accounted for, and supervise the students at all times.
- uri: http://data.europa.eu/esco/occupation/6afe39e2-2674-45db-b05c-a6cab02fe25b
  preferred_label: further education teacher
  isco_code: '2359'
  code: '2359.9'
  description: Further education teachers organise and teach programmes designed specifically
    for adult learners. They impart a wide spectrum of subjects, ranging from academic
    areas such as mathematics and history, to trainings for personality development,
    technical expertise or practical courses like languages and ICT. They teach and
    support adults aspiring to broaden their knowledge and their personal and professional
    skills and/or to achieve further qualifications. Further education teachers consider
    the previous knowledge and the work and life experience of the learners. They
    individualize their teaching and involve the students in the planning and executing
    of their learning activities. Further education teachers design reasonable assignments
    and examinations suitable to their adult learners.
- uri: http://data.europa.eu/esco/occupation/6e1b1bd7-9eec-4f10-bce7-94a27d9023e8
  preferred_label: admissions coordinator
  isco_code: '2359'
  code: '2359.3'
  description: Admissions coordinators are in charge of the students' applications
    and admissions to a (private) school, college or university. They assess possible
    future students' qualifications and subsequently approve or deny their application,
    based on the regulations and desires set by the board of directors and the school
    administration. They also assist the accepted students in their enrollment in
    the programme and courses of their choice.
- uri: http://data.europa.eu/esco/occupation/a6517365-211c-456d-aca4-1a0115c7b1e1
  preferred_label: e-learning architect
  isco_code: '2359'
  code: '2359.6'
  description: E-learning architects establish goals and procedures for the application
    of learning technologies within an organisation and the creation of an infrastructure
    that supports these goals and procedures. They review the existing curriculum
    of courses and verify the online delivery capability, advising changes to the
    curriculum to adapt to online delivery.
- uri: http://data.europa.eu/esco/occupation/a9c30651-ccbc-4a80-900c-7880615cdf6e
  preferred_label: instructional designer
  isco_code: '2359'
  code: '2359.10'
  description: Instructional designers develop instructional material for training
    courses using multimedia technology and authoring tools. They aim to create instructional
    experiences which make the acquisition of knowledge and skills more efficient,
    effective, and appealing.
- uri: http://data.europa.eu/esco/occupation/abab3d6a-82b9-49bd-8a4b-7bc678130558
  preferred_label: academic advisor
  isco_code: '2359'
  code: '2359.1'
  description: Academic advisors assist students, at post-secondary level, in recognising
    and achieving their educational goals. They advise students on their schedule
    selection of school programmes, communicate to them degree requirements, and assist
    them in career planning. Academic advisors also discuss the student's academic
    performance and its implications and make suggestions for improvement including
    study advice. They also work closely with other university administrators and
    professors and ensure they are up to date on university or college regulation,
    program, or requirement changes.
- uri: http://data.europa.eu/esco/occupation/ec5b72d1-0206-4179-9abd-570c66bc44b9
  preferred_label: e-learning developer
  isco_code: '2359'
  code: '2359.7'
  description: E-learning developers design and develop simpler forms of digital learning
    content including reference materials, slides, assessments, screen-casts, interview
    videos and podcasts. They write and provide content for a computer based learning
    application.
- uri: http://data.europa.eu/esco/occupation/1ad59946-d13e-441e-9b36-56e1df055e21
  preferred_label: financial auditor
  isco_code: '2411'
  code: 2411.1.7
  description: Financial auditors collect and examine financial data for clients,
    organisations and companies. They ensure the financial data is properly maintained
    and free of material misstatements due to error or fraud, that it adds up, and
    functions legally and effectively. They review lending and credit policies or
    numbers in databases and documents, evaluate, consult and assist the source of
    the transaction if necessary. They use their review of the client's financial
    governance as assurance to give testimony to the shareholders, stakeholders and
    board of directors of the organisation or company that all is up to par.
- uri: http://data.europa.eu/esco/occupation/4e4a291d-1d38-4c5a-812a-5827d0691b11
  preferred_label: budget analyst
  isco_code: '2411'
  code: 2411.1.4
  description: Budget analysts monitor the spending activities of public and private
    institutions and companies. They prepare budget reports, review the budget model
    used in the company and ensure compliance with the budgeting policies and other
    legal regulations.
- uri: http://data.europa.eu/esco/occupation/59c22779-4d89-4bc9-ba8b-d64bea236723
  preferred_label: tax advisor
  isco_code: '2411'
  code: 2411.1.12
  description: Tax advisors use their expertise in tax legislation to provide commercially-focused
    advisory and consultancy services to a wide range of clients from all economic
    sectors. They explain complicated tax-related legislation to their clients and
    assist them in ensuring the most efficient and beneficial payment of taxes by
    devising tax-efficient strategies. They also inform them of fiscal changes and
    developments and may specialise in tax strategies concerning mergers or multinational
    reconstruction for business clients, trust and estate taxes for individual clients
    etc.
- uri: http://data.europa.eu/esco/occupation/5e5b1b61-1351-4d3b-a293-deb3661715dd
  preferred_label: financial controller
  isco_code: '2411'
  code: 2411.1.8
  description: Financial controllers handle all tasks related to the budgeting and
    accounting aspects of a company or organisation. They implement and ensure compliance
    with internal financial and accounting procedures, and prepare documentation for
    external audits. They collect information related to financial statements such
    as assets, liabilities, equity, and cash flow in order to assess the company's
    financial position to prepare annual budgets and forecasts.
- uri: http://data.europa.eu/esco/occupation/78db356f-a96a-4456-ab29-2de62e52f830
  preferred_label: public finance accountant
  isco_code: '2411'
  code: 2411.1.11
  description: Public finance accountants head the treasury department of a governmental
    institution. They manage the institution's financial administration, expenditure
    and income generation, and compliance with taxation and other financial legislation.
    They perform administrative duties to ensure record keeping, develop plans for
    budget management and perform financial forecasts.
- uri: http://data.europa.eu/esco/occupation/84871c2a-abd1-45eb-b03a-65e51a26fd84
  preferred_label: cost analyst
  isco_code: '2411'
  code: 2411.1.5
  description: Cost analysts prepare regular costs, budgeting analyses and reports
    in order to contribute to the overall cost planning and forecasting activities
    of a business. They review and reconcile key balance sheets and identify new opportunities
    to save costs.
- uri: http://data.europa.eu/esco/occupation/89330b57-6a30-40e1-b623-50f47a4b0c34
  preferred_label: grants management officer
  isco_code: '2411'
  code: 2411.1.10
  description: Grants management officers work professionally in the administration
    and management of grant funds. They look at grant applications from individuals,
    charities, community groups or university research departments and decide whether
    to award funding given out by charitable trusts, government or public bodies or
    not. However, sometimes they may refer the grant application to a senior officer
    or committee.
- uri: http://data.europa.eu/esco/occupation/a04eedcf-8424-475a-8dc5-f30a9da4b151
  preferred_label: financial fraud examiner
  isco_code: '2411'
  code: 2411.1.9
  description: Financial fraud examiners undertake anti-fraud investigations including
    financial statement irregularities, securities fraud and market abuse detection.
    They manage fraud risk assessments and prepare forensic reports including the
    analysis and verification of evidence. Financial fraud examiners liaise with regulatory
    bodies.
- uri: http://data.europa.eu/esco/occupation/caafca69-9faa-4850-8930-a3fa07fea4e6
  preferred_label: accounting analyst
  isco_code: '2411'
  code: 2411.1.1
  description: Accounting analysts evaluate the financial statements of clients, usually
    companies, which include the income sheet, the balance sheet, the statement of
    cash flows and additional notes to other financial statements. They interpret
    and implement new accounting systems and accounting procedures and will analyse
    and determine if the proposed systems conform to accounting regulations and meet
    user information requirements.
- uri: http://data.europa.eu/esco/occupation/cd4f41a5-87a6-4b3c-8ee3-14e6f457c365
  preferred_label: audit supervisor
  isco_code: '2411'
  code: 2411.1.2
  description: Audit supervisors oversee audit staff, planning and reporting, and
    review the audit staff's automated audit work papers to ensure compliance with
    the company's methodology. They prepare reports, evaluate general auditing and
    operating practices, and communicate findings to the superior management.
- uri: http://data.europa.eu/esco/occupation/d9723f33-7faf-4f8a-8a98-6b02d1e10f2b
  preferred_label: bankruptcy trustee
  isco_code: '2411'
  code: 2411.1.3
  description: Bankruptcy trustees administer a client's bankruptcy case, investigate
    legal documentation for fraud possibilities and manage the money received from
    the sale of non-exempt property so as to distribute it to the owed creditors.
- uri: http://data.europa.eu/esco/occupation/dfa51b4d-0929-4885-b682-29e375c6b52c
  preferred_label: dividend analyst
  isco_code: '2411'
  code: 2411.1.6
  description: Dividend analysts calculate and allocate dividends and interest incomes
    of a company's earnings to a category of its shareholders. They assess business
    systems and processes in order to identify user needs and to deliver appropriate
    solutions. They also undertake dividend forecasts on amounts and payment schedules
    and identify potential risks, based on their financial and market price expertise.
- uri: http://data.europa.eu/esco/occupation/eda0d957-3c3c-4139-b89a-a18bc9e18897
  preferred_label: accountant
  isco_code: '2411'
  code: '2411.1'
  description: Accountants review and analyse financial statements, budgets, financial
    reports, and business plans in order to check for irregularities resulting from
    error or fraud, and provide their clients with financial advice in matters such
    as financial forecasting and risk analysis. They may audit financial data, resolve
    insolvency cases, prepare tax returns and provide other tax-related advice in
    reference to current legislation.
- uri: http://data.europa.eu/esco/occupation/0ecedad1-1144-45ff-83db-a3c4db393036
  preferred_label: investment manager
  isco_code: '2412'
  code: 2412.6.3
  description: Investment managers administer the portfolio of investments that a
    company has. They perform close follow up of the investments looking for the most
    profitable solutions represented in financial products or securities. They analyse
    behaviour in financial markets, interests rates, and the companies' position in
    order to advise on risks and profitability for the client.
- uri: http://data.europa.eu/esco/occupation/21de0f3b-a71a-4263-a9ba-90c5f3721b4d
  preferred_label: financial planner
  isco_code: '2412'
  code: '2412.4'
  description: Financial planners assist people dealing with various personal financial
    issues. They are specialised in financial planning, such as retirement planning,
    investment planning, risk management and insurance planning, and tax planning.
    They advise a strategy tailored to the client's needs. They ensure the accuracy
    of bank and other financial records while maintaining a customer-orientated approach
    and following ethical standards.
- uri: http://data.europa.eu/esco/occupation/244a79eb-122b-4bee-8065-b4c39efce4ff
  preferred_label: corporate investment banker
  isco_code: '2412'
  code: 2412.6.1
  description: Corporate investment bankers offer strategic advice on financial services
    to companies and other institutions. They ensure that legal regulations are being
    followed by their clients in their efforts of raising any capital. They provide
    technical expertise and information on mergers and acquisitions, bonds and shares,
    privatisations and reorganisation, raising capital and security underwriting,
    including equity and debt markets.
- uri: http://data.europa.eu/esco/occupation/38d9c76b-1a7b-4d65-879b-733ae7e9364e
  preferred_label: investment adviser
  isco_code: '2412'
  code: '2412.6'
  description: Investment advisers are professionals who offer transparent advice
    by recommending suitable solutions on financial matters to their clients. They
    advise on investing pension or free funds in securities such as stocks, bonds,
    mutual funds and exchange-traded funds to customers. Investment advisers serve
    individuals, households, families and owners of small companies.
- uri: http://data.europa.eu/esco/occupation/4c715719-3c3f-4058-ba00-9b2ef34848e8
  preferred_label: investor relations manager
  isco_code: '2412'
  code: 2412.6.4
  description: Investor relations managers disseminate the investment strategy of
    the company and monitor the reactions of the investment community towards it.
    They use marketing, financial, communications, and security law expertise to ensure
    transparent communication to the larger community. They respond to inquiries from
    shareholders and investors in relation to the company's financial stability, stocks,
    or corporate policies.
- uri: http://data.europa.eu/esco/occupation/4ed22a87-8478-4731-be11-5942eacb2e16
  preferred_label: public funding advisor
  isco_code: '2412'
  code: '2412.10'
  description: Public funding advisors advise individuals and businesses about funding
    opportunities given by the government. They analyse the needs of clients, consult
    them on funds, grants and subsidies that apply to them and help with the application
    process. Public funding advisors also set up public grant administration in organisations.
- uri: http://data.europa.eu/esco/occupation/50760da6-abc3-424c-b159-8ddf0818e016
  preferred_label: business valuer
  isco_code: '2412'
  code: '2412.1'
  description: Business valuers provide valuation assessements of business entities,
    stock and other securities and intangible assets, in order to assist their clients
    in strategic decision-making procedures such as mergers and acquisitions, litigation
    cases, bankruptcy, taxation compliance and general restructuring of the companies.
- uri: http://data.europa.eu/esco/occupation/659b0ffd-337c-4a1f-82e3-2730812279de
  preferred_label: venture capitalist
  isco_code: '2412'
  code: '2412.11'
  description: Venture capitalists invest in young or small start-up companies by
    providing private funding. They research potential markets and particular product
    opportunities to help business owners develop or expand a business. They provide
    business advice, technical expertise, and network contacts based on their experience
    and activities. They do not assume executive managerial positions within the company,
    but have a say in its strategic direction.
- uri: http://data.europa.eu/esco/occupation/7284ccbf-e2fd-4e2f-8bbf-bc54eab610d5
  preferred_label: personal trust officer
  isco_code: '2412'
  code: '2412.8'
  description: Personal trust officers monitor and administer personal trusts. They
    interpret trust and testamentary documentation accordingly, interact with financial
    advisors to define the investment goal for the achievement of trust objectives,
    coordinate the purchase and sale of securities with account executives and review
    clients' accounts regularly.
- uri: http://data.europa.eu/esco/occupation/7a6ca615-a2bc-499d-8288-d186ce2594ea
  preferred_label: financial risk manager
  isco_code: '2412'
  code: '2412.5'
  description: Financial risk managers identify and assess potential risk areas threatening
    the assets or capital of organisations and give advice on how to deal with them.
    They specialise in either credit, market, operational or regulatory risk analysis.
    They use statistical analysis to evaluate risk, make recommendations to reduce
    and control financial risk and review documentation for legal compliance.
- uri: http://data.europa.eu/esco/occupation/934c3572-37f4-4cdd-a4a4-017f5f7809e4
  preferred_label: investment fund management assistant
  isco_code: '2412'
  code: 2412.6.2
  description: Investment fund management assistants provide clients with financial
    planning advice on financial products and serve as the main contact point for
    new and old clients. They assist and perform preparatory work in the creation
    and administration of funds and help with the implementation of fund management
    decisions made by the portfolio or fund manager.
- uri: http://data.europa.eu/esco/occupation/b09acdda-6680-49d1-a411-129610ee3bc0
  preferred_label: corporate risk manager
  isco_code: '2412'
  code: '2412.3'
  description: Corporate risk managers identify and assess potential threats and opportunities
    to a company, and give advice on how to deal with them. They create preventive
    plans to avoid and reduce risks, and put plans in place for when the company is
    threatened. They coordinate risk management aspects across the different functions
    of an organisation and are responsible for technical activities such as risk assessment,
    risk mapping and insurance purchase. They report on risk issues to the senior
    management and the company's board.
- uri: http://data.europa.eu/esco/occupation/b95bdbed-1e7e-482a-aa73-7bdbb3e36358
  preferred_label: investment fund manager
  isco_code: '2412'
  code: '2412.7'
  description: Investment fund managers implement and monitor the investment strategy
    of a fund. They manage the fund's portfolio trading activities and supervise the
    financial, securities, and investment analysts in charge to perform research on
    the investments and then make buying and selling recommendations. They make decisions
    on when to buy or sell the assets included in a portfolio. Investment fund managers
    works in a variety of settings such as banks, investment vehicles and stockbroking
    companies, working closely with the investment analyst. This occupation manages
    strategy and does not always work with relations between shareholders or investors.
- uri: http://data.europa.eu/esco/occupation/d2d451cc-e839-4192-be54-d7724814aa03
  preferred_label: corporate banking adviser
  isco_code: '2412'
  code: '2412.2'
  description: Corporate banking advisers offer advice on a broad range of financial
    goods and services such as securities services, credit services, cash management,
    insurance products, leasing, information on merges and acquisitions and capital
    markets activities, to institutions and organisations.
- uri: http://data.europa.eu/esco/occupation/d96de969-d43d-4082-8559-7fc35484a217
  preferred_label: relationship banking manager
  isco_code: '2412'
  code: 2412.4.1
  description: Relationship banking managers retain and expand existing and prospective
    customer relationships. They use cross-selling techniques to advise and sell various
    banking and financial products and services to customers. They also manage the
    total relationship with customers and are responsible for optimising business
    results and customer satisfaction.
- uri: http://data.europa.eu/esco/occupation/de99886e-59e3-432d-ba53-9652dbe378d6
  preferred_label: programme funding manager
  isco_code: '2412'
  code: '2412.9'
  description: Programme funding managers take the lead in developing and realizing
    the funding strategy of the programmes of an organisation.
- uri: http://data.europa.eu/esco/occupation/076d23f3-a689-4f1a-8b55-ae870c9aaa85
  preferred_label: securities analyst
  isco_code: '2413'
  code: 2413.1.4
  description: Securities analysts perform research activities to gather and analyse
    financial, legal and economic information. They interpret data on the price, stability
    and future investment trends in a certain economic area and make recommendations
    and forecasts to business clients.
- uri: http://data.europa.eu/esco/occupation/18d2b37a-9c31-4393-833e-bc2f7b1ce52a
  preferred_label: mergers and acquisitions analyst
  isco_code: '2413'
  code: 2413.1.3
  description: Mergers and acquisitions analysts oversee the execution of transactions
    for the purchase, sale, merger or takeover of companies. They negotiate and complete
    the deal on the client's behalf, by working closely with lawyers and accountants.
    Mergers and acquisitions analysts conduct operational and legal risk assessments
    of a company, assess comparable companies in the market and help with the post-merger
    integration.
- uri: http://data.europa.eu/esco/occupation/1e331638-3f66-4641-9c49-56a94235f94c
  preferred_label: insurance rating analyst
  isco_code: '2413'
  code: 2413.1.1
  description: Insurance rating analysts analyse information related to insurance
    markets and their credit rating, prepare rating reports and invoices, compile
    financial data and present and explain credit rating opinions to stakeholders,
    clients and external parties. They work for insurance companies and calculate
    the insurance premium and rates for the company’s clients using both manual and
    automated methods.
- uri: http://data.europa.eu/esco/occupation/276a4ff1-a67c-4677-9f20-dc85f1060e1b
  preferred_label: middle office analyst
  isco_code: '2413'
  code: '2413.2'
  description: Middle office analysts work in the treasury of a financial company,
    ensuring compliance with company policy and legislation, providing research and
    analysis on financial matters, measuring risk and supporting operations in the
    front office.
- uri: http://data.europa.eu/esco/occupation/8d586ee9-0ab1-4155-a3b0-2ca786c8e48c
  preferred_label: financial analyst
  isco_code: '2413'
  code: '2413.1'
  description: Financial analysts conduct economic research and elicit valuable analyses
    on financial matters such as profitability, liquidity, solvency, and asset management.
    They provide recommendations on financial matters for decision-making processes.
    Financial analysts work in both the public and the private sector.
- uri: http://data.europa.eu/esco/occupation/b7f47c25-bdf3-42fa-a68e-ad32754b2dba
  preferred_label: investment analyst
  isco_code: '2413'
  code: 2413.1.2
  description: Investment analysts undertake research to make informed recommendations
    to fund managers. They research investments globally but depending on the nature
    and field of their employer they can specialise in fields like retail, infrastructure,
    energy, banking and financial services. They focus on financial and economical
    information such as the political and economic developments that can impact financial
    markets, the financial performance of the target companies and use the interpretation
    of data from different sources to understand how it affects investment decision
    making.
- uri: http://data.europa.eu/esco/occupation/207d7b18-6540-432e-8aa6-785ed434572f
  preferred_label: business intelligence manager
  isco_code: '2421'
  code: '2421.3'
  description: Business intelligence managers gain knowledge of the industry, the
    innovative processes therein, and contrast them with the operations of the company
    in order to improve them. They focus their analysis in the supply chain processes,
    warehouses, storage, and sales as to facilitate communication and revenue improvement.
- uri: http://data.europa.eu/esco/occupation/219d1c30-3849-4de3-b0d6-07da187b6521
  preferred_label: manufacturing cost estimator
  isco_code: '2421'
  code: 2421.1.1
  description: Manufacturing cost estimators collect and analyse data to evaluate
    the money, materials, labour and time required for manufacturing processes. They
    conduct analyses to identify (alternative) cost effective technical designs and
    production processes. They develop and use methods and tools for cost planning,
    controlling and analysis. They also perform quantitative and qualitative risk
    analyses and report on the development of costs.
- uri: http://data.europa.eu/esco/occupation/51cd3a7a-eae6-4dc6-9f24-179d7ec6d230
  preferred_label: logistics analyst
  isco_code: '2421'
  code: '2421.5'
  description: Logistics analysts streamline product manufacturing, transportation,
    storage and distribution. They assess production and supply chain problems to
    determine economically efficient solutions. They assists company managers in decision-making
    processes and direct programs designed to provide subcontractors, managers and
    customers with logistic technology.
- uri: http://data.europa.eu/esco/occupation/60082a99-d8ef-4e84-9290-78902681b6ed
  preferred_label: business analyst
  isco_code: '2421'
  code: '2421.1'
  description: Business analysts research and understand the strategic position of
    businesses and companies in relation to their markets and their stakeholders.
    They analyse and present their views on how the company, from many perspectives,
    can improve its strategic position and internal corporate structure. They assess
    needs for change, communication methods, technology, IT tools, new standards and
    certifications.
- uri: http://data.europa.eu/esco/occupation/6a29d804-f775-446c-bec7-35fc4e28ac97
  preferred_label: business consultant
  isco_code: '2421'
  code: '2421.2'
  description: Business consultants analyse the position, structure and processes
    of businesses and companies and offer services or advice to improve them. They
    research and identify business processes such as financial inefficiencies or employee
    management and devise strategical plans to overcome these difficulties. They work
    in external consulting firms where they provide an objective view on a business
    and or company's structure and methodological processes.
- uri: http://data.europa.eu/esco/occupation/a330b100-e651-4db1-bcf0-e9cbc025c614
  preferred_label: process officer
  isco_code: '2421'
  code: '2421.7'
  description: Process officers identify, document and maintain the processes that
    are necessary to be implemented for an organisation. They review existing processes,
    evaluate improvements with stakeholders, draft internal documents and support
    the operations of the organization to meet the key KPIs.
- uri: http://data.europa.eu/esco/occupation/a520fba4-2a29-43a0-bfd5-43892306501d
  preferred_label: building information modelling consultant
  isco_code: '2421'
  code: '2421.6'
  description: Building information modelling consultants advice, guide and evaluate
    clients in building information modelling (BIM) business processes, as well as
    construction teams on performing BIM technologies. They manage the communication
    with staff and clients, implement strategies and BIM solutions for completing
    the deliverables, and draft documents such as flow charts, agendas and guides
    for best practices.
- uri: http://data.europa.eu/esco/occupation/c9862fdd-53b7-4da9-b742-4302d704836c
  preferred_label: lean manager
  isco_code: '2421'
  code: '2421.4'
  description: Lean managers plan and manage lean programs in different business units
    of an organisation. They drive and coordinate continuous improvements projects
    aimed at achieving manufacturing efficiency, optimise workforce productivity,
    generate business innovation and realise transformational changes impacting on
    operations and business processes, and report on results and progresses to the
    company management. They contribute to the creation of a continuous improvement
    culture within the company, and they are responsible for developing and training
    a team of lean experts.
- uri: http://data.europa.eu/esco/occupation/01205776-db8d-4588-a6a6-56d0b9c660a9
  preferred_label: housing policy officer
  isco_code: '2422'
  code: 2422.12.8
  description: Housing policy officers research, analyse and develop housing policies
    which enable affordable and adequate housing for all. They implement these policies
    to improve the housing situation of the population by measures such as building
    affordable housing, supporting people to buy real estate and improving conditions
    in existing housing. Housing policy officers work closely with partners, external
    organisations or other stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/0561328b-875b-4ae2-9ba1-9af9049aef01
  preferred_label: procurement category specialist
  isco_code: '2422'
  code: '2422.14'
  description: Procurement category specialists are experts in specific markets and
    contract types and provide advanced knowledge of a particular category of supplies,
    services or works. They help internal or external clients to increase value for
    money and end users' satisfaction through their advanced knowledge of the suppliers
    and their offering.
- uri: http://data.europa.eu/esco/occupation/1a46d0f0-93d7-44d1-bff9-58e3f21bd4c4
  preferred_label: social service consultant
  isco_code: '2422'
  code: '2422.16'
  description: Social service consultants aid in the development of policy and procedure
    for social service programs. They research social service programs and identify
    areas for improvement, as well as aid in the development of new programs. They
    fulfil advisory functions for social service organisations.
- uri: http://data.europa.eu/esco/occupation/2808c7ec-cdb1-4b48-8429-e160a418ed0c
  preferred_label: regional development policy officer
  isco_code: '2422'
  code: 2422.12.14
  description: Regional development policy officers research, analyse and develop
    regional development policies. They implement policies that aim at reducing regional
    disparities by fostering economic activities in a region and structural changes
    such as supporting multi-level governance, rural development and improvement of
    infrastructure. They work closely with partners, external organisations or other
    stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/3826cb92-27f5-40ac-8dad-70af5abd6036
  preferred_label: competition policy officer
  isco_code: '2422'
  code: 2422.12.2
  description: Competition policy officers manage the development of regional and
    national competition policies and law, in order to regulate competition and competitive
    practices, to encourage open and transparent trade practices and to protect consumers
    and businesses.
- uri: http://data.europa.eu/esco/occupation/39e9fc8f-02bd-4577-b603-2dc96204ce74
  preferred_label: community development officer
  isco_code: '2422'
  code: '2422.2'
  description: Community development officers develop plans to improve quality of
    life in local communities. They investigate and assess the community's issues
    and needs, manage resources, and develop implementation strategies. They communicate
    with the community for investigation purposes, and to inform the community on
    development plans.
- uri: http://data.europa.eu/esco/occupation/3fa31588-2e4d-49c3-b839-4b615cc62742
  preferred_label: humanitarian advisor
  isco_code: '2422'
  code: '2422.7'
  description: Humanitarian advisors ensure strategies to reduce the impact of humanitarian
    crises on a national and/or international level. They provide professional advice
    and support and this in collaboration with different partners.
- uri: http://data.europa.eu/esco/occupation/4ca8ba6c-dc55-40c0-ae6c-d55c94dd2e03
  preferred_label: intelligence officer
  isco_code: '2422'
  code: '2422.8'
  description: Intelligence officers develop and execute plans to gather information
    and intelligence. They investigate the lines of enquiry which would provide them
    with the necessary intelligence, and contact and interview people who may provide
    intelligence. They write reports on their results, and perform administrative
    duties to ensure records maintenance.
- uri: http://data.europa.eu/esco/occupation/50e00fda-ac7c-4bc5-9f19-69a33ff3d6e7
  preferred_label: fiscal affairs policy officer
  isco_code: '2422'
  code: 2422.12.6
  description: Fiscal affairs policy officers research, analyse and develop policies
    related to taxation and government spending in public policy sectors, and implement
    these policies to improve the existing regulation around the sector. They work
    closely with partners, external organisations or other stakeholders and provide
    them with regular updates.
- uri: http://data.europa.eu/esco/occupation/5d601b40-7e0e-404e-bbff-bb98e147437c
  preferred_label: legal policy officer
  isco_code: '2422'
  code: 2422.12.11
  description: Legal policy officers research, analyse and develop policies related
    to the legal sector and implement these policies to improve the existing regulation
    around the sector. They work closely with partners, external organisations or
    other stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/5fe1b340-9b02-4c40-bbc9-ffd4d5fb5699
  preferred_label: cultural policy officer
  isco_code: '2422'
  code: 2422.12.3
  description: Cultural policy officers develop and implement policies to improve
    and promote cultural activities and events. They manage resources and communicate
    with the public and media in order to facilitate interest in cultural programs
    and emphasize their importance in a community.
- uri: http://data.europa.eu/esco/occupation/61053604-8091-4a8e-9c63-5151051722e3
  preferred_label: healthcare consultant
  isco_code: '2422'
  code: '2422.6'
  description: Healthcare consultants advise health care organisations on the development
    of plans to improve patient care and safety. They analyse health care policies
    and identify issues, and aid in the development of improvement strategies.
- uri: http://data.europa.eu/esco/occupation/643a2225-6a01-4899-81b0-e867ca09b9c9
  preferred_label: government planning inspector
  isco_code: '2422'
  code: '2422.5'
  description: Government planning inspectors monitor the development and implementation
    of government plans and policies, as well as processing planning and policy proposals,
    and performing inspections of planning procedures.
- uri: http://data.europa.eu/esco/occupation/65fb0b53-b8c4-4839-b099-c80b6de5a158
  preferred_label: employment programme coordinator
  isco_code: '2422'
  code: '2422.3'
  description: Employment programme coordinators research and develop employment programmes
    and policies to improve employment standards and reduce issues such as unemployment.
    They supervise promotion of policy plans and coordinate implementation.
- uri: http://data.europa.eu/esco/occupation/6b5e5aa6-9bf7-47e6-90d2-4d2187d47d11
  preferred_label: immigration policy officer
  isco_code: '2422'
  code: 2422.12.9
  description: Immigration policy officers develop strategies for the integration
    of refugees and asylum seekers, and policies for the transit of people from one
    nation to another. They aim to improve international cooperation and communication
    on the subject of immigration, as well as efficiency of immigration and integration
    procedures.
- uri: http://data.europa.eu/esco/occupation/7819669b-30c2-42e6-a1c4-0bcd6f0379ff
  preferred_label: international relations officer
  isco_code: '2422'
  code: '2422.9'
  description: International relations officers ensure the development of cooperation
    between international public organisations and governments. They facilitate communication
    between their organisation and foreign organisations and develop collaboration
    strategies, promoting a collaborative relationship beneficial for both parties.
- uri: http://data.europa.eu/esco/occupation/7b629a14-09d0-417e-8181-7683923b4e5e
  preferred_label: sports programme coordinator
  isco_code: '2422'
  code: '2422.17'
  description: Sports programme coordinators coordinate sports and recreation activities
    and policy implementation. They develop new programs and aim to promote and implement
    them, as well as ensure the maintenance of sports and recreation facilities.
- uri: http://data.europa.eu/esco/occupation/8213b4bc-60ce-4ffc-9e00-9758fb2003c6
  preferred_label: monitoring and evaluation officer
  isco_code: '2422'
  code: '2422.10'
  description: Monitoring and evaluation officers are responsible for the conceptualisation,
    design, implementation and follow-up of the monitoring and evaluation activities
    of projects, programmes, policies, strategies, institutions or processes, along
    the relevant programming cycle. They develop monitoring, inspection and evaluation
    methods and instruments needed to collect and analyse data, and report on results
    by applying structured M&E frameworks, theories, approaches and methodologies.
    M&E officers inform decision-making through reporting, learning products or activities
    and knowledge management. They can also engage in capacity development activities
    by providing training and capacity building support within their organizations
    or for clients and partners.
- uri: http://data.europa.eu/esco/occupation/8bf76ba6-e661-4574-9887-4f2cb943835a
  preferred_label: political affairs officer
  isco_code: '2422'
  code: '2422.13'
  description: Political affairs officers analyse developments in foreign politics
    and other policy matters, monitor conflicts and consult on mediation measures,
    as well as other developmental strategies. They write reports to ensure communication
    with governmental bodies, and develop policies and implementation methods.
- uri: http://data.europa.eu/esco/occupation/98f17395-0f8c-4f51-9072-cb8f66fd6044
  preferred_label: agricultural policy officer
  isco_code: '2422'
  code: 2422.12.1
  description: Agricultural policy officers analyse and identify agricultural policy
    issues and develop plans for improvement and new policy implementation. They write
    reports and presentations in order to communicate and acquire support for the
    policies from government officials and the public. They also communicate with
    professionals in agriculture for research and information purposes and perform
    administrative duties.
- uri: http://data.europa.eu/esco/occupation/a1ba7574-cc28-446c-9741-12d7fbb325cb
  preferred_label: labour market policy officer
  isco_code: '2422'
  code: 2422.12.10
  description: Labour market policy officers research, analyse and develop labour
    market policies. They implement policies ranging from financial policies to practical
    policies such as improving job searching mechanisms, promoting job training, giving
    incentives to start-ups and income support. Labour market policy officers work
    closely with partners, external organisations or other stakeholders and provide
    them with regular updates.
- uri: http://data.europa.eu/esco/occupation/b5d2db88-9e2b-4efa-8f2f-0e62a494791e
  preferred_label: environmental policy officer
  isco_code: '2422'
  code: 2422.12.5
  description: Environmental policy officers research, analyse, develop and implement
    policies related to the environment. They give expert advice to entities such
    as commercial organisations, government agencies and land developers. Environmental
    policy officers work on reducing the impact of industrial, commercial and agricultural
    activities on the environment.
- uri: http://data.europa.eu/esco/occupation/c418ed9a-132f-48cd-ae5c-dd375070ee0e
  preferred_label: trade development officer
  isco_code: '2422'
  code: '2422.18'
  description: Trade development officers develop and implement trade policies both
    internally and in international import and export relations. They analyse the
    domestic and foreign markets in order to promote and establish business operations,
    and ensure trade proceedings are compliant with legislation and businesses are
    protected from distortions.
- uri: http://data.europa.eu/esco/occupation/caf7b8fb-b2d6-46b7-bffa-bea7f8e4aed8
  preferred_label: policy officer
  isco_code: '2422'
  code: '2422.12'
  description: Policy officers research, analyse and develop policies in various public
    sectors, and shape and implement these policies to improve the existing regulation
    around the sector. They evaluate effects of existing policies and report findings
    to the government and members of the public. Policy officers work closely with
    partners, external organisations or other stakeholders and provide them with regular
    updates.
- uri: http://data.europa.eu/esco/occupation/cb4f98c8-6b8d-41d8-87eb-a2a2033a3a25
  preferred_label: public procurement specialist
  isco_code: '2422'
  code: '2422.15'
  description: Public procurement specialists are full-time public procurement practitioners
    working as part of a procurement team in a large organisation or central purchasing
    body in all phases of the procurement cycle. They translate needs into contracts
    and deliver value for money for the organisation and the public.
- uri: http://data.europa.eu/esco/occupation/d4d6842b-27f0-4222-85db-c542acf6d434
  preferred_label: public health policy officer
  isco_code: '2422'
  code: 2422.12.12
  description: Public health policy officers develop and implement strategies for
    the improvement of a community's health care policy. They advise governments on
    policy changes and identify problems in current health care policies.
- uri: http://data.europa.eu/esco/occupation/d6ef013f-57e9-4100-bbe5-3e4930664dee
  preferred_label: social services policy officer
  isco_code: '2422'
  code: 2422.12.15
  description: Social services policy officers research, analyse and develop social
    services policies and implement these policies and services to improve circumstances
    of disadvantaged and vulnerable members of society such as children and elderly
    people. They work in the administration of social services and stay in contact
    with organisations and other stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/d9004a14-bda2-4c63-ab64-17ca163ac1bd
  preferred_label: parliamentary assistant
  isco_code: '2422'
  code: '2422.11'
  description: Parliamentary assistants provide support to officials and politicians
    of regional, national and international parliaments and undertake logistical tasks.
    They revise official documents and follow procedures set by the respective parliaments.
    They support on the communication with stakeholders and provide the logistical
    support required in handling official processes.
- uri: http://data.europa.eu/esco/occupation/f7450c1f-20b7-45dd-b3bb-25095830bf3f
  preferred_label: foreign affairs officer
  isco_code: '2422'
  code: 2422.12.7
  description: Foreign affairs officers analyse foreign affairs policies and operations,
    and write reports outlining their analyses in a clear and comprehensible manner.
    They communicate with parties who benefit from their findings, and act as advisers
    in the development or implementation of or reporting on foreign policy. Foreign
    affairs officers may also perform administrative duties in the department, such
    as assisting with problems concerning passports and visas. They promote friendly
    and open communication between different nations' governments and institutions.
- uri: http://data.europa.eu/esco/occupation/f817aab2-ec8a-45ec-88ef-c11e0f19fd85
  preferred_label: education policy officer
  isco_code: '2422'
  code: 2422.12.4
  description: Education policy officers research, analyse and develop education policies,
    and implement these policies to improve the existing education system. They try
    to improve all aspects of education which will impact institutions such as schools,
    universities and vocational schools. They work closely with partners, external
    organisations or other stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/fdf7b000-d923-4086-9660-eb8ee5e77ef0
  preferred_label: recreation policy officer
  isco_code: '2422'
  code: 2422.12.13
  description: Recreation policy officers research, analyse and develop policies in
    the sports and recreation sector and implement these policies in order to improve
    the sport and recreation system and improve the health of the population. They
    strive to increase the participation in sports, support athletes, enhance the
    performance of athletes in national and international competitions, improve social
    inclusion and community development. They work closely with partners, external
    organisations or other stakeholders and provide them with regular updates.
- uri: http://data.europa.eu/esco/occupation/ffade2f4-2528-4dfd-b36a-6e4092be08ed
  preferred_label: civil service administrative officer
  isco_code: '2422'
  code: '2422.1'
  description: Civil service administrative officers perform administrative duties
    in civil service organisations and government departments. They ensure record
    maintenance, handle enquiries and provide information to the public, either in
    person, through emails or phone calls. They support senior staff, and ensure a
    fluent internal flow of information.
- uri: http://data.europa.eu/esco/occupation/068370e0-9c27-4814-87d0-44fbb3140815
  preferred_label: recruitment consultant
  isco_code: '2423'
  code: '2423.6'
  description: Recruitment consultants provide the suitable candidates to employers
    according to the specific job profile requested. They perform testing and interviewing
    with job seekers, shortlist few candidates to present to the employers and match
    candidates to appropriate jobs. Recruitment consultants maintain relationships
    with employers to offer their services on a more long-term basis.
- uri: http://data.europa.eu/esco/occupation/1fce1be0-bf52-449b-9a2b-3f2cc710290a
  preferred_label: compensation analyst
  isco_code: '2423'
  code: '2423.7'
  description: Compensation analysts recognise and reward contributions and behaviors
    that support company’s business objectives and corporate values.
- uri: http://data.europa.eu/esco/occupation/20b9f370-6b56-4679-8c06-c23b866a5bd0
  preferred_label: labour relations officer
  isco_code: '2423'
  code: '2423.4'
  description: Labour relations officers implement labour policy in an organisation,
    and advise trade unions on policies and negotiation. They handle disputes, and
    advise management on personnel policy as well as facilitate communication between
    trade unions and managerial staff.
- uri: http://data.europa.eu/esco/occupation/5d0cc30d-068a-424c-8463-f42872a7149e
  preferred_label: career guidance advisor
  isco_code: '2423'
  code: '2423.1'
  description: Career guidance advisors provide guidance and advice to adults and
    students on making educational, training and occupational choices and assist people
    in managing their careers, through career planning and career exploration. They
    help identify options for future careers, assist beneficiaries in the development
    of their curriculum and help people reflect on their ambitions, interests and
    qualifications. Career guidance advisors may provide advice on various career
    planning issues and make suggestions for lifelong learning if necessary, including
    study recommendations. They may also assist the individual in the search for a
    job or provide guidance and advice to prepare a candidate for recognition of prior
    learning.
- uri: http://data.europa.eu/esco/occupation/6d03eaef-1ce5-4a1e-bb41-0908e1af1b65
  preferred_label: occupational analyst
  isco_code: '2423'
  code: '2423.5'
  description: Occupational analysts collect and analyse occupational information
    within one field or company in order to make recommendations for reducing costs
    and general business improvements. They provide technical assistance to employers
    in dealing with problematic staff recruitment and development and with staff restructuring.
    Occupational analysts study and write job descriptions and prepare occupational
    classification systems.
- uri: http://data.europa.eu/esco/occupation/d3e32e5e-7f24-48e3-b939-e4f800eb62fb
  preferred_label: human resources officer
  isco_code: '2423'
  code: '2423.3'
  description: Human resources officers develop and implement strategies that help
    their employers select and retain appropriately qualified staff within that business
    sector. They recruit staff, prepare job advertisements, interview and short-list
    people, negotiate with employment agencies, and set up working conditions. Human
    resources officers also administer the payroll, review salaries and advise on
    remuneration benefits and employment law. They arrange for training opportunities
    to enhance employees' performance.
- uri: http://data.europa.eu/esco/occupation/e4112a88-973f-4c7a-97f5-2241e6b6833f
  preferred_label: employment and vocational integration consultant
  isco_code: '2423'
  code: '2423.2'
  description: Employment and vocational integration consultants offer assistance
    to unemployed individuals in finding jobs or vocational training opportunities,
    according to their educational or professional background and experience. They
    advise them on how to market their skills in the job-hunting process. Employment
    and vocational integration consultants help job-seekers write CVs and cover letters,
    prepare for a job interview and indicate where to search for new job or training
    opportunities.
- uri: http://data.europa.eu/esco/occupation/0ba06640-e0ac-4911-9e43-289a8e41651e
  preferred_label: corporate trainer
  isco_code: '2424'
  code: '2424.2'
  description: Corporate trainers train, coach, and guide employees of a company to
    teach and improve their skills, competences and knowledge in accordance with the
    needs of the company. They develop the existing potential of the employees to
    increase their efficiency, motivation, job satisfaction, and employability.
- uri: http://data.europa.eu/esco/occupation/d9612966-e295-4d81-ba2b-9f36bad0b392
  preferred_label: business coach
  isco_code: '2424'
  code: '2424.1'
  description: Business coaches guide employees of a company or other institution
    in order to improve their personal effectiveness, increase their job satisfaction,
    and positively impact their career development in the business setting. They do
    this by leading the coachee (the person who is being coached) to resolution of
    their challenges by their own means. Business coaches aim to address specific
    tasks or reach specific goals, as opposed to overall development.
- uri: http://data.europa.eu/esco/occupation/002da35b-7808-43f3-83bf-63596b8b351f
  preferred_label: hospitality revenue manager
  isco_code: '2431'
  code: '2431.9'
  description: Hospitality revenue managers maximise revenue generated from facilities
    such as hotels, holiday resorts and camping grounds by analysing trends and competition.
    They assist establishment managers in strategic decisions. Hospitality revenue
    managers analyse and optimise the financial potential of facilities and manage
    the corresponding staff.
- uri: http://data.europa.eu/esco/occupation/133ab775-f08d-4bc7-8629-89d286180f4e
  preferred_label: employer branding manager
  isco_code: '2431'
  code: '2431.17'
  description: Employer branding managers collaborate with marketing experts to promote
    an employer's image through communication formats such as print and social media.
    Manage an online marketing program to promote job openings and career opportunities
    at the company.
- uri: http://data.europa.eu/esco/occupation/21af40bb-2ae3-4fc7-9b28-d2cdd8308912
  preferred_label: promotion assistant
  isco_code: '2431'
  code: '2431.16'
  description: Promotion assistants provide support in the implementation of programs
    and promotional efforts in points-of-sale. They research and administer all the
    information required by managers to decide whether promotional programs are required.
    If so, they support in getting of materials and resources for the promotional
    action.
- uri: http://data.europa.eu/esco/occupation/356227b9-2263-4dbd-81e9-7dfc6d3f3af7
  preferred_label: online marketer
  isco_code: '2431'
  code: 2431.10.4
  description: Online marketers use e-mail, internet and social media in order to
    market goods and brands.
- uri: http://data.europa.eu/esco/occupation/4163b31e-440b-4991-b5c3-48d0515250ef
  preferred_label: network marketer
  isco_code: '2431'
  code: '2431.13'
  description: Network marketers apply various marketing strategies, including ​network
    marketing strategies to sell products and convince new people to also join in
    and start selling these products. They use personal relations to attract customers
    and sell various types of products.
- uri: http://data.europa.eu/esco/occupation/4791e217-d607-40d5-9f84-df1d0a071cbc
  preferred_label: marketing consultant
  isco_code: '2431'
  code: '2431.10'
  description: Marketing consultants advise companies in the development of marketing
    strategies for specific purposes. They can advise and develop strategies for the
    entry of a brand in the market, for the re-launch of a product, for the introduction
    of a new product, or for the positioning of a commercial image. They perform previous
    studies of the position of the company and perception of customers in order to
    define the marketing approach.
- uri: http://data.europa.eu/esco/occupation/4795d4e3-c623-47ff-abab-7de97fcb764e
  preferred_label: advertising media buyer
  isco_code: '2431'
  code: '2431.2'
  description: Advertising media buyers purchase, on behalf of their clients, advertising
    space in the print, broadcast and online media. They analyse the effectiveness
    and appropriateness of the different channels depending on the good or service,
    providing advice for the decision-making. They try to negotiate the best price,
    without compromising the quality of the advertisements. They support the development
    and implementation of marketing and advertising plans through the most suited
    media outlet.
- uri: http://data.europa.eu/esco/occupation/47e81c7f-2d04-4a60-a8ff-9913c36d8344
  preferred_label: marketing assistant
  isco_code: '2431'
  code: 2431.10.3
  description: Marketing assistants support all the efforts and operations carried
    out by marketing managers and officers. They prepare reports in relation to the
    marketing operations needed by other departments, especially account and financial
    divisions. They ensure that resources needed by the managers to perform their
    job are in place.
- uri: http://data.europa.eu/esco/occupation/4ae470fc-bcf8-4704-abd5-e086ebb1552c
  preferred_label: membership manager
  isco_code: '2431'
  code: '2431.12'
  description: Membership managers oversee and coordinate the membership plan, support
    existing members and engage with possible new members. They analyse the market
    trend reports and develop marketing plans accordingly. Membership managers monitor
    and ensure the efficiency of processes, systems and strategies.
- uri: http://data.europa.eu/esco/occupation/586fe133-1987-41f4-b89a-f39d4bc58e1e
  preferred_label: eBusiness manager
  isco_code: '2431'
  code: 2431.10.2
  description: eBusiness managers create and execute a company's electronic strategy
    plan for selling products and services online. They also improve data integrity,
    placement of online tools and brand exposure and monitor sales for companies that
    market products to customers using the internet. They collaborate with the marketing
    and sales management team using ICT tools to reach sales goals and provide accurate
    information and offerings to business partners.
- uri: http://data.europa.eu/esco/occupation/66fb9704-0d56-4673-8e69-7823816b73e1
  preferred_label: market research analyst
  isco_code: '2431'
  code: '2431.11'
  description: Market research analysts collect the information gathered in the market
    research and study it to draw conclusions. They define the potential customers
    of a product, the target group and the way they can be reached. Market research
    analysts analyse the position of products in the market from different perspectives
    such as features, prices and competitors. They analyse cross selling and interdependencies
    between different products and their placement. Market research analysts prepare
    information helpful for the development of marketing strategies.
- uri: http://data.europa.eu/esco/occupation/725090a7-9943-4dae-8079-a6999d21ddba
  preferred_label: client relations manager
  isco_code: '2431'
  code: '2431.6'
  description: Client relations managers act as the middle person between a company
    and its customers. They ensure that the customers are satisfied by providing them
    with guidance and explanation on their accounts and services received by the company.
    They also have possible other tasks such as developing plans or delivering proposals.
- uri: http://data.europa.eu/esco/occupation/9c9752b7-3e3b-4a08-8553-b63a013f8072
  preferred_label: customer experience manager
  isco_code: '2431'
  code: '2431.8'
  description: Customer experience managers monitor customer experiences by creating,
    evaluating and improving the customer's interaction organisations in the hospitality,
    recreation or entertainment industry. They develop plans of action to optimise
    all aspects of the customer's experience. Customer experience managers strive
    to ensure customer satisfaction and boost company profits.
- uri: http://data.europa.eu/esco/occupation/b1ab3572-fa2f-4624-8eac-3c3d986d237b
  preferred_label: advertising copywriter
  isco_code: '2431'
  code: '2431.1'
  description: Advertising copywriters are responsible for the written or verbal design
    of advertisements and commercials. They write slogans, catchphrases and work closely
    together with advertising artists.
- uri: http://data.europa.eu/esco/occupation/b55718eb-e8ff-4485-8ad0-bbac32cbd77b
  preferred_label: advertising media planner
  isco_code: '2431'
  code: 2431.10.1
  description: Advertising media planners advise on the best communication media platforms
    to convey ideas. They analyse advertising plans in order to assess the aim and
    objective of the marketing strategy. They assess the potential and response rate
    that different communication channels might have on the transmission of a message
    related to a product, company, or brand.
- uri: http://data.europa.eu/esco/occupation/b76178c0-a03a-4793-b079-1e61e636c521
  preferred_label: business developer
  isco_code: '2431'
  code: '2431.5'
  description: Business developers strive to improve the market share of companies
    in the market. They perform strategic analyses of the core advantages that a company's
    products or services have to offer, they cooperate in the development of marketing
    campaigns for lead generation and support on sales efforts.
- uri: http://data.europa.eu/esco/occupation/d2db926b-8b14-4686-9c98-fb0dc3a38cbb
  preferred_label: creative director
  isco_code: '2431'
  code: '2431.7'
  description: Creative directors manage the team that is responsible for the creation
    of advertisements and commercials. They oversee the whole creation process. Creative
    directors pitch the designs of their team to the client.
- uri: http://data.europa.eu/esco/occupation/de80bbf0-447d-4a6a-845a-fdba4e0dc30c
  preferred_label: brand manager
  isco_code: '2431'
  code: '2431.4'
  description: Brand managers analyse and plan the way a brand is positioned on the
    market.
- uri: http://data.europa.eu/esco/occupation/e01719f4-d7dd-42fe-b504-93128520f84a
  preferred_label: advertising specialist
  isco_code: '2431'
  code: '2431.3'
  description: Advertising specialists provide advice to companies and organisations
    about the development of their advertising strategies and on advertising-related
    topics covering a more general strategic approach. They combine knowledge of marketing,
    budgets, and psychology with a creative mind to develop advertising campaigns.
    They propose alternatives to clients that promote their organisations, products,
    or projects.
- uri: http://data.europa.eu/esco/occupation/e16c2422-1323-4d8a-bd0f-c7584de70be1
  preferred_label: pricing specialist
  isco_code: '2431'
  code: '2431.14'
  description: Pricing specialists analyse production prices, market trends and competitors
    in order to establish the right price, taking brand and marketing concepts into
    consideration.
- uri: http://data.europa.eu/esco/occupation/e5a63940-57d3-4065-8713-74b4e2c93063
  preferred_label: product and services manager
  isco_code: '2431'
  code: '2431.15'
  description: Product and services managers are in charge of defining the content
    and structure of a catalogue or portfolio within a company.
- uri: http://data.europa.eu/esco/occupation/13427968-250b-4967-a682-afac5cd0af4f
  preferred_label: campaign canvasser
  isco_code: '2432'
  code: 2432.6.1
  description: Campaign canvassers operate on field level to persuade the public to
    vote for the political candidate they represent. They engage in direct conversation
    with the public in public places, and gather information on the public's opinion,
    as well as perform activities ensuring that information on the campaign reaches
    a wide audience.
- uri: http://data.europa.eu/esco/occupation/137b1d11-c4bc-4016-89ba-45345d4c71f0
  preferred_label: online community manager
  isco_code: '2432'
  code: '2432.5'
  description: Online community managers provide and maintain an interactive environment
    facilitated by applications such as social media, forums and wikis. They maintain
    the relations between different digital communities.
- uri: http://data.europa.eu/esco/occupation/3e213d52-e7a0-4980-99d9-23da1f717f50
  preferred_label: political campaign officer
  isco_code: '2432'
  code: '2432.6'
  description: Political campaign officers provide support during political campaigns,
    advising the candidate and campaign management staff on campaign strategies and
    campaign staff coordination, as well as developing advertising and research strategies.
- uri: http://data.europa.eu/esco/occupation/82fe0140-7069-47f9-a7d4-d63a611cb5bd
  preferred_label: election agent
  isco_code: '2432'
  code: '2432.2'
  description: Election agents manage a political candidate's campaign and oversee
    the operations of elections to ensure accuracy. They develop strategies to support
    candidates and persuade the public to vote for the candidate they represent. They
    conduct research to gauge which image and ideas would be most advantageous for
    the candidate to present to the public in order to secure the most votes.
- uri: http://data.europa.eu/esco/occupation/903dc1bf-2da8-477d-83b2-687d360cf1da
  preferred_label: intercultural communication consultant
  isco_code: '2432'
  code: '2432.4'
  description: Intercultural communication consultants specialise in social interaction
    between parties of different cultures, advise organisations on international interactions
    in order to optimise their performance, and facilitiate cooperation and positive
    interaction with organisations and individuals from other cultures.
- uri: http://data.europa.eu/esco/occupation/98358049-fbcd-479e-a644-e92bde5af2e0
  preferred_label: activism officer
  isco_code: '2432'
  code: '2432.1'
  description: Activism officers promote or hinder social, political, economic or
    environmental change by using different tactics such as persuasive research, media
    pressure or public campaigning.
- uri: http://data.europa.eu/esco/occupation/9e285322-2cfa-430f-9b66-41be57d698e2
  preferred_label: public affairs consultant
  isco_code: '2432'
  code: '2432.8'
  description: Public affairs consultants function as representatives for a client's
    goal. They attempt to persuade legislative bodies and policy makers to implement
    laws or regulation in accordance with the client's wishes, and negotiate with
    parties with potentially conflicting interests. They perform analytical and research
    duties in order to ensure that the client's cause is being addressed in an appropriate
    way to the appropriate parties. They also consult their clients on their causes
    and policies.
- uri: http://data.europa.eu/esco/occupation/b89ba3a8-f03a-46b8-ac54-c87d7204aad0
  preferred_label: spokesperson
  isco_code: '2432'
  code: 2432.9.1
  description: Spokespeople speak on behalf of companies or organisations. They use
    communication strategies to represent clients through public announcements and
    conferences. They promote their clients in a positive light and work to increase
    an understanding of their activities and interests.
- uri: http://data.europa.eu/esco/occupation/c0489e22-6a1b-4e52-974a-eb71bbb42134
  preferred_label: public relations officer
  isco_code: '2432'
  code: '2432.9'
  description: Public relations officers represent a company or organisation to stakeholders
    and the public. They use communications strategies to promote an understanding
    of the activities and image of their clients in a favourable way.
- uri: http://data.europa.eu/esco/occupation/c2e6609d-0abe-4a38-b295-e06edbd52e82
  preferred_label: fundraising manager
  isco_code: '2432'
  code: '2432.3'
  description: Fundraising managers are responsible for raising money on behalf of
    organisations, often non-profit such as charities. Moreover, they manage the fundraised
    resources developing programs for its use. They perform a variety of tasks to
    raise money such as developing corporate partnerships, coordinating direct mail
    campaigns, organizing fundraisers, contacting donators or sponsors, and sourcing
    grant income from trusts, foundations and other statutory bodies.
- uri: http://data.europa.eu/esco/occupation/f6811475-94d4-4d13-8d5f-f173978ae7ec
  preferred_label: political party agent
  isco_code: '2432'
  code: '2432.7'
  description: Political party agents manage the administrative tasks of a political
    party, such as budget management, record keeping, writing of agendas, etc. They
    also ensure productive communication with governmental bodies, and with press
    and media.
- uri: http://data.europa.eu/esco/occupation/114e1eff-215e-47df-8e10-45a5b72f8197
  preferred_label: renewable energy consultant
  isco_code: '2433'
  code: '2433.3'
  description: Renewable energy consultants advise clients on the advantages and disadvantages
    of different renewable energy sources. They conduct surveys and interviews to
    research demand of and opinions on renewable energy, and strive to advise clients
    on the most advantageous source of renewable energy for their purpose.
- uri: http://data.europa.eu/esco/occupation/2d6a1cc1-cd13-42c5-a2b1-f0183bd0d253
  preferred_label: technical sales representative in agricultural machinery and equipment
  isco_code: '2433'
  code: 2433.6.1
  description: Technical sales representatives in agricultural machinery and equipment
    act for a business to sell its merchandise while providing technical insight for
    customers.
- uri: http://data.europa.eu/esco/occupation/4a13bafa-a2ac-4864-a278-176ea5969280
  preferred_label: technical sales representative in hardware, plumbing and heating
    equipment
  isco_code: '2433'
  code: 2433.6.3
  description: Technical sales representatives in hardware, plumbing and heating equipment
    act for a business to sell its merchandise while providing technical insight for
    customers.
- uri: http://data.europa.eu/esco/occupation/52fcfdb9-9dcf-4591-aba5-45337f791a10
  preferred_label: technical sales representative in mining and construction machinery
  isco_code: '2433'
  code: 2433.6.5
  description: Technical sales representatives in mining and construction machinery
    act for a business to sell its merchandise while providing technical insight for
    customers.
- uri: http://data.europa.eu/esco/occupation/8529edc5-96ad-4cde-b34a-f86ad3753e4d
  preferred_label: sales engineer
  isco_code: '2433'
  code: '2433.4'
  description: Sales engineers provide technical customisation of products based on
    customers requests and needs (mainly heavy duty), such as building equipment.
    They take care of business to business contact and assume responsibility for complex
    repairs and maintenance process.
- uri: http://data.europa.eu/esco/occupation/98e58946-3227-4f6c-a5d1-5892fe76883d
  preferred_label: after-sales service technician
  isco_code: '2433'
  code: '2433.1'
  description: After-sales service technicians provide after-sales service support
    to customers, such as the installation, maintenance and repair of the sold products.
    They take corrective actions to ensure customers’ satisfaction, resolve technical
    product-related issues and write customer summary reports.
- uri: http://data.europa.eu/esco/occupation/ab762f91-d737-485f-a85c-67cab92dee01
  preferred_label: medical sales representative
  isco_code: '2433'
  code: '2433.2'
  description: Medical sales representatives promote and sell medical devices, equipment
    and pharmaceutical products to healthcare professionals. They provide product
    information and demonstrate features to healthcare professionals. Medical representatives
    negotiate and close sales contracts.
- uri: http://data.europa.eu/esco/occupation/b6f4573d-659f-49ca-a885-850a48d01913
  preferred_label: technical sales representative in machinery and industrial equipment
  isco_code: '2433'
  code: 2433.6.4
  description: Technical sales representatives in machinery and industrial equipment
    act for a business to sell its merchandise while providing technical insight for
    customers.
- uri: http://data.europa.eu/esco/occupation/bf2ca3bb-5fa5-41d9-a039-949cad61616d
  preferred_label: technical sales representative in chemical products
  isco_code: '2433'
  code: 2433.6.2
  description: Technical sales representatives in chemical products act for a business
    to sell its merchandise while providing technical insight for customers.
- uri: http://data.europa.eu/esco/occupation/c956be07-53a3-4b01-b8f8-f0c5a428eaa8
  preferred_label: technical sales representative
  isco_code: '2433'
  code: '2433.6'
  description: Technical sales representatives act for a business to sell its merchandise
    while providing technical insight for customers.
- uri: http://data.europa.eu/esco/occupation/d19932b3-169a-4cdf-a9cd-bdf8857b0184
  preferred_label: technical sales representative in the textile machinery industry
  isco_code: '2433'
  code: 2433.6.7
  description: Technical sales representatives in the textile machinery industry act
    for a business to sell its merchandise while providing technical insight for customers.
- uri: http://data.europa.eu/esco/occupation/e6c298a4-62de-4b62-b48e-c5fdca8f6071
  preferred_label: technical sales representative in office machinery and equipment
  isco_code: '2433'
  code: 2433.6.6
  description: Technical sales representatives in office machinery and equipment act
    for a business to sell its merchandise while providing technical insight for customers.
- uri: http://data.europa.eu/esco/occupation/fd4b90ed-6bb4-447e-b13a-afb8015700b3
  preferred_label: solar energy sales consultant
  isco_code: '2433'
  code: '2433.5'
  description: Solar energy sales consultants provide advice on solar energy for domestic
    or industrial purposes, and aim to promote the use of solar energy as an alternative
    and more sustainable source of energy. They communicate with prospective clients,
    and attend networking events, to ensure increased sales of solar energy products.
- uri: http://data.europa.eu/esco/occupation/16605833-c196-48d7-a6f5-bbdebdc353df
  preferred_label: ICT presales engineer
  isco_code: '2434'
  code: '2434.3'
  description: ICT presales engineers actively drive and manage the ICT evaluation
    stage of the sales process, working in conjunction with the sales team. They provide
    technical guidance to pre-sales personnel and plan and modify product ICT configurations
    to meet client requirements. They pursue additional business development opportunities.
- uri: http://data.europa.eu/esco/occupation/57b459d4-655c-4053-b189-3c249ce33faf
  preferred_label: ICT business development manager
  isco_code: '2434'
  code: '2434.2'
  description: ICT business development managers increase business opportunities for
    the organisation and develop strategies that will enhance the smooth running of
    the organisation, product development and product distribution. They negotiate
    prices and establish contract terms.
- uri: http://data.europa.eu/esco/occupation/6e591f17-65c1-4a24-af2a-ca7862d4625e
  preferred_label: technical sales representative in electronic and telecommunications
    equipment
  isco_code: '2434'
  code: '2434.4'
  description: Technical sales representatives in electronic and telecommunications
    equipment act for a business to sell its merchandise while providing technical
    insight for customers.
- uri: http://data.europa.eu/esco/occupation/89b85c45-ddc7-4fe1-be5a-d3db2be11f3b
  preferred_label: ICT account manager
  isco_code: '2434'
  code: '2434.1'
  description: ICT account managers build business relationships with customers to
    facilitate the sale of hardware, software, telecommunications or ICT services.
    They also identify opportunities and manage sourcing and delivery of products
    to customers. They achieve sales targets and maintain profitability.
- uri: http://data.europa.eu/esco/occupation/07e60525-1aad-4099-aaf3-2c7014c92212
  preferred_label: integration engineer
  isco_code: '2511'
  code: '2511.17'
  description: Integration engineers develop and implement solutions which coordinate
    applications across the enterprise or its units and departments. They evaluate
    existing components or systems to determine integration requirements and ensure
    that the final solutions meet organisational needs. They reuse components when
    possible and assist management in taking decisions. They perform ICT system integration
    troubleshooting.
- uri: http://data.europa.eu/esco/occupation/10469d70-78a3-4650-9e29-d04de13c62c1
  preferred_label: embedded system designer
  isco_code: '2511'
  code: '2511.5'
  description: Embedded system designers translate and design requirements and the
    high-level plan or architecture of an embedded control system according to technical
    software specifications.
- uri: http://data.europa.eu/esco/occupation/1c5a45b9-440e-4726-b565-16a952abd341
  preferred_label: computer vision engineer
  isco_code: '2511'
  code: '2511.2'
  description: Computer vision engineers research, design, develop, and train artificial
    intelligence algorithms and machine learning primitives that understand the content
    of digital images based on a large amount of data. They apply this understanding
    to solve different real-world problems such as security, autonomous driving, robotic
    manufacturing, digital image classification, medical image processing and diagnosis,
    etc.
- uri: http://data.europa.eu/esco/occupation/2079755f-d809-49e6-8037-4de6180e54c0
  preferred_label: data engineer
  isco_code: '2511'
  code: '2511.20'
  description: Data engineers develop the architecture needed to process, manage,
    and store large amounts of data which will be used by data scientists for analysis.
    They design the infrastructure and maintain data pipelines and warehouses to leverage
    data for strategic advantage.
- uri: http://data.europa.eu/esco/occupation/22987b58-dbfa-4ecd-ae3f-82dd209255f6
  preferred_label: green ICT consultant
  isco_code: '2511'
  code: '2511.7'
  description: Green ICT consultants advise organisations on their green ICT strategy
    and its implementation in the most effective and efficient manner to allow the
    organisation to reach their short, mid, and long term ICT environmental objectives.
- uri: http://data.europa.eu/esco/occupation/258e46f9-0075-4a2e-adae-1ff0477e0f30
  preferred_label: data scientist
  isco_code: '2511'
  code: '2511.4'
  description: Data scientists find and interpret rich data sources, manage large
    amounts of data, merge data sources, ensure consistency of data-sets, and create
    visualisations to aid in understanding data. They build mathematical models using
    data, present and communicate data insights and findings to specialists and scientists
    in their team and if required, to a non-expert audience, and recommend ways to
    apply the data.
- uri: http://data.europa.eu/esco/occupation/2bef94db-0088-4507-982a-2ca717529adb
  preferred_label: enterprise architect
  isco_code: '2511'
  code: '2511.6'
  description: Enterprise architects balance technological opportunities with business
    requirements. They also maintain a holistic view of the organisation's strategy,
    processes, information and ICT assets and link the business mission, strategy
    and processes to the ICT strategy.
- uri: http://data.europa.eu/esco/occupation/35553663-deab-4d9a-bf22-15c1625d28e8
  preferred_label: artificial intelligence engineer
  isco_code: '2511'
  code: '2511.11'
  description: Artificial intelligence engineer apply methods of artificial intelligence
    in engineering, robotics and computer science to design programs which simulate
    intelligence including thinking models, cognitive and knowledge-based systems,
    problem solving, and decision making. They also integrate structured knowledge
    into computer systems (ontologies, knowledge bases) in order to solve complex
    problems normally requiring a high level of human expertise or artificial intelligence
    methods.
- uri: http://data.europa.eu/esco/occupation/4b3201cb-ffc5-4f61-9fc3-5c0f0038fa5f
  preferred_label: ICT business analysis manager
  isco_code: '2511'
  code: '2511.8'
  description: ICT business analysis managers identify areas where information system
    changes are needed to support business plans and monitor the impact in terms of
    change management. They contribute to the general ICT functional requirements
    of the business organisation. ICT business analysis managers analyse business
    needs and translate them into ICT solutions.
- uri: http://data.europa.eu/esco/occupation/6e92d4b5-3167-4166-802f-da7753951a31
  preferred_label: ICT research consultant
  isco_code: '2511'
  code: '2511.12'
  description: ICT research consultants perform targeted ICT research and provide
    a final report to the client. They also use ICT tools to design questionnaires
    for surveys, analyse the results, write reports, present the results and make
    recommendations based on the research findings.
- uri: http://data.europa.eu/esco/occupation/78faf623-2543-43a5-acb2-3c43a22d36e4
  preferred_label: blockchain architect
  isco_code: '2511'
  code: 2511.14.1
  description: Blockchain architects are ICT system architects that are specialized
    in blockchain-based solutions. They design architecture, components, modules,
    interfaces, and data for a decentralized system to meet specified requirements.
- uri: http://data.europa.eu/esco/occupation/a6a0b60f-08da-4faa-bf54-942987efb471
  preferred_label: ICT system analyst
  isco_code: '2511'
  code: '2511.13'
  description: ICT system analysts specify the system needs to meet the end user requirements.
    They analyse system functions in order to define their goals or purposes and to
    discover operations and procedures for accomplishing them most efficiently. They
    also design new IT solutions to improve business efficiency and productivity,
    produce outline designs and estimate costs of new systems, specify the operations
    the system will perform, and the way data will be viewed by the end user. They
    present the design to the users and work closely with the users to implement the
    solution.
- uri: http://data.europa.eu/esco/occupation/a7c1d23d-aeca-4bee-9a08-5993ed98b135
  preferred_label: ICT system developer
  isco_code: '2511'
  code: '2511.15'
  description: ICT system developers maintain, audit and improve organisational support
    systems. They use existing or new technologies to meet particular needs. They
    test both hardware and software system components, diagnose and resolve system
    faults.
- uri: http://data.europa.eu/esco/occupation/b1c80369-067e-4041-84c8-dbe65640a5d8
  preferred_label: ICT consultant
  isco_code: '2511'
  code: '2511.10'
  description: ICT consultants provide advice on how to optimise the use of existing
    tools and systems, make recommendations for the development and implementation
    of a business project or technological solution and contribute to project definitions.
    They raise awareness on information technology innovations and their potential
    value to a business. They also participate in the assessment and choice of ICT
    solutions.
- uri: http://data.europa.eu/esco/occupation/bd9d395a-d587-45c6-8d72-ceef226df9e1
  preferred_label: ICT system integration consultant
  isco_code: '2511'
  code: '2511.16'
  description: ICT system integration consultants advise on bringing together different
    systems to interoperate within an organisation for enabling data sharing and reducing
    redundancy.
- uri: http://data.europa.eu/esco/occupation/cdd3d773-75a4-4f35-bd1d-1ac720afcf9d
  preferred_label: IT auditor
  isco_code: '2511'
  code: '2511.18'
  description: IT auditors perform audits of information systems, platforms, and operating
    procedures in accordance with established corporate standards for efficiency,
    accuracy and security. They evaluate ICT infrastructure in terms of risk to the
    organisation and establish controls to mitigate loss. They determine and recommend
    improvements in the current risk management controls and in the implementation
    of system changes or upgrades.
- uri: http://data.europa.eu/esco/occupation/d3edb8f8-3a06-47a0-8fb9-9b212c006aa2
  preferred_label: data analyst
  isco_code: '2511'
  code: '2511.3'
  description: Data analysts import, inspect, clean, transform, validate, model, or
    interpret collections of data with regard to the business goals of the company.
    They ensure that the data sources and repositories provide consistent and reliable
    data. Data analysts use different algorithms and IT tools as demanded by the situation
    and the current data. They might prepare reports in the form of visualisations
    such as graphs, charts, and dashboards.
- uri: http://data.europa.eu/esco/occupation/e1c72b5f-4c5c-487c-a6df-e84b64a51dae
  preferred_label: ICT system architect
  isco_code: '2511'
  code: '2511.14'
  description: ICT system architects design architecture, components, modules, interfaces,
    and data for a multi-components system to meet specified requirements.
- uri: http://data.europa.eu/esco/occupation/e3229e40-f571-4b26-baca-29edc8fe313e
  preferred_label: computer scientist
  isco_code: '2511'
  code: '2511.1'
  description: Computer scientists conduct research in computer and information science,
    directed toward greater knowledge and understanding of fundamental aspects of
    ICT phenomena. They write research reports and proposals. Computer scientists
    also invent and design new approaches to computing technology, find innovative
    uses for existing technology and studies and solve complex problems in computing.
- uri: http://data.europa.eu/esco/occupation/faed411a-f920-4100-86a8-b877928b429c
  preferred_label: user experience analyst
  isco_code: '2511'
  code: '2511.19'
  description: User experience analysts assess client interaction and experience and
    analyse users' behaviours, attitudes, and emotions about the usage of a particular
    product, system or service. They make proposals for the improvement of the interface
    and usability of products, systems or services. In doing so, they take into consideration
    the practical, experiential, affective, meaningful and valuable aspects of human–computer
    interaction and product ownership, as well as the person's perceptions of system
    aspects such as utility, ease of use and efficiency, and user experience dynamics.
- uri: http://data.europa.eu/esco/occupation/fe0fa514-b48d-4a53-9757-a283c0baacf0
  preferred_label: ICT business analyst
  isco_code: '2511'
  code: '2511.9'
  description: ICT business analysts are in charge of analysing and designing an organisation's
    processes and systems, assessing the business model and its integration with technology.
    They also identify change needs, assess the impact of the change, capture and
    document requirements and then ensure that these requirements are delivered whilst
    supporting the business through the implementation process.
- uri: http://data.europa.eu/esco/occupation/04ba4d6c-957d-417f-bf63-5b9e015a9f86
  preferred_label: software analyst
  isco_code: '2512'
  code: '2512.2'
  description: Software analysts elicit and prioritise user requirements, produce
    and document software specifications, test their application, and review them
    during software development. They act as the interface between the software users
    and the software development team.
- uri: http://data.europa.eu/esco/occupation/24135b84-cbdd-4d42-9ed2-02fd982d15b2
  preferred_label: blockchain developer
  isco_code: '2512'
  code: 2512.4.1
  description: Blockchain developers implement or program blockchain-based software
    systems based on specifications and designs by using programming languages, tools,
    and blockchain platforms.
- uri: http://data.europa.eu/esco/occupation/2fb96c6c-8d0b-4ef0-b1ee-3e493305e4eb
  preferred_label: cloud architect
  isco_code: '2512'
  code: '2512.6'
  description: Cloud architects are responsible for converting the technical features
    of a project into the architecture to lead to the final product. To develop technical
    cloud strategy, they have in-depth knowledge of the architectural principles and
    services, assisting with cloud migration efforts, review workload architectures,
    and provide guidance on how to address high-risk issues. They typically perform
    in a pre-sales capacity and are often asked to deliver proof-of-concept projects,
    topical workshops, and lead implementation projects. They team up with DevOps
    engineers to build the appropriate technologies.
- uri: http://data.europa.eu/esco/occupation/349ee6f6-c295-4c38-9b98-48765b55280e
  preferred_label: cloud engineer
  isco_code: '2512'
  code: '2512.1'
  description: Cloud engineers are responsible for the design, planning, management
    and maintenance of cloud-based systems. They develop and implement cloud-applications,
    handle the migration of existing on-premise applications to the cloud, and debug
    cloud stacks.
- uri: http://data.europa.eu/esco/occupation/6ce5f7e3-a534-4aa2-ab23-255408ddb53a
  preferred_label: IoT developer
  isco_code: '2512'
  code: '2512.9'
  description: IoT developers analyse and gather data for interpreting the pattern
    and predicting the result. They use artificial intelligence for managing the tasks
    and autonomous decisions, employing machine learning algorithms to create smarter
    devices through data sensors. IoT developers create software for connecting objects
    to systems and devices, or for programming these objects to make them function
    on their own.
- uri: http://data.europa.eu/esco/occupation/781a6350-e686-45b9-b075-e4c8d5a05ff7
  preferred_label: cloud software developer
  isco_code: '2512'
  code: '2512.8'
  description: Cloud software developers create, deploy, and modernize software applications
    to run on the cloud using microservices, containers, and serverless technologies.
    They develop scalable and highly available applications using cloud architectures
    and best practices. They incorporate logging and monitoring into their code and
    are able to perform root cause analysis on failures.
- uri: http://data.europa.eu/esco/occupation/866c7813-2c03-47d7-9bdc-192cfbace57c
  preferred_label: user interface developer
  isco_code: '2512'
  code: '2512.5'
  description: User interface developers implement, code, document and maintain the
    interface of a software system by using front-end development technologies.
- uri: http://data.europa.eu/esco/occupation/cc867bee-ab5c-427f-9244-f7a204d9574b
  preferred_label: cloud DevOps engineer
  isco_code: '2512'
  code: '2512.7'
  description: Cloud DevOps engineers implement and manage continuous software delivery
    systems and methodologies. This includes managing and configuring code repositories,
    build services, automated testing, and deployment mechanisms. For cloud-based
    workloads, a Cloud DevOps Engineer define and deploy infrastructure as code, automating
    test and development environments. They can define and configure automated disaster
    recovery solutions that meet business objectives.
- uri: http://data.europa.eu/esco/occupation/d0aa0792-4345-474b-9365-686cf4869d2e
  preferred_label: software architect
  isco_code: '2512'
  code: '2512.3'
  description: Software architects create the technical design and the functional
    model of a software system, based on functional specifications. They also design
    the architecture of the system or different modules and components related to
    the business' or customer requirements, technical platform, computer language
    or development environment.
- uri: http://data.europa.eu/esco/occupation/f2b15a0e-e65a-438a-affb-29b9d50b77d1
  preferred_label: software developer
  isco_code: '2512'
  code: '2512.4'
  description: Software developers implement or program all kinds of software systems
    based on specifications and designs by using programming languages, tools, and
    platforms.
- uri: http://data.europa.eu/esco/occupation/092fdeeb-a76f-4ed2-b248-90fd6eaaffef
  preferred_label: search engine optimisation expert
  isco_code: '2513'
  code: '2513.2'
  description: Search engine optimisation experts increase the ranking of a company's
    web pages with regard to target queries in a search engine. They create and launch
    SEO campaigns and identify areas of improvement. Search engine optimisation experts
    may conduct pay per click (PPC) campaigns.
- uri: http://data.europa.eu/esco/occupation/96e20037-0a25-4bf6-a25e-808d1605d890
  preferred_label: user interface designer
  isco_code: '2513'
  code: '2513.3'
  description: User interface designers are in charge of designing user interfaces
    for applications and systems. They perform layout, graphics and dialogues design
    activities as well as adaptation activities.
- uri: http://data.europa.eu/esco/occupation/9ebaf3f0-0be0-47b7-b2b1-b3b04130fa81
  preferred_label: digital games developer
  isco_code: '2513'
  code: '2513.1'
  description: Digital games developers program, implement and document digital games.
    They implement technical standards in gameplay, graphics, sound and functionality.
- uri: http://data.europa.eu/esco/occupation/a74f6c51-37e5-423e-aa5b-044e98663027
  preferred_label: web content manager
  isco_code: '2513'
  code: '2513.4'
  description: Web content managers curate or create content for a web platform according
    to the long-term strategic goals, policies and procedures for an organisation's
    online content or their customers. They control and monitor compliance with standards,
    legal and privacy regulations and ensure web optimisation. They are also responsible
    for integrating the work of writers and designers to produce a final layout which
    is compatible with corporate standards.
- uri: http://data.europa.eu/esco/occupation/c40a2919-48a9-40ea-b506-1f34f693496d
  preferred_label: web developer
  isco_code: '2513'
  code: '2513.5'
  description: Web developers develop, implement and document web-accessible software
    based on the designs provided. They align the client's web presence with its business
    strategy, troubleshoot software problems and issues and look for ways to improve
    the application.
- uri: http://data.europa.eu/esco/occupation/2ed56c3f-61d6-4f7e-9ef8-8849eb102e4c
  preferred_label: mobile application developer
  isco_code: '2514'
  code: 2514.2.2
  description: Mobile application developers implement applications software for mobile
    devices, based on the designs provided, using general or specific development
    tools for device operating systems.
- uri: http://data.europa.eu/esco/occupation/456ed487-02f2-45c9-9213-d0fd8e9a069d
  preferred_label: ICT application configurator
  isco_code: '2514'
  code: '2514.1'
  description: ICT application configurators identify, record, and maintain user-specific
    application configurations based upon user requirements and business rules. They
    configure generic software systems in order to create a specific version applied
    to an organisation's context. These configurations range from adjusting basic
    parameters through the creation of business rules and roles in the ICT system
    to developing specific modules (including the configuration of Commercial off-the-shelf
    systems (COTS). They also document configurations, perform configuration updates,
    and ensure the configurations are correctly implemented in the application.
- uri: http://data.europa.eu/esco/occupation/57af9090-55b4-4911-b2d0-86db01c00b02
  preferred_label: embedded systems software developer
  isco_code: '2514'
  code: 2514.2.1
  description: Embedded systems software developers program, implement, document and
    maintain software to be run on an embedded system.
- uri: http://data.europa.eu/esco/occupation/6e5ceba0-df96-465f-adb4-2e06ae715d43
  preferred_label: numerical tool and process control programmer
  isco_code: '2514'
  code: '2514.4'
  description: Numerical tool and process control programmers develop computer programs
    to control automatic machines and equipment involved in manufacturing processes.
    They analyse blueprints and job orders, conduct computer simulations and trial
    runs.
- uri: http://data.europa.eu/esco/occupation/bb6198c4-1d3e-40b9-9cc4-ad2dd9d7c74b
  preferred_label: industrial mobile devices software developer
  isco_code: '2514'
  code: '2514.3'
  description: Industrial mobile devices software developers implement applications
    software for specific, professional industrial mobile (handheld) devices, based
    on the industry needs, using general or specific development tools for device
    operating systems.
- uri: http://data.europa.eu/esco/occupation/bd272aee-adc9-4a06-a15c-a73b4b4a46a7
  preferred_label: ICT application developer
  isco_code: '2514'
  code: '2514.2'
  description: ICT application developers implement the ICT (software) applications
    based on the designs provided using application domain specific languages, tools,
    platforms and experience.
- uri: http://data.europa.eu/esco/occupation/cc325a8f-702e-4bf0-893f-5b5d456475ad
  preferred_label: cloud identity manager
  isco_code: '2514'
  code: '2514.5'
  description: Cloud identity managers work with identity access management's applications.
    Collaborate with senior management to address key risks in the identity governance.
    Plan strategies to comply with professional standards.
- uri: http://data.europa.eu/esco/occupation/0ab5c12c-c1c1-4772-8345-aa287d0e391d
  preferred_label: ICT test analyst
  isco_code: '2519'
  code: '2519.6'
  description: ICT test analysts work in testing environments, assessing products,
    checking for quality and accuracy, or creating tests scripts. They design tests
    which are then implemented by testers.
- uri: http://data.europa.eu/esco/occupation/102e75c8-3b47-4964-9b47-30a980aed25c
  preferred_label: ICT disaster recovery analyst
  isco_code: '2519'
  code: '2519.4'
  description: ICT disaster recovery analysts develop, maintain, and implement ICT
    continuity and disaster recovery strategies and solutions. They support the technical
    teams, assess the risks, design and develop procedures, documentation and strategies
    for disaster recovery in order for business functions to continue and recover
    with a minimal loss of data. They also coordinate the system backups tests and
    validations.
- uri: http://data.europa.eu/esco/occupation/106f79e4-6264-45f1-9e7a-297435cd684b
  preferred_label: software tester
  isco_code: '2519'
  code: '2519.7'
  description: Software testers perform software tests. They may also plan and design
    them. They may also debug and repair software although this mainly corresponds
    to designers and developers. They ensure that applications function properly before
    delivering them to internal and external clients.
- uri: http://data.europa.eu/esco/occupation/33e4f026-a823-4ffc-99e4-60d3fe597a1e
  preferred_label: digital games tester
  isco_code: '2519'
  code: 2519.7.1
  description: Digital games testers review and test various genres of digital games
    by playing them in order to find bugs and glitches within the game's functionality
    or graphics. They may evaluate the capacity of attraction and playability of games.
    They may also debug the games themselves.
- uri: http://data.europa.eu/esco/occupation/3b1ea27c-781c-41eb-821f-214285260dd2
  preferred_label: ICT change and configuration manager
  isco_code: '2519'
  code: '2519.3'
  description: ICT change and configuration managers organise and implement a process
    to manage changes throughout the lifecycle of ICT assets such as software, applications,
    ICT systems, etc. ICT change and configuration managers have a sound knowledge
    of the main technologies and processes used in system engineering and to manage
    the lifecycle of ICT systems and subsystems.
- uri: http://data.europa.eu/esco/occupation/50af07f0-7a75-424e-a66d-5a9deea10f4c
  preferred_label: ICT accessibility tester
  isco_code: '2519'
  code: 2519.7.2
  description: ICT accessibility testers evaluate websites, software applications,
    systems or user interface components with regards to friendliness, operability
    of the navigation and visibility to all types of users, especially including those
    with special needs or disabilities.
- uri: http://data.europa.eu/esco/occupation/52d5edc9-7902-4cd3-8b06-6bd77c98d440
  preferred_label: ICT system tester
  isco_code: '2519'
  code: 2519.7.4
  description: ICT system testers perform testing activities and some test planning
    activities. They may also debug and repair ICT systems and components although
    this mainly corresponds to designers and developers. They ensure that all systems
    and components function properly before delivering them to internal and external
    clients.
- uri: http://data.europa.eu/esco/occupation/5f50290d-f520-4a69-85c7-1390d2a4a8b6
  preferred_label: ICT usability tester
  isco_code: '2519'
  code: 2519.7.5
  description: ICT usability testers ensure compliance with requirements and strive
    for optimal usability within the software engineering cycle phases (analysis,
    design, implementation, and deployment). They also work closely with users (analysts)
    to research for and document user profiles, analyse tasks, workflows, and user
    scenarios.
- uri: http://data.europa.eu/esco/occupation/7086d0ca-1e77-4690-89c9-7ed1a0478fa3
  preferred_label: data quality specialist
  isco_code: '2519'
  code: '2519.1'
  description: Data quality specialists review organisation's data for accuracy, recommend
    enhancements to record systems and data acquisition processes and assess referential
    and historical integrity of data. They also develop documents and maintain data
    quality goals and standards and oversee an organisation's data privacy policy
    and monitor compliance of data flows against data quality standards.
- uri: http://data.europa.eu/esco/occupation/731f38f1-b08f-4dd5-a25e-f8627c038273
  preferred_label: ICT integration tester
  isco_code: '2519'
  code: 2519.7.3
  description: ICT integration testers perform tests in groups of system components,
    units or even applications. They group them in larger aggregates and apply integration
    test plans on them. They oversee the complexity of relations between different
    components.
- uri: http://data.europa.eu/esco/occupation/76a1a76c-b014-4600-8901-56cb936de7ed
  preferred_label: ICT auditor manager
  isco_code: '2519'
  code: '2519.2'
  description: ICT auditor managers monitor ICT auditors responsible for auditing
    information systems, platforms, and operating procedures in accordance with established
    corporate standards for efficiency, accuracy and security. They evaluate ICT infrastructure
    in terms of risk to the organisation and establish controls to mitigate loss.
    They determine and recommend improvements in the current risk management controls
    and in the implementation of system changes or upgrades.
- uri: http://data.europa.eu/esco/occupation/a28dff76-74df-46ee-929f-d1fffbb63cd7
  preferred_label: ICT quality assurance manager
  isco_code: '2519'
  code: '2519.5'
  description: ICT quality assurance managers establish and operate an ICT quality
    approach through quality management systems, in compliance with internal and external
    standards and the organisation's culture. They ensure that the management controls
    are correctly implemented to safeguard asset, data integrity and operations. They
    focus on the achievement of quality goals, including the maintenance of the external
    certification according to quality standards and monitor statistics to forecast
    quality outcomes.
- uri: http://data.europa.eu/esco/occupation/1562c7a3-c7d9-419d-b9b6-db26610bcf84
  preferred_label: data warehouse designer
  isco_code: '2521'
  code: '2521.5'
  description: Data warehouse designers are responsible for planning, connecting,
    designing, scheduling, and deploying data warehouse systems. They develop, monitor
    and maintain ETL processes, reporting applications and data warehouse design.
- uri: http://data.europa.eu/esco/occupation/3d190639-90f8-4402-b1b3-a104a17e0d67
  preferred_label: database integrator
  isco_code: '2521'
  code: '2521.4'
  description: Database integrators perform integration among different databases.
    They maintain integration and ensure interoperability.
- uri: http://data.europa.eu/esco/occupation/8c57af09-719c-42b3-be40-6ed4946236cc
  preferred_label: database administrator
  isco_code: '2521'
  code: '2521.1'
  description: Database administrators test, implement and administer computer databases.
    They use their expertise in database management systems to plan, coordinate and
    implement security measures to safeguard computer databases. They also use scripts
    and configuration files to tailor a database to users' needs.
- uri: http://data.europa.eu/esco/occupation/8d9ec84d-cf2d-4179-87bc-335cda54a427
  preferred_label: database designer
  isco_code: '2521'
  code: '2521.2'
  description: Database designers specify the database's logical structure, processes,
    and information flows. They design data models and databases to serve data acquisition.
- uri: http://data.europa.eu/esco/occupation/b11e1742-5e28-4270-b081-b0193d85ee7d
  preferred_label: database developer
  isco_code: '2521'
  code: '2521.3'
  description: Database developers program, implement and coordinate changes to computer
    databases based on their expertise of database management systems.
- uri: http://data.europa.eu/esco/occupation/81480b40-a318-47f3-9b2c-56b69ed67d95
  preferred_label: ICT network administrator
  isco_code: '2522'
  code: 2522.1.1
  description: ICT network administrators maintain operation of a reliable, secure,
    and efficient data communications network, including LAN, WAN, intranet, and internet.
    They perform network address assignment, management and implementation of routing
    protocols such as ISIS, OSPF, BGP, routing table configurations and certain implementations
    of authentication. They perform maintenance and administration of servers (file
    servers, VPN gateways, intrusion detection systems), desktop computers, printers,
    routers, switches, firewalls, phones, IP communications, personal digital assistants,
    smartphones, software deployment, security updates and patches as well as a vast
    array of additional technologies inclusive of both hardware and software.
- uri: http://data.europa.eu/esco/occupation/98c3d8f8-e3a8-49b7-9e58-236f25a6f6a0
  preferred_label: system configurator
  isco_code: '2522'
  code: 2522.1.2
  description: System configurators tailor a computer system to the organisation's
    and users' needs. They adjust the base system and software to the needs of the
    customer. They perform configuration activities and scripting and ensure communication
    with users.
- uri: http://data.europa.eu/esco/occupation/9e2e6e1e-363b-4e1b-a673-7bc0f7343300
  preferred_label: ICT system administrator
  isco_code: '2522'
  code: '2522.1'
  description: ICT system administrators are responsible for the upkeep, configuration,
    and reliable operation of computer and network systems, servers, workstations
    and peripheral devices. They may acquire, install, or upgrade computer components
    and software; automate routine tasks; write computer programs; troubleshoot; train
    and supervise staff; and provide technical support. They ensure optimum system
    integrity, security, backup and performance.
- uri: http://data.europa.eu/esco/occupation/4543bf7b-8ffb-4ade-88b9-58da34366f04
  preferred_label: ICT capacity planner
  isco_code: '2523'
  code: '2523.1'
  description: ICT capacity planners ensure that the capacity of ICT services and
    ICT infrastructure is able to deliver agreed service level targets in a cost effective
    and timely manner. They also consider all resources required to deliver the appropriate
    ICT service, and plan for short, medium, and long term business requirements.
- uri: http://data.europa.eu/esco/occupation/cf2b03cd-feb7-4f47-90f6-ff1ed6016d3d
  preferred_label: ICT network engineer
  isco_code: '2523'
  code: '2523.3'
  description: ICT network engineers implement, maintain and support computer networks.
    They also perform network modelling, analysis, and planning. They may also design
    network and computer security measures. They may research and recommend network
    and data communications hardware and software.
- uri: http://data.europa.eu/esco/occupation/e0b544dd-b621-4126-a55e-054af25c6ea0
  preferred_label: ICT network architect
  isco_code: '2523'
  code: '2523.2'
  description: ICT network architects design the topology and connectivity of ICT
    network such as hardware, infrastructure, communication and hardware components.
- uri: http://data.europa.eu/esco/occupation/0464b062-cea6-4164-b10d-956c61956ae7
  preferred_label: ICT security administrator
  isco_code: '2529'
  code: '2529.6'
  description: ICT security administrators plan and carry out security measures to
    protect information and data from unauthorised access, deliberate attack, theft
    and corruption.
- uri: http://data.europa.eu/esco/occupation/0c448a27-10ec-43ba-b880-d9938bade424
  preferred_label: digital forensics expert
  isco_code: '2529'
  code: '2529.2'
  description: Digital forensics experts retrieve and analyse information from computers
    and other types of data storage devices. They examine digital media that may have
    been hidden, encrypted or damaged, in a forensic manner with the aim to identify,
    preserve, recover, analyse and present facts and opinions about the digital information.
- uri: http://data.europa.eu/esco/occupation/0ce5a9f4-e00a-4bbe-b255-3c63407167a4
  preferred_label: cyber incident responder
  isco_code: '2529'
  code: '2529.7'
  description: Cyber incident responders monitor and assess cybersecurity state systems,
    analysing, evaluating, and mitigating the impact of cybersecurity incidents. Moreover,
    they identify malicious actors and cyber incidents root causes. According to the
    organisation’s Incident Response Plan, they restore systems and process functionalities
    to an operational state, collecting evidence and documenting actions taken.
- uri: http://data.europa.eu/esco/occupation/1c5a896a-e010-4217-a29a-c44db26e25da
  preferred_label: embedded systems security engineer
  isco_code: '2529'
  code: '2529.3'
  description: Embedded systems security engineers advise and implement solutions
    to control access to data and programs in embedded and connected systems. They
    help ensuring the safe operation of products with embedded systems and connected
    devices by being responsible for the protection and security of the related systems
    and design, plan and execute security measures accordingly. Embedded systems security
    engineers help to keep attackers at bay by implementing safeguards that prevent
    intrusions and breaches.
- uri: http://data.europa.eu/esco/occupation/276ba420-ef09-4a0e-b215-2c2e2f80ad28
  preferred_label: chief ICT security officer
  isco_code: '2529'
  code: '2529.1'
  description: Chief ICT security officers protect company and employee information
    against unauthorized access. They also define the Information System security
    policy, manage security deployment across all Information Systems and ensure the
    provision of information availability.
- uri: http://data.europa.eu/esco/occupation/76ef0a87-6afe-4560-b5d0-9a086abe45c5
  preferred_label: ethical hacker
  isco_code: '2529'
  code: '2529.4'
  description: Ethical hackers perform security vulnerability assessments and penetration
    tests in accordance with industry-accepted methods and protocols. They analyse
    systems for potential vulnerabilities that may result from improper system configuration,
    hardware or software flaws, or operational weaknesses.
- uri: http://data.europa.eu/esco/occupation/7754d570-9519-48c2-b1c9-8e165f8bca0f
  preferred_label: cybersecurity risk manager
  isco_code: '2529'
  code: '2529.8'
  description: Cybersecurity risk managers identify, analyse, assess, estimate and
    mitigate cybersecurity-related risks of ICT infrastructures such as systems or
    services. They manage these aspects by planning risk analysis, applying, reporting,
    assessing, communicating, and treating them. They establish a risk management
    strategy for the organisation and ensure that risks remain at an acceptable level
    for the organisation by selecting mitigation actions and controls.
- uri: http://data.europa.eu/esco/occupation/812c217d-32b7-4f6a-9faf-993d3577ac7f
  preferred_label: knowledge engineer
  isco_code: '2529'
  code: '2529.9'
  description: Knowledge engineers integrate structured knowledge into computer systems
    (knowledge bases) in order to solve complex problems normally requiring a high
    level of human expertise or artificial intelligence methods. They are also responsible
    for eliciting or extracting knowledge from information sources, maintaining this
    knowledge, and making it available to the organisation or users. To achieve this,
    they are aware of knowledge representation and maintenance techniques (rules,
    frames, semantic nets, ontologies) and use knowledge extraction techniques and
    tools. They can design and build expert or artificial intelligence systems that
    use this knowledge.
- uri: http://data.europa.eu/esco/occupation/a99b38bc-6e71-4bef-b127-0f2b5e357815
  preferred_label: ICT resilience manager
  isco_code: '2529'
  code: '2529.5'
  description: ICT resilience managers research, plan and develop models, policies,
    methods, techniques and tools that enhance an organisation's cyber security, resilience
    and disaster recovery.
- uri: http://data.europa.eu/esco/occupation/974d4eab-fbee-4c52-b16e-73bdd8c25b53
  preferred_label: lawyer
  isco_code: '2611'
  code: '2611.1'
  description: Lawyers provide legal advice to clients and act on their behalf in
    legal proceedings and in compliance with the law. They research for, interpret
    and study cases to represent their clients in a variety of settings such as courts
    and administrative boards. They create arguments on behalf of their clients for
    lawsuits in different contexts with the aim of finding a legal remedy.
- uri: http://data.europa.eu/esco/occupation/acf462a3-9c34-46cb-952a-c612c38299f4
  preferred_label: prosecutor
  isco_code: '2611'
  code: 2611.1.2
  description: Prosecutors represent governmental bodies and the general public in
    court cases against parties accused of illegal activity. They investigate the
    court cases by examining evidence, interviewing involved parties, and interpreting
    the law. They use the results of their investigation in order to present the case
    during court hearings, and to construct persuasive arguments in order to ensure
    the outcome is the most favourable for the parties they represent.
- uri: http://data.europa.eu/esco/occupation/fdfce14e-992d-4ff4-9f9d-7a353c75654e
  preferred_label: corporate lawyer
  isco_code: '2611'
  code: 2611.1.1
  description: Corporate lawyers provide legal consulting services and representation
    to corporations and organisations. They give advice on matters relating to taxes,
    legal rights and patents, international trade, trademarks, and legal financial
    issues arising from operating a business.
- uri: http://data.europa.eu/esco/occupation/07bd65d7-c13f-443a-bdf6-88903f3822be
  preferred_label: judge
  isco_code: '2612'
  code: '2612.1'
  description: Judges preside over, review and handle court cases, hearings, appeals
    and trials. They ensure that court procedures conform to conventional legal processes
    and review evidence and juries. Judges preside over cases involving such areas
    as crime, family issues, civil law, small claims and juvenile offenses.
- uri: http://data.europa.eu/esco/occupation/353c19d6-62d6-4dfc-85e9-f59d219d457c
  preferred_label: supreme court judge
  isco_code: '2612'
  code: 2612.1.1
  description: Supreme court judges preside in high courts, dealing with complex criminal
    and civil cases. They examine the case during trials in order to formulate a sentence
    or to direct a jury in reaching a conclusion, and decide on any punishments if
    an offending party is found guilty. They rule proceedings and ensure the trial
    is held in a fair manner compliant with legislation.
- uri: http://data.europa.eu/esco/occupation/1619d7f3-7d95-407c-a20e-47745bfcde73
  preferred_label: data protection officer
  isco_code: '2619'
  code: '2619.4'
  description: Data protection officers ensure that the processing of personal data
    in an organisation is compliant with data protection standards and with the obligations
    set out in the applicable legislation such as GDPR. They elaborate and implement
    the organisation policy related to data protection, are responsible for data protection
    impact assessments and handle complaints and requests from third parties and regulatory
    agencies. Data protection officers lead investigations into potential data breaches,
    conduct internal audits and act as point of contact within the organisation on
    any matters related to the processing of personal data. Data protection officers
    may develop training programmes and provide training to other employees on data
    protection procedures.
- uri: http://data.europa.eu/esco/occupation/246dda29-70f6-408b-b205-aa17b2ffb168
  preferred_label: election observer
  isco_code: '2619'
  code: '2619.5'
  description: Election observers are skilled and trained spectators of the elections
    in a functioning democracy in order to enhance the transparency and credibility
    of the observed elections.
- uri: http://data.europa.eu/esco/occupation/2c9939ef-ebab-4111-8f27-605ae8782791
  preferred_label: contract manager
  isco_code: '2619'
  code: '2619.1'
  description: Contract managers oversee the respect of awarded contracts to ensure
    that services are delivered as foreseen and that each step of the delivery is
    properly documented. They act as the main point of contact for suppliers on contractual
    matters and report back to their leadership. They implement financial and operational
    controls and ensure compliance with all reporting requirements.
- uri: http://data.europa.eu/esco/occupation/31854d78-3615-43a4-aa3a-c597ecb20ceb
  preferred_label: legal consultant
  isco_code: '2619'
  code: '2619.7'
  description: Legal consultants advise a varied array of clients ranging from business,
    individuals, up to legal firms. They provide legal advisory outside courtrooms
    in relation to legal affairs which depend on the nature of the client. They advise
    in matters such as merging of multinationals, housing purchase, modification of
    contracts and its implications. They help clients in general to abide by the regulations
    and avoid committing illegal acts.
- uri: http://data.europa.eu/esco/occupation/403be630-8d1e-43b7-9f07-098aca5bb689
  preferred_label: mediator
  isco_code: '2619'
  code: '2619.9'
  description: Mediators resolve disputes between two parties by examining the case,
    interviewing both parties, and advising on a solution which would be the most
    beneficial for them. They listen to both parties in order to facilitate communication
    and find a fair agreement and organise meetings. They aim at resolving disputes
    through dialogue and alternative solution without having to take the case to litigation
    and courts. Mediators ensure that the resolution is compliant with legal regulations
    and is also enforced.
- uri: http://data.europa.eu/esco/occupation/666846b2-01ce-43f6-8cb7-f3be09fac4a2
  preferred_label: ombudsman
  isco_code: '2619'
  code: '2619.11'
  description: Ombudsmen resolve disputes between two parties where there is a power
    imbalance, as an impartial mediator. They interview the parties involved and investigate
    the case in order to come to a resolution beneficial to both parties. They advise
    on conflict resolution and offer support to clients. The claims are mostly against
    public institutions and authorities.
- uri: http://data.europa.eu/esco/occupation/76884a72-d8b8-4819-bd40-71d6420a9a42
  preferred_label: court jury coordinator
  isco_code: '2619'
  code: '2619.3'
  description: Court jury coordinators aid lawyers in the preparation of the trial
    by researching jury members. They aid in the development of trial strategies,
    analyse the jury's behaviour during a trial, and advise lawyers on proceedings.
    They also assist in preparing witnesses and constructing arguments.
- uri: http://data.europa.eu/esco/occupation/779d13be-60b4-48f3-a339-fe483be96c7f
  preferred_label: regulatory affairs manager
  isco_code: '2619'
  code: '2619.12'
  description: Regulatory affairs managers are in charge of regulatory and legal affairs
    in several sectors such as the healthcare, energy and banking industries. They
    oversee the development of products and services from inception to market release
    by making sure everything complies with the local legislation and meets regulatory
    requirements. They have experience in the different phases of regulatory processes
    and act as an interface between business and government legislation or regulatory
    boards.
- uri: http://data.europa.eu/esco/occupation/7b89d3e0-c6fb-4c95-bf0d-3b4acf05f9d6
  preferred_label: legislative drafter
  isco_code: '2619'
  code: '2619.8'
  description: Legislative drafters research pieces of legislations and edit them
    in order to make them stronger and more clear. Rarely they also add new ideas
    which have never been incorporated into a law or a bill before.
- uri: http://data.europa.eu/esco/occupation/8801ef16-92a4-4889-8f80-9b78206c7ec0
  preferred_label: human rights officer
  isco_code: '2619'
  code: '2619.6'
  description: Human rights officers investigate and handle human rights violations,
    as well as develop plans to reduce violations and to ensure compliance to human
    rights legislation. They investigate complaints by examining information and interviewing
    victims and perpetrators, and communicate with organisations involved with human
    rights activities.
- uri: http://data.europa.eu/esco/occupation/c6c48286-2037-47e3-a132-b745dce858e2
  preferred_label: coroner
  isco_code: '2619'
  code: '2619.2'
  description: Coroners oversee the examination of deceased individuals in order to
    determine the cause of death in uncommon circumstances. They ensure records are
    maintained of the deaths within their jurisdiction, and facilitate communication
    with other officials to ensure the investigation is complete.
- uri: http://data.europa.eu/esco/occupation/d21890a3-cbe9-49df-9a19-a4120d866548
  preferred_label: notary
  isco_code: '2619'
  code: '2619.10'
  description: Notaries ensure the authenticity and legitimacy of official documents
    such as declarations, certificates, contracts, deeds and purchases. They examine
    the documents, witness the signing and authenticate them. They administer oaths
    and affirmations and perform other acts of notarisation.
- uri: http://data.europa.eu/esco/occupation/691d30cc-6b2c-4025-89b4-3e719fe664c7
  preferred_label: exhibition curator
  isco_code: '2621'
  code: '2621.6'
  description: Exhibition curators organise and display artworks and artefacts. They
    work in and for museums, art galleries, museums for science or history, libraries
    and archives, and in other cultural institutions. In general, exhibition curators
    work in artistic and cultural exhibition fields and events of all kinds.
- uri: http://data.europa.eu/esco/occupation/7556c748-15b4-4e44-97d9-00d885d4cd7d
  preferred_label: conservator
  isco_code: '2621'
  code: '2621.3'
  description: Conservators organise and valorise works of art, buildings, books and
    furniture. They work in a wide range of areas such as creating and implementing
    new collections of art, preserving heritage buildings by applying restoration
    techniques as well as foreseeing the conservation of literary works, films, and
    valuable objects.
- uri: http://data.europa.eu/esco/occupation/8f324afc-6ae8-48f5-af68-0fac08024fd1
  preferred_label: exhibition registrar
  isco_code: '2621'
  code: '2621.7'
  description: Exhibition registrars organise, manage and document movement of museum
    artefacts to and from storage, display and exhibitions. This happens in collaboration
    with private or public partners such as art transporters, insurers and restorers,
    within the museum and outside.
- uri: http://data.europa.eu/esco/occupation/96be6ac3-5932-4bfc-933d-84b267d0d486
  preferred_label: collection manager
  isco_code: '2621'
  code: '2621.2'
  description: Collection managers ensure the care and preservation of objects within
    cultural institutions, like museums, libraries, and archives. Collection managers,
    along with exhibition curators, and conservators, play a very important role in
    collections care. They can be found in most large museums.
- uri: http://data.europa.eu/esco/occupation/a63733fa-f7ff-4733-8961-1ec4eeaab00b
  preferred_label: museum scientist
  isco_code: '2621'
  code: '2621.8'
  description: Museum scientists perform and/or manage the curatorial, preparatory
    and clerical work in general museums, botanical gardens, art galleries, fine arts
    related collections, aquariums or similar areas. They manage the collections of
    natural, historical and anthropological material that is educational, scientific
    or aesthetic in purpose.
- uri: http://data.europa.eu/esco/occupation/b9b47087-6045-405d-b769-6a0c94e2eb84
  preferred_label: cultural visitor services manager
  isco_code: '2621'
  code: '2621.5'
  description: Cultural visitor services managers are in charge of all programmes,
    activities, studies and research concerning the presentation of the cultural venue's
    artefacts or programme to current and prospective visitors.
- uri: http://data.europa.eu/esco/occupation/e3b08984-19fe-4d51-a1b0-990676fc7234
  preferred_label: archivist
  isco_code: '2621'
  code: '2621.1'
  description: Archivists assess, collect, organise, preserve and provide access to
    records and archives. Records maintained are in any format, analogue or digital
    and include several kinds of media (documents, photographs, video and sound recordings,
    etc.).
- uri: http://data.europa.eu/esco/occupation/e7417f4f-7072-4b07-a71f-71f6fc7f5e5b
  preferred_label: zoo registrar
  isco_code: '2621'
  code: '2621.9'
  description: Zoo registrars are responsible for the maintenance of a wide variety
    of records relating to animals and their care in zoological collections. This
    includes both historic and current records. They have the responsibiltity to collate
    records into an organised and recognised records keeping system. In most cases
    this also involves submitting regular reports to regional or international species
    information systems and/or as part of managed breeding programmes i.e. zoo registrars
    are usually responsible for both internal and external management if institutional
    records . Zoo registrars also often coordinate animal transportation for the zoological
    collection.
- uri: http://data.europa.eu/esco/occupation/fb022de4-920a-4eb0-80f9-fbb8ecfc36b1
  preferred_label: cultural archive manager
  isco_code: '2621'
  code: '2621.4'
  description: Cultural archive managers ensure the care and preservation of a cultural
    institution and the archives within. They ensure the management and development
    of the institution’s assets and collections, including the digitisation of the
    archive collections.
- uri: http://data.europa.eu/esco/occupation/3765a20d-5160-4e8f-82f1-ad7872b9db24
  preferred_label: information manager
  isco_code: '2622'
  code: '2622.1'
  description: Information managers are responsible for systems that provide information
    to people. They assure access to the information in different work environments
    (public or private) based on theoretical principles and hands-on capabilities
    in storing, retrieving and communicating information.
- uri: http://data.europa.eu/esco/occupation/60f7eb23-a7ea-4cbe-98a5-1248291f62d5
  preferred_label: librarian
  isco_code: '2622'
  code: '2622.2'
  description: Librarians manage libraries and perform related library services. They
    manage, collect and develop information resources. They make information available,
    accessible and discoverable to any kind of user.
- uri: http://data.europa.eu/esco/occupation/12ff7f9c-c5b5-4d4a-b585-c350dd1400eb
  preferred_label: business economics researcher
  isco_code: '2631'
  code: 2631.2.1
  description: Business economics researchers conduct research on topics regarding
    economy, organisations, and strategy. They analyse macroeconomic and microeconomic
    trends and use this information to analyse the positions of industries or specific
    companies in the economy. They provide advice regarding strategic planning, product
    feasibility, forecast trends, emerging markets, taxing policies, and consumer
    trends.
- uri: http://data.europa.eu/esco/occupation/394a4bdd-7032-4d87-89a2-9d937cebdd09
  preferred_label: economic policy officer
  isco_code: '2631'
  code: '2631.1'
  description: Economic policy officers develop economic strategies. They monitor
    aspects of economics such as competitiveness, innovation and trade. Economic policy
    officers contribute to the development of economic policies, projects and programs.
    They research, analyse and assess public policy problems and recommend appropriate
    actions.
- uri: http://data.europa.eu/esco/occupation/56afc09a-75a0-49c7-a5cb-256df45d8f2d
  preferred_label: economic adviser
  isco_code: '2631'
  code: 2631.2.2
  description: Economic advisers research economic developments and advise on economic
    problems. They forecast trends and behaviour in economics, and advise on finance,
    trade, fiscal and other related matters. They advise companies and organisations
    on techniques to gain economic profit.
- uri: http://data.europa.eu/esco/occupation/99492920-e5a5-4dba-9e5a-93193147198c
  preferred_label: economist
  isco_code: '2631'
  code: '2631.2'
  description: Economists perform research and develop theories in the field of economics,
    whether for microeconomic or macroeconomic analysis. They study trends, analyse
    statistical data, and to some extent work with economic mathematical models in
    order to advise companies, governments, and related institutions. They advise
    on product feasibility, trend forecasts, emerging markets, tax policies, and consumer
    trends.
- uri: http://data.europa.eu/esco/occupation/9e1e8379-6377-4969-b141-0d2337218fc9
  preferred_label: economic development coordinator
  isco_code: '2631'
  code: 2631.2.3
  description: Economic development coordinators outline and implement policies for
    the improvement of a community's, government's or institution's economic growth
    and stability. They research economic trends and coordinate cooperation between
    institutions working in economic development. They analyse potential economic
    risks and conflicts and develop plans to resolve them. Economic development coordinators
    advise on the economic sustainability of institutions and economic growth.
- uri: http://data.europa.eu/esco/occupation/b3e459a2-0103-4182-8882-c255d474a7ff
  preferred_label: tax policy analyst
  isco_code: '2631'
  code: 2631.2.4
  description: Tax policy analysts research and develop taxation policies and legislation
    in order to improve and develop tax policies. They advise official bodies on policy
    implementation and financial operations, as well as forecast financial influence
    of changes in tax policies.
- uri: http://data.europa.eu/esco/occupation/0611f232-b30e-46c7-9c26-2d59b1448e79
  preferred_label: criminologist
  isco_code: '2632'
  code: '2632.4'
  description: Criminologists study conditions pertaining to humans such as the social
    and psychological aspects that could lead them to commit criminal acts. They observe
    and analyse different factors ranging from behavioural conditions up to social
    background and environment of suspects in order to advise organisations on the
    prevention of crime.
- uri: http://data.europa.eu/esco/occupation/11df8941-508c-4103-ad40-52cdf9430a59
  preferred_label: sociologist
  isco_code: '2632'
  code: '2632.6'
  description: Sociologists focus their research on explaining social behaviour and
    the way people have organised themselves as a society. They research and explain
    the way societies have evolved by describing their legal, political, and economic
    systems and their cultural expressions.
- uri: http://data.europa.eu/esco/occupation/19db5ad1-ffbf-41a0-8746-d3878f0d5dbd
  preferred_label: media scientist
  isco_code: '2632'
  code: 2632.1.2
  description: Media scientists research the role and impact that media has on the
    society. They observe and document the usage of different kinds of media such
    as newspapers, radio and TV and the response from society.
- uri: http://data.europa.eu/esco/occupation/203ea2ee-bbee-4aaf-83d7-2f2225f916e3
  preferred_label: archaeologist
  isco_code: '2632'
  code: '2632.2'
  description: Archaeologists research and study past civilisations and settlements
    through collecting and inspecting material remains. They analyse and draw conclusions
    on a wide array of matters such as hierarchy systems, linguistics, culture, and
    politics based on the study of objects, structures, fossils, relics, and artifacts
    left behind by these peoples. Archaeologists utilise various interdisciplinary
    methods such as stratigraphy, typology, 3D analysis, mathematics, and modelling.
- uri: http://data.europa.eu/esco/occupation/3af4d6be-90b5-41f6-be06-3330dab3df73
  preferred_label: social work researcher
  isco_code: '2632'
  code: 2632.6.1
  description: Social work researchers manage research projects aiming to investigate
    and provide reports on social issues. They first perform research by gathering
    information through interviews, focus groups and questionnaires; followed by organising
    and analysing the gathered information using computer software packages. They
    analyse social problems and needs, and the different ways and techniques to respond
    to them.
- uri: http://data.europa.eu/esco/occupation/441a5b76-2f51-4704-9df7-3b8e715dd3ad
  preferred_label: behavioural scientist
  isco_code: '2632'
  code: '2632.3'
  description: Behavioural scientists research, observe and describe human behaviour
    in society. They draw conclusions on the motives that stir actions in humans,
    observe the various circumstances for different behaviours, and describe different
    personalities. They advise organisations and governmental institutions on this
    field. They may also analyse the behaviour of animals.
- uri: http://data.europa.eu/esco/occupation/6cd08cbe-7611-4d70-8886-6c59c0385442
  preferred_label: communication scientist
  isco_code: '2632'
  code: 2632.1.1
  description: Communication scientists research the different aspects of the planning,
    collecting, creating, organizing, preserving, using, evaluating and exchanging
    information through verbal or non-verbal communication. They study the interactions
    between groups, individuals, and individuals with technologies (robots).
- uri: http://data.europa.eu/esco/occupation/9851c83c-5670-4da0-964a-1ef0e682e30b
  preferred_label: thanatology researcher
  isco_code: '2632'
  code: '2632.7'
  description: Thanatology researchers study death and the dying in a variety of scientific
    fields such as psychology, sociology, physiology and anthropology. They contribute
    to the growth of knowledge on aspects of death such as the psychological phenomena
    the dying and those around them are experiencing.
- uri: http://data.europa.eu/esco/occupation/acf69cab-8629-45c8-ae10-c8fb15f474b6
  preferred_label: anthropologist
  isco_code: '2632'
  code: '2632.1'
  description: Anthropologists research all aspects of life pertaining to humans.
    They study the various civilisations that have existed along the time and their
    ways of organisation. They attempt to analyse the physical, societal, linguistic,
    political, economical, philosophical, and cultural aspects of different people.
    The aim of their studies is to understand and describe the past of humanity and
    solve topical societal problems. They explore different perspectives such as philosophical
    anthropology.
- uri: http://data.europa.eu/esco/occupation/bac64fa2-dcd6-47bb-8e5c-04e04a86a199
  preferred_label: geographer
  isco_code: '2632'
  code: '2632.5'
  description: Geographers are scholars who study human and physical geography. Depending
    on their specialisation, they study political, economical and cultural aspects
    of humanity contained within human geography. Moreover, they study land formations,
    soils, natural frontiers, and water flows contained in physical geography.
- uri: http://data.europa.eu/esco/occupation/0cd729a6-ed11-4338-ac4b-d4b924390128
  preferred_label: historian
  isco_code: '2633'
  code: '2633.1'
  description: Historians research, analyze, interpret, and present the past of human
    societies. They analyse documents, sources, and traces from the past in order
    to understand the past societies.
- uri: http://data.europa.eu/esco/occupation/4f89b0d2-b666-4890-af01-25d1d60da1f3
  preferred_label: political scientist
  isco_code: '2633'
  code: '2633.3'
  description: Political scientists study political behaviour, activity and systems,
    including the elements that fall therein. Their study of the field ranges from
    the origins and evolution of various political systems to topical matters such
    as decision-making processes, political behaviour, political trends, society,
    and power perspectives. They advise governments and institutional organisations
    on governance matters.
- uri: http://data.europa.eu/esco/occupation/5f45a1ea-4d1b-43c3-b6a8-53b2276b3eb3
  preferred_label: genealogist
  isco_code: '2633'
  code: 2633.1.1
  description: Genealogists trace history and lineages of families. The results of
    their effort are displayed in a table of the descent from person to person which
    forms a family tree or they are written as narratives. Genealogists use analysis
    of public records, informal interviews, genetic analysis, and other methods to
    gain input information.
- uri: http://data.europa.eu/esco/occupation/bfc92738-128b-44f5-92d4-51b10df17961
  preferred_label: philosopher
  isco_code: '2633'
  code: '2633.2'
  description: Philosophers study and argument over general and structural problems
    pertaining to society, humans and individuals. They have well-developed rational
    and argumentative abilities to engage in discussion related to existence, value
    systems, knowledge, or reality. They recur to logic in discussion which lead to
    levels of deepness and abstraction.
- uri: http://data.europa.eu/esco/occupation/4f5bc9a5-e989-409b-bfb5-973b472163cd
  preferred_label: educational psychologist
  isco_code: '2634'
  code: 2634.2.2
  description: Educational psychologists are psychologists employed by educational
    institutions to provide psychological and emotional support to students in need.
    They are specialised in the provision of direct support and interventions to students,
    conducting psychological testing and assessment, and consulting with families,
    teachers and other school-based student support professionals, such as school
    social workers and educational counsellors, about the students. They may also
    work with the school administration to improve practical support strategies in
    order to improve the students' well-being.
- uri: http://data.europa.eu/esco/occupation/52ded7d7-11df-42e3-b90a-d7f4b70fb4b9
  preferred_label: psychologist
  isco_code: '2634'
  code: '2634.2'
  description: Psychologists study the behaviour and mental processes in humans. They
    provide services to clients who deal with mental health issues and life issues
    such as bereavement, relationship difficulties, domestic violence, and sexual
    abuse. They also provide counselling for mental health issues such as eating disorders,
    post-traumatic stress disorders, and psychosis in order to help the clients rehabilitate
    and reach a healthy behaviour.
- uri: http://data.europa.eu/esco/occupation/7d9e2a65-758c-4cbd-b66d-3a595d3d63b1
  preferred_label: polygraph examiner
  isco_code: '2634'
  code: '2634.1'
  description: Polygraph examiners prepare individuals for polygraph testing, conduct
    the polygraph exam and interpret the results. They pay close attention to detail
    and use a range of instruments to monitor respiratory, sweat and cardiovascular
    responses to questions addressed during the process. Polygraph examiners write
    reports on the basis of the results and can provide courtroom testimony.
- uri: http://data.europa.eu/esco/occupation/976c7f50-7f9e-4347-bbb9-f0dc842046a3
  preferred_label: health psychologist
  isco_code: '2634'
  code: 2634.2.3
  description: Health psychologists deal with the various aspects of health related
    behaviour of individuals and groups, by helping individuals or groups prevent
    illness and promote healthy behaviours by also providing counseling services.
    They perform tasks for the development of health promotion activities and projects
    on the basis of psychological science, research findings, theories, methods and
    techniques. They also engage in research about health related issues to influence
    public policy on health care issues.
- uri: http://data.europa.eu/esco/occupation/af69484e-b43f-4685-b22d-f3418df45c4d
  preferred_label: psychotherapist
  isco_code: '2634'
  code: 2634.2.4
  description: Psychotherapists assist and treat healthcare users with varying degrees
    of psychological, psychosocial, or psychosomatic behavioural disorders and pathogenic
    conditions by means of psychotherapeutic methods. They promote personal development
    and well-being and provide advice on improving relationships, capabilities, and
    problem-solving techniques. They use science-based psychotherapeutic methods such
    as behavioural therapy, existential analysis and logotherapy, psychoanalysis or
    systemic family therapy in order to guide the patients in their development and
    help them search for appropriate solutions to their problems. Psychotherapists
    are not required to have academic degrees in psychology or a medical qualification
    in psychiatry. It is an independent occupation from psychology, psychiatry, and
    counselling.
- uri: http://data.europa.eu/esco/occupation/c3c8c56c-b3ab-4425-a38a-abcace020d22
  preferred_label: clinical psychologist
  isco_code: '2634'
  code: 2634.2.1
  description: Clinical psychologists diagnose, rehabilitate, and support individuals
    affected by mental, emotional, and behavioural disorders and problems as well
    as mental changes and pathogenic conditions through use of cognitive tools and
    appropriate intervention. They use clinical psychological resources on the basis
    of psychological science, its findings, theories, methods, and techniques for
    the investigation, interpretation, and prediction of human experience and behaviour.
- uri: http://data.europa.eu/esco/occupation/094e04fd-3039-4615-850b-b232794f84f5
  preferred_label: youth information worker
  isco_code: '2635'
  code: 2635.3.27.1
  description: Youth information workers deliver youth information, guidance and counselling
    services in a variety of settings in order to empower young people and support
    their wellbeing and autonomy. They ensure that those services are accessible,
    resourced and welcoming for young people and run activities aimed at reaching
    the entire youth population, by means that are effective and appropriate for different
    groups and needs. Youth information workers aim to enable young people to make
    their own informed choices and become active citizens. They work in close partnership
    with other services.
- uri: http://data.europa.eu/esco/occupation/0d423a2e-6fb7-4704-8544-bd6c522b3c62
  preferred_label: child care social worker
  isco_code: '2635'
  code: 2635.3.2
  description: Child care social workers provide social services to children and their
    families in order to improve their social and psychological functioning. They
    aim to maximize family's well-being and protect children from abuse and neglect.
    They assist adoption arrangements and find foster homes where needed.
- uri: http://data.europa.eu/esco/occupation/186ef31e-f26f-4320-a307-c5f95d6cb284
  preferred_label: consultant social worker
  isco_code: '2635'
  code: 2635.3.7
  description: Consultant social workers deliver high quality social work services
    by contributing to the development and improvement of social work and social care
    practice. They contribute to policy development, deliver trainings and focus on
    research in the field of social work practices.
- uri: http://data.europa.eu/esco/occupation/19f6634f-ec0c-4513-b0d9-d43f9ddeb82d
  preferred_label: education welfare officer
  isco_code: '2635'
  code: 2635.3.10
  description: Education welfare officers address the social and psychological well-being
    of students. They counsel students concerning their personal issues that affect
    their school behaviour, performance and social life. These issues may range from
    attention deficit problems, to social and personal issues such as poverty or domestic
    and sexual abuse. Education welfare officers also handle the communication between
    the students, the parents and the school.
- uri: http://data.europa.eu/esco/occupation/3b2229b4-807c-482a-89ca-2d0a542be196
  preferred_label: gerontology social worker
  isco_code: '2635'
  code: 2635.3.14
  description: Gerontology social workers provide assistance to elderly individuals
    and their families helping them to cope with their biopsychosocial needs. They
    help connecting the elderly with community resources by gathering information
    about the array of services available to them. Gerontology social workers assess
    their clients' needs, functional capacity and health problems and liaise with
    medical professionals when necessary.
- uri: http://data.europa.eu/esco/occupation/4b05bef2-ded4-4b09-ab94-f4c6a555a775
  preferred_label: social worker
  isco_code: '2635'
  code: '2635.3'
  description: Social workers are practice-based professionals who promote social
    change and development, social cohesion, and the empowerment and liberation of
    people. They interact with individuals, families, groups, organisations and communities
    in order to provide various forms of therapy and counselling, group work, and
    community work. Social workers guide people to use services to claim benefits,
    access community resources, find jobs and training, obtain legal advice or deal
    with other local authority departments.
- uri: http://data.europa.eu/esco/occupation/4bdc4e52-1c9c-4d80-898a-18522d905fee
  preferred_label: youth offending team worker
  isco_code: '2635'
  code: 2635.3.26
  description: Youth offending team workers support young offenders by preventing
    them from reoffending, counselling them for behavioural changes, referring them
    to agencies that provide housing, helping them back into education, involving
    them in constructive activities, visiting them when located in secure institutions
    and assessing future risks.
- uri: http://data.europa.eu/esco/occupation/4c40c1e8-0584-4a77-8ca3-ec82538f9488
  preferred_label: benefits advice worker
  isco_code: '2635'
  code: 2635.3.1
  description: Benefits advice workers guide individuals in the social work area to
    help them solve specific problems in their personal life by addressing personal
    and relationship issues, inner conflicts, depression and addictions. They attempt
    to empower individuals to achieve change and improve the quality of their life.
    They may also support and advise clients on demanding their social security benefits.
- uri: http://data.europa.eu/esco/occupation/5727b567-993d-4d41-a13d-81a6af1a9a8e
  preferred_label: social counsellor
  isco_code: '2635'
  code: '2635.1'
  description: Social counsellors provide support and guidance to individuals in the
    social work area, to help them solve specific problems in their personal life.
    It involves addressing personal and relationship issues, dealing with inner conflicts,
    crisis moments such as depression and addiction, in an attempt to empower individuals
    to achieve change and improve their life quality.
- uri: http://data.europa.eu/esco/occupation/5d758e75-a116-485a-b800-5db08ffd3ba1
  preferred_label: drug and alcohol addiction counsellor
  isco_code: '2635'
  code: 2635.1.2
  description: Drug and alcohol addiction counsellors provide assistance and counselling
    to individuals and families dealing with drug and alcohol addictions, monitoring
    their progress, advocating for them, performing crisis interventions and group
    therapy. They also assist the persons with the consequences of their addictions
    which can be unemployment, physical or mental disorders and poverty. Drug and
    alcohol addiction counsellors may also prepare educational programs for high-risk
    populations.
- uri: http://data.europa.eu/esco/occupation/6a167ceb-f847-4ef0-af47-89454c53770b
  preferred_label: clinical social worker
  isco_code: '2635'
  code: 2635.3.3
  description: Clinical social workers provide therapy, counselling, and intervention
    services to clients. They treat clients with personal struggles, namely mental
    illness, addiction, and abuse, advocating for them and helping them gain access
    to the necessary resources. They also focus on the impact of medical and public
    health issues within social aspects.
- uri: http://data.europa.eu/esco/occupation/6a6ce738-b049-4521-b402-8e1f346c7eca
  preferred_label: homelessness worker
  isco_code: '2635'
  code: 2635.3.15
  description: Homelessness workers provide on-the-spot assistance, counselling and
    advice to people who have housing problems or live on the streets. They present
    them with services available to homeless people starting from hostel vacancies
    to financial aid services. They may have to cope with persons with mental health
    problems, addictions or victims of domestic or sexual abuse.
- uri: http://data.europa.eu/esco/occupation/6a7212c9-40da-4346-a190-3896bdd9a925
  preferred_label: probation officer
  isco_code: '2635'
  code: 2635.3.21
  description: Probation officers supervise offenders after their release, or who
    were sentenced to penalties outside of incarceration. They write reports providing
    advice on the offender's sentence and analysis concerning possibilities of reoffense.
    They aid the offenders during the rehabilitation and reintegration process and
    ensure the offenders carry out their community service sentence when necessary.
- uri: http://data.europa.eu/esco/occupation/738257d3-7e56-4745-9b2e-014e60d41d48
  preferred_label: hospital social worker
  isco_code: '2635'
  code: 2635.3.16
  description: Hospital social workers provide counselling to patients and their families
    helping them to better cope with the illness, the emotions surrounding diagnosis,
    and with social and financial problems. They work in cooperation with doctors,
    nurses and other health professionals sensitising them on the emotional aspects
    of a patient. They act as link between patients and medical staff. Hospital social
    workers also support the patients and their families with the discharge from the
    hospital.
- uri: http://data.europa.eu/esco/occupation/7591db5b-ee01-4b6b-b626-ddaf892458d4
  preferred_label: crisis situation social worker
  isco_code: '2635'
  code: 2635.3.9
  description: Crisis situation social workers provide emergency support and assistance
    to persons with physical or mental disorders by addressing their distress, impairment,
    and instability. They assess the level of risk, mobilise client resources, and
    stabilise the crisis.
- uri: http://data.europa.eu/esco/occupation/83dc2d94-9e30-493a-bd93-6346e05fe146
  preferred_label: family planning counsellor
  isco_code: '2635'
  code: 2635.1.3
  description: Family planning counsellors provide support and counselling to adults
    and adolescents on issues such as reproduction, contraceptive methods, pregnancy
    or termination of pregnancy, in compliance with the legislation and practices.
    They also provide information about maintaining optimum health practices, sexual
    disease prevention and treatment recommendation referrals, working in collaboration
    with the professional doctors.
- uri: http://data.europa.eu/esco/occupation/85482504-c83d-4038-80d9-265198d18b48
  preferred_label: community care case worker
  isco_code: '2635'
  code: 2635.3.4
  description: Community care case workers perform assessment and care management.
    They organise domiciliary services to support vulnerable adults who are living
    with physical impairment or convalescing, aiming to improve their lives in the
    community and enabling them to live safely and independently at their own home.
- uri: http://data.europa.eu/esco/occupation/90569478-805c-4d14-a1ba-e9c9c4ac2818
  preferred_label: victim support officer
  isco_code: '2635'
  code: 2635.3.25
  description: Victim support officers provide assistance and counselling to people
    who were victim of or have witnessed crimes such as sexual assault, domestic abuse
    or anti-social behaviour. They develop solutions according to the different needs
    and feelings of persons.
- uri: http://data.europa.eu/esco/occupation/95d0a616-a4a9-4f56-a8fb-4de43cdb4c82
  preferred_label: family social worker
  isco_code: '2635'
  code: 2635.3.13
  description: Family social workers provide advice to families about the range of
    social services available to solve their problems or challenging life situations
    such as addictions, mental illnesses, medical or financial struggles. They help
    their users to access these social services and monitor their appropriate usage.
- uri: http://data.europa.eu/esco/occupation/98b261ec-def2-4871-b062-56cdd290c844
  preferred_label: military welfare worker
  isco_code: '2635'
  code: 2635.3.19
  description: Military welfare workers assist families in coping with the deployment
    in the military of a family member by supporting them through the adjustment process
    of leaving and returning of the family member. They help teenagers go through
    the fear of loosing their parents to the military or not recognising their parents
    at their return. Military welfare workers help veterans to re-adapt to civilian
    life and help them manage sufferings, trauma disorders or griefs.
- uri: http://data.europa.eu/esco/occupation/9aa2115d-83cb-4db1-af1d-b426c87c2393
  preferred_label: criminal justice social worker
  isco_code: '2635'
  code: 2635.3.8
  description: Criminal justice social workers tackle criminal behaviour and reduce
    risk of reoffending by promoting and establishing programs to prevent crime within
    communities. They assist in prosecutions and help to investigate criminal cases.
    They assist prisoners reinsert into the community after release from custody.
    They also support and supervise the offenders sentenced to community service and
    provide support to the victims and the people closely affected by the crime.
- uri: http://data.europa.eu/esco/occupation/9cda1c7c-ba07-4381-b831-1bb346ff865f
  preferred_label: marriage counsellor
  isco_code: '2635'
  code: 2635.1.4
  description: Marriage counsellors support and guide couples and families that are
    going through crises such as depression, substance abuse and relationship problems.
    They help improving their communication by providing group or individual therapy.
- uri: http://data.europa.eu/esco/occupation/a76a05bb-e04d-4be8-953e-1ffd691dd58d
  preferred_label: mental health social worker
  isco_code: '2635'
  code: 2635.3.17
  description: Mental health social workers assist and provide counselling to people
    with mental, emotional, or substance abuse problems. They focus on providing personalised
    support to cases and monitor the recovery process of their clients by providing
    therapy, crisis intervention, client advocacy and education. Mental health social
    workers may contribute to mental health services improvement and mental health
    outcomes for citizens.
- uri: http://data.europa.eu/esco/occupation/a9a41b21-8dd4-476f-96c7-85733fa63d3b
  preferred_label: migrant social worker
  isco_code: '2635'
  code: 2635.3.18
  description: Migrant social workers provide advice to migrants in order to guide
    them through the necessary steps of integration, namely living and working in
    a foreign country. They explain eligibility criteria, rights, and duties. They
    help migrants in the development and maintenance of their information as clients
    for further referral to day care, social services and employment programs. Migrant
    social workers collaborate with employers and inform them of the available migrant
    services, advocating for migrant clients.
- uri: http://data.europa.eu/esco/occupation/aff66ae0-d6e1-4de3-b6af-78647defd08c
  preferred_label: enterprise development worker
  isco_code: '2635'
  code: 2635.3.12
  description: Enterprise development workers support enterprises in solving big social
    problems by liaising with communities and customers. They strive to improve the
    productivity of employees and the health of their families by focusing on the
    work-life balance.
- uri: http://data.europa.eu/esco/occupation/b73f4ce5-13fa-43a0-bbf6-01d7315849b8
  preferred_label: social work supervisor
  isco_code: '2635'
  code: 2635.3.23
  description: Social work supervisors manage social work cases by investigating alleged
    neglect or abuse cases. They make family dynamics assessment and provide assistance
    to sick people or with emotional or mental disorders. They train, assist, advise,
    evaluate and assign work to subordinate social workers making sure that all work
    is done according to the established policies, laws, procedures and priorities.
- uri: http://data.europa.eu/esco/occupation/b7507136-e71e-47e8-b873-e77d5cdf2922
  preferred_label: youth worker
  isco_code: '2635'
  code: 2635.3.27
  description: Youth workers support, accompany and counsel young people, focusing
    on their personal and social development. They are involved in managing community
    projects and services through one-to-one or group-based activities. Youth workers
    can be volunteers or paid professionals who facilitate non-formal and informal
    learning processes. They are engaged in a large spectrum of activities by, with
    and for young people.
- uri: http://data.europa.eu/esco/occupation/b9dd2ee7-5fea-46f8-b226-ddae9501f728
  preferred_label: sexual violence counsellor
  isco_code: '2635'
  code: 2635.1.5
  description: Sexual violence counsellors provide support services, crisis care services
    and counselling to women and adolescents who have been directly or indirectly
    exposed to sexual assault and/or rape. They inform victims of the relevant legal
    procedures and protective services maintaining client confidentiality. They also
    address problematic sexualized behaviours of children.
- uri: http://data.europa.eu/esco/occupation/be6d7fd3-2e51-499f-a31d-8aa0bbd32f2a
  preferred_label: palliative care social worker
  isco_code: '2635'
  code: 2635.3.20
  description: Palliative care social workers provide assistance and counselling to
    patients with a chronic or a terminal disease and their families with the practical
    arrangements. They arrange the required medical care for the patient and help
    the family to adjust to the diagnosis by providing support and attention to their
    emotional needs, helping them to understand their options.
- uri: http://data.europa.eu/esco/occupation/c60ede09-b67b-4173-8991-b9b694149488
  preferred_label: employment support worker
  isco_code: '2635'
  code: 2635.3.11
  description: Employment support workers provide assistance to people with difficulties
    to find a job and long-term unemployed people. They provide guidance in the creation
    CVs, searching for job openings, contacting employers, and the preparation for
    job interviews.
- uri: http://data.europa.eu/esco/occupation/ce53a1b2-2fec-4d04-9390-47fb3dd525f0
  preferred_label: community social worker
  isco_code: '2635'
  code: 2635.3.6
  description: Community social workers help people in disadvantage or excluded from
    society to change their situation and handle their integration problems. They
    work with communities focusing on specific groups. Community social workers liaise
    closely with social workers, schools, local authorities and probation officers
    representing people before policy makers at local and national level.
- uri: http://data.europa.eu/esco/occupation/d6bffef4-f09a-4711-9ecb-92ec04353b21
  preferred_label: substance misuse worker
  isco_code: '2635'
  code: 2635.3.24
  description: Substance misuse workers provide assistance and counselling to people
    with substance abuse problems. They monitor their progress, advocate for them,
    and performe crisis interventions and group therapy. They also assist patients
    dealing with the consequences of tobacco, alcohol or recreational drugs abuse,
    which can be problematics as unemployment, physical or mental disorders and poverty.
- uri: http://data.europa.eu/esco/occupation/dc69f2ed-ebe9-43da-bf9d-31aac874d4c2
  preferred_label: rehabilitation support worker
  isco_code: '2635'
  code: 2635.3.22
  description: Rehabilitation support workers provide counselling to individuals dealing
    with birth defects or with major consequences caused by diseases, accidents, and
    burnouts. They help them to cope with personal, social and vocational issues.
    They assess the personal needs of clients, develop rehabilitation plans, get involved
    in the training, and help people undergoing a rehabilitation plan with job placement.
- uri: http://data.europa.eu/esco/occupation/f7f8c077-26ec-455f-8311-aeafbc24d9a5
  preferred_label: bereavement counsellor
  isco_code: '2635'
  code: 2635.1.1
  description: Bereavement counsellors support and guide patients and their families
    to better cope with the death of the loved ones by assisting them in emergent
    situations, at the hospices and at the memorial services. They train other professionals
    and communities anticipating the supportive needs of bereavement and responding
    to the education requirements.
- uri: http://data.europa.eu/esco/occupation/fa4a3b52-990c-44eb-a912-490f5d689400
  preferred_label: social pedagogue
  isco_code: '2635'
  code: '2635.2'
  description: Social pedagogues provide care, support, and education to children
    and young persons with different backgrounds or capabilities. They develop educational
    processes for young persons to be in charge of their own experiences, using a
    multi-disciplinary approach set to the learning experience. Social pedagogues
    contribute to the individuals' learning, welfare, and societal inclusion, and
    put an emphasis on building self-reliance.
- uri: http://data.europa.eu/esco/occupation/ff2c1183-3fd7-40c7-8ddc-b20b100363c3
  preferred_label: community development social worker
  isco_code: '2635'
  code: 2635.3.5
  description: Community development social workers support individuals, families,
    and groups in socially or financially deprived areas. They provide leadership
    and bring local people together to make changes and tackle social inequality,
    helping people to develop the skills needed to eventually run their own community
    groups.
- uri: http://data.europa.eu/esco/occupation/0f086907-96a6-4e88-bf00-a84295125a6a
  preferred_label: missionary
  isco_code: '2636'
  code: '2636.3'
  description: Missionaries supervise the execution of missions of outreach from a
    church foundation. They organise the mission and develop the mission's goals and
    strategies, and ensure the mission's goals are executed, and policies implemented.
    They perform administrative duties for record maintenance, and facilitate communication
    with the relevant institutions in the mission's location.
- uri: http://data.europa.eu/esco/occupation/6d421d34-baa1-44f9-9ea0-231d76e325fd
  preferred_label: religion scientific researcher
  isco_code: '2636'
  code: '2636.4'
  description: Religion scientific researchers study concepts related to religions,
    beliefs and spirituality. They apply rationality in the pursue of morality and
    ethics by studying of scripture, religion, discipline, and divine law.
- uri: http://data.europa.eu/esco/occupation/a4dd6eae-ca75-456f-829d-333671a7c186
  preferred_label: chaplain
  isco_code: '2636'
  code: '2636.1'
  description: Chaplains perform religious activities in secular institutions. They
    perform counselling services and provide spiritual and emotional support to the
    people in the institution, as well as cooperate with priests or other religious
    officials to support religious activities in the community.
- uri: http://data.europa.eu/esco/occupation/ed256ed0-0432-4969-8544-3e5e01a517a9
  preferred_label: minister of religion
  isco_code: '2636'
  code: '2636.2'
  description: Ministers of religion lead religious organisations or communities,
    perform spiritual and religious ceremonies and provide spiritual guidance to members
    of a particular religious group. They may undertake missionary work, pastoral
    or preaching work, or work within a religious order or community, such as a monastery
    or convent. Ministers of religion perform duties such as leading worship services,
    giving religious education, officiating at funerals and marriages, counselling
    congregation members and offer a range of other community services, both in conjunction
    with the organisation they work for, and through their own personal day to day
    activities.
- uri: http://data.europa.eu/esco/occupation/01d74409-5303-4b5c-8925-0cc21c4da8ee
  preferred_label: medical writer
  isco_code: '2641'
  code: 2641.4.5
  description: Medical writers produce and process scientific documents related to
    medical affairs. Work alongside scientists, doctors and other healthcare professionals.
- uri: http://data.europa.eu/esco/occupation/4bef1707-a251-427e-9d8b-96595ec38d45
  preferred_label: book editor
  isco_code: '2641'
  code: '2641.1'
  description: Book editors find manuscripts that can be published. They review texts
    from writers to evaluate the commercial potential or they ask writers to take
    on projects that the publishing company wishes to publish. Book editors maintain
    good relationships with writers.
- uri: http://data.europa.eu/esco/occupation/572c51ef-531b-4331-8e66-b1641173e54e
  preferred_label: dramaturge
  isco_code: '2641'
  code: '2641.2'
  description: Dramaturges read new plays and works and propose them to the stage
    director and/or art council of a theatre. They gather documentation on the work,
    author, problems addressed, times and described environments. They also participate
    in the analysis of themes, characters, dramatic construction, etc.
- uri: http://data.europa.eu/esco/occupation/5a91a8bc-eb18-4c7e-847d-96cbcce5a47a
  preferred_label: speechwriter
  isco_code: '2641'
  code: 2641.4.3
  description: Speechwriters research and write speeches on multiple topics. They
    need to catch and hold the interest of an audience. Speechwriters create presentations
    in a conversational tone so it looks like if the text was not scripted. They write
    in a comprehensible manner so the audience gets the message of the speech.
- uri: http://data.europa.eu/esco/occupation/8cb59bc4-1f39-477e-beea-effed12d186c
  preferred_label: technical communicator
  isco_code: '2641'
  code: 2641.4.4
  description: Technical communicators prepare clear, concise and professional communication
    from product developers to users of the products such as online help, user manuals,
    white papers, specifications and industrial videos. For this, they analyse products,
    legal requirements, markets, customers and users. They develop information and
    media concepts, standards, structures and software tool support. They plan the
    content creation and media production processes, develop written, graphical, video
    or other contents, generate media output, release their information products and
    receive feedback from the users.
- uri: http://data.europa.eu/esco/occupation/b06a1dde-e5a1-4219-9491-2bedd0282e4b
  preferred_label: writer
  isco_code: '2641'
  code: '2641.4'
  description: Writers develop content for books. They write novels, poetry, short
    stories, comics and other forms of literature. These forms of writing can be fictional
    or non-fictional.
- uri: http://data.europa.eu/esco/occupation/e55e1a62-eab4-4829-a71e-e0d294cacf6b
  preferred_label: lyricist
  isco_code: '2641'
  code: 2641.4.1
  description: Lyricists interpret the style of a music piece and write words to accompany
    the melody. They work together with the music composer.
- uri: http://data.europa.eu/esco/occupation/ebe936e2-64e7-4777-94d6-42caa5a12409
  preferred_label: script writer
  isco_code: '2641'
  code: 2641.4.2
  description: Script writers create scripts for motion pictures or television series.
    They write a detailed story that consists of plot, characters, dialogue and physical
    environment.
- uri: http://data.europa.eu/esco/occupation/f3d8bc61-f812-4106-afd2-a356e4c11fce
  preferred_label: literary scholar
  isco_code: '2641'
  code: '2641.3'
  description: Literary scholars research works of literature, history of literature,
    genres, and literary criticism in order to appraise the works and the surrounding
    aspects in an appropriate context and to produce research results on specific
    topics in the field of literature.
- uri: http://data.europa.eu/esco/occupation/26ca1895-2047-4c76-a678-831c85824f61
  preferred_label: fact checker
  isco_code: '2642'
  code: 2642.1.10
  description: Fact checkers make certain that all the information in texts that are
    ready for publishing is correct. They research the facts thoroughly and correct
    errors.
- uri: http://data.europa.eu/esco/occupation/26ce22fe-4018-4387-8e6b-c2555f5fc0ac
  preferred_label: newspaper editor
  isco_code: '2642'
  code: 2642.1.13
  description: Newspaper editors decide which news stories are interesting enough
    and will be covered in the paper. They assign journalists to each item. Newspaper
    editors determine the length of each news article and where it will be featured
    in the newspaper. They also ensure that publications are finished on time for
    publishing.
- uri: http://data.europa.eu/esco/occupation/4cc98057-8ed5-4b45-855b-7a67bc2e5bae
  preferred_label: foreign correspondent
  isco_code: '2642'
  code: 2642.1.11
  description: Foreign correspondents research and write news stories of international
    importance for newspapers, journals, magazines, radio, television and other media.
    They are stationed in a foreign country.
- uri: http://data.europa.eu/esco/occupation/51ec004e-aec8-4f89-b114-952bcc56b0b0
  preferred_label: vlogger
  isco_code: '2642'
  code: 2642.1.17
  description: Vloggers make online videos to talk about a wide range of subjects
    such as politics, fashion, economics and sports. They can relate objective facts,
    but often they also give their opinion on the related topic. Vloggers post these
    videos online on social media or streaming platforms, often accompanied with written
    text. They also interact with their viewers via comments.
- uri: http://data.europa.eu/esco/occupation/70b5896f-988e-4084-9c19-2c82bd5cc9a5
  preferred_label: sports journalist
  isco_code: '2642'
  code: 2642.1.16
  description: Sports journalists research and write articles about sport events and
    athletes for newspapers, magazines, television and other media. They conduct interviews
    and attend events.
- uri: http://data.europa.eu/esco/occupation/72add02e-ae39-4dfb-8047-ced4c1a347f5
  preferred_label: picture editor
  isco_code: '2642'
  code: 2642.1.14
  description: Picture editors select and approve photographs and illustrations for
    newspapers, journals and magazines. Picture editors make sure that the photographs
    are delivered on time for publication.
- uri: http://data.europa.eu/esco/occupation/8bd74371-1818-47d5-a253-d703c51c5f26
  preferred_label: copy editor
  isco_code: '2642'
  code: 2642.1.5
  description: Copy editors ascertain that a text is agreeable to read. They ensure
    that a text adheres to the conventions of grammar and spelling. Copy editors read
    and revise materials for books, journals, magazines and other media.
- uri: http://data.europa.eu/esco/occupation/a47f82d3-4cf7-4abf-bb36-2c8cbad28234
  preferred_label: journalist
  isco_code: '2642'
  code: '2642.1'
  description: Journalists research, verify and write news stories for newspapers,
    magazines, television and other broadcast media. They cover political, economic,
    cultural, social and sport events. Journalists must conform to ethical codes such
    as freedom of speech and right of reply, press law and editorial standards in
    order to bring objective information.
- uri: http://data.europa.eu/esco/occupation/ac80b511-fd22-4edf-8570-e531704778bd
  preferred_label: blogger
  isco_code: '2642'
  code: 2642.1.1
  description: Bloggers write online articles on a wide range of subjects such as
    politics, fashion, economics and sports. They can relate objective facts, but
    often they also give their opinion on the related topic. Bloggers also interact
    with their readers via comments.
- uri: http://data.europa.eu/esco/occupation/b65530b8-0b50-49da-8e9e-331b161374a5
  preferred_label: broadcast news editor
  isco_code: '2642'
  code: 2642.1.2
  description: Broadcast news editors decide which news stories will be covered during
    the news. They assign journalists to each item. Broadcast news editors also determine
    the length of coverage for each news item and where it will be featured during
    the broadcast.
- uri: http://data.europa.eu/esco/occupation/b866b3bb-3dbd-4b3d-9a53-9ec15f43ca2f
  preferred_label: columnist
  isco_code: '2642'
  code: 2642.1.4
  description: Columnists research and write opinion pieces about new events for newspapers,
    journals, magazines and other media. They have an area of interest and can be
    recognised by their writing style.
- uri: http://data.europa.eu/esco/occupation/cbdb80db-c760-4b68-b074-88c397650ef5
  preferred_label: editor-in-chief
  isco_code: '2642'
  code: 2642.1.8
  description: Editors-in-chief oversee the production of news stories for newspapers,
    magazines, journals and other media. They manage the day-to-day operations of
    a publication and make sure it is ready on time.
- uri: http://data.europa.eu/esco/occupation/d3570716-cc0d-4a61-b9a0-9b3081050e9d
  preferred_label: entertainment journalist
  isco_code: '2642'
  code: 2642.1.9
  description: Entertainment journalists research and write articles about cultural
    and social events for newspapers, magazines, television and other media. They
    conduct interviews with artists and celebrities and attend events.
- uri: http://data.europa.eu/esco/occupation/d372b694-041a-4978-bd81-efbb763ee70d
  preferred_label: crime journalist
  isco_code: '2642'
  code: 2642.1.6
  description: Crime journalists research and write articles about criminal events
    for newspapers, magazines, television and other media. They conduct interviews
    and attend court hearings.
- uri: http://data.europa.eu/esco/occupation/db3da11f-67a0-415f-b785-81f33d3be810
  preferred_label: business journalist
  isco_code: '2642'
  code: 2642.1.3
  description: Business journalists research and write articles about economy and
    economic events for newspapers, magazines, television and other media. They conduct
    interviews and attend events.
- uri: http://data.europa.eu/esco/occupation/eb7e42d0-9b3f-49ad-81f1-b9ee8491bf39
  preferred_label: political journalist
  isco_code: '2642'
  code: 2642.1.15
  description: Political journalists research and write articles about politics and
    politicians for newspapers, magazines, television and other media. They conduct
    interviews and attend events.
- uri: http://data.europa.eu/esco/occupation/f8d14b95-6a36-4290-b226-2342e236406e
  preferred_label: magazine editor
  isco_code: '2642'
  code: 2642.1.12
  description: Magazine editors decide which stories are interesting enough and will
    be covered in the magazine. They assign journalists to each item. Magazine editors
    determine the length of each article and where it will be featured in the magazine.
    They also ensure that publications are finished on time for publishing.
- uri: http://data.europa.eu/esco/occupation/fdd8eef7-d89c-419f-9166-0747f466a769
  preferred_label: critic
  isco_code: '2642'
  code: 2642.1.7
  description: Critics write reviews of literary, musical and artistic works, restaurants,
    movies, television programs and other themes for newspapers, journals, magazines,
    radio, television and other media. They evaluate theme, expression and technique.
    Critics make judgements based on their personal experience and knowledge.
- uri: http://data.europa.eu/esco/occupation/1a07bd7d-2e1d-4930-a84a-1a442b8f2a44
  preferred_label: translator
  isco_code: '2643'
  code: '2643.6'
  description: Translators transcribe written documents from one or more languages
    to another ensuring that the message and nuances therein remain in the translated
    material. They translate material backed up by an understanding of it, which can
    include commercial and industrial documentation, personal documents, journalism,
    novels, creative writing, and scientific texts delivering the translations in
    any format.
- uri: http://data.europa.eu/esco/occupation/23e692a9-a242-4d4f-988f-ed562f757864
  preferred_label: interpreter
  isco_code: '2643'
  code: '2643.2'
  description: Interpreters understand and convert spoken communication from one language
    to another. They retain considerable amounts of information, often with the aid
    of note-taking, and communicate it immediately after whilst keeping the nuances
    and stress of the message in the recipient language.
- uri: http://data.europa.eu/esco/occupation/49c3db8c-c586-42d1-9726-f65d8303c0b1
  preferred_label: lexicographer
  isco_code: '2643'
  code: '2643.3'
  description: Lexicographers write and compile the content for dictionaries. They
    also determine which new words are common use and should be included in the glossary.
- uri: http://data.europa.eu/esco/occupation/55d2eb3e-1e49-404a-b4bf-be4829694a59
  preferred_label: lawyer linguist
  isco_code: '2643'
  code: 2643.4.1
  description: Lawyer linguists interpret and translate legal pieces from one language
    to another. They provide legal analysis and help in understanding technicalities
    of the content expressed in other languages.
- uri: http://data.europa.eu/esco/occupation/757da94f-d1f3-48ad-ac61-74e22bc18cca
  preferred_label: graphologist
  isco_code: '2643'
  code: '2643.1'
  description: Graphologists analyse written or printed materials in order to draw
    conclusions and evidence about traits, personality, abilities and authorship of
    the writer. They interpret letter forms, the fashion of writing, and patterns
    in the writing.
- uri: http://data.europa.eu/esco/occupation/9a2147aa-a72f-4f83-8653-c3f50d4e1e73
  preferred_label: sign language interpreter
  isco_code: '2643'
  code: '2643.5'
  description: Sign language interpreters understand and convert sign language into
    spoken language and vice versa. They maintain the nuances and the stress of the
    message in the recipient language.
- uri: http://data.europa.eu/esco/occupation/a9c7a04d-807a-41b5-b441-87c73c73c9c5
  preferred_label: linguist
  isco_code: '2643'
  code: '2643.4'
  description: Linguists study languages scientifically. They master languages and
    can interpret them in terms of their grammatical, semantic, and phonetic characteristics.
    They research the evolution of language and the way it is used by societies.
- uri: http://data.europa.eu/esco/occupation/da4589ce-7534-4cc1-9ce4-cabf9364b87c
  preferred_label: localiser
  isco_code: '2643'
  code: 2643.6.1
  description: Localisers translate and adapt texts to the language and culture of
    a specific target audience. They convert standard translation into locally understandable
    texts with flairs of the culture, sayings, and other nuances that make the translation
    richer and more meaningful for a cultural target group than it was before.
- uri: http://data.europa.eu/esco/occupation/ec2c0655-5ba0-4cc8-860a-977f73b37f34
  preferred_label: subtitler
  isco_code: '2643'
  code: 2643.6.2
  description: Subtitlers can work intralingually, within the same language, or interlingually,
    across languages. Intralingual subtitlers create the subtitles for hearing-impaired
    viewers, whereas interlingual subtitlers create the subtitles for movies or television
    programmes in a different language to the one heard in the audiovisual production.
    They both ensure that the captions and subtitles are synchronised with the sound,
    images and dialogue of the audiovisual work.
- uri: http://data.europa.eu/esco/occupation/09a40a9a-2b60-422c-abe4-96d829bc27df
  preferred_label: art restorer
  isco_code: '2651'
  code: '2651.2'
  description: Art restorers work to perform corrective treatment based on an evaluation
    of the aesthetic, historic and scientific characteristics of art objects. They
    determine the structural stability of art pieces and address problems of chemical
    and physical deterioration.
- uri: http://data.europa.eu/esco/occupation/374d925a-107b-4c99-bc8b-75483441f062
  preferred_label: artistic painter
  isco_code: '2651'
  code: '2651.1'
  description: Artistic painters create paintings in oil or water colours or pastel,
    miniatures, collages, and drawings executed directly by the artist and/or entirely
    under their control .
- uri: http://data.europa.eu/esco/occupation/42ff9e52-1f56-427d-b772-b9328c39b98a
  preferred_label: drawing artist
  isco_code: '2651'
  code: '2651.6'
  description: Drawing artists express concepts by providing a drawn representation
    corresponding to the idea.
- uri: http://data.europa.eu/esco/occupation/7beefadd-ea05-4f59-bc4b-01075f27b937
  preferred_label: video artist
  isco_code: '2651'
  code: '2651.11'
  description: Video artists create videos using analogue or digital techniques to
    obtain special effects, animation, or other animated visuals using films, videos,
    images, computer or other electronic tools.
- uri: http://data.europa.eu/esco/occupation/802a0e5d-5625-4166-a1f0-d13e2586df55
  preferred_label: printmaker
  isco_code: '2651'
  code: '2651.8'
  description: Printmakers engrave or etch metal, wood, rubber or other materials
    to create images which are transported onto surfaces, generally using a printing
    press. Printmakers often use tools such as etcher-circuit processors, pantograph
    engravers, and silk screen etchers.
- uri: http://data.europa.eu/esco/occupation/94d94bd0-9ac3-4bd8-81c0-c3fdf551aa16
  preferred_label: sculptor
  isco_code: '2651'
  code: '2651.9'
  description: Sculptors may use a wide variety of materials to create sculptures,
    such as stone, clay, glass, wood, plaster, or any material of their choice. Those
    materials can be carved, modelled, moulded, cast, wrought, welded, and so on,
    in order to reach the desired shape.
- uri: http://data.europa.eu/esco/occupation/969f8af0-3c0d-403a-9c16-a6fb76c6b443
  preferred_label: conceptual artist
  isco_code: '2651'
  code: '2651.5'
  description: Conceptual artists choose any material as an artistic tool or/and material
    to be presented as an artistic experience to the public. Their work, belonging
    to the fine arts, can be two-dimensional (drawing, painting, collage), three-dimensional
    (sculpture, installation) or four-dimensional (moving images, performance).
- uri: http://data.europa.eu/esco/occupation/ae66ca51-e762-48b4-bd46-071dc87cb30d
  preferred_label: storyboard artist
  isco_code: '2651'
  code: '2651.10'
  description: Storyboard artists draw out the scenes of a motion picture or television
    series according to the script in order to see what will be possible during production.
    They work together with the producer and video and motion picture director.
- uri: http://data.europa.eu/esco/occupation/b2f5ed56-c83f-40d0-b861-f5253cd3d1d9
  preferred_label: glass artist
  isco_code: '2651'
  code: '2651.7'
  description: Glass artists create original artworks by assembling pieces of glass.
    They can be involved in restoration processes (such as those going on in cathedrals,
    churches, etc.) and can create accessoires, windows or decorations.
- uri: http://data.europa.eu/esco/occupation/ec0e64c9-6d9b-4a9f-a022-a418f3b381fe
  preferred_label: ceramicist
  isco_code: '2651'
  code: '2651.4'
  description: Ceramicist have an in-depth knowledge of materials and the relevant
    know-how to develop their own methods of expression and personal projects through
    ceramic. Their creations can include ceramic sculptures, jewellery, domestic and
    commercial tablewares and kitchenwares, giftware, garden ceramics, wall and floor
    tiles.
- uri: http://data.europa.eu/esco/occupation/ecd0fad8-b099-4c47-93f6-dde9f6f6c5fc
  preferred_label: cartoonist
  isco_code: '2651'
  code: '2651.3'
  description: Cartoonists draw people, objects, events, etc. in a comical or derogatory
    way. They exaggerate physical features and personality traits. Cartoonists also
    portray political, economic, cultural ans social events in a humoristic way.
- uri: http://data.europa.eu/esco/occupation/0e216d47-fc12-43e9-8953-ad8ba11f4b96
  preferred_label: musical conductor
  isco_code: '2652'
  code: 2652.3.1
  description: Musical conductors lead ensembles of musicians directing them during
    rehearsals, recording sessions and live performances and helping them attaining
    their best performance. They can work with a variety of ensembles such as choirs
    and orchestras. Musical conductors adjust the tempo (speed), rhythm, dynamics
    (loud or soft) and articulation (smooth or detached) of the music using gestures
    and sometimes dancing to motivate the musicians to play according to the music
    sheet.
- uri: http://data.europa.eu/esco/occupation/13d8b1be-d711-4bbc-a45e-cad605162f41
  preferred_label: music director
  isco_code: '2652'
  code: '2652.2'
  description: Music directors lead musical groups such as orchestras and bands during
    live performances or recording sessions. They organise the music and composition,
    coordinate the playing musicians and record the performance. Music directors are
    professionals working in diverse places such as the film industry, music videos,
    radio stations, musical ensembles or schools.
- uri: http://data.europa.eu/esco/occupation/1d4a4baf-4073-43bd-ac72-ff7d443273ff
  preferred_label: disc jockey
  isco_code: '2652'
  code: '2652.6'
  description: Disc jockeys mix music from various sources using turntables or a mixing
    console and play music at events in front of a live audience. They may provide
    the music on the radio. They select the music played on the radio and make sure
    that it is broadcasted according to schedule. Disc jockeys can also create mixes
    for later distribution and playback.
- uri: http://data.europa.eu/esco/occupation/45170a38-b3ae-4a96-90ff-eb45e55600b6
  preferred_label: music arranger
  isco_code: '2652'
  code: 2652.1.1
  description: Music arrangers create arrangements for music after its creation by
    a composer. They interpret, adapt or rework a composition for other instruments
    or voices, or to another style. Music arrangers are experts in instruments and
    orchestration, harmony, polyphony and composition techniques.
- uri: http://data.europa.eu/esco/occupation/6581aa0d-c807-4091-84cc-bc041f962ab1
  preferred_label: singer
  isco_code: '2652'
  code: 2652.3.2
  description: Singers are professional musicians, skilled in the use of their voice
    as a musical instrument, with different vocal ranges. They perform for live audiences
    and for recordings in different musical genres.
- uri: http://data.europa.eu/esco/occupation/7dc05fcc-b079-45ed-b5d4-74c75f99976c
  preferred_label: composer
  isco_code: '2652'
  code: '2652.1'
  description: Composers create new music pieces in a variety of styles. They usually
    note down the created music in musical notation. Composers may work independently
    or as part of a group or ensemble. Many create pieces to support film, television,
    games or live performances.
- uri: http://data.europa.eu/esco/occupation/ce8145f5-d7ea-40ea-b12e-ef168f11184a
  preferred_label: sound artist
  isco_code: '2652'
  code: '2652.5'
  description: Sound artists use sound as a main creative medium. They express, through
    the creation of sounds, their intention and identity. Sound art is interdisciplinary
    in nature and takes on hybrid forms.
- uri: http://data.europa.eu/esco/occupation/cf7b89d0-1cf9-4567-a8bf-9d6905a2b31b
  preferred_label: choirmaster/choirmistress
  isco_code: '2652'
  code: 2652.3.1.1
  description: Choirmasters/choirmistresses manage various aspects of the vocal, and
    sometimes instrumental, performances of musical groups, such as choirs, ensembles,
    or glee clubs.
- uri: http://data.europa.eu/esco/occupation/d23fbcdc-d5e9-4724-a83f-99a0cfa8adb0
  preferred_label: répétiteur
  isco_code: '2652'
  code: '2652.4'
  description: Répétiteurs accompany performers, usually singers, following the instructions
    of musical conductors in directing rehearsals and guiding the artists in the rehearsal
    process.
- uri: http://data.europa.eu/esco/occupation/f6803a58-91d9-4251-9a07-09fc387cec16
  preferred_label: musician
  isco_code: '2652'
  code: '2652.3'
  description: Musicians perform a vocal or musical part that can be recorded or played
    for an audience. They have know-how and practice of one or many instruments or
    using their voice. The musician can also write and transcribe music.
- uri: http://data.europa.eu/esco/occupation/06ac0f53-431e-4bc6-acb8-2f5da041b5d3
  preferred_label: dance répétiteur
  isco_code: '2653'
  code: 2653.1.2
  description: Dance répétiteurs assist conductors and choreographers in directing
    rehearsals and guiding the artists in the rehearsal process. Regardless of their
    nature and scope, a répétiteur's actions are, from an ethical and practical standpoint,
    based on a commitment to respect the integrity of the work.
- uri: http://data.europa.eu/esco/occupation/07b91f36-8272-493a-8e1c-5625e77efe68
  preferred_label: dancer
  isco_code: '2653'
  code: '2653.2'
  description: Dancers interpret ideas, feelings, stories or characters for audiences
    by using movement and body language mostly accompanied by music. This normally
    involves interpreting the work of a choreographer or a traditional repertory,
    although it may sometimes require improvisation.
- uri: http://data.europa.eu/esco/occupation/189a337d-f6fb-44e2-9e7a-bc27b7b76e0e
  preferred_label: choreographer
  isco_code: '2653'
  code: '2653.1'
  description: Choreographers create sequences of movements in which motion, form
    or both are specified. Some choreographers also take up the role of coordinating,
    teaching and rehearsing performers in the production of the choreography. They
    can also act as a movement coach for actors.
- uri: http://data.europa.eu/esco/occupation/c737f094-7921-4d57-b883-6442343a5fd8
  preferred_label: choreologist
  isco_code: '2653'
  code: 2653.1.1
  description: 'Choreologists are specialised creators of dance in specific styles
    or traditions, such as ethnic dance, early dance or baroque dance. Their work
    is contextualised historically and sociologically as an expression of the human
    group that developed it. Choreologists analyse dance from intrinsic aspects: theory,
    practice and epistemology of movements in itself. They also study dance from the
    extrinsic perspective: the social, ethnological, etnographical and sociological
    context in which dance is developed.'
- uri: http://data.europa.eu/esco/occupation/00030d09-2b3a-4efd-87cc-c4ea39d27c34
  preferred_label: technical director
  isco_code: '2654'
  code: 2654.1.7
  description: Technical directors realise the artistic visions of the creators within
    technical constraints. They coordinate the operations of various production units,
    such as scene, wardrobe, sound and lighting, and make-up. They adapt the prototype
    and study the feasibility, implementation, operation and technical monitoring
    of the artistic project. They are also responsible for the stage equipment and
    technical equipment.
- uri: http://data.europa.eu/esco/occupation/0bce6d52-a45e-4826-91ea-68976f1b9d1c
  preferred_label: art administrator
  isco_code: '2654'
  code: '2654.6'
  description: Art administrators are among the professionals that manage the business
    needs of an organisation devoted to arts. They provide support for financial and
    corporative tasks, and they can work for a range of organizations from for-profit
    to governmental or non-profit organisations. Examples of these organisations are
    dance companies, film studios, theaters and art museums or galleries.
- uri: http://data.europa.eu/esco/occupation/1a7fb683-6544-4442-b54c-ec72ef468ff0
  preferred_label: video and motion picture director
  isco_code: '2654'
  code: 2654.1.8
  description: Video and motion picture directors are responsible for the overall
    production of a movie or television program. They edit and translate the script
    into audiovisual images. Video and motion picture directors supervise and manage
    the film crew. They convey their creative vision on the actors, audio and video
    equipment operators, lighting technicians, etc and direct them. Video and motion
    picture directors also supervise the editing of the footage.
- uri: http://data.europa.eu/esco/occupation/2f372afe-d513-4357-abe1-e5e0b5cf9ae5
  preferred_label: performance lighting director
  isco_code: '2654'
  code: 2654.1.4
  description: Performance lighting directors determine what lights are needed during
    production, according to the video and motion picture director's creative vision.
    They use the script to design the lighting requirements for each shot. Performance
    lighting directors oversee the lighting setup and operation.
- uri: http://data.europa.eu/esco/occupation/30b25ee4-da97-4167-8592-460217f6bdcc
  preferred_label: animation director
  isco_code: '2654'
  code: 2654.1.1
  description: Animation directors supervise and recruit multimedia artists. They
    are responsible for the quality of the animation, that the production is delivered
    on time and within budget.
- uri: http://data.europa.eu/esco/occupation/3b6bea7d-36f4-44fb-ac73-d1cc8a198dcb
  preferred_label: video and motion picture producer
  isco_code: '2654'
  code: 2654.3.2
  description: Video and motion picture producers supervise the entire production
    of a movie or television programme. They select the scripts that will be turned
    into motion pictures or series. Video and motion picture producers find the financial
    means to make a movie or television series. They have the final decision on the
    whole project, from development and editing to distribution. During large-scale
    productions, video and motion picture producers can be part of a team of producers
    and may be responsible for some of these tasks.
- uri: http://data.europa.eu/esco/occupation/4d4b243f-6c3b-48c3-a564-2e7f2d592a3c
  preferred_label: production designer
  isco_code: '2654'
  code: 2654.1.5
  description: Production designers are responsible for the complete look (style,
    colouring and locations) of television programmes, series, motion pictures and
    commercials. They create the visual concept for the entire production such as
    set design, lighting, costumes and camera angles. Production designers work together
    with the director, designers and oversee the art department. They also create
    sketches, drawings, do colouring and location research and advise props and stage
    settings to the director.
- uri: http://data.europa.eu/esco/occupation/4f2f2539-3e38-4393-9dac-a9a48af7cd32
  preferred_label: casting director
  isco_code: '2654'
  code: 2654.1.2
  description: Casting directors select actors for all roles in a motion picture or
    television series. They co-operate with the producer and director to determine
    what they are looking for. Casting directors contact talent agents and organise
    interviews and auditions for the parts. They determine the fees and contracts
    for the actors and extras.
- uri: http://data.europa.eu/esco/occupation/52b9e8dc-de6c-41dd-b29a-e1291c273f6f
  preferred_label: producer
  isco_code: '2654'
  code: '2654.3'
  description: Producers are responsible for managing the production of music, motion
    pictures or series. They plan and coordinate all aspects of the production such
    as the direction, publication and financing. Producers oversee the production
    and manage all technical and logistic aspects of recording and editing.
- uri: http://data.europa.eu/esco/occupation/56bff5e1-3c76-4f45-b50e-e3a59bf1053e
  preferred_label: post-production supervisor
  isco_code: '2654'
  code: '2654.2'
  description: Post-production supervisors oversee the whole post-production process.
    They work together with the music editor and video and motion picture editor.
    Post production supervisors help plan the production workflow to make sure the
    post production phase is included and budgeted for. They ensure that the final
    product is delivered and distributed.
- uri: http://data.europa.eu/esco/occupation/5ff7a990-a306-40c2-9224-b2bf7f15b2f9
  preferred_label: music producer
  isco_code: '2654'
  code: 2654.3.1
  description: Music producers are responsible for acquiring music to be published.
    They listen to demos of songs and determine whether they are good enough to be
    published. Music producers oversee the production of records. They manage the
    technical aspects of recording and editing.
- uri: http://data.europa.eu/esco/occupation/6ba25e0f-7fb8-4879-a1f9-d4f8945966be
  preferred_label: director of photography
  isco_code: '2654'
  code: 2654.1.3
  description: Directors of photography are responsible for the visual interpretation
    of the script and all photography components of the film, including framing, colouring,
    lightning, style and locations. They create the visual look of the film or television
    programme and select the filming equipment, including the lens and filters. Directors
    of photography manage the visual equipment operators and lighting technicians.
    They work together with the video and motion picture director to achieve the desired
    effect.
- uri: http://data.europa.eu/esco/occupation/8a451ae2-3c31-4f35-90af-6275b1b02f93
  preferred_label: stage director
  isco_code: '2654'
  code: 2654.1.6
  description: Stage directors oversee and orchestrate the mounting of a performance
    production by unifying various endeavours and aspects of a theatrical production.
    They ensure the quality and completeness of the theatrical production and lead
    the members of the creative team into realising their artistic vision for it.
- uri: http://data.europa.eu/esco/occupation/ac734172-ae9a-41ab-80a0-a7b33694e027
  preferred_label: video and motion picture editor
  isco_code: '2654'
  code: '2654.5'
  description: Video and motion picture editors are responsible for the assembly and
    cutting of raw footage into a logically and aesthetically-pleasant material for
    movies, television series, or domestic purposes. They reorganize scenes that have
    been shot and decide which special effects are needed. Video and motion picture
    editors work closely together with sound editors and music directors.
- uri: http://data.europa.eu/esco/occupation/cb93fd23-1f51-4495-867a-936c1967066b
  preferred_label: art director
  isco_code: '2654'
  code: '2654.1'
  description: Art directors shape the visual layout of a concept. They create innovative
    designs, develop artistic projects and manage the cooperation between all aspects
    involved. Art directors may perform creative work in theatre, marketing, advertising,
    video and motion picture, fashion or online companies. They ensure that the work
    performed is visually appealing to audiences.
- uri: http://data.europa.eu/esco/occupation/ce7d3362-5383-47d1-b66f-57b021c3d862
  preferred_label: radio producer
  isco_code: '2654'
  code: '2654.4'
  description: Radio producers are responsible for organising the making of radio
    shows. They oversee aspects of radio shows such as content, audio production,
    resource planning and personnel supervision.
- uri: http://data.europa.eu/esco/occupation/ef0363cf-361a-47df-9431-d94afb757ce0
  preferred_label: podcast producer
  isco_code: '2654'
  code: '2654.7'
  description: Podcast producers supervise the entire production process of a podcast.
    This process involves planning the episodes, supporting audio recording and editing,
    production tasks and publishing the final version of the product. They also develop
    promotion and marketing strategies based on podcast market trends and target audience.
- uri: http://data.europa.eu/esco/occupation/26171f39-e85a-448f-bd28-a73a5a99927f
  preferred_label: actor/actress
  isco_code: '2655'
  code: '2655.1'
  description: Actors/actresses play roles and parts on live stage performances, TV,
    radio, video, motion picture productions, or other settings for entertainment
    or instruction. They use body language (gestures and dancing) and voice (speech
    and singing) in order to present the character or story according to the script,
    following the guidelines of a director.
- uri: http://data.europa.eu/esco/occupation/e89e330c-daa3-48f0-b34e-04e3344ea8dc
  preferred_label: voice-over artist
  isco_code: '2655'
  code: 2655.1.1
  description: Voice-over artists perform the dialogues of animated television or
    movie characters. They empathise with their characters and make them come alive
    with their voice.
- uri: http://data.europa.eu/esco/occupation/09a9a956-db70-436f-8398-d85a17f6cdfe
  preferred_label: presenter
  isco_code: '2656'
  code: '2656.3'
  description: Presenters host broadcast productions. They are the face or voice of
    these programs and make announcements on different platforms such as radio, television,
    theatres or other establishments. They ensure that their audience is entertained
    and introduce the artists or persons being interviewed.
- uri: http://data.europa.eu/esco/occupation/0dce2f9b-eda5-4dc4-ba74-36eeed8c9a44
  preferred_label: audio describer
  isco_code: '2656'
  code: '2656.1'
  description: Audio describers depict orally what happens on the screen or on stage
    for the blind and visually impaired so that they can enjoy audio-visual shows,
    live performances or sports events. They produce audio description scripts for
    programmes and events and use their voice to record them.
- uri: http://data.europa.eu/esco/occupation/83e45d86-1bce-45c5-ba8b-097738f9f28b
  preferred_label: news anchor
  isco_code: '2656'
  code: '2656.2'
  description: News anchors present news stories on radio and television. They introduce
    pre-recorded news items and items covered by live reporters. News anchors are
    often trained journalists.
- uri: http://data.europa.eu/esco/occupation/080bce18-066b-4431-90ed-e07608f73fe0
  preferred_label: street artist
  isco_code: '2659'
  code: '2659.3'
  description: Street artists create visual art such as graffiti art or sticker art
    in urban environments' public spaces, on the streets, typically expressing feelings
    or political views and ideas, opting for non-traditional art venues.
- uri: http://data.europa.eu/esco/occupation/22799921-76a1-44c4-a7c3-c6a548e8ad85
  preferred_label: circus artist
  isco_code: '2659'
  code: 2659.2.1
  description: Circus artists develop original performance pieces showcasing great
    artistic and performing skills, emotive depth and artistic proposals for the general
    public. Alone, or collectively, they may perform one or more traditional or original
    circus disciplines, which are usually based on physical capabilities such as strength,
    balance, agility, flexibility, ability and coordination of body parts, and combined
    with performance disciplines such as dance, theatre, mime etc. The physical nature
    of the exercises performed often includes a certain level of risk for the performer.
- uri: http://data.europa.eu/esco/occupation/2800e788-57b4-49f7-9c00-6c35e12cfb8e
  preferred_label: puppeteer
  isco_code: '2659'
  code: 2659.2.3
  description: Puppeteers perform shows by manipulating puppets such as hand puppets
    or marionettes. Their performance is based on a script and the movements of the
    puppets have to be synchronised with the speech and music. Puppeteers may write
    their own scripts and design and create their own puppets.
- uri: http://data.europa.eu/esco/occupation/4efdf62f-a1d9-450e-aebc-2d6a6110f05d
  preferred_label: community artist
  isco_code: '2659'
  code: '2659.1'
  description: Community artists research, plan, organise and lead artistic activities
    for people brought together by a shared interest, capacity, environment or condition.
    They manage and coordinate creative projects with local groups and individuals
    to foster their artistic creativity and improve their quality of life. Community
    artists make the arts accessible to the community they work for, and provide opportunities
    for participants to shape their artistic programme.
- uri: http://data.europa.eu/esco/occupation/61e278a3-2c27-4c18-a827-11e2326b33ae
  preferred_label: street performer
  isco_code: '2659'
  code: 2659.2.5
  description: Street performers create street arts performances for outdoor spaces,
    using space and audience as a creative resource. They create their performance
    through playful exploration and experimentation with the purpose of entertaining
    and possibly also of sharing critical opinions concerning societal issues. They
    stimulate audience participation as a component of their performance whilst respecting
    the audience's safety and integrity.
- uri: http://data.europa.eu/esco/occupation/76deb33d-f9bc-4ca2-a5cc-49c8f5a17f38
  preferred_label: variety artist
  isco_code: '2659'
  code: 2659.2.6
  description: 'Variety artists are multi-disciplinary artists who master in at least
    two of the following disciplines: comedy, dance, singing, circus arts, object
    manipulation and illusionism. They perform solo or collectively, may appear in
    music variety shows, cabaret, musicals and other entertainment events. Their artistic
    performance is characterised by the blending of arts, styles and disciplines.'
- uri: http://data.europa.eu/esco/occupation/8cc90646-fc23-445f-a95f-e28e6b5d5a05
  preferred_label: tourist animator
  isco_code: '2659'
  code: '2659.4'
  description: Tourist animators develop and organise entertainment activities for
    guests of a hospitality establishment. They set up and coordinate activities to
    entertain customers.
- uri: http://data.europa.eu/esco/occupation/a655aff1-e5e9-4c64-bc85-b902568a3dfb
  preferred_label: performance artist
  isco_code: '2659'
  code: '2659.2'
  description: 'Performance artists create a performance which can be any situation
    that involves four basic elements: time, space, the performer''s body, or presence
    in a medium, and a relationship between the performer and audience or onlookers.
    They are flexible with the medium of the art work, the setting and the length
    of time of the performance.'
- uri: http://data.europa.eu/esco/occupation/bd2c868c-371b-4958-83b4-012c52bc7faf
  preferred_label: stand-up comedian
  isco_code: '2659'
  code: 2659.2.4
  description: Stand-up comedians tell humorist stories, jokes and one-liners typically
    described as a monologue, act or routine. They often perform in comedy clubs,
    bars, nightclubs and theatres. They may also use music, magic tricks or props
    to enhance their performance.
- uri: http://data.europa.eu/esco/occupation/0d7ae791-653e-4297-9f61-8bad87f61d57
  preferred_label: meteorology technician
  isco_code: '3111'
  code: '3111.8'
  description: Meteorology technicians collect large amounts of meteorological information
    for weather information users such as aviation companies or meteorological institutions.
    They operate specialised measuring instruments to make accurate weather predictions
    and report their observations. Meteorology technicians assist meteorologists in
    their scientific operations.
- uri: http://data.europa.eu/esco/occupation/184e59d7-5646-4fe4-9059-46867ff09574
  preferred_label: radiation protection technician
  isco_code: '3111'
  code: '3111.12'
  description: Radiation protection technicians monitor radiation levels in buildings
    and facilities to ensure compliance with health and safety standards, and to prevent
    dangerous elevations in the radiation level. They take measures to minimise radiation
    emissions, and to prevent further contamination in the event of radiation pollution,
    by developing radiation protection plans, in particular for nuclear plants and
    facilities.
- uri: http://data.europa.eu/esco/occupation/33fe4c90-c4fd-4860-bdc5-24fcab16f45a
  preferred_label: food analyst
  isco_code: '3111'
  code: '3111.3'
  description: Food analysts perform standardised tests to determine the chemical,
    physical, or microbiological features of products for human consumption.
- uri: http://data.europa.eu/esco/occupation/4b8dced3-ac9e-445d-8787-e07daf52e295
  preferred_label: leather laboratory technician
  isco_code: '3111'
  code: '3111.6'
  description: Leather laboratory technicians perform and report chemical analyses
    and physical tests of leather. They also perform and report chemical analyses
    of auxiliaries, environmental emissions and discharges. They ensure that the tests
    are carried out according to appropriate national, international or customer standards.
- uri: http://data.europa.eu/esco/occupation/668943cc-c454-4a1b-a296-2fcb524a6222
  preferred_label: hydrographic surveying technician
  isco_code: '3111'
  code: '3111.5'
  description: Hydrographic surveying technicians perform oceanographic and surveying
    operations in marine environments. They assist hydrographic surveyors, using specialised
    equipment to map and study underwater topography and morphology of bodies of water.
    They assist in the installation and deployment of hydrographic and surveying equipment
    and report about their work.
- uri: http://data.europa.eu/esco/occupation/774ad663-2124-4ac2-a287-5fb2e478906e
  preferred_label: nuclear technician
  isco_code: '3111'
  code: '3111.10'
  description: Nuclear technicians function as aids to physicists and engineers in
    nuclear laboratories and power plants. They monitor the procedures to ensure safety
    and quality control, and maintain equipment. They also handle and control radioactive
    equipment and measure radiation levels to ensure safety.
- uri: http://data.europa.eu/esco/occupation/84cb6e91-ce11-409e-9306-23c9698631af
  preferred_label: soil surveying technician
  isco_code: '3111'
  code: '3111.14'
  description: Soil surveying technicians analyse soil by carrying out technical surveying
    tasks, using soil surveying techniques. They focus on the process of classifying
    soil types and other soil properties. Soil surveying technicians operate surveying
    equipment and utilise programs to retrieve and interpret relevant data, and perform
    computations as required.
- uri: http://data.europa.eu/esco/occupation/87775d69-ae88-449e-ad71-6f9875711816
  preferred_label: chemistry technician
  isco_code: '3111'
  code: '3111.1'
  description: Chemistry technicians monitor chemical processes and conduct tests
    to analyse chemical substances for manufacturing or scientific purposes. They
    work in laboratories or production facilities where they assist chemists in their
    work. Chemistry technicians perform laboratory activities, test chemical substances,
    analyse data and report about their work.
- uri: http://data.europa.eu/esco/occupation/8a87e8b3-aecf-48a7-9837-4e022c3b9bb9
  preferred_label: chromatographer
  isco_code: '3111'
  code: 3111.1.1
  description: Chromatographers apply the corresponding chromatography techniques
    (such as gas, liquid or ion exchange techniques) to identify and analyse samples'
    chemical compounds. They calibrate and maintain the chromatography machinery and
    prepare the equipment and solutions. Chromatographers may also develop and apply
    new chromatography methods according to samples and chemical compounds that need
    to be analysed.
- uri: http://data.europa.eu/esco/occupation/a9bcc9e0-5be7-47a0-818b-acad10fe90d9
  preferred_label: physics technician
  isco_code: '3111'
  code: '3111.11'
  description: Physics technicians monitor physical processes and perform tests for
    manufacturing, educational or scientific purposes. They work in laboratories,
    schools or production facilities where they assist physicists in their work. Physics
    technicians perform technical or practical work and report about their results.
- uri: http://data.europa.eu/esco/occupation/b176e5d7-1f94-495c-907f-80a7f61aed59
  preferred_label: remote sensing technician
  isco_code: '3111'
  code: '3111.13'
  description: Remote sensing technicians collect airborne data. They utilise equipment
    aimed for the collection of data and determination of geographical points in order
    to help in a variety of operations such as land conservation, urban planning,
    and military operations.
- uri: http://data.europa.eu/esco/occupation/e6a3ce2e-c0f2-47a7-937a-61ae9abfe1fa
  preferred_label: metrology technician
  isco_code: '3111'
  code: '3111.9'
  description: Metrology technicians apply their practical knowledge of metrology
    to calibrate measuring instruments, test equipment and analyse their performance.
    They ensure that the evaluated equipment meets requirements for precision, performance
    and accuracy. They report about their work and advise on technical matters concerning
    measuring instruments.
- uri: http://data.europa.eu/esco/occupation/eb00745b-9abb-4bd8-8291-aade48af029d
  preferred_label: material testing technician
  isco_code: '3111'
  code: '3111.7'
  description: Material testing technicians perform a variety of tests on materials
    such as soils, concrete, masonry and asphalt, in order to verify conformance to
    intended usage cases and specifications.
- uri: http://data.europa.eu/esco/occupation/fb3f5f35-e6f7-4168-aef2-e4dfb7f2a3ee
  preferred_label: geology technician
  isco_code: '3111'
  code: '3111.4'
  description: Geology technicians assist in all the activities carried out by geologists.
    Under the supervision of geologists, they collect materials, carry out research
    and study the samples collected from the Earth. Geology technicians assist in
    determining the value of the land for oil or gas exploration. They perform various
    technical activities, including collecting samples during geochemical surveys,
    working on drill sites, and participating in geophysical surveys and geological
    studies.
- uri: http://data.europa.eu/esco/occupation/09e070ce-0afe-40bb-be90-530e5d42cdbd
  preferred_label: domestic energy assessor
  isco_code: '3112'
  code: 3112.1.5.1
  description: Domestic energy assessors advise individuals on energy supply for their
    homes. They assess the individual's needs and recommend the appropriate source
    of energy and supplier, attempting to secure energy sales. They also advise on
    economic and environmental advantages of types of energy, and create energy plans
    compliant with regulations and the technical requirements and conditions of the
    residence.
- uri: http://data.europa.eu/esco/occupation/0f5cc4eb-925d-4b99-be6d-b0964a253a9a
  preferred_label: civil engineering technician
  isco_code: '3112'
  code: '3112.1'
  description: Civil engineering technicians help design and execute construction
    plans and take on organisational tasks, for example in the planning and monitoring,
    and in bidding and invoicing of construction work. They also calculate material
    requirements, and help with the purchasing and organising, and ensure the quality
    of the construction materials. Civil engineering technicians may perform technical
    tasks in civil engineering and develop and advise on policy implementing strategies
    for road works, traffic lights, sewerage and water management systems.
- uri: http://data.europa.eu/esco/occupation/13331bd9-0599-47c0-9812-29650c218de3
  preferred_label: water systems engineering technician
  isco_code: '3112'
  code: 3112.1.13
  description: Water systems engineering technicians aid engineers in the development
    and implementation of water supply and water treatment systems. They monitor the
    operations to ensure compliance with health and safety regulations, check water
    quality and ensure implementation of water-related legislation.
- uri: http://data.europa.eu/esco/occupation/23a61ff1-c954-4867-b982-a018b535f98b
  preferred_label: energy conservation officer
  isco_code: '3112'
  code: '3112.6'
  description: Energy conservation officers promote the conservation of energy in
    both residential homes as in businesses. They advise people on ways te reduce
    their power consumption by enforcing energy efficiency improvements and implementing
    energy demand management policies.
- uri: http://data.europa.eu/esco/occupation/326027fc-5408-47cd-9b32-fbe770dbbe80
  preferred_label: construction quality manager
  isco_code: '3112'
  code: 3112.1.4
  description: Construction quality managers make sure the quality of the work meets
    standards set in the contract, as well as minimum legislative standards. They
    establish procedures to check quality, perform inspections, and propose solutions
    to quality shortcomings.
- uri: http://data.europa.eu/esco/occupation/3f54ceba-3c4e-4ba1-8ddb-9e49a881a60a
  preferred_label: construction safety manager
  isco_code: '3112'
  code: '3112.3'
  description: Construction safety managers inspect, enforce and control health and
    safety measures at construction sites. They also manage workplace accidents and
    take action to make sure that safety policies are correctly implemented.
- uri: http://data.europa.eu/esco/occupation/40260ee8-c94a-4dc8-a562-f9fbc2fe13b1
  preferred_label: sewerage maintenance technician
  isco_code: '3112'
  code: 3112.1.12
  description: Sewerage maintenance technicians inspect sewers and pipeline systems.
    They do this by using moving video cameras, whose recordings tell them whether
    they need to perform any maintenance and repair on these types of systems.
- uri: http://data.europa.eu/esco/occupation/41d609a1-62df-4cec-ac71-6434e545a729
  preferred_label: corrosion technician
  isco_code: '3112'
  code: '3112.4'
  description: Corrosion technicians monitor the integrity from a pipeline and provide
    repairs to it if needed. They ensure that the pipelines are properly connected
    and are in line with the health and safety regulations. Corrosion technicians
    inspect cathodic protection systems and pipeline connection points for corrosion.
    They may also assist in the designing of pipelines, analyse soil and write reports
    on technical issues.
- uri: http://data.europa.eu/esco/occupation/4c9ca706-3973-4926-854d-44011662ca83
  preferred_label: fire protection technician
  isco_code: '3112'
  code: 3112.1.7
  description: Fire protection technicians install and maintain fire protection equipment,
    such as fire extinguishers, fire alarms, fire detection systems, or sprinkler
    systems in facilities to ensure compliance to safety standards and protection
    from fire hazards. They inspect the equipment to ensure its functionality, and
    perform repairs.
- uri: http://data.europa.eu/esco/occupation/511c8e9f-b19e-4ae8-9959-c047e7410441
  preferred_label: railway infrastructure inspector
  isco_code: '3112'
  code: '3112.9'
  description: Railway infrastructure inspectors are responsible for checking the
    conditions of railways. They monitor compliance to health and safety standards
    and inspect the infrastructure to detect damage or flaws. They analyse and report
    on their findings to ensure railway conditions are maintained at a safe level.
- uri: http://data.europa.eu/esco/occupation/624986f9-21ef-4cdf-8cf6-8407a337ec2f
  preferred_label: surveying technician
  isco_code: '3112'
  code: '3112.10'
  description: Surveying technicians carry out technical surveying tasks. They assist
    surveyors, architects or engineers in surveying related technical tasks such as
    mapping land, creating construction drawings and operating precise measuring equipment.
- uri: http://data.europa.eu/esco/occupation/6293a718-3fcd-433f-a010-0899821a51b7
  preferred_label: bridge inspector
  isco_code: '3112'
  code: 3112.1.1
  description: Bridge inspectors inspect bridge structures for joint break, cracks,
    rust and other faults. They also carry out or organise the maintenance of the
    structures.
- uri: http://data.europa.eu/esco/occupation/6d1e2801-3ab0-4d74-ac27-918339e8db64
  preferred_label: construction safety inspector
  isco_code: '3112'
  code: '3112.2'
  description: Construction safety inspectors monitor construction sites and their
    conformity to health and safety regulations. They perform inspections, identify
    safety hazards and report on their findings.
- uri: http://data.europa.eu/esco/occupation/755c5c5f-2ee3-4487-94db-30ec2ba2e883
  preferred_label: rail maintenance technician
  isco_code: '3112'
  code: 3112.1.10
  description: Rail maintenance technicians execute routine inspections of railway
    tracks, powerlines, signage stations, switches, and other railway infrastructure.
    They are also sent out to repair defects quickly, safely, and at any time of the
    day or night.
- uri: http://data.europa.eu/esco/occupation/8ae1e637-840b-4be0-a5df-8653375d8949
  preferred_label: landfill supervisor
  isco_code: '3112'
  code: 3112.1.9
  description: Landfill supervisors coordinate the activities and operations of landfills
    and landfill staff. They research legislation concerning waste management and
    ensure the operations of the landfill are compliant, and direct waste disposal
    operations.
- uri: http://data.europa.eu/esco/occupation/9581c837-fee7-4068-9618-1116fd93d723
  preferred_label: engineering assistant
  isco_code: '3112'
  code: '3112.8'
  description: Engineering assistants ensure the administration and monitoring of
    technical and engineering files for projects, assignments, and quality matters.
    They assist engineers with their experiments, participate in site visits, and
    administer the collection of information.
- uri: http://data.europa.eu/esco/occupation/adf9257e-78cb-467d-b259-59ed65bd7aed
  preferred_label: fire safety tester
  isco_code: '3112'
  code: 3112.1.8
  description: Fire safety testers conduct a variety of tests on materials such as
    building, transportation and textiles materials, as well as on fire prevention
    and fire fighting systems. They measures, among other things, the flame resistance
    and behaviour of materials under extreme circumstances.
- uri: http://data.europa.eu/esco/occupation/c302791c-6864-4ec5-9a6c-2fca38764f0e
  preferred_label: fire inspector
  isco_code: '3112'
  code: 3112.1.6
  description: Fire inspectors conduct inspections of buildings and properties to
    ensure they are compliant with fire prevention and safety regulations, and enforce
    the regulations in facilities which are not compliant. They also perform educational
    activities, educating the public on fire safety and prevention methods, policies,
    and disaster response.
- uri: http://data.europa.eu/esco/occupation/c7f5cab7-7cfb-47d7-890c-6b9c00a9eaaf
  preferred_label: energy assessor
  isco_code: '3112'
  code: 3112.1.5
  description: Energy assessors determine the energy performance of buildings. They
    create an Energy Performance Certificate (EPC) which indicates what the estimated
    energy consumption of a property is. Furthermore they give advice on how to improve
    energy conservation.
- uri: http://data.europa.eu/esco/occupation/c9a5f7c5-0f8b-4252-9729-5f19c105ef81
  preferred_label: road maintenance technician
  isco_code: '3112'
  code: 3112.1.11
  description: Road maintenance technicians inspect and manage roads in enclosed areas
    for maintenance and repair. They help to relieve traffic safely and smoothly,
    and check if traffic signs, roads and pavements are in good condition.
- uri: http://data.europa.eu/esco/occupation/cbde1a3a-406d-4d17-b30b-03981925035d
  preferred_label: energy analyst
  isco_code: '3112'
  code: '3112.5'
  description: Energy analysts evaluate the consumption of energy in buidings owned
    by consumers and businesses. By analysing existing energy systems, they recommend
    cost-effective alternatives. Energy analysts suggest efficiency improvements,
    make business analyses and participate in the development of policies concerning
    the use of traditional fuels, transportation, and other factors relating to energy
    consumption.
- uri: http://data.europa.eu/esco/occupation/de74eb4e-c95e-425a-9b3a-7be805ec0321
  preferred_label: energy consultant
  isco_code: '3112'
  code: '3112.7'
  description: Energy consultants advise clients on the advantages and disadvantages
    of different energy sources. They help clients to understand energy tariffs and
    try to reduce their energy consumption and carbon footprint by using energy efficient
    products and methods.
- uri: http://data.europa.eu/esco/occupation/f0978ec0-ae7d-4c4a-8f80-3fd200edddac
  preferred_label: construction quality inspector
  isco_code: '3112'
  code: 3112.1.3
  description: Construction quality inspectors monitor the activities at larger construction
    sites to make sure everything happens according to standards and specifications.
    They pay close attention to potential safety problems and take samples of products
    to test for conformity with standards and specifications.
- uri: http://data.europa.eu/esco/occupation/f0e479d9-7afd-40b1-b60f-b68c400c15fb
  preferred_label: building inspector
  isco_code: '3112'
  code: 3112.1.2
  description: Building inspectors perform inspections of buildings to determine compliance
    with specifications for various focuses of assessment. They observe and determine
    the suitability of construction, quality and resistance, and general compliance
    with regulations.
- uri: http://data.europa.eu/esco/occupation/10841c22-0154-48ab-aaca-ce61b9a8e448
  preferred_label: battery manufacturing technician
  isco_code: '3113'
  code: '3113.4'
  description: Battery manufacturing technicians test and package batteries such as
    cells, packs, and systems, ensuring that they meet the required quality standards
    and performance specifications. They work with a team of engineers and scientists
    in order to prepare the batteries for various applications as electric vehicles,
    consumer electronics, and grid storage.
- uri: http://data.europa.eu/esco/occupation/41519a6e-d4f1-4991-b821-24c54647949d
  preferred_label: battery maintenance technician
  isco_code: '3113'
  code: '3113.3'
  description: Battery maintenance technicians are responsible for the maintenance
    and repair of the equipment used in the production of batteries. They work in
    battery manufacturing plants and are responsible for ensuring that the equipment
    is in good working order and is able to produce high-quality batteries. They need
    to have a strong understanding of mechanical, electrical, and control systems,
    as well as experience with maintenance and repair of manufacturing equipment.
- uri: http://data.europa.eu/esco/occupation/51c7015c-dc81-4fcb-b15f-619a4656a9fe
  preferred_label: electromechanical engineering technician
  isco_code: '3113'
  code: 3113.1.2
  description: Electromechanical engineering technicians collaborate with electromechanical
    engineers in the development of electromechanical equipment. Electromechanical
    engineering technicians are responsible for building, installing, testing, monitoring,
    and maintaining the electromechanical equipment, circuits and systems. They test
    this by the use of test instruments such as oscilloscopes and voltmeters. Electromechanical
    engineering technicians also use soldering equipment and hand tools to repair
    electromechanical equipment.
- uri: http://data.europa.eu/esco/occupation/7ef064b1-aab8-4818-a468-8f17acbfd995
  preferred_label: hydropower technician
  isco_code: '3113'
  code: '3113.2'
  description: Hydropower technicians install and maintain systems in hydropower plants.
    They perform inspections, analyse problems and carry out repairs. They ensure
    the turbines operate in compliance with regulations, and assist the hydropower
    engineers in the construction of turbines.
- uri: http://data.europa.eu/esco/occupation/9aa2a36f-296e-45fe-9798-b7839e0ed389
  preferred_label: electrical engineering technician
  isco_code: '3113'
  code: '3113.1'
  description: Electrical engineering technicians work together with electrical engineers
    in electrical engineering reasearch. They perform technical tasks and aid in the
    designing, testing, manufacturing and operation of electrical devices and facilities.
- uri: http://data.europa.eu/esco/occupation/c332af81-4481-4494-9786-aea1f5c5ffcf
  preferred_label: calibration technician
  isco_code: '3113'
  code: 3113.1.1
  description: Calibration technicians test and calibrate electrical and electronic
    equipment. They read blueprints and other technical drawings to develop testing
    procedures for every product.
- uri: http://data.europa.eu/esco/occupation/0ea36a48-a27d-4515-b61f-3cab395cf60f
  preferred_label: microelectronics engineering technician
  isco_code: '3114'
  code: 3114.1.6
  description: Microelectronics engineering technicians collaborate with microelectronics
    engineers in the development of small electronic devices and components such as
    micro-processors, memory chips, and integrated circuits for machine and motor
    controls. Microelectronics engineering technicians are responsible for building,
    testing, and maintaining the microelectronic systems and devices.
- uri: http://data.europa.eu/esco/occupation/2168e49d-e58a-43ec-a15e-8e173939b255
  preferred_label: microelectronics maintenance technician
  isco_code: '3114'
  code: 3114.1.7
  description: Microelectronics maintenance technicians are responsible for carrying
    out preventive and corrective activities and troubleshooting of microelectronic
    systems and devices. They diagnose and detect malfunctions in microelectronic
    systems, products, and components and remove, replace, or repair these components
    when necessary. They execute preventative equipment maintenance tasks.
- uri: http://data.europa.eu/esco/occupation/26e1add0-da3f-4ed6-aa91-791cb550146f
  preferred_label: microsystem engineering technician
  isco_code: '3114'
  code: 3114.1.8
  description: Microsystem engineering technicians collaborate with micro-system engineers
    in the development of microsystems or microelectromechanical systems (MEMS) devices,
    which can be integrated in mechanical, optical, acoustic, and electronic products.
    Microsystem engineering technicians are responsible for building, testing, and
    maintaining the microsystems.
- uri: http://data.europa.eu/esco/occupation/27811419-407f-4868-a388-2f7df7aafd91
  preferred_label: electronics engineering technician
  isco_code: '3114'
  code: '3114.1'
  description: Electronics engineering technicians work closely with electronics engineers
    in the development of electronic equipment and devices. Electronics engineering
    technicians are responsible for building, testing, and maintaining electronic
    devices.
- uri: http://data.europa.eu/esco/occupation/2bb8adee-2b84-4d7b-84f9-0620bc09ada8
  preferred_label: instrumentation engineering technician
  isco_code: '3114'
  code: 3114.1.4
  description: Instrumentation engineering technicians assist instrumentation engineers
    in the development of control equipment, such as valves, relays, and regulators,
    which can be used to monitor and control processes. Instrumentation engineering
    technicians are responsible for building, testing, monitoring, and maintaining
    of equipment. They use wrenches, beam cutters, grind saws, and overhead cranes
    to build and repair equipment.
- uri: http://data.europa.eu/esco/occupation/30641348-f9f2-4fe5-ab8c-fe6ff9931a54
  preferred_label: medical device engineering technician
  isco_code: '3114'
  code: 3114.1.5
  description: Medical device engineering technicians collaborate with medical device
    engineers in the design, development and production of medical-technical systems,
    installations, and equipment such as pacemakers, MRI machines, and X-ray devices.
    They build, install, inspect, modify, repair, calibrate, and maintain medical-technical
    equipment and support systems. Medical device engineering technicians are responsible
    for the operational readiness, safe use, economic operation and the appropriate
    procurement of medical equipment and facilities in hospitals.
- uri: http://data.europa.eu/esco/occupation/38a7f453-a7f0-45d2-a74d-5b92506e4a21
  preferred_label: computer hardware engineering technician
  isco_code: '3114'
  code: 3114.1.2
  description: Computer hardware engineering technicians collaborate with computer
    hardware engineers in the development of computer hardware, such as motherboards,
    routers, and microprocessors. Computer hardware engineering technicians are responsible
    for building, testing, monitoring, and maintaining the developed computer technology.
- uri: http://data.europa.eu/esco/occupation/631e504f-0db4-4e03-bf90-3f00d550170f
  preferred_label: sensor engineering technician
  isco_code: '3114'
  code: 3114.1.10
  description: Sensor engineering technicians collaborate with sensor engineers in
    the development of sensors, sensor systems, and products that are equipped with
    sensors. Their role is to build, test, maintain, and repair the sensor equipment.
- uri: http://data.europa.eu/esco/occupation/b5e21e2b-ab0c-4c8d-8277-d98be4ad79c4
  preferred_label: avionics inspector
  isco_code: '3114'
  code: 3114.1.1
  description: Avionics inspectors inspect instruments, electrical, mechanical and
    electronic systems of aircrafts to ensure their compliance with performance and
    safety standards. They also examine maintenance, repair and overhaul work and
    review any modification to check its conformity to standards and procedures. They
    provide detailed inspection, certification and repair records.
- uri: http://data.europa.eu/esco/occupation/becbe3ca-e000-40c0-9f67-5c4035b930ea
  preferred_label: computer hardware test technician
  isco_code: '3114'
  code: 3114.1.3
  description: Computer hardware test technicians conduct testing of computer hardware
    such as circuit boards, computer chips, computer systems, and other electronic
    and electrical components. They analyse the hardware configuration and test the
    hardware reliability and conformance to specifications.
- uri: http://data.europa.eu/esco/occupation/dcfeb6e4-f39d-49fb-96cd-23292fb3e037
  preferred_label: optoelectronic engineering technician
  isco_code: '3114'
  code: 3114.1.9
  description: Optoelectronic engineering technicians collaborate with engineers in
    the development of optoelectronic systems and components, such as photodiodes,
    optical sensors, lasers and LED's. Optoelectronic engineering technicians build,
    test, install and calibrate optoelectronic equipment. They read blueprint and
    other technical drawings to develop testing and calibrating procedures.
- uri: http://data.europa.eu/esco/occupation/04849c5c-9236-4a75-aabb-11c6d03e459c
  preferred_label: marine engineering technician
  isco_code: '3115'
  code: 3115.1.7
  description: Marine engineering technicians carry out technical functions to help
    marine engineers with the design, development, manufacturing and testing processes,
    installation and maintenance of all types of boats from pleasure crafts to naval
    vessels, including submarines. They also conduct experiments, collect and analyse
    data and report their findings.
- uri: http://data.europa.eu/esco/occupation/05a55bb3-68d6-4ff0-83fd-46a68a45a598
  preferred_label: aerospace engineering technician
  isco_code: '3115'
  code: 3115.1.1
  description: Aerospace engineering technicians work with aerospace engineers to
    operate, maintain and test equipment used on aircraft and spacecraft. They review
    blueprints and instructions to determine test specifications and procedures. They
    use software to make sure that parts of a spacecraft or aircraft are functioning
    properly. They record test procedures and results, and make recommendations for
    changes.
- uri: http://data.europa.eu/esco/occupation/0f2c04f1-9001-4a77-884f-1ea16949f6f6
  preferred_label: rolling stock engineering technician
  isco_code: '3115'
  code: 3115.1.18
  description: Rolling stock engineering technicians carry out technical functions
    to help rolling stock engineers with the design, development, manufacturing and
    testing processes, installation and maintenance of rail vehicles such as wagons,
    multiple units, carriages and locomotives. They also conduct experiments, collect
    and analyse data and report their findings.
- uri: http://data.europa.eu/esco/occupation/11833a96-fc27-4b03-a53d-892ac891a2bb
  preferred_label: production engineering technician
  isco_code: '3115'
  code: 3115.1.16
  description: Production engineering technicians plan production, follow up production
    processes and develop and test solutions to solve technical problems. They work
    closely with engineers and technologists, inspect products, conduct tests, and
    collect data.
- uri: http://data.europa.eu/esco/occupation/3046f16d-1f7d-408f-b9a5-155410fbd2ea
  preferred_label: pneumatic engineering technician
  isco_code: '3115'
  code: 3115.1.15
  description: Pneumatic engineering technicians evaluate operating pneumatic systems
    and assemblies such as compressed air machines, and recommend modifications for
    more efficiency. They are also involved in the design of pneumatic systems and
    components such as circuits.
- uri: http://data.europa.eu/esco/occupation/384ed128-e86e-4dd8-96ff-b6e6657cb027
  preferred_label: marine surveyor
  isco_code: '3115'
  code: 3115.1.9
  description: Marine surveyors inspect vessels intended for operations in maritime
    or open sea waters. They ensure that vessels and equipment follow the regulations
    laid down by the International Maritime Organisation (IMO). They may also act
    as third parties for the review of offshore facilities and construction projects.
- uri: http://data.europa.eu/esco/occupation/3ce9c89d-6f1a-48b5-942d-386e46e2fd06
  preferred_label: heating, ventilation, air conditioning and refrigeration engineering
    technician
  isco_code: '3115'
  code: 3115.1.5
  description: Heating, ventilation, air conditioning and refrigeration engineering
    technicians aid in the design of devices which provide heating, ventilation, air
    conditioning and possibly refrigeration in buildings. They ensure the equipment
    complies with environmental standards. They handle hazardous materials used in
    the systems, and ensure safety precautions are in place.
- uri: http://data.europa.eu/esco/occupation/42e9d1c5-76f1-41ef-996e-38d5ac711a31
  preferred_label: rolling stock inspector
  isco_code: '3115'
  code: 3115.1.21
  description: Rolling stock inspectors inspect wagons and carriages to assess their
    technical condition while grouped together and before they are used for transportation
    activities. They check technical devices, ensure complete and correct operation
    of the rolling stock, and prepare required technical documents and/or checklists.
    Depending on work organisation they are also responsible for limited ad-hoc maintenance
    or exchange work and the performance of brake tests.
- uri: http://data.europa.eu/esco/occupation/444c9aa9-578d-4a9a-9949-99ef1bacb20e
  preferred_label: automotive engineering technician
  isco_code: '3115'
  code: 3115.1.4
  description: Automotive engineering technicians work with automotive engineers to
    operate, repair, maintain and test equipment used in motor vehicles. In some environments,
    such as an airport they are responsible for keeping equipment and vehicles serviceable.
    They review blueprints and designs to determine test specifications and procedures.
    Automotive engineering technicians use software to make sure that parts of a motor
    vehicle are functioning properly. They record test procedures and results, and
    make recommendations for changes.
- uri: http://data.europa.eu/esco/occupation/80a648c5-ecb7-40e6-a4d4-7680291ffa74
  preferred_label: rolling stock engine tester
  isco_code: '3115'
  code: 3115.1.20
  description: Rolling stock engine testers test the performance of diesel and electric
    engines used for locomotives. They position or give directions to workers positioning
    engines on the test stand. They use hand tools and machinery to position and connect
    the engine to the test stand. They use computerised equipment to enter, read and
    record test data such as temperature, speed, fuel consumption, oil and exhaust
    pressure.
- uri: http://data.europa.eu/esco/occupation/8234eee9-1647-460d-8d62-7fe02cb884b0
  preferred_label: refrigeration air condition and heat pump technician
  isco_code: '3115'
  code: 3115.1.17
  description: Refrigeration air condition and heat pump technicians have the competence
    and ability to safely and satisfactory perform design, pre-assembling, installation,
    putting into operation, commissioning, operating, in-service inspection, leakage
    checking, general maintenance, circuit maintenance, decommissioning, removing,
    reclaiming, recycling refrigerant and dismantling of refrigeration, air condition
    and heat pump systems, equipment or appliance, and to work with electrical, electrotechnical
    and electronical components of refrigeration, air conditioning and heat pump systems.
- uri: http://data.europa.eu/esco/occupation/84219dd7-eb68-426e-9ec3-431eceb61c96
  preferred_label: rolling stock engine inspector
  isco_code: '3115'
  code: 3115.1.19
  description: Rolling stock engine inspectors inspect diesel and electric engines
    used for locomotives to ensure compliance with standards and regulations. They
    conduct routine, post-overhaul, pre-availability and post-casualty inspections.
    They provide documentation for repair activities and technical support to maintenance
    and repair centers. They review administrative records, analyse the operating
    performance of engines and report their findings.
- uri: http://data.europa.eu/esco/occupation/8b490c1a-2f8c-4693-bcfa-ecfc88838a8e
  preferred_label: motor vehicle engine inspector
  isco_code: '3115'
  code: 3115.1.12
  description: Motor vehicle engine inspectors inspect diesel, gas, petrol and electric
    engines used for cars, buses, trucks etc. in assembly facilities such as factories
    and mechanic shops to ensure compliance with safety standards and regulations.
    They conduct routine, post-overhaul, pre-availability and post-casualty inspections.
    They provide documentation for repair activities and technical support to maintenance
    and repair centres. They review administrative records, analyse the operating
    performance of engines and report their findings.
- uri: http://data.europa.eu/esco/occupation/a9b20949-897b-481f-8642-d1f69263baff
  preferred_label: industrial maintenance supervisor
  isco_code: '3115'
  code: 3115.1.6
  description: Industrial maintenance supervisors organise and supervise the activities
    and maintenance operations of machines, systems and equipment. They ensure inspections
    are done according to health, safety and environmental standards, and productivity
    and quality requirements.
- uri: http://data.europa.eu/esco/occupation/b31e404e-9af6-457d-a58a-208f612eeba3
  preferred_label: mechanical engineering technician
  isco_code: '3115'
  code: '3115.1'
  description: Mechanical engineering technicians provide technical support to mechanical
    engineers in producing and manufacturing mechanical machinery. They help make
    designs and adjustments, and perform tests. They also develop layouts and drawings,
    collate and interpret data and write reports.
- uri: http://data.europa.eu/esco/occupation/b343dd0c-8a83-4e13-a79c-0ac52f526c64
  preferred_label: aircraft engine tester
  isco_code: '3115'
  code: 3115.1.3
  description: Aircraft engine testers test the performance of all engines used for
    aircraft in specialised facilities such as laboratories.They position or give
    directions to workers positioning engines on the test stand. They use hand tools
    and machinery to position and connect the engine to the test stand. They use computerised
    equipment to enter, read and record test data such as temperature, speed, fuel
    consumption, oil and exhaust pressure.
- uri: http://data.europa.eu/esco/occupation/b50ae5f6-3f67-4cc7-92bb-6cec7214bfc4
  preferred_label: motor vehicle engine tester
  isco_code: '3115'
  code: 3115.1.13
  description: Motor vehicle engine testers test the performance of diesel, petrol,
    gas and electric engines in specialised facilities such as laboratories. They
    position or give directions to workers positioning engines on the test stand.
    They use hand tools and machinery to position and connect the engine to the test
    stand. They use computerised equipment to enter, read and record test data such
    as temperature, speed, fuel consumption, oil and exhaust pressure.
- uri: http://data.europa.eu/esco/occupation/b9296f1a-a68b-4ac7-9904-f2cf1374fbaf
  preferred_label: material stress analyst
  isco_code: '3115'
  code: 3115.1.10
  description: Material stress analysts plan and use software to perform structural
    analyses including static, stability and fatigue analyses on a variety of machines.
    They develop analysis of primary and secondary structures. They prepare technical
    reports to document their analysis results, participate in design reviews and
    recommend process improvements. They also assist in the development of structural
    test plans.
- uri: http://data.europa.eu/esco/occupation/cd92596c-bd96-4126-8b67-7bf6ed2ca8fb
  preferred_label: marine mechatronics technician
  isco_code: '3115'
  code: 3115.1.8
  description: Marine mechatronics technicians work on shipyards and vessels to configure
    and optimize industrial mechatronic systems and plans, supervise and execute their
    assembly and maintenance.
- uri: http://data.europa.eu/esco/occupation/d2af4f6b-c990-4d8e-bb17-befca23a307a
  preferred_label: optomechanical engineering technician
  isco_code: '3115'
  code: 3115.1.14
  description: Optomechanical engineering technicians collaborate with engineers in
    the development of optomechanical devices, such as optical tables, deformable
    mirrors, and optical mounts. Optomechanical engineering technicians build, install,
    test, and maintain optomechanical equipment prototypes. They determine materials
    and assembly requirements.
- uri: http://data.europa.eu/esco/occupation/da6220cb-21ee-4076-8796-1e922b44c394
  preferred_label: vessel engine inspector
  isco_code: '3115'
  code: 3115.1.22
  description: Vessel engine inspectors inspect ship and boat engines such as electric
    motors, nuclear reactors, gas turbine engines, outboard motors, two-stroke or
    four-stroke diesel engines, LNG, fuel dual engines and, in some cases, marine
    steam engines in assembly facilities to ensure compliance with safety standards
    and regulations. They conduct routine, post-overhaul, pre-availability and post-casualty
    inspections. They provide documentation for repair activities and technical support
    to maintenance and repair centres. They review administrative records, analyse
    the operating performance of engines and report their findings.
- uri: http://data.europa.eu/esco/occupation/e58eadca-e512-4167-96f1-fff980f117e3
  preferred_label: vessel engine tester
  isco_code: '3115'
  code: 3115.1.23
  description: Vessel engine testers test the performance of vessel engines such as
    electric motors, nuclear reactors, gas turbine engines, outboard motors, two-stroke
    or four-stroke diesel engines, LNG, dual fuel engines and, in some cases, marine
    steam engines in specialised facilities such as laboratories. They position or
    give directions to workers positioning engines on the test stand. They use hand
    tools and machinery to position and connect the engine to the test stand. They
    use computerised equipment to enter, read and record test data such as temperature,
    speed, fuel consumption, oil and exhaust pressure.
- uri: http://data.europa.eu/esco/occupation/edf2e989-d7c5-496e-b365-81fc5cb9eb39
  preferred_label: mechatronics engineering technician
  isco_code: '3115'
  code: 3115.1.11
  description: Mechatronics engineering technicians collaborate with engineers in
    the development of mechatronic devices and applications through a combination
    of mechanical engineering, electronic engineering, and computer engineering. They
    build, test, install, and calibrate mechatronics and solve technical problems.
- uri: http://data.europa.eu/esco/occupation/ef9c2914-2f3d-464c-ae0a-d02b403dc7e9
  preferred_label: aircraft engine inspector
  isco_code: '3115'
  code: 3115.1.2
  description: Aircraft engine inspectors inspect all types of engines used for aircrafts
    in factories to ensure compliance with safety standards and regulations. They
    conduct routine, post-overhaul, pre-availability and post-casualty inspections.
    They provide documentation for repair activities and technical support to maintenance
    and repair centres. They review administrative records, analyse the operating
    performance of engines and report their findings.
- uri: http://data.europa.eu/esco/occupation/f7ddb68a-beba-4aa9-b5cb-d174d70ea724
  preferred_label: welding inspector
  isco_code: '3115'
  code: 3115.1.24
  description: Welding inspectors examine the connections and bonds between metals.
    They utilise visual tools and electrical instruments to inspect and ensure the
    quality and safety of connections. Welding inspectors ensure that all related
    welding activities, plans and materials follow the appropriate guidelines, in
    accordance with safety regulations. In addition to working in the field completing
    their examinations of welding projects, inspectors spend time in an office setting
    compiling their reports.
- uri: http://data.europa.eu/esco/occupation/00634fc4-802a-461b-8af0-499273756f99
  preferred_label: asphalt laboratory technician
  isco_code: '3116'
  code: 3116.1.1
  description: Asphalt laboratory technicians perform asphalt and related raw materials
    inspections and laboratory testing, ensuring a high quality of the products. They
    also participate in coming up with resolutions to technical issues on construction
    sites.
- uri: http://data.europa.eu/esco/occupation/35bc3847-58ad-46f5-8921-e58acc2762a6
  preferred_label: chemical engineering technician
  isco_code: '3116'
  code: '3116.1'
  description: Chemical engineering technicians transform raw materials in order to
    develop and test chemical products. They also work on improving chemical plant
    operations and processes.
- uri: http://data.europa.eu/esco/occupation/657eeac9-5bb9-449d-a353-aa7d5f47e2b5
  preferred_label: colour sampling technician
  isco_code: '3116'
  code: 3116.1.3
  description: Colour sampling technicians prepare recipes of colours and dyeing mixes.
    They ensure consistency in colour while using materials from different sources.
- uri: http://data.europa.eu/esco/occupation/c95121e9-e9f7-40a9-adcb-6fda1e82bbd2
  preferred_label: hazardous waste technician
  isco_code: '3116'
  code: 3116.1.4
  description: Hazardous waste technicians dispose of materials that have been in
    contact with or are ignitable, corrosive, reactive, toxic or a combination of
    the aforementioned hazardous traits. They remove the waste from industrial facilities
    or households and transport them to a treatment facility to ensure they are treated
    and disposed of according to regulations. They may also advise on the proper treatment
    of hazardous waste, and aid in the clean-up of hazardous waste spills.
- uri: http://data.europa.eu/esco/occupation/dacaa18b-93f6-48b4-b4f2-cb33e21804e7
  preferred_label: chemical manufacturing quality technician
  isco_code: '3116'
  code: 3116.1.2
  description: Chemical manufacturing quality technicians perform inspections and
    precision measurements in order to test and ensure the quality of products, by
    using computer controlled machinery and systems.
- uri: http://data.europa.eu/esco/occupation/06351e17-67c4-44bc-adf7-64b73f92c3b5
  preferred_label: metallurgical technician
  isco_code: '3117'
  code: '3117.3'
  description: Metallurgical technicians provide technical support in researching
    and performing experiments on minerals, metals, alloys, oil and gas. They also
    assist in improving the methods of extraction.
- uri: http://data.europa.eu/esco/occupation/9ce12690-c3bf-4135-b7a5-b666bb8c68f5
  preferred_label: mine surveying technician
  isco_code: '3117'
  code: '3117.5'
  description: Mine surveying technicians conduct boundary and topographic surveys
    and surveys of the progress of mining operations. They operate surveying equipment
    and utilise programs to retrieve and interpret relevant data, and perform computations
    as required.
- uri: http://data.europa.eu/esco/occupation/e9665bdf-2989-4dc5-9aa9-7b791e489779
  preferred_label: geotechnician
  isco_code: '3117'
  code: '3117.2'
  description: Geotechnicians collect and process rock and soil samples for geomechanical
    testing. They also describe the quality of rock mass, including structure, discontinuities,
    colour and weathering. Mine geotechnicians may measure the size of underground
    openings. They report the collected information to geologists and engineers as
    required.
- uri: http://data.europa.eu/esco/occupation/f83f19ca-b816-484a-b8be-92b7785121ea
  preferred_label: mine safety officer
  isco_code: '3117'
  code: '3117.4'
  description: Mine safety officers oversee health and safety systems at mining operations.
    They report workplace accidents, compile accident statistics, estimate risks to
    employee safety and health, and suggest solutions or new measurements and techniques.
- uri: http://data.europa.eu/esco/occupation/fad4abdf-fe1b-4751-8253-aef40b49afe0
  preferred_label: desalination technician
  isco_code: '3117'
  code: '3117.1'
  description: Desalination technicians operate, monitor and maintain desalination
    plant equipment. They ensure compliance with legal regulations and safety and
    health requirements.
- uri: http://data.europa.eu/esco/occupation/1c9937fe-5eaa-4f7e-ba31-77e6e7db022c
  preferred_label: aerospace engineering drafter
  isco_code: '3118'
  code: 3118.3.1
  description: Aerospace engineering drafters convert the aerospace engineers' designs
    into technical drawings usually using computer-aided design programs. Their drawings
    detail dimensions, fastening and assembling methods and other specifications used
    in the manufacture of aircrafts and spacecrafts.
- uri: http://data.europa.eu/esco/occupation/1e2aaeff-5bf1-4649-9f09-9ebbd5cc3501
  preferred_label: electromechanical drafter
  isco_code: '3118'
  code: 3118.3.7
  description: Electromechanical drafters draw and create blueprints together with
    electromechanical engineers. They interpret the specifications and requirements
    made by the engineer and design electromechanical equipment and components.
- uri: http://data.europa.eu/esco/occupation/2515bd46-ccd4-4561-97d1-b9544608a76e
  preferred_label: electrical drafter
  isco_code: '3118'
  code: 3118.3.6
  description: Electrical drafters support engineers in the design and conceptualisation
    of electrical equipment. They draft, with the support of specialised software,
    the specifications of a varied number of electrical systems such as voltage transformers,
    power plants, or energy supply in buildings.
- uri: http://data.europa.eu/esco/occupation/2ac509e8-2850-42c3-b11d-d24077a7921b
  preferred_label: marine engineering drafter
  isco_code: '3118'
  code: 3118.3.10
  description: Marine engineering drafters convert the marine engineers’ designs into
    technical drawings usually using software. Their drawings detail dimensions, fastening
    and assembling methods and other specifications used in the manufacture of all
    types of boats from pleasure crafts to naval vessels, including submarines.
- uri: http://data.europa.eu/esco/occupation/30aef4c6-49ca-4464-bf82-78ed88b3eb9b
  preferred_label: civil drafter
  isco_code: '3118'
  code: 3118.3.4
  description: Civil drafters draw and prepare sketches for civil engineers and architects
    of architectonic projects of different kinds, topographical maps, or for the reconstruction
    of existing structures. They lay down in the sketches all the specifications and
    requirements such as mathematical, aesthetic, engineering, and technical.
- uri: http://data.europa.eu/esco/occupation/341b405b-12cd-4ece-9b4b-cbfae3551ea3
  preferred_label: automotive engineering drafter
  isco_code: '3118'
  code: 3118.3.3
  description: Automotive engineering drafters convert the automotive engineers’ designs
    into technical drawings usually using software. Their drawings detail dimensions,
    fastening and assembling methods and other specifications used in the manufacture
    of automotive components, cars, buses, trucks and other motor vehicles.
- uri: http://data.europa.eu/esco/occupation/364cb5ca-3002-425f-b815-aefa513df78a
  preferred_label: architectural drafter
  isco_code: '3118'
  code: 3118.3.2
  description: Architectural drafters make drawings of the specifications and ideas
    provided by architects. They draw architectural drawings using computer-aided
    equipment and software, or using conventional methods like paper and pen.
- uri: http://data.europa.eu/esco/occupation/38240cc5-d1d9-4de9-9480-29c51da291eb
  preferred_label: mechanical engineering drafter
  isco_code: '3118'
  code: 3118.3.11
  description: Mechanical engineering drafters convert mechanical engineers' designs
    and sketches into technical drawings detailing dimensions, fastening and assembling
    methods and other specifications used for example in manufacturing processes.
- uri: http://data.europa.eu/esco/occupation/3f73120d-cece-4848-9fb4-61fdbaa7eba5
  preferred_label: rolling stock engineering drafter
  isco_code: '3118'
  code: 3118.3.13
  description: Rolling stock engineering drafters convert the rolling stock engineers’
    designs into technical drawings usually using software. Their drawings detail
    dimensions, fastening and assembling methods and other specifications used in
    the manufacture of rail vehicles such as locomotives, multiple units, carriages
    and wagons.
- uri: http://data.europa.eu/esco/occupation/4cf7be91-fed9-47a7-9ca9-e74c7eb6becb
  preferred_label: 3D printing technician
  isco_code: '3118'
  code: '3118.1'
  description: 3D printing technicians assist in the designing and programming of
    products, ranging from prosthetic products to 3D miniatures. They may also provide
    3D printing maintenance, check 3D renders for customers and run 3D printing tests.
    3D printing technicians can also repair, maintain and clean 3D printers.
- uri: http://data.europa.eu/esco/occupation/62979364-6fac-41f2-87ca-202bca19a6ab
  preferred_label: computer-aided design operator
  isco_code: '3118'
  code: 3118.3.5
  description: Computer-aided design operators use computer hardware and software
    in order to add the technical dimensions to computer aided design drawings. Computer-aided
    design operators ensure all additional aspects of the created images of products
    are accurate and realistic. They also calculate the amount of materials needed
    to manufacture the products. Later the finalised digital design is processed by
    computer-aided manufacturing machines that produce the finished product.
- uri: http://data.europa.eu/esco/occupation/849a656c-8559-4471-91ed-442c42b0b641
  preferred_label: clothing CAD technician
  isco_code: '3118'
  code: '3118.2'
  description: Clothing CAD technicians use software to create design plans for clothing
    products. They work in 2D design which is known as surface modelling, or 3D design
    which is called solid modelling. They use surface modelling to draw a flat representation
    of the clothing product. In solid modelling, they create a 3D display of a structure
    or component in order to take a virtual look of the clothing product.
- uri: http://data.europa.eu/esco/occupation/91e35fd9-ac59-48ef-8416-c06a201b2da8
  preferred_label: printed circuit board designer
  isco_code: '3118'
  code: '3118.4'
  description: Printed circuit board designers diagram and design the construction
    of circuit boards. They envision the logical placing of conductive tracks, coppers,
    and pin pads in the board. They use computer programmes and specialised software
    for the designs.
- uri: http://data.europa.eu/esco/occupation/a4869ae9-2dfe-48cc-bd97-f803880f3407
  preferred_label: drafter
  isco_code: '3118'
  code: '3118.3'
  description: Drafters prepare and create technical drawings using a special software
    or manual techniques, to show how something is built or works.
- uri: http://data.europa.eu/esco/occupation/c52129d9-4656-4ce8-ba13-8a72a51d5400
  preferred_label: product development engineering drafter
  isco_code: '3118'
  code: 3118.3.12
  description: Product development engineering drafters design and draw blueprints
    to bring new concepts and products to life. They draft and draw detailed plans
    on how to manufacture a product.
- uri: http://data.europa.eu/esco/occupation/d849fd2a-5210-434b-a50b-2d92de3a4bac
  preferred_label: electronics drafter
  isco_code: '3118'
  code: 3118.3.8
  description: Electronics drafters support electronic engineers in the design and
    conceptualisation of electronic equipment. They draft blueprints and assembly
    diagrams of electronic systems and components using technical drawing software.
- uri: http://data.europa.eu/esco/occupation/defbf906-e823-44b4-872f-99406c51022b
  preferred_label: heating, ventilation, air conditioning (and refrigeration) drafter
  isco_code: '3118'
  code: 3118.3.9
  description: Heating, ventilation, air conditioning (and refrigeration) drafters
    create prototypes and sketches, technical details, and aesthetic briefings provided
    by engineers for the creation of drawings, usually computer aided, of heating,
    ventilation, air conditioning and possibly refrigeration systems. They can draft
    for all kinds of projects where these systems can be used.
- uri: http://data.europa.eu/esco/occupation/0663da10-e42c-41e8-992c-07d00ac97bea
  preferred_label: textile quality technician
  isco_code: '3119'
  code: 3119.16.6
  description: Textile quality technicians perform physical laboratory tests on textile
    materials and products. They compare textile materials and products to standards
    and interpret results.
- uri: http://data.europa.eu/esco/occupation/08f5481e-9233-4ef2-9e4b-945224879ce5
  preferred_label: commissioning technician
  isco_code: '3119'
  code: '3119.4'
  description: Commissioning technicians work with commissioning engineers to supervise
    the final stages of a project when systems are installed and tested. They inspect
    the correct functioning of the equipment, facilities and plants and when necessary
    they perform repairs and maintenance.
- uri: http://data.europa.eu/esco/occupation/1209b85e-80f1-490f-a7e1-6ad220bb956d
  preferred_label: footwear product developer
  isco_code: '3119'
  code: '3119.6'
  description: Footwear product developers provide interface between design and production.
    They engineer the footwear prototypes previously created by designers. They select,
    design or re-design lasts and footwear components, make patterns for uppers, linings
    and bottom components, and produce technical drawings for a various range of tools,
    e.g. cutting dies, mould, etc. They also produce and evaluate footwear prototypes,
    grade and produce sizing samples, perform required tests for samples and confirm
    the customer’s qualitative and pricing constraints.
- uri: http://data.europa.eu/esco/occupation/16bc69b8-5abc-49e4-a860-befb734d54d3
  preferred_label: textile chemical quality technician
  isco_code: '3119'
  code: 3119.16.5
  description: Textile chemical quality technicians perform chemical laboratory tests
    on textile materials and products. They interpret results and support colouration
    and finishing of textiles.
- uri: http://data.europa.eu/esco/occupation/1a165cb5-99ff-4a4e-9e08-97a0fb7ed6f8
  preferred_label: offshore renewable energy technician
  isco_code: '3119'
  code: '3119.11'
  description: Offshore renewable energy technicians install offshore energy farms
    and equipment. They ensure the equipment operate in compliance with regulations
    and assist the offshore renewable energy engineers in the construction of energy
    devices such as wind turbine blades, tidal stream and wave generators. They also
    react to system problems, and repair faults.
- uri: http://data.europa.eu/esco/occupation/250d6493-68ab-4d69-ba67-c10293a20f49
  preferred_label: photonics engineering technician
  isco_code: '3119'
  code: '3119.12'
  description: Photonics engineering technicians collaborate with engineers in the
    development of photonic systems or components, usually in the form of optical
    equipment, such as lasers, lenses, and fibre optic equipment. Photonics engineering
    technicians build, test, install and calibrate optical equipment. They read blueprint
    and other technical drawings to develop testing and calibrating procedures.
- uri: http://data.europa.eu/esco/occupation/3288a2fe-4934-47c8-ad0b-11b16c9cd461
  preferred_label: utilities inspector
  isco_code: '3119'
  code: '3119.19'
  description: Utilities inspectors examine products, systems and machiney such as
    sewer, water, gas or electric turbines ensuring they are built and functioning
    according to regulations. They write inspection reports and provide recommendations
    to improve the systems and repair the broken components.
- uri: http://data.europa.eu/esco/occupation/3c0c688b-f7ca-40dc-8222-ab011d4e2449
  preferred_label: tanning technician
  isco_code: '3119'
  code: '3119.17'
  description: Tanning technicians have knowledge of the technical management of all
    tannery production departments, from beamhouse to tanning, post-tanning and finishing
    of leather. They ensure compliance with product specifications and secure consistent
    leather quality, fitness for use and process and product sustainability.
- uri: http://data.europa.eu/esco/occupation/418f3a43-a6b2-4101-aaa0-832fe7d82885
  preferred_label: metal additive manufacturing operator
  isco_code: '3119'
  code: '3119.10'
  description: Metal additive manufacturing operators operate machines using additive
    manufacturing processes, such as fitting and setting up, maintenance and repair.
    They have factual and broad understanding in the field of metal additive manufacturing
    process. They are able to develop solutions on basic and specific problems related
    with additive manufacturing machines and processes and self-manage the handling
    of feedstock (approval, storage, contamination, traceability).
- uri: http://data.europa.eu/esco/occupation/42381741-f3a7-4b26-b35c-da6fad9f1cfd
  preferred_label: product development engineering technician
  isco_code: '3119'
  code: '3119.15'
  description: Product development engineering technicians improve efficiency of product
    development, set up equipment and develop and test solutions to solve technical
    problems. They work closely with engineers and technologists, inspect products,
    conduct tests and collect data.
- uri: http://data.europa.eu/esco/occupation/45f8504d-24ac-4bcd-8692-a93acc74204c
  preferred_label: leather goods quality control laboratory technician
  isco_code: '3119'
  code: 3119.16.3
  description: Leather goods quality control laboratory technicians perform laboratory
    control tests according to the national and international standards. During laboratory
    control tests they prepare samples, address test procedures, analysis and interpretation
    of the results and comparison with guidelines and standards and prepare reports.
    They make the linkage with outsourced laboratories for the tests which cannot
    be performed inside the company. They propose corrective and preventive measures.
- uri: http://data.europa.eu/esco/occupation/53be4843-8f31-4645-b25c-9a5bbb04f6b6
  preferred_label: process engineering technician
  isco_code: '3119'
  code: '3119.14'
  description: Process engineering technicians work closely with engineers to evaluate
    the existing processes and configure manufacturing systems to reduce cost, improve
    sustainability and develop best practices within the production process.
- uri: http://data.europa.eu/esco/occupation/5791a961-4717-4230-a245-a4082a675f04
  preferred_label: automation engineering technician
  isco_code: '3119'
  code: '3119.2'
  description: Automation engineering technicians collaborate with automation engineers
    in the development of applications and systems for the automation of the production
    process. Automation engineering technicians build, test, monitor, and maintain
    the computer-controlled systems used in automated production systems.
- uri: http://data.europa.eu/esco/occupation/59dae100-fdfe-44bd-8bd8-a0d3cd813ce4
  preferred_label: footwear production technician
  isco_code: '3119'
  code: '3119.7'
  description: Footwear production technicians perform a wide range of activities
    regarding footwear manufacturing. They are involved in all phases of the process
    including product engineering and different types of construction. They aim at
    maximising productivity and reducing production costs, assuring the functionality
    and quality of product and customer satisfaction.
- uri: http://data.europa.eu/esco/occupation/745c8bb3-b50b-4380-9377-1b68a6576986
  preferred_label: textile process controller
  isco_code: '3119'
  code: '3119.18'
  description: Textile process controllers perform textile process operations, technical
    functions in various aspects of design, production and quality control of textile
    products, and cost control for processes. They use computer aided manufacturing
    (CAM), and computer integrated manufacturing (CIM) tools in order to ensure conformity
    of entire production process to specifications. They compare and exchange individual
    processes with other departments (e.g. cost calculation office) and initiate appropriate
    actions. They analyse the structure and properties of raw materials used in textiles
    and assist to prepare specifications for their production, analyse and interpret
    test data.
- uri: http://data.europa.eu/esco/occupation/7833d5cd-873d-4fdd-b2f8-9762d68494a7
  preferred_label: robotics engineering technician
  isco_code: '3119'
  code: 3119.2.1
  description: Robotics engineering technicians collaborate with engineers in the
    development of robotic devices and applications through a combination of mechanical
    engineering, electronic engineering, and computer engineering. Robotics engineering
    technicians build, test, install and calibrate robotic equipment.
- uri: http://data.europa.eu/esco/occupation/7bf11599-d0bb-4789-9886-55c87f5da449
  preferred_label: leather goods quality technician
  isco_code: '3119'
  code: 3119.16.4
  description: Leather goods quality technicians perform tasks related to quality
    control. As such, they execute laboratory tests (finished products, used materials
    and components) according to the national and international standards. They analyse
    and interpret the results of the laboratory tests, prepare reports, advise on
    corrective and preventive measures. All in all, they contribute to the accomplishment
    of requirements and objectives with the aim of continuous improvement and customer
    satisfaction.
- uri: http://data.europa.eu/esco/occupation/822bbc2d-bc6a-4fb5-afb8-89170120c6d8
  preferred_label: airport maintenance technician
  isco_code: '3119'
  code: '3119.1'
  description: Airport maintenance technicians are in charge of the maintenance of
    all equipment necessary for ensuring the functionality of the airport, for example,
    visual aids, airport electrical systems, luggage systems, security systems, pavements,
    drainage, and maintenance of unpaved areas.
- uri: http://data.europa.eu/esco/occupation/8a0c1556-f616-4d41-a03c-8a093a644807
  preferred_label: footwear quality technician
  isco_code: '3119'
  code: 3119.16.2
  description: Footwear quality technicians manage all the standards and techniques
    related to processes and products. They perform tasks using quality systems based
    on national and international standards. They analyse and interpret the results,
    prepare reports, advise on corrective measures, contribute to the achievement
    of requirements and objectives for the benefit of continuous improvement and customer
    satisfaction.
- uri: http://data.europa.eu/esco/occupation/8b828b9f-e41a-48d1-9d35-2c4378279a79
  preferred_label: pipeline compliance coordinator
  isco_code: '3119'
  code: '3119.13'
  description: Pipeline compliance coordinators track, compile and summarise all the
    compliance and conformance activities in pipeline infrastructures and fields.
    They ensure that works are carried out within regulatory frameworks. They strive
    to develop and implement compliance policies and recommend ways to minimize risk.
    They inspect sites, collect evidence, and report compliance needs to the management.
- uri: http://data.europa.eu/esco/occupation/998a0bf4-b1be-42ab-aee5-0096c9be3319
  preferred_label: quality engineering technician
  isco_code: '3119'
  code: '3119.16'
  description: Quality engineering technicians work with quality engineers or managers
    to analyse and solve quality problems and improve productivity. They examine machines
    for imperfections and inspect products to make sure they meet the standards. They
    also provide personnel with training in inspection techniques and prepare inspection
    plans.
- uri: http://data.europa.eu/esco/occupation/a645b7e5-dfa8-4cce-938f-2d6395a6b51d
  preferred_label: leather goods manufacturing technician
  isco_code: '3119'
  code: '3119.9'
  description: Leather goods manufacturing technicians perform a wide range of activities
    and tasks related to the leather goods manufacturing process including cutting,
    closing and finishing, according to pre-defined quality criteria, resulting from
    the direct relationship with the costumer. They use manual techniques supported
    by simple traditional equipment to produce exclusive models or very small orders.
- uri: http://data.europa.eu/esco/occupation/afee6a28-f654-4ac7-a665-f758616bc689
  preferred_label: food technician
  isco_code: '3119'
  code: '3119.5'
  description: Food technicians assist food technologists in the deveolpment of processes
    for manufacturing foodstuffs and related products based on chemical, physical,
    and biological principles. They perform research and experiments on ingredients,
    additives and packaging. Food technicians also check product quality to ensure
    compliance with legislation and regulations.
- uri: http://data.europa.eu/esco/occupation/bcc21c63-7eee-4520-8fa7-43eefd389668
  preferred_label: industrial engineering technician
  isco_code: '3119'
  code: '3119.8'
  description: Industrial engineering technicians assist industrial engineers in improving
    efficiency, safety and productivity in manufacturing plants. They conduct production
    studies, prepare layouts for machinery and equipment and suggest solutions to
    remedy quality problems.
- uri: http://data.europa.eu/esco/occupation/c8ee6499-7613-4c02-9edf-2a0edcf47705
  preferred_label: aviation safety officer
  isco_code: '3119'
  code: '3119.3'
  description: Aviation safety officers plan and develop safety procedures for aviation
    companies. They study safety regulations and restrictions relative to aviation
    company operations. Hence, they direct activities of personnel in order to safeguard
    the application of safety measures in compliance with regulations.
- uri: http://data.europa.eu/esco/occupation/ed976196-3d5d-4121-9367-e1022af603fa
  preferred_label: footwear quality control laboratory technician
  isco_code: '3119'
  code: 3119.16.1
  description: Footwear quality control laboratory technicians perform all laboratory
    tests of footwear and materials or components according to the national and international
    standards. They analyse and interpret their results, and prepare the report for
    the quality manager, advising on rejections or acceptances. They apply previously
    defined quality management tools aiming at achievement of the objectives stated
    in the quality policy. They participate in monitoring and control of the quality
    system, namely internal and external auditing. They collaborate in the preparation
    of documents related to quality and in the linkage with outsourced laboratories
    for the tests which cannot be performed inside the company.
- uri: http://data.europa.eu/esco/occupation/23993e79-a0a0-4155-9f62-68e14ee65dab
  preferred_label: mine shift manager
  isco_code: '3121'
  code: 3121.1.1
  description: Mine shift managers supervise staff, manage plant and equipment, optimise
    productivity and ensure safety at the mine on a day to day basis.
- uri: http://data.europa.eu/esco/occupation/5c14982e-375d-47c5-9ea1-e9bcf3884643
  preferred_label: mine supervisor
  isco_code: '3121'
  code: '3121.1'
  description: Mine supervisors coordinate and supervise the activities related to
    mining and quarrying in underground and surface mines and quarries. They oversee
    the workers, schedules, processes and organisation in the mines and quarries.
- uri: http://data.europa.eu/esco/occupation/040f62f5-d570-4d3f-b732-c8ea4afc2738
  preferred_label: container equipment assembly supervisor
  isco_code: '3122'
  code: 3122.3.2
  description: Container equipment assembly supervisors monitor the assembly process
    of containers such as boilers or pressure vessels. They train and coach the workers
    involved in the assembly to achieve production goals.
- uri: http://data.europa.eu/esco/occupation/0e68f523-3206-4896-b725-44150dd22057
  preferred_label: leather goods production supervisor
  isco_code: '3122'
  code: 3122.4.7
  description: Leather goods production supervisors monitor and coordinate day-to-day
    production activities of a leather goods manufacturing plant. They oversee quality
    control as well as manage the leather goods production staff. The work also involves
    organising the work flow as well as taking care of production plan and costs.
- uri: http://data.europa.eu/esco/occupation/139fba7b-6c1f-40ee-8acf-78f97e57c905
  preferred_label: waste management supervisor
  isco_code: '3122'
  code: '3122.5'
  description: Waste management supervisors coordinate waste collection, recycling,
    and disposal facilities. They supervise waste management operations, ensuring
    compliance with environmental standards, and oversee staff. They aid in the development
    of waste management methods, aiming for increased waste reduction, and aid in
    the prevention of violations of waste treatment legislation.
- uri: http://data.europa.eu/esco/occupation/16bf6d6f-64ec-4f80-9070-f81a7b179d53
  preferred_label: precision mechanics supervisor
  isco_code: '3122'
  code: 3122.4.14
  description: Precision mechanics supervisors oversee, train and manage workers who
    fit together complex parts of small-size machines such as measuring or control
    mechanisms.
- uri: http://data.europa.eu/esco/occupation/202e1870-77d7-4efa-bf2c-7a032af30b7e
  preferred_label: vessel assembly supervisor
  isco_code: '3122'
  code: 3122.3.7
  description: Vessel assembly supervisors coordinate the employees involved in boat
    and ship manufacturing and schedule their activities. They prepare production
    reports and recommend measures to reduce the cost and improve productivity. Vessel
    assembly supervisors train employees in company policies, job duties and safety
    measures. They check compliance with applied working procedures and engineering.
    Vessel assembly supervisors oversee the supplies and communicate with other departments
    to avoid unnecessary interruptions of the production process.
- uri: http://data.europa.eu/esco/occupation/2cec9e4a-5a37-4cb1-a8b7-2e8d94766417
  preferred_label: machine operator supervisor
  isco_code: '3122'
  code: 3122.4.8
  description: Machine operator supervisors coordinate and direct workers who set
    up and operate machines. They monitor the production process and the flow of materials,
    and they make sure that the products meet the requirements.
- uri: http://data.europa.eu/esco/occupation/37f7677a-97d1-420b-a8b0-09339472121f
  preferred_label: machinery assembly supervisor
  isco_code: '3122'
  code: 3122.3.4
  description: Machinery assembly supervisors monitor the machinery assembly process.
    They train and coach assembly workers to achieve production goals.
- uri: http://data.europa.eu/esco/occupation/40517ed4-2769-4283-a15b-4b0d939bd2d3
  preferred_label: production supervisor
  isco_code: '3122'
  code: '3122.4'
  description: Production supervisors coordinate, plan and direct manufacturing and
    production processes. They are responsible for reviewing production schedules
    or orders as well as dealing with staff in these production areas.
- uri: http://data.europa.eu/esco/occupation/432cd69f-6323-4147-94f2-342de3cb0a65
  preferred_label: optical instrument production supervisor
  isco_code: '3122'
  code: 3122.4.11
  description: Optical instrument production supervisors coordinate, plan and direct
    the optical instrument production process. They make sure the optical glass is
    processed properly and optical equipment is assembled according to specifications.
    They manage labourers working on the production line, oversee the quality of the
    assembled goods, and perform cost and resource management.
- uri: http://data.europa.eu/esco/occupation/4568a282-3904-4dfc-a6ec-e847b3ca90e8
  preferred_label: plastic and rubber products manufacturing supervisor
  isco_code: '3122'
  code: 3122.4.13
  description: Plastic and rubber products manufacturing supervisors manage and coordinate
    the activities of personnel involved in plastic or rubber products manufacturing,
    making sure the production is efficiently, safely and cost-effectively processed.
    They are responsible for the installation of new production lines and for the
    provision of trainings.
- uri: http://data.europa.eu/esco/occupation/4b536ea7-ebac-4f75-8356-94eb639f1ecc
  preferred_label: print studio supervisor
  isco_code: '3122'
  code: 3122.4.15
  description: Print studio supervisors organise the activity of one or more teams
    of machine operators in printing, binding of books and finishing of printed materials.
    They aim to optimise production processes.
- uri: http://data.europa.eu/esco/occupation/5baffa9d-1607-4665-be94-662bad26b9ff
  preferred_label: distillery supervisor
  isco_code: '3122'
  code: 3122.4.3
  description: Distillery supervisors coordinate the production processes comprised
    in the production of spirits and manage the workers engaged in the process. They
    verify distilled liquors being produced at specified amounts and proofs.
- uri: http://data.europa.eu/esco/occupation/623958d6-775c-4586-b928-86582d9d1b69
  preferred_label: food production planner
  isco_code: '3122'
  code: '3122.2'
  description: Food production planners prepare production plans, evaluate all the
    variables in the process and strive to ensure that production objectives be achieved.
- uri: http://data.europa.eu/esco/occupation/6ebe4e2e-7deb-4923-8b47-ca6fc03fa13a
  preferred_label: paper mill supervisor
  isco_code: '3122'
  code: 3122.4.12
  description: Paper mill supervisors coordinate and monitor the operations at a paper
    mill during production of products such as corrugated board, cardboard boxes or
    padded envelopes. They ensure that production targets, such as quantity and quality
    of products, timeliness and cost-effectiveness can be achieved. They have a clear
    overview of ongoing processes, and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/7db415ec-0437-4a5e-95ea-622ea9f13dd0
  preferred_label: metal production supervisor
  isco_code: '3122'
  code: 3122.4.10
  description: Metal production supervisors oversee the day-to-day working process
    and activities of the labourers in a metal fabrication factory. They supervise
    staff, create work schedules, maintain a safe work environment and serve as the
    first, most accessible management representative for the workers to contact when
    there is need.
- uri: http://data.europa.eu/esco/occupation/83191970-020d-4350-b2e0-be971533d286
  preferred_label: electronics production supervisor
  isco_code: '3122'
  code: 3122.4.5
  description: Electronics production supervisors coordinate, plan and direct the
    electronics production process. They manage labourers working on the production
    line, oversee the quality of the assembled goods, and perform cost and resource
    management.
- uri: http://data.europa.eu/esco/occupation/952c766a-db5c-42b2-809d-d14cbb02cdb6
  preferred_label: dairy processing technician
  isco_code: '3122'
  code: '3122.1'
  description: Dairy processing technicians supervise and coordinate production processes,
    operations, and maintenance workers in milk, cheese, ice cream and/or other dairy
    production plants. They assist food technologists in improving processes, developing
    new food products and establishing procedures and standards for production and
    packaging.
- uri: http://data.europa.eu/esco/occupation/95d69048-3a4b-4cce-a155-584aaecfe403
  preferred_label: footwear assembly supervisor
  isco_code: '3122'
  code: 3122.3.3
  description: Footwear assembly supervisors check and coordinate activities of operators
    in the lasting room. They are in charge of coordinating lasting room activity
    with the previous and following activities of the production chain. They examine
    uppers and soles to be lasted and give instructions to produce them. These supervisors
    are in charge of supplying the lasting room with uppers, lasts, shanks, counters
    and small handling tools, and they are also in charge of the quality control of
    the lasting.
- uri: http://data.europa.eu/esco/occupation/96e139de-0756-45ad-b512-f7c2109a72b1
  preferred_label: aircraft assembly supervisor
  isco_code: '3122'
  code: 3122.3.1
  description: Aircraft assembly supervisors coordinate the employees involved in
    aircraft manufacturing and schedule their activities. They prepare production
    reports and recommend measures to reduce the cost and improve productivity such
    as hiring, ordering new equipment and implementing new production methods. They
    train employees in company policies, job duties and safety measures. They oversee
    the supplies and communicate with other departments to avoid unnecessary interruptions
    of the production process.
- uri: http://data.europa.eu/esco/occupation/a659968d-0804-4357-bc60-735e4d41e65c
  preferred_label: footwear production supervisor
  isco_code: '3122'
  code: 3122.4.6
  description: Footwear production supervisors monitor and coordinate day-to-day production
    activities of a footwear manufacturing plant. They oversee quality control to
    ensure that the end product is in alignment with production specifications, and
    manage the footwear staff. The work also involves negotiations with suppliers
    as well as taking care of the production plan and production costs.
- uri: http://data.europa.eu/esco/occupation/aeae4491-91b2-4029-9648-364e0bc4ecff
  preferred_label: electrical equipment production supervisor
  isco_code: '3122'
  code: 3122.4.4
  description: Electrical equipment production supervisors coordinate, plan and direct
    the production process of electrical equipment. They manage labourers working
    on the production line, oversee the quality of the assembled goods, and perform
    cost and resource management.
- uri: http://data.europa.eu/esco/occupation/b12b14fd-5b74-40c6-afd9-dd35b34e27ed
  preferred_label: industrial assembly supervisor
  isco_code: '3122'
  code: '3122.3'
  description: Industrial assembly supervisors are in charge of organizing, planning
    and coordinating assembly operations. They keep track of all the work activities
    and manage the process for efficient functioning in order to tackle problems such
    as production loss. They answer to the industrial production and the manufacturing
    manager.
- uri: http://data.europa.eu/esco/occupation/bdfd018a-aae1-407e-a88c-471e50b0695d
  preferred_label: wood production supervisor
  isco_code: '3122'
  code: 3122.4.16
  description: Wood production supervisors monitor processes involved in the conversion
    of felled trees into usable lumber. They follow the production process and make
    quick decisions to resolve problems. ​They ensure that production targets, such
    as quantity and quality of products, timeliness and cost-effectiveness, can be
    achieved.
- uri: http://data.europa.eu/esco/occupation/c4046ba8-cfe0-4748-beac-22e865962d75
  preferred_label: malt house supervisor
  isco_code: '3122'
  code: 3122.4.9
  description: Malt house supervisors oversee the malting processes in its integrity.
    They supervise the processes of steeping, germination, and kilning. They monitor
    each one of the processing parameters aiming to meet customer specifications.
    They provide assistance and leadership to malt house production employees and
    ensure that they operate in a safe and professional manner.
- uri: http://data.europa.eu/esco/occupation/c7ee21d5-9a13-4cf8-a3b9-292eefd37f7a
  preferred_label: animal feed supervisor
  isco_code: '3122'
  code: 3122.4.1
  description: Animal feed supervisors supervise the manufacturing process of animal
    feeds. They control quality, take samples for labs, follow up on lab results and
    take measures according to the results.
- uri: http://data.europa.eu/esco/occupation/dc54d531-70b5-4301-bc75-da76c2dfac1a
  preferred_label: rolling stock assembly supervisor
  isco_code: '3122'
  code: 3122.3.6
  description: Rolling stock assembly supervisors coordinate the employees involved
    in rolling stock manufacturing and schedule their activities. They prepare production
    reports and recommend measures to reduce the cost and improve productivity such
    as hiring, ordering new equipment and implementing new production methods. They
    train employees in company policies, job duties and safety measures. They oversee
    the supplies and communicate with other departments to avoid unnecessary interruptions
    of the production process.
- uri: http://data.europa.eu/esco/occupation/e2c38c87-2bcf-492a-a78e-3be9480481cc
  preferred_label: motor vehicle assembly supervisor
  isco_code: '3122'
  code: 3122.3.5
  description: Motor vehicle assembly supervisors coordinate the employees involved
    in motor vehicle manufacturing and schedule their activities. They prepare production
    reports and recommend measures to reduce the cost and improve productivity such
    as hiring, ordering new equipment and implementing new production methods. They
    train employees in company policies, job duties and safety measures. They oversee
    the supplies and communicate with other departments to avoid unnecessary interruptions
    of the production process.
- uri: http://data.europa.eu/esco/occupation/e34b93ec-5e11-4858-ba1e-e245c4c39cec
  preferred_label: wood assembly supervisor
  isco_code: '3122'
  code: 3122.3.8
  description: Wood assembly supervisors monitor the various processes in the assembly
    of wood products. They have a thorough understanding of the production processes
    under their supervision and take quick decisions when required.
- uri: http://data.europa.eu/esco/occupation/f5aa06b0-745e-4eb1-b050-3e15d11e5eb5
  preferred_label: chemical processing supervisor
  isco_code: '3122'
  code: 3122.4.2
  description: Chemical processing supervisors coordinate the activities and the staff
    involved in the chemical production process, ensuring the production goals and
    deadlines are met. They control quality and optimize chemicals processing by ensuring
    defined tests, analysis and quality control procedures are performed.
- uri: http://data.europa.eu/esco/occupation/0181835d-dd00-49e2-9fc4-e1382a65957f
  preferred_label: insulation supervisor
  isco_code: '3123'
  code: 3123.1.13
  description: Insulation supervisors monitor insulation operations. They assign tasks
    and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/046574a1-9bb3-4a80-8a7b-83dc7db1dae2
  preferred_label: bricklaying supervisor
  isco_code: '3123'
  code: 3123.1.1
  description: Bricklaying supervisors monitor bricklaying activities. They assign
    tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/05ebeb56-6ceb-488d-ba91-ed15088efc8e
  preferred_label: bridge construction supervisor
  isco_code: '3123'
  code: 3123.1.2
  description: Bridge construction supervisors monitor the construction of bridges.
    They assign tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/0763c810-8ac6-4e39-867d-780a11af26e0
  preferred_label: plumbing supervisor
  isco_code: '3123'
  code: 3123.1.17
  description: Plumbing supervisors monitor plumbing operations. They assign tasks
    and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/0dd7e6cd-2e5a-4fae-9ce0-6a3622d4019f
  preferred_label: construction general supervisor
  isco_code: '3123'
  code: '3123.1'
  description: Construction general supervisors keep track of the proceedings of all
    stages in the building process. They coordinate the different teams, assign tasks,
    and resolve problems.
- uri: http://data.europa.eu/esco/occupation/18cff178-4ef0-46c9-a6e5-f6f38179cdcb
  preferred_label: tiling supervisor
  isco_code: '3123'
  code: 3123.1.25
  description: Tiling supervisors monitor tile fitting operations. They assign tasks
    and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/18fbb1f8-eceb-4bf4-8fc7-932b8f6130cd
  preferred_label: paperhanger supervisor
  isco_code: '3123'
  code: 3123.1.15
  description: Paperhanger supervisors monitor the hanging of wallpaper. They assign
    tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/1e55f5e3-2f02-434b-997b-9a9f3eb745e8
  preferred_label: power lines supervisor
  isco_code: '3123'
  code: 3123.1.18
  description: Power lines supervisors monitor the construction and maintenance of
    power lines and associated equipment. They assign tasks and take quick decisions
    to resolve problems.
- uri: http://data.europa.eu/esco/occupation/20db07fc-cc02-46aa-a4fc-b3c73ba8fa8f
  preferred_label: concrete finisher supervisor
  isco_code: '3123'
  code: 3123.1.4
  description: Concrete finisher supervisors monitor the concrete finishing process.
    They assign tasks to finishers and take quick decisions to resolve problems. They
    may also pass on their skills to apprentices.
- uri: http://data.europa.eu/esco/occupation/2a226be5-6157-49e9-bd4b-e3b46d55c082
  preferred_label: rail construction supervisor
  isco_code: '3123'
  code: 3123.1.19
  description: Rail construction supervisors monitor the construction and maintenance
    of railway infrastructure. They assign tasks, either on the ground or from a control
    room, and make quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/2b318e09-1a5d-4d7f-85a7-fe78945fe917
  preferred_label: sewer construction supervisor
  isco_code: '3123'
  code: 3123.1.22
  description: Sewer construction supervisors supervise the installation of sewer
    pipes and other sewage infrastructure. They assign tasks and make quick decisions
    to resolve problems.
- uri: http://data.europa.eu/esco/occupation/2e85b540-4a92-47f3-bc8c-0699c51692d1
  preferred_label: lift installation supervisor
  isco_code: '3123'
  code: 3123.1.14
  description: Lift installation supervisor monitor the installation of lifts. They
    keep an overview of the proceedings, assign tasks, and take quick decisions to
    resolve problems.
- uri: http://data.europa.eu/esco/occupation/2ea3070e-3d0b-4de6-b5bd-fe4a04649b04
  preferred_label: construction scaffolding supervisor
  isco_code: '3123'
  code: 3123.1.6
  description: Construction scaffolding supervisors plan and supervise the transport,
    assembly, disassembly and maintenance of the structures. They also ensure the
    safety of the scaffolds, support structures, access ladders and fenders.
- uri: http://data.europa.eu/esco/occupation/57d1be2e-c476-43fb-b014-fa58602cac95
  preferred_label: dismantling supervisor
  isco_code: '3123'
  code: 3123.1.9
  description: Dismantling supervisors monitor the operations involved in dismantling
    activities such as removing and possibly recycling industrial equipment and machinery
    or decommissioning of plants. The distribute the task among workers and supervise
    if everything is done according to safety regulations. If problems arise they
    consult with engineers and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/60d77070-2cf4-4883-b44d-91e8ce54db86
  preferred_label: water conservation technician supervisor
  isco_code: '3123'
  code: 3123.1.26
  description: Water conservation technician supervisors supervise the installation
    of systems to recover, filter, store and distribute water from different sources
    such as rainwater and domestic greywater. They assign tasks and take quick decisions.
- uri: http://data.europa.eu/esco/occupation/66dc9349-6ca3-4ce4-9865-40686234d752
  preferred_label: roofing supervisor
  isco_code: '3123'
  code: 3123.1.21
  description: Roofing supervisors monitor the work on roofing a building. They assign
    tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/6a67114c-60a3-4cec-af26-c7df6fe6e9b5
  preferred_label: construction painting supervisor
  isco_code: '3123'
  code: 3123.1.5
  description: Construction painting supervisors plan, direct and oversee the work
    of the crew of painters assigned to a certain project or location. They supervise
    and evaluate the work of painters.
- uri: http://data.europa.eu/esco/occupation/71e4891f-48a6-435f-8897-208969fb4e44
  preferred_label: dredging supervisor
  isco_code: '3123'
  code: 3123.1.10
  description: Dredging supervisors monitor dredging operations. They make sure the
    operation proceeds per regulations and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/7c205166-d862-45fc-90e5-58a3aa3721dd
  preferred_label: road construction supervisor
  isco_code: '3123'
  code: 3123.1.20
  description: Road construction supervisors monitor the construction and maintenance
    of roads. They assign tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/8249697a-3dc8-417d-9acf-3a7e0864069a
  preferred_label: terrazzo setter supervisor
  isco_code: '3123'
  code: 3123.1.24
  description: Terrazzo setter supervisors monitor terrazzo setting operations. They
    assign tasks and take quick decision to resolve problems.
- uri: http://data.europa.eu/esco/occupation/87580fa5-39d2-4b7e-9274-b744e684f17c
  preferred_label: carpenter supervisor
  isco_code: '3123'
  code: 3123.1.3
  description: Carpenter supervisors monitor carpentry operations in construction.
    They assign tasks and take quick decisions to resolve problems. They pass their
    skills on to apprentice carpenters.
- uri: http://data.europa.eu/esco/occupation/8862c29b-3810-4fbc-85c7-c9ee87535f73
  preferred_label: electrical supervisor
  isco_code: '3123'
  code: 3123.1.11
  description: Electrical supervisors monitor the operations involved in installing
    and servicing electricity cables and other electrical infrastructure. They assign
    tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/9defc0f8-3eed-4a56-80e1-d534983aff4f
  preferred_label: demolition supervisor
  isco_code: '3123'
  code: 3123.1.8
  description: Demolition supervisors monitor operations involved in the demolition
    of buildings and clean up of debris. They take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/a603fdd9-31e7-424a-883a-e9f6bf88085a
  preferred_label: structural ironwork supervisor
  isco_code: '3123'
  code: 3123.1.23
  description: Structural ironwork supervisors monitor ironworking activities. They
    assign tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/aecb033a-2be8-459c-bbdc-87bbae922894
  preferred_label: plastering supervisor
  isco_code: '3123'
  code: 3123.1.16
  description: Plastering supervisors monitor plastering activities. They assign tasks
    and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/b206a740-c7eb-407d-9cdb-93502368c4d8
  preferred_label: crane crew supervisor
  isco_code: '3123'
  code: 3123.1.7
  description: Crane crew supervisors are present to supervise crane operations. They
    keep an eye on safety and make sure regulations are followed. The supervisor takes
    quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/ceb9910a-1174-4926-82c9-5afee2bd3702
  preferred_label: glass installation supervisor
  isco_code: '3123'
  code: 3123.1.12
  description: Glass installation supervisor monitor the process of installing plate
    glass. They assign tasks and take quick decisions to resolve problems.
- uri: http://data.europa.eu/esco/occupation/e575efca-c3e4-43fe-8c46-327d310f795e
  preferred_label: underwater construction supervisor
  isco_code: '3123'
  code: '3123.2'
  description: Underwater construction supervisors monitor underwater construction
    projects such as tunnels, canal locks and bridge pillars. They guide and instruct
    construction commercial divers and make sure they adhere to safety regulations.
- uri: http://data.europa.eu/esco/occupation/12938d1a-eeb2-4b1e-a22b-f0bebeadfb73
  preferred_label: hydroelectric plant operator
  isco_code: '3131'
  code: 3131.3.5
  description: Hydroelectric plant operators operate and maintain the equipment used
    in the production of energy from the movement of water. They monitor the measuring
    equipment, assess the production needs, and adapt the water flow to meet these
    needs. They also perform repairs and maintenance duties.
- uri: http://data.europa.eu/esco/occupation/16b974f4-cb8c-436c-8c05-a16957c40131
  preferred_label: fossil-fuel power plant operator
  isco_code: '3131'
  code: 3131.3.3
  description: Fossil-fuel power plant operators operate and maintain industrial equipment,
    such as generators, turbines and boilers, that provides electricity produced from
    fossil fuels like natural gas or coal. They ensure the safety of operations and
    that the equipment complies with legislation. They may also work in combined cycle
    power plants which use heat recovery systems to recover exhaust heat from one
    operation and activate steam turbines.
- uri: http://data.europa.eu/esco/occupation/47af27c4-5b45-4cce-ba01-4e96f8cf97b9
  preferred_label: offshore renewable energy plant operator
  isco_code: '3131'
  code: '3131.1'
  description: Offshore renewable energy plant operators operate and maintain equipment
    which produce electrical energy from marine renewable sources such as offshore
    wind power, wave power, or tidal currents. They monitor measuring equipment to
    ensure the safety of operations, and that the production needs are met. They also
    react to system problems, and repair faults.
- uri: http://data.europa.eu/esco/occupation/6d823dbb-4008-4fb7-b98d-f9d934478647
  preferred_label: solar power plant operator
  isco_code: '3131'
  code: 3131.3.8
  description: Solar power plant operators operate and maintain equipment which produce
    electrical energy from solar power. They monitor measuring equipment to ensure
    the safety of operations, and that the production needs are met. They also react
    to system problems, and repair faults.
- uri: http://data.europa.eu/esco/occupation/72381086-cb6e-455e-a40b-ccb26550aab6
  preferred_label: power production plant operator
  isco_code: '3131'
  code: '3131.3'
  description: Power production plant operators maintain and operate the equipment
    in power stations and other energy production plants. They repair faults, operate
    machinery directly or from a control room, and handle materials related to electricity
    production in compliance with safety and environmental procedures. They facilitate
    interaction between electrical energy facilities, ensuring that distribution occurs
    safely.
- uri: http://data.europa.eu/esco/occupation/74332fd0-4a50-464e-9116-98fa9b8127ac
  preferred_label: electrical power distributor
  isco_code: '3131'
  code: 3131.3.1
  description: Electrical power distributors operate and maintain equipment which
    deliver the energy from the transmission system to the consumer. They supervise
    power line maintenance and repairs, and ensure the distribution needs are met.
    They also react to faults in the distribution system which cause problems such
    as outages.
- uri: http://data.europa.eu/esco/occupation/7cdeb653-8f3d-4921-832b-b95f9d700a86
  preferred_label: electrical transmission system operator
  isco_code: '3131'
  code: 3131.3.2
  description: Electrical transmission system operators transport energy in the form
    of electrical power. They transmit electrical power from generation plants over
    an interconnected network, an electrical grid, to electricity distribution stations.
- uri: http://data.europa.eu/esco/occupation/a32187fa-bc37-4fc2-8e89-296632bfc271
  preferred_label: onshore wind farm technician
  isco_code: '3131'
  code: '3131.2'
  description: Onshore wind farm technicians operate and maintain onshore wind farms
    by performing diagnostic inspections, analysing faults, and performing repair
    duties. They ensure the wind turbines operate in compliance with regulations and
    assist the wind engineers in the construction of wind turbines. Onshore wind farm
    technicians may also test and install hardware and software components of wind
    turbines.
- uri: http://data.europa.eu/esco/occupation/aac62c63-b6bf-4387-8ba3-75a487f25824
  preferred_label: steam turbine operator
  isco_code: '3131'
  code: 3131.3.9
  description: Steam turbine operators operate and maintain machinery which generates
    power. They ensure the safety of the operations and monitor operations to detect
    problems, and react to emergency situations.
- uri: http://data.europa.eu/esco/occupation/b2eacfdf-5de5-4e8c-a8cb-3d32e201c210
  preferred_label: nuclear reactor operator
  isco_code: '3131'
  code: 3131.3.6
  description: Nuclear reactor operators directly control nuclear reactors in power
    plants from control panels, and are solely responsible for the alterations in
    reactor reactivity. They start up operations and react to changes in status such
    as casualties and critical events. They monitor parameters and ensure compliance
    with safety regulations.
- uri: http://data.europa.eu/esco/occupation/c3959398-a5d7-4b26-abcf-ef7af87e5822
  preferred_label: geothermal power plant operator
  isco_code: '3131'
  code: 3131.3.4
  description: Geothermal power plant operators operate and maintain equipment, often
    steam-driven turbines, which produce electrical energy. They monitor measuring
    equipment to ensure the safety of operations, and that the production needs are
    met. They also react to system problems, and repair faults. They may regulate
    the generators to control the flow of electricity to the power lines.
- uri: http://data.europa.eu/esco/occupation/f33a70bd-c5b6-495d-8e0c-5e2c6e56d93e
  preferred_label: power plant control room operator
  isco_code: '3131'
  code: 3131.3.7
  description: Power plant control room operators are responsible for the safe and
    proper operation of power plants, switchyards and associated control structures.
    They repair and maintain the involved machinery and equipment to ensure the plant's
    efficient operation and to tackle emergency situations such as blackouts.
- uri: http://data.europa.eu/esco/occupation/1ab184b6-de00-4476-ba1d-c6a71c668be3
  preferred_label: water treatment systems operator
  isco_code: '3132'
  code: '3132.7'
  description: Water treatment systems operators treat water to ensure safety for
    drinking, irrigation, or other use. They operate and maintain water treatment
    equipment and ensure the water is safe for bottling and use in food production
    by thoroughly testing before distribution, and by meeting environmental standards.
- uri: http://data.europa.eu/esco/occupation/1b48fbd2-688f-4ba9-b430-86b2ae273724
  preferred_label: liquid waste treatment plant operator
  isco_code: '3132'
  code: '3132.2'
  description: Liquid waste treatment plant operators remove hazardous chemicals and
    pollutants from liquid waste such as oil so that it can be safely used for new
    applications. They operate and maintain liquid waste treatment equipment, monitor
    operations, and test samples to ensure the safety standards are met.
- uri: http://data.europa.eu/esco/occupation/3e626058-f669-4503-84ec-6ae1a6077a61
  preferred_label: incinerator operator
  isco_code: '3132'
  code: '3132.1'
  description: Incinerator operators tend incineration machines which burn refuse
    and waste. They ensure the equipment is maintained, and that the incineration
    process occurs in accordance with safety regulations for the incineration of waste.
- uri: http://data.europa.eu/esco/occupation/7f800e7d-9d86-406a-9116-b5eca7526869
  preferred_label: water plant technician
  isco_code: '3132'
  code: '3132.6'
  description: Water plant technicians maintain and repair water treatment and supply
    equipment in a water plant. They ensure the provision of clean water by measuring
    the water quality, ensuring it is filtered and treated correctly, and maintaining
    distribution systems.
- uri: http://data.europa.eu/esco/occupation/d43e9693-7087-412c-b54c-e9068012630a
  preferred_label: wastewater treatment operator
  isco_code: '3132'
  code: '3132.4'
  description: Wastewater treatment operators operate equipment used in a water or
    wastewater plant. They treat and clean drinking water before it is distributed
    to the consumer and process wastewater to remove harmful substances before returning
    it to rivers and seas. They take samples and perform tests to analyse the water
    quality.
- uri: http://data.europa.eu/esco/occupation/d99e2022-cbe1-4aaa-8f9d-7db129d61f0c
  preferred_label: wastewater treatment technician
  isco_code: '3132'
  code: '3132.5'
  description: Wastewater treatment technicians aid wastewater treatment operators
    in the operation and maintenance of wastewater treatment equipment, and the purification
    procedure of wastewater, in sewage plants. They perform repair duties.
- uri: http://data.europa.eu/esco/occupation/fd6a1c18-b0ff-419f-a36a-e05957452d55
  preferred_label: solid waste operator
  isco_code: '3132'
  code: '3132.3'
  description: Solid waste operators operate and maintain solid waste treatment and
    distribution equipment, and test samples to monitor pollution. They assist in
    the collection and disposal of solid waste, such as construction and demolition
    debris, and ensure treatment is compliant to safety regulations. They ensure community
    waste containers are emptied, ensure proper differentiation between waste which
    needs to be recycled or disposed of, and monitor equipment.
- uri: http://data.europa.eu/esco/occupation/235ce16a-1ef7-4535-a82e-e371213c392b
  preferred_label: air separation plant operator
  isco_code: '3133'
  code: 3133.1.1
  description: Air separation plant operators control and maintain the equipment for
    nitrogen and oxygen extraction from air, ensuring the required operational parameters
    of pressure, flow and temperature are met. They perform product purity tests and
    monitor its transfer to storage tanks or to fill cylinders.
- uri: http://data.europa.eu/esco/occupation/6eb85dd0-1188-4081-bf54-1345fb5de3ca
  preferred_label: biogas technician
  isco_code: '3133'
  code: 3133.1.2
  description: Biogas technicians work in the derivation of gas from organic matter
    and produced as landfill gas or digested gas. They operate equipment in biogas
    plants, perform tests and maintenance tasks, and take action in the event of a
    failure.
- uri: http://data.europa.eu/esco/occupation/a241eff8-309b-43ae-8890-ac4cfbd3067c
  preferred_label: chemical processing plant controller
  isco_code: '3133'
  code: '3133.1'
  description: Chemical processing plant controllers control the chemical production
    process. They operate machines and systems, being responsible to monitor and maintain
    the equipment and the instruments in control.
- uri: http://data.europa.eu/esco/occupation/b21aac17-8237-4264-bc2c-0e315346fd8f
  preferred_label: chemical plant control room operator
  isco_code: '3133'
  code: 3133.1.3
  description: Chemical plant control room operators monitor and inspect remotely
    the production systems during their shift, reporting all anomalies and incidents
    using the required systems. They operate the control room panels and ensure the
    safety of production workers and production equipment.
- uri: http://data.europa.eu/esco/occupation/cbdbe324-81fe-48da-a8f7-0106dd94a05b
  preferred_label: gas processing plant supervisor
  isco_code: '3133'
  code: 3133.1.4
  description: Gas processing plant supervisors supervise the processing of gas for
    utility and energy services by controlling compressors and other processing equipment
    to ensure standard operation. They supervise the maintenance of the equipment,
    and perform tests to detect problems or deviations, and to ensure quality.
- uri: http://data.europa.eu/esco/occupation/f1c8c186-bef9-4d72-9257-90fc4f992ab7
  preferred_label: gas station operator
  isco_code: '3133'
  code: 3133.1.5
  description: Gas station operators process gases for compression, transmission or
    recovery by using gas, steam or electric engine compressors. They perform chemical
    tests on gases and are responsible for pumps and pipelines operations.
- uri: http://data.europa.eu/esco/occupation/026a5233-cad9-4b1d-8852-22c2685ab34e
  preferred_label: petroleum pump system operator
  isco_code: '3134'
  code: '3134.4'
  description: Petroleum pump system operators tend pumps that keep the circulation
    of oil and derived products running smoothly. They monitor the flow within the
    pipes at a refinery and test the equipment to ensure minimum disruptions. Pump
    systems operators work from a highly automated control room, where they communicate
    with other workers to coordinate pump activities. Pump system operators undertake
    minor repairs and maintenance, and report as called for.
- uri: http://data.europa.eu/esco/occupation/217e7ae2-605d-4225-afd2-6319c2408116
  preferred_label: oil refinery control room operator
  isco_code: '3134'
  code: '3134.3'
  description: Oil refinery control room operators perform a range of tasks from the
    control room of an oil refinery. They monitor the processes through electronic
    representations shown on monitors, dials, and lights. Control room operators make
    changes to variables and communicate with other departments to make sure processes
    keep running smoothly and according to established procedures. They take appropriate
    actions in case of irregularities or emergencies.
- uri: http://data.europa.eu/esco/occupation/47ae3ed9-e03c-450e-9ea8-aab317545adc
  preferred_label: gas processing plant control room operator
  isco_code: '3134'
  code: '3134.1'
  description: Gas processing plant control room operators perform a range of tasks
    from the control room of a processing plant. They monitor the processes through
    electronic representations shown on monitors, dials, and lights. They make changes
    to variables and communicate with other departments to make sure processes keep
    running smoothly and according to established procedures. They take appropriate
    actions in case of irregularities or emergencies.
- uri: http://data.europa.eu/esco/occupation/7afeee90-5672-470d-b061-24ffaafb2fc9
  preferred_label: refinery shift manager
  isco_code: '3134'
  code: '3134.5'
  description: Refinery shift managers supervise staff, manage plant and equipment,
    optimise production and ensure safety at the oil refinery on a day-to-day basis.
- uri: http://data.europa.eu/esco/occupation/d26a941d-443a-4301-a648-3cb3a4427775
  preferred_label: gas processing plant operator
  isco_code: '3134'
  code: '3134.2'
  description: Gas processing plant operators operate and maintain distribution equipment
    in a gas distribution plant. They distribute gas to utility facilities or consumers,
    and ensure the correct pressure is maintained on gas pipelines. They also oversee
    compliance with scheduling and demand.
- uri: http://data.europa.eu/esco/occupation/528e63a7-91be-4477-be2f-69ce82deb726
  preferred_label: metal furnace operator
  isco_code: '3135'
  code: '3135.1'
  description: Metal furnace operators monitor the process of making metal before
    it is cast into forms. They control metal making furnaces and direct all activities
    of furnace operation, including the interpretation of computer data, temperature
    measurement and adjustment, loading vessels, and adding iron, oxygen, and other
    additives to be melted into the desired metal composition. They control the chemicothermal
    treatment of the metal in order to reach the standards. In case of observed faults
    in the metal, they notify the authorised personnel and participate in the removal
    of the fault.
- uri: http://data.europa.eu/esco/occupation/5001506f-dd7d-4801-92ac-6f7e93b45133
  preferred_label: industrial robot controller
  isco_code: '3139'
  code: '3139.2'
  description: Industrial robot controllers operate and monitor industrial robots
    used in automation processes to perform various manufacturing activities such
    as lifting, welding and assembling. They ensure that the machines are working
    correctly and in sync with other industrial robots, maintain and repair defective
    parts, assess risks and perform tests.
- uri: http://data.europa.eu/esco/occupation/869e3a85-6e4c-4e3c-b14f-a8399c1abd2d
  preferred_label: automated assembly line operator
  isco_code: '3139'
  code: '3139.1'
  description: Automated assembly line operators operate, maintain and clean production
    machines. They are responsible for the assembly of a whole product or a part of
    a product. Automated assembly line operators perform all tasks in a production
    process via a rotation system.
- uri: http://data.europa.eu/esco/occupation/d0d7d777-073f-4c33-8f27-1d4a0e8e626f
  preferred_label: pulp control operator
  isco_code: '3139'
  code: '3139.3'
  description: Pulp control operators operate and monitor multi-function process control
    machinery and equipment to control the processing of wood, scrap pulp, recycable
    paper and other cellulose materials in the production of pulp. They set up, operate
    and maintain the machinery, analyse the production results and adjust the process
    when necessary.
- uri: http://data.europa.eu/esco/occupation/f444e8ec-5eed-4777-866e-7127aa06ce4f
  preferred_label: clothing process control technician
  isco_code: '3139'
  code: 3139.1.1
  description: Clothing process control technicians operate multiple process control
    equipment in manufacturing assembly lines.
- uri: http://data.europa.eu/esco/occupation/0da75680-fbf9-44d8-802a-ac12eb425a34
  preferred_label: biotechnical technician
  isco_code: '3141'
  code: '3141.1'
  description: Biotechnical technicians perform technological work in assistance of
    scientists. They work in laboratory settings where they help scientists to research,
    develop and test forms of biotechnology. They set up lab equipment, prepare scientific
    tests and gather scientific data.
- uri: http://data.europa.eu/esco/occupation/2c5ae1b4-c3ca-4882-b7ce-e346ae5b5b00
  preferred_label: botanical technician
  isco_code: '3141'
  code: 3141.2.4
  description: Botanical technicians provide technical assistance in researching and
    testing different plant species to monitor their properties such as growth and
    structure. They collect and analyse data using laboratory equipment, compile reports
    and maintain laboratory stock. Botanical technicians also study plants to research
    their use in areas such as medicine, food and materials.
- uri: http://data.europa.eu/esco/occupation/31cc4199-703c-4f8a-9b46-a2070a6d35df
  preferred_label: biology technician
  isco_code: '3141'
  code: 3141.2.3
  description: Biology technicians provide technical assistance in researching and
    analysing the relationship between living organisms and their environment. They
    use laboratory equipment to examine organic substances such as bodily fluids,
    medicines, plants and food. They collect and analyse data for experiments, compile
    reports and maintain laboratory stock.
- uri: http://data.europa.eu/esco/occupation/4fef1907-cf82-413b-841a-02ef57e299a6
  preferred_label: scientific laboratory technician
  isco_code: '3141'
  code: '3141.2'
  description: Scientific laboratory technicians carry out laboratory-based research,
    analysis and testing and support life science professionals. They sample, test,
    measure, research and analyse in areas such as biology, biotechnology, environmental
    science, forensic science and pharmacology. Scientific laboratory technicians
    also observe and monitor laboratory activities, record test sequences and analyse
    the results.
- uri: http://data.europa.eu/esco/occupation/95324a4a-a5ea-4d89-8ede-4422ccb46a28
  preferred_label: biochemistry technician
  isco_code: '3141'
  code: 3141.2.2
  description: Biochemistry technicians provide technical assistance in researching,
    analysing and testing the reactions caused by chemicals in living organisms. They
    use laboratory equipment to help develop or improve chemical-based products and
    also collect and analyse data for experiments, compile reports and maintain laboratory
    stock.
- uri: http://data.europa.eu/esco/occupation/f3b99acc-b212-45cf-bb4f-7b83cc6f0d71
  preferred_label: bacteriology technician
  isco_code: '3141'
  code: 3141.2.1
  description: Bacteriology technicians provide technical assistance in researching
    and testing bacteria using laboratory equipment. They collect and analyse data
    for experiments, compile reports and maintain laboratory stock.
- uri: http://data.europa.eu/esco/occupation/ff4c28e2-66b1-4ae7-9053-fba8ec3428be
  preferred_label: zoology technician
  isco_code: '3141'
  code: 3141.2.5
  description: Zoology technicians provide technical assistance in researching and
    testing animal species using laboratory equipment. They aid in research concerning
    animals as well as their environments and ecosystems. They collect and analyse
    data, compile reports and maintain laboratory stock.
- uri: http://data.europa.eu/esco/occupation/1f8314c2-01bd-4af4-babc-04d7034591b8
  preferred_label: agricultural technician
  isco_code: '3142'
  code: '3142.1'
  description: Agricultural technicians collect and conduct experiments and tests
    on agriculture and aquaculture specimens. They provide support to scientists and
    farmers and also analyse and report on conditions in the collected specimens'
    environments.
- uri: http://data.europa.eu/esco/occupation/ac036ea7-883a-4265-96d5-c02bbe6667e1
  preferred_label: aquaculture site supervisor
  isco_code: '3142'
  code: 3142.1.2
  description: Aquaculture site supervisors supervise production processes in large-scale
    aquaculture operations and inspect aquaculture sites to maintain and improve performance.
    They maintain the health, safety and security of the workplace, develop management
    plans to reduce the risks from pests, predators and diseases and supervise both
    the disposal of bio and chemical waste and the maintenance of equipment and machinery.
- uri: http://data.europa.eu/esco/occupation/b9e51ff4-d7fb-4653-bc72-65086ffc6e65
  preferred_label: viticulture adviser
  isco_code: '3142'
  code: 3142.1.3
  description: Viticulture advisers advise on improving vineyard production and wine-making.
- uri: http://data.europa.eu/esco/occupation/f9cbdeb4-1559-4d45-b2d7-edf8aebe400b
  preferred_label: aquaculture quality supervisor
  isco_code: '3142'
  code: 3142.1.1
  description: Aquaculture quality supervisors establish standards and policies for
    the quality control of aquatic organisms’ production. They test and inspect the
    stock according to hazard analysis and critical control points (HACCP) principles
    and safety regulations.
- uri: http://data.europa.eu/esco/occupation/fbf3aefb-70ff-440b-8724-bac3ed5e2c93
  preferred_label: forestry technician
  isco_code: '3143'
  code: '3143.1'
  description: Forestry technicians assist and support the forest manager and implement
    their decisions. They supervise a team of forestry equipment operators and support
    and supervise forestry and environmental protection through research and data
    collection. They also manage resource conservation and harvesting plans.
- uri: http://data.europa.eu/esco/occupation/340b04fd-6312-47e5-80ff-28222a343864
  preferred_label: fisheries engineering technician
  isco_code: '3151'
  code: '3151.1'
  description: Fisheries engineering technicians perform maintenance and repair machines
    and equipment in the fish hold and refrigeration system on board of fishing vessels.
- uri: http://data.europa.eu/esco/occupation/6ce86c90-36cc-43ef-a1e0-885d8151f976
  preferred_label: ship duty engineer
  isco_code: '3151'
  code: '3151.4'
  description: Ship duty engineers share responsibility for most of the content of
    the ship's hull. They ensure operation of the main engines, steering mechanism,
    electrical generation and other major subsystems. They communicate with the ship
    chief engineer to perform technical operations.
- uri: http://data.europa.eu/esco/occupation/9dbbeb2c-0d51-4c03-8ef6-8dfa7360db22
  preferred_label: ship assistant engineer
  isco_code: '3151'
  code: '3151.3'
  description: Ship assistant engineers assist the ship chief engineer and the ship
    duty engineer in the operations of the ship's hull. They support the operation
    of the main engines, steering mechanism, electrical generation and other major
    subsystems. They communicate with maritime engineers about the performance of
    technical operations. They also ensure appropriate safety and regulatory standards
    compliance and are able to take on higher level positions if needed.
- uri: http://data.europa.eu/esco/occupation/cd19e8d1-6abd-4c99-a9bb-85e7c30aca31
  preferred_label: marine chief engineer
  isco_code: '3151'
  code: '3151.2'
  description: Marine chief engineers are responsible for the entire technical operations
    of the vessel including engineering, electrical, and mechanical divisions. They
    are the head of the entire engine department aboard the ship and have overall
    responsibility for all technical operations and equipment on-board the ship. Marine
    chief engineers collaborate on security, survival and health care on board and
    observe the national and international standards of application.
- uri: http://data.europa.eu/esco/occupation/17e39591-7137-4960-94c8-8169f7a5d67b
  preferred_label: officer of the watch
  isco_code: '3152'
  code: '3152.6'
  description: Officers of the watch lead the navigation of the operational level.
    Handle cargo and stowage tasks as well as control the operation of the ship. At
    the operational level, they take care for persons on board.
- uri: http://data.europa.eu/esco/occupation/1ff5cf0d-e81f-4287-ba00-096816b16777
  preferred_label: maritime pilot
  isco_code: '3152'
  code: '3152.3'
  description: Maritime pilots are mariners who guide ships through dangerous or congested
    waters, such as harbours or river mouths. They are expert ship handlers who possess
    detailed knowledge of local waterways.
- uri: http://data.europa.eu/esco/occupation/6474e4d4-e3a6-4e88-83ee-971ebbf954e9
  preferred_label: helmsman
  isco_code: '3152'
  code: '3152.2'
  description: Helmsmen are members of the crew on the highest rank of the operational
    level on an inland vessel. They perform a variety of duties concerned with the
    operation and upkeep of deck department areas, the engine and other equipment,
    mooring and unmooring, as well as the steering of the ship as the main task.
- uri: http://data.europa.eu/esco/occupation/e3df1f82-3df9-41e5-8487-635e184653d1
  preferred_label: deck officer
  isco_code: '3152'
  code: '3152.1'
  description: Deck officers or mates perform the watch duties on board of vessels
    like determining the course and speed, manoeuvring to avoid hazards, and continuously
    monitoring the vessels position using charts and navigational aids. They maintain
    logs and other records tracking the ship's movements. They ensure that the proper
    procedures and safety practices are followed, check that equipment is in good
    working order, and oversee the loading and discharging of cargo or passengers.
    They supervise crew members engaged in maintenance and the primary upkeep of the
    vessel.
- uri: http://data.europa.eu/esco/occupation/ee646fa1-3f09-4e43-9275-3aa958ca00ae
  preferred_label: skipper
  isco_code: '3152'
  code: '3152.5'
  description: Skippers are the highest authority on-board or on inland waterways,
    they are in charge of the vessel and are held responsible for the safety and well
    being of the clients and crew. They are licensed by the responsible authority
    and will determine the operations of the vessel at any time. They are the ultimate
    instance responsible for the crew, the ship, the cargo and/or passengers, and
    the voyage.
- uri: http://data.europa.eu/esco/occupation/f2a416b8-c7e4-49ee-964d-a49f6af79b84
  preferred_label: ship captain
  isco_code: '3152'
  code: '3152.4'
  description: Ship captains are in charge of a vessel for the transportation of goods
    and passengers, operating in offshore and coastal waters. The size of the vessel
    can range from a small vessel to a cruise liner depending on the tonnage that
    they are certified to sail. Ship captains have vast experience with ships and
    their operation, and are likely to have worked their way through the ranks of
    other ship-related positions.
- uri: http://data.europa.eu/esco/occupation/27a88c48-1d09-4a8c-a82a-a61ea16476d9
  preferred_label: drone pilot
  isco_code: '3153'
  code: '3153.4'
  description: Drone pilots remotely operate unmanned aerial vehicles (UAVs). They
    navigate the drone as well as activate other equipment as cameras, sensors as
    LIDARS to calculate distances, or any other instrumentation.
- uri: http://data.europa.eu/esco/occupation/476420bb-2577-4f79-ad32-186f19c4fd02
  preferred_label: helicopter pilot
  isco_code: '3153'
  code: 3153.2.4
  description: Helicopter pilots fly helicopters in order to transport passengers
    and cargo from one place to another. They plan flights using aeronautical charts
    and navigation instruments. Prior to departure, they inspect helicopters following
    checklists to detect leaking hydraulic fluid, inoperative control, low fuel level,
    or other unsafe conditions.
- uri: http://data.europa.eu/esco/occupation/522c55ca-ee4a-407d-9fc6-f810c5266523
  preferred_label: airline transport pilot
  isco_code: '3153'
  code: 3153.2.2.1
  description: Airline transport pilots fly large aircrafts with a maximum take-off
    weight of more than 5700 kilograms, to transport passengers, mail, or freight
    on long or short-haul flights for leisure, business or commercial purposes. They
    have the overall responsibility for the safe and efficient operation of aircrafts
    and the safety of crew and passengers.
- uri: http://data.europa.eu/esco/occupation/523ab5a0-5e72-418d-9d61-a6126a446123
  preferred_label: commercial pilot
  isco_code: '3153'
  code: 3153.2.2
  description: Commercial pilots navigate flight of fixed-wing and multi-engine aircrafts
    for the transport of passengers and cargo.
- uri: http://data.europa.eu/esco/occupation/807a1ac3-4f56-41f3-a68c-d653d558eb0a
  preferred_label: co-pilot
  isco_code: '3153'
  code: 3153.2.1
  description: Co-pilots are responsible for assisting captains by monitoring the
    flight instruments, handling radio communications, watching for air traffic, and
    taking over for the pilot as needed. They adhere to the pilot's commands, flight
    plans, and regulations and procedures of aviation national authorities, companies,
    and airports.
- uri: http://data.europa.eu/esco/occupation/81a1e1f5-cce3-444d-bfc3-9771236d57cd
  preferred_label: aircraft maintenance engineer
  isco_code: '3153'
  code: '3153.1'
  description: Aircraft maintenance engineers make preflight and postflight inspections,
    adjustments, and minor repairs to ensure safe and sound performance of aircrafts.
    They inspect aircraft prior to takeoff to detect malfunctions such as oil leaks,
    electrical or hydraulic problems. They verify passenger and cargo distribution
    and amount of fuel to ensure that weight and balance specifications are met.
- uri: http://data.europa.eu/esco/occupation/8a42240b-2b5c-4f6f-8787-f0547fbc46c5
  preferred_label: private pilot
  isco_code: '3153'
  code: 3153.2.5
  description: Private pilots operate non-commercial airplanes for leisure with a
    limited amount of seats and engine horsepower. They also provide private transport
    for people.
- uri: http://data.europa.eu/esco/occupation/9a4ba556-e72b-49c2-834c-d6a03a2fc906
  preferred_label: aircraft pilot
  isco_code: '3153'
  code: '3153.2'
  description: Aircraft pilots control and navigate aircraft. They operate the mechanical
    and electrical systems of the aircraft and transport people, mail and freight.
- uri: http://data.europa.eu/esco/occupation/b3b32930-05f0-4b2e-93bf-34d1e3f89a3b
  preferred_label: flight instructor
  isco_code: '3153'
  code: 3153.2.3
  description: Flight instructors train both new and experienced pilots seeking to
    gain licences or experience in flying new aircraft, how to properly operate an
    aircraft according to regulations. They teach their students both the theory and
    practice of how to optimally fly and maintain an airplane, and they observe and
    evaluate student technique. They also focus on the regulations relating to operational
    and safety procedures specific to different (commercial) airline aircraft.
- uri: http://data.europa.eu/esco/occupation/d48d4949-73a2-40d7-8350-329cda6b5a9a
  preferred_label: second officer
  isco_code: '3153'
  code: 3153.2.6
  description: Second officers are responsible for monitoring and controlling various
    aircraft systems including fixed-wing and rotary wing. They work in close coordination
    with the two pilots during all phases of flight. They make pre-flight, inflight,
    and post flight inspections, adjustments, and minor repairs. They verify parameters
    such as passenger and cargo distribution, the amount of fuel, aircraft performance,
    and appropriate engine speed according to instructions of pilots.
- uri: http://data.europa.eu/esco/occupation/d4edb527-2e5d-440c-9f8c-cd5caa9cc4d6
  preferred_label: astronaut
  isco_code: '3153'
  code: '3153.3'
  description: Astronauts are crew members commanding spacecrafts for operations beyond
    low Earth orbit or higher than the regular altitude reached by commercial flights.
    They orbit the Earth in order to perform operations such as scientific research
    and experiments, launching or release of satellites, and building of space stations.
- uri: http://data.europa.eu/esco/occupation/3c2da05f-eb24-41f7-8307-46c96660fee0
  preferred_label: air traffic controller
  isco_code: '3154'
  code: '3154.1'
  description: Air traffic controllers assist pilots by providing information concerning
    the height, speed and course. They assist pilots in order to facilitate a safe
    take off and landing of aircrafts. They are responsible for maintaining a secure
    and orderly movement of aircraft along major air routes up in the sky and around
    airports. They control air traffic in and within vicinity of airports according
    to established procedures and policies to prevent collisions and to minimise delays
    arising from traffic congestion.
- uri: http://data.europa.eu/esco/occupation/4be03a63-0423-4e50-acbf-aec405bb0741
  preferred_label: aeronautical information service officer
  isco_code: '3154'
  code: 3154.1.1
  description: Aeronautical information service officers maintain the operational
    timing from sunrise to sunset in order to ensure that the information passed by
    agencies is authentic. They strive to ensure safety, regularity and efficiency.
- uri: http://data.europa.eu/esco/occupation/9967986b-570d-4db1-a179-aad7d1623ea8
  preferred_label: airport operations officer
  isco_code: '3154'
  code: 3154.1.3
  description: Airport operations officers perform supervisory and administrative
    work monitoring operational activities on an assigned shift at a large airport.
    They ensure the safe take-off and landing of aircrafts.
- uri: http://data.europa.eu/esco/occupation/b0473a10-e3de-480c-a841-171f2356a074
  preferred_label: aviation inspector
  isco_code: '3154'
  code: '3154.2'
  description: Aviation inspectors perform inspections of the procedures followed
    in the matters of maintenance, air navigational aids, air traffic controls, and
    communications equipment. They check compliance with ICAO, EU, national and environmental
    regulations.
- uri: http://data.europa.eu/esco/occupation/e53e1bd8-7316-4fab-9338-c6a66f50e5b7
  preferred_label: flight operations officer
  isco_code: '3154'
  code: '3154.3'
  description: Flight operations officers compile flight information to expedite movement
    of aircraft between and through airports. They compile aircraft dispatch data
    such as scheduled arrival and departure times at checkpoints and scheduled stops,
    amount of fuel needed for flight, and maximum allowable gross take-off and landing
    weight.
- uri: http://data.europa.eu/esco/occupation/f470b785-643c-46f9-8b31-6085427ab7b8
  preferred_label: aeronautical information specialist
  isco_code: '3154'
  code: 3154.1.2
  description: Aeronautical information specialists provide high quality aeronautical
    information management services through technological means. They support senior
    aeronautical information specialists and assess changes in aeronautical information
    affecting charts and other products. They answer requests related to aeronautical
    data needs for airway companies, operational groups and systems.
- uri: http://data.europa.eu/esco/occupation/0022f466-426c-41a4-ac96-a235c945cf97
  preferred_label: air traffic safety technician
  isco_code: '3155'
  code: '3155.1'
  description: Air traffic safety technicians provide technical support regarding
    the safety of air traffic control and navigation systems. They design, maintain,
    install and operate these systems both in the airport and on board the aeroplane
    according to regulations.
- uri: http://data.europa.eu/esco/occupation/57a73b7c-cf10-4852-b067-c25833fa149e
  preferred_label: clinical perfusion scientist
  isco_code: '3211'
  code: '3211.1'
  description: Clinical perfusion scientists operate heart-lung equipment during surgical
    operations to ensure breathing and blood circulation. They work as part of the
    surgical team, connect patients to the heart-lung machines in preparation for
    surgery, monitor their condition during surgery, report to the team on the patients'
    status and determine the necessary techniques according to their needs.
- uri: http://data.europa.eu/esco/occupation/e139b0a3-3bc5-4c33-bfbf-51ac20ac12fa
  preferred_label: radiation therapist
  isco_code: '3211'
  code: '3211.2'
  description: Radiation therapists are responsible for the accurate delivery of radiotherapy
    to cancer patients and, as part of the multidisciplinary team, for elements of
    treatment preparation and patient care. This encompasses the safe and accurate
    delivery of the radiation dose prescribed and the clinical care and support of
    the patient throughout the treatment preparation, treatment delivery and immediate
    post treatment phases.
- uri: http://data.europa.eu/esco/occupation/0044c991-c26f-4261-a213-4bd1c0564a4c
  preferred_label: medical laboratory assistant
  isco_code: '3212'
  code: '3212.2'
  description: Medical laboratory assistants work under supervision of the biomedical
    scientist and carry out basic laboratory procedures. They work in the pre-analytical
    handling of samples such as checking the details of specimens received for analysis,
    maintaining analysers, loading reagents, and packaging specimens. They also perform
    clerical tasks such as monitoring the stock levels of reagents used in analysis.
- uri: http://data.europa.eu/esco/occupation/82b5c6dc-6a4d-4415-80d8-5cfedfc54de7
  preferred_label: clinical trial assistant
  isco_code: '3213'
  code: '3213.2'
  description: Clinical trial assistants support clinical drug research. Collaborate
    with researchers and doctors in hospitals. Manage essential documents such as
    clinical case report forms, study protocols, and informed consent forms. File
    relevant logs related to side effects of medicines.
- uri: http://data.europa.eu/esco/occupation/c1a86d6d-7785-43e1-994b-958eba58fff7
  preferred_label: pharmacy assistant
  isco_code: '3213'
  code: '3213.1'
  description: Pharmacy assistants perform general duties, such as stock management,
    serving at the cash desk, or performing administrative duties. They deal with
    the inventory within the pharmacy under the supervision of a pharmacist.
- uri: http://data.europa.eu/esco/occupation/521bbfd5-c179-46e3-879b-e74bd6db367c
  preferred_label: audiology technician
  isco_code: '3214'
  code: '3214.1'
  description: Audiology technicians create and service hearing aids and hearing protection
    products. They dispense, fit and provide hearing aids for those who need them.
- uri: http://data.europa.eu/esco/occupation/929b5c9d-2fbf-44f2-980d-2ac6c0dc212f
  preferred_label: prosthetist-orthotist
  isco_code: '3214'
  code: '3214.3'
  description: Prosthetist-orthotists design and custom fit prostheses and orthoses
    for individuals who are missing a limb from accident, disease or congenital conditions
    or for individuals who have impairments, deficiences or weaknesses due to injury,
    pathology or congenital malformation. They mix patient care with the design and
    fabrication of these devices to address their patients' needs.
- uri: http://data.europa.eu/esco/occupation/30194ac4-93b8-4450-8a15-f6f7cbe351cb
  preferred_label: maternity support worker
  isco_code: '3222'
  code: '3222.1'
  description: Maternity support workers work together in a team with midwives and
    health professionals within the occupational fields of nursing and midwifery.
    They assist midwives and women in childbirth by providing the necessary support,
    care and advice during pregnancy, labour and the postpartum period, assist births
    and assist in providing care for the new-born.
- uri: http://data.europa.eu/esco/occupation/463558cd-6e02-43a8-a675-d4e65af70431
  preferred_label: herbal therapist
  isco_code: '3230'
  code: '3230.1'
  description: Herbal therapists use herbal medicine to relief pain and treat illnesses
    such as allergies, chronic physical conditions or stress-related conditions. They
    study the properties and benefits of plants and create a personalised treatment
    plan for the patients.
- uri: http://data.europa.eu/esco/occupation/15cc27b1-7358-48ed-9fb8-69ffe9f1fc98
  preferred_label: animal artificial insemination technician
  isco_code: '3240'
  code: 3240.2.1
  description: Animal artificial insemination technicians are in charge of the impregnation
    of an animal using collected semen, in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/24f1eb3a-e99c-4c38-9bda-ba2ba6bf9fa4
  preferred_label: veterinary nurse
  isco_code: '3240'
  code: 3240.2.4
  description: Veterinary nurses support animals undergoing veterinary treatment and
    give advice to veterinary clients in the promotion of animal health and disease
    prevention in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/289c7385-2342-4a4e-b0b1-7b2e977aea79
  preferred_label: alternative animal therapist
  isco_code: '3240'
  code: '3240.1'
  description: Alternative animal therapists investigate sick or injured small and
    large animals and provide an alternative healing treatment. They may use homeopathy
    or acupuncture and other alternative medicines or methods to heal the animal.
    Alternative animal therapists also advise treatments which strengthen the self-healing
    powers of animals.
- uri: http://data.europa.eu/esco/occupation/319f9864-7f13-4b0c-a827-d50295e239ad
  preferred_label: animal embryo transfer technician
  isco_code: '3240'
  code: 3240.2.2
  description: Animal embryo transfer technicians aid and support the carrying out
    of embryo transfer under veterinary supervision in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/32ef07df-1b0a-439a-916e-8289eb9f4895
  preferred_label: equine dental technician
  isco_code: '3240'
  code: 3240.2.3
  description: Equine dental technicians provide routine equine dental care, using
    appropriate equipment in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/99ebf2c2-1811-4c77-b2e6-7008cba29ea0
  preferred_label: veterinary technician
  isco_code: '3240'
  code: '3240.2'
  description: Veterinary technicians provide the technical and administrative support
    to the veterinarian in accordance with national legislation.
- uri: http://data.europa.eu/esco/occupation/bdc74965-1d1a-4f8e-a490-9cf71f494e02
  preferred_label: dental chairside assistant
  isco_code: '3251'
  code: '3251.1'
  description: Dental chairside assistants support dental practitioners in clinical
    treatments, as preparation and helping in practical execution and follow-up, and
    administrative tasks under supervision and following the orders of the dental
    practitioner.
- uri: http://data.europa.eu/esco/occupation/14eb2c85-fce5-40b6-bcd0-46ac99994b0d
  preferred_label: medical records clerk
  isco_code: '3252'
  code: '3252.1'
  description: Medical records clerks organise, keep up-to-date and archive patients`
    records for medical staff availability. They transfer medical information from
    a patient’s paper records to an electronic template.
- uri: http://data.europa.eu/esco/occupation/32ac76f6-20a0-469e-8cac-e68634087dd3
  preferred_label: picture archiving and communication systems administrator
  isco_code: '3252'
  code: '3252.3'
  description: Picture archiving and communication systems administrators manage picture
    archiving and communication systems (PACS). They store images taken by various
    types of medical equipment, such as X-rays, in order to enable easy access to
    these images for medical. PACS administrators ensure the day-to-day management
    and maintenance of the system.
- uri: http://data.europa.eu/esco/occupation/6219f0ef-6414-4d01-9221-41ac25dcb409
  preferred_label: clinical coder
  isco_code: '3252'
  code: 3252.1.1
  description: Clinical coders read patients' medical records. They analyse and interpret
    medical statements about diseases, injuries and procedures. Clinical coders convert
    this information into health classification codes in order to calculate treatment
    reimbursements, to produce statistics and to monitor health care performance.
- uri: http://data.europa.eu/esco/occupation/92be1fac-97c4-4d4d-ada7-f6aa07d6f316
  preferred_label: waiting list coordinator
  isco_code: '3252'
  code: '3252.4'
  description: Waiting list coordinators guarantee the day to day management of waiting
    list time. They plan when operation rooms are available and call patients in to
    be operated. Waiting list coordinators make sure to optimise the use of resources.
- uri: http://data.europa.eu/esco/occupation/983c2816-a339-4817-97f4-151a9ff3e64d
  preferred_label: medical records manager
  isco_code: '3252'
  code: '3252.2'
  description: Medical records managers are responsible for managing activities of
    medical records units which maintain and secure patient data. They supervise,
    oversee and train employees while implementing medical department policies.
- uri: http://data.europa.eu/esco/occupation/b560456a-bc4d-41a9-94c8-bf8636147246
  preferred_label: first aid instructor
  isco_code: '3253'
  code: 3253.1.1
  description: First aid instructors teach students immediate lifesaving emergency
    measures, such as cardiopulmonary resuscitation, the recovery position, and injury
    care. They provided practice materials such as a specialised manikin.
- uri: http://data.europa.eu/esco/occupation/c7ad889f-10fc-4346-b740-bd479ad82b47
  preferred_label: community health worker
  isco_code: '3253'
  code: '3253.1'
  description: Community health workers provide advice and information about various
    health subjects to the community. They can assist with pre- and post-natal care,
    give nutritional advice and help individuals stop smoking. Community health workers
    develop health and prevention programmes.
- uri: http://data.europa.eu/esco/occupation/1084e2d6-b153-4090-8065-c9231f71d4f0
  preferred_label: optical technician
  isco_code: '3254'
  code: 3254.1.1
  description: Optical technicians assemble, repair and design various parts of eyewear
    such as lenses, frames, patterns and eyewear. They cut, inspect, mount and polish
    all parts using various machinery and hand tools. Optical technicians shape, grind
    and coat lenses for prescription eyewear. They fit completed lenses into eyeglass
    frames. Optical technicians ensure that lenses conform to the dispensing optician’s,
    specialised doctor in ophtalmology's or optometrist's prescriptions. They may
    also work with other associated optical instrumentation and its maintenance.
- uri: http://data.europa.eu/esco/occupation/6e0e068b-cd5c-4400-8899-54056087fa14
  preferred_label: optician
  isco_code: '3254'
  code: '3254.1'
  description: Opticians help to improve and correct an individual's vision. They
    fit spectacle lenses and frames, contact lenses, and other devices according to
    the specifications of the individual. Their scope of practice varies according
    to national regulations and they might operate according to prescriptions provided
    by a specialised doctor in ophthalmology or an optometrist in the countries where
    requested.
- uri: http://data.europa.eu/esco/occupation/9487f835-b5a9-4742-8ecf-35520911e28c
  preferred_label: massage therapist
  isco_code: '3255'
  code: '3255.1'
  description: Massage therapists provide therapeutic massage treatments to improve
    the well-being of their clients. They perform a variety of massage types such
    as shiatsu and swedish massage, according to their client's needs and preferences.
- uri: http://data.europa.eu/esco/occupation/b01affdd-c8a9-4121-bc50-a5be17f014eb
  preferred_label: shiatsu practitioner
  isco_code: '3255'
  code: '3255.3'
  description: Shiatsu practitioners provide health maintenance, health education,
    whole health evaluation and recommendations for wellbeing, and treatment of certain
    illness through energetic evaluation of the body's life energy system (Ki) and
    regulation of the life energy system through various energetic and manual techniques.
- uri: http://data.europa.eu/esco/occupation/ceda6443-e1dd-4890-b018-42318e3abac2
  preferred_label: sophrologist
  isco_code: '3255'
  code: '3255.4'
  description: Sophrologists aim to reduce their clients` stress and produce optimal
    health and well-being by applying a dynamic relaxation method which consists of
    a specific set of physical and mental exercises on a doctor's order.
- uri: http://data.europa.eu/esco/occupation/f88124d7-ee7e-4d21-9036-0658b496c119
  preferred_label: physiotherapy assistant
  isco_code: '3255'
  code: '3255.2'
  description: Physiotherapy assistants work under supervision, within defined contexts
    using agreed treatment protocols and procedures such as collecting client data
    and maintaining the equipment required in physiotherapy interventions. The overall
    responsibility is retained by the delegating professional.
- uri: http://data.europa.eu/esco/occupation/0c041d1e-1841-4acb-b0a1-2c387a61bf65
  preferred_label: doctors' surgery assistant
  isco_code: '3256'
  code: '3256.1'
  description: Doctors' surgery assistants support doctors of medicine in medical
    measures, in performing simple support activities during medical procedures, standardised
    diagnostic programmes and standardised point-of-care tests, ensuring surgery hygiene,
    cleaning, disinfecting, sterilising and maintaining medical devices and performing
    the organisational and administrative tasks required for operating a doctor`s
    surgery under supervision, following the orders of the doctor of medicine.
- uri: http://data.europa.eu/esco/occupation/1b422c31-f242-46b5-bbdc-aa63885e4b5c
  preferred_label: transport health and safety inspector
  isco_code: '3257'
  code: '3257.6'
  description: Transport health and safety inspectors are responsible for maintaining
    safety standards, reducing risk to company, staff and customers and achieving
    industry standards. They evaluate existing security systems to determine potential
    risks in all transport sectors such as road and sea transport, and develop policies
    and procedures that minimise the risk to properties, employees and computer systems.
- uri: http://data.europa.eu/esco/occupation/2b31f745-f04f-4d2c-9692-4715e1448f80
  preferred_label: health and safety inspector
  isco_code: '3257'
  code: '3257.7'
  description: Health and safety inspectors investigate the implementation and application
    of labour standards and policies in a workplace. They advise employers as well
    as employees on the improvement of policy and legislation implementation, ensure
    that the law is adhered to, and that matters of equality and labour rights are
    respected. They write reports and communicate with authorities.
- uri: http://data.europa.eu/esco/occupation/43d49e27-302b-439d-bce6-86555527edb5
  preferred_label: healthcare inspector
  isco_code: '3257'
  code: 3257.5.1
  description: Healthcare inspectors visit healthcare facilities to ensure proper
    care is given to all patients in accordance with legal requirements. They also
    inspect if equipment, processes and staff operate adequately to prevent the spreading
    of infections and diseases.
- uri: http://data.europa.eu/esco/occupation/673f3266-ab1a-447d-9b28-fc5838dc07e3
  preferred_label: occupational health and safety inspector
  isco_code: '3257'
  code: '3257.5'
  description: Occupational health and safety inspectors perform workplace audits
    to ensure compliance with government and environment legislation. They also investigate
    work accidents. Occupational health and safety inspectors interview employees
    to ensure the work environment is compliant with health and safety rules, inspect
    the physical work site and analyse legal paperwork.
- uri: http://data.europa.eu/esco/occupation/7d8b3c73-20f8-467e-91e4-00378673a2cd
  preferred_label: food safety inspector
  isco_code: '3257'
  code: '3257.3'
  description: Food safety inspectors carry out inspections in food processing environments
    from a food safety standpoint. They are part of official control bodies who check
    and control food products and processes to ensure compliance with regulations
    and laws governing safety and health.
- uri: http://data.europa.eu/esco/occupation/a092cb70-f3e3-4224-98a3-b97c0114de77
  preferred_label: environmental health inspector
  isco_code: '3257'
  code: '3257.1'
  description: Environmental health inspectors carry out investigations to ensure
    that areas, organisations and companies comply with environmental and public health
    legislation. They evaluate environmental complaints, provide reports on their
    findings and work to prevent future hazards or noncompliance with current policies.
    Environmental health inspectors perform consultations to promote public health
    and safety.
- uri: http://data.europa.eu/esco/occupation/a41acf2b-fb87-496f-aec3-7c5fdc5e9211
  preferred_label: industrial waste inspector
  isco_code: '3257'
  code: '3257.4'
  description: Industrial waste inspectors conduct controls in companies to ensure
    they comply with waste and environmental regulations. They check the documentation
    related to waste management, they collect samples for analysis and observe the
    industrial practices. They may advise or preventive or corrective actions to improve
    industrial waste management and disposal.
- uri: http://data.europa.eu/esco/occupation/b3867d0a-e902-4d88-b0c2-3e0d2cf35c83
  preferred_label: hazardous materials inspector
  isco_code: '3257'
  code: 3257.4.1
  description: Hazardous materials inspectors inspect facilities which handle hazardous
    materials to ensure compliance to health and safety regulations, and hazardous
    materials handling legislation. They investigate violations, oversee tests of
    emergency and risk response plans, and consult on the improvement of the facilities'
    operations and procedures, as well as on hazardous materials regulations. They
    also advise plants on potential sources of danger to a community, and on better
    safety regulations.
- uri: http://data.europa.eu/esco/occupation/c872187a-079b-413b-8503-7b5dd92abb88
  preferred_label: food regulatory advisor
  isco_code: '3257'
  code: '3257.2'
  description: Food regulatory advisors are extra-judicial or judiciary technical
    experts. They ensure food industry practices comply with the regulatory norms.
    They perform audits, make diagnosis and monitor activities of inspection. These
    experts have expertise in food processing, food analysis, quality, safety, certification,
    traceability. They update, review, and approve labelling designs, develop nutrition
    facts panels, and ensure that products and labels meet appropriate standards and
    regulations.
- uri: http://data.europa.eu/esco/occupation/de0856fe-21fa-46d6-88ee-f99d3b4946bc
  preferred_label: hazardous waste inspector
  isco_code: '3257'
  code: 3257.4.2
  description: Hazardous waste inspectors inspect industrial sites to ensure they
    adhere to waste disposal legislation, and inspect their equipment to see if it
    is operational and functions according to regulations. They also aim to educate
    the public on hazardous substances and on hazardous waste handling regulations.
- uri: http://data.europa.eu/esco/occupation/0b5dfc02-b825-4445-811d-d39ed442657e
  preferred_label: paramedic in emergency responses
  isco_code: '3258'
  code: '3258.2'
  description: Paramedics in emergency responses provide emergency care to sick, injured,
    and vulnerable persons in emergency medical situations, before and during transport
    to a medical facility. They implement and oversee the transfer of the patient
    in connection with transport. They provide assistance in acute situations, implement
    life-saving emergency measures, and monitor the performance of the transportation
    process. As allowed by national law they may also provide oxygen, certain drugs,
    the puncture of peripheral veins and infusion of crystalloid solutions and perform
    endotracheal intubation if needed for the immediate prevention of threats for
    the life or health of an emergency patient.
- uri: http://data.europa.eu/esco/occupation/64e909ad-1bd0-493c-a8dc-1afbed0c9c2f
  preferred_label: emergency ambulance driver
  isco_code: '3258'
  code: '3258.1'
  description: Emergency ambulance drivers use emergency vehicles to respond to medical
    emergencies and support the work of paramedics, move patients safely, take note
    of changes in the patient's vital signs and report to the paramedics in charge,
    ensuring the medical equipment is well stored, transported and functional, under
    supervision and on order of a doctor of medicine.
- uri: http://data.europa.eu/esco/occupation/16e65196-3449-4c88-b379-0aa98f43db2b
  preferred_label: anaesthetic technician
  isco_code: '3259'
  code: '3259.1'
  description: Anaesthetic technicians assist specialised doctors in anaesthetics.
    They prepare operating theatres and other specialised clinics for anaesthetic
    procedures, prepare the equipment needed for anaesthesia, and assist with inducing
    and maintaining adequate anaesthesia and post-anaesthesia procedures. They do
    so under supervision, following the orders of the doctor of medicine.
- uri: http://data.europa.eu/esco/occupation/66ca3643-e6f3-4c75-9300-40d813185b3e
  preferred_label: chiropractic assistant
  isco_code: '3259'
  code: '3259.3'
  description: Chiropractic assistants perform routine and administrative tasks to
    support patient care and work under the sole direction and supervision of a Chiropractor
    or Specialized Chiropractor. They may interview patients, keep records of the
    case history, assist Chiropractors or Specialized Chiropractors in providing patients
    examination and perform administrative tasks. Chiropractic assistants work within
    defined contexts using agreed protocols and procedures.
- uri: http://data.europa.eu/esco/occupation/68bc2af1-96ea-4ec2-8b2f-5cde76472135
  preferred_label: dietetic technician
  isco_code: '3259'
  code: '3259.5'
  description: Dietetic technicians assist dietitians in planning nutritional programmes
    and in planning menus for patients as part of an overall treatment plan under
    supervision of a dietitian. Under supervision of a dietitian, dietetic technicians
    assist dietitians in patient reviews, enteral feeding discharge planning, and
    clinical auditing which includes nutritional screening.
- uri: http://data.europa.eu/esco/occupation/7b8b6118-6876-4a71-81a6-4b5fa9bfa221
  preferred_label: respiratory therapy technician
  isco_code: '3259'
  code: '3259.7'
  description: Respiratory therapy technicians assist doctors and surgeons to treat
    respiratory problems. They work in hospitals and medical facilities where they
    operate medical equipment to test patients' respiratory conditions and aid in
    their treatment. Respiratory therapy technicians also tend to breathing equipment
    and machines during surgery.
- uri: http://data.europa.eu/esco/occupation/abae06d8-525f-4a2d-8bbd-67b559aad8f2
  preferred_label: temperature screener
  isco_code: '3259'
  code: '3259.8'
  description: Temperature screeners are responsible for checking the temperature
    of guests, staff or visitors entering the premises of an organisation or public
    spaces, as a measure to prevent the spread of infectious diseases in private and
    public spaces.
- uri: http://data.europa.eu/esco/occupation/c56bb750-db0b-487b-89f4-82dee6dcab09
  preferred_label: covid tester
  isco_code: '3259'
  code: '3259.4'
  description: Covid testers perform Covid tests through nasal or throat swabs. They
    complement the sample information with health-related questions they ask the individuals,
    and input the data collected into digital devices.
- uri: http://data.europa.eu/esco/occupation/d1b8c046-3867-423a-84fd-41f7be3a6d29
  preferred_label: assistant clinical psychologist
  isco_code: '3259'
  code: '3259.2'
  description: Assistant clinical psychologists aid psychologists in their work. They
    work in healthcare facilities or private practices where they assist psychologists
    with their treatment of patients. Assistant clinical psychologists are healthcare
    professionals that can assess patients with psychological tests and aid with therapy,
    as well as performing administrative functions.
- uri: http://data.europa.eu/esco/occupation/05a06850-d465-481e-9d68-792d4ad1da3e
  preferred_label: foreign exchange trader
  isco_code: '3311'
  code: 3311.3.2
  description: Foreign exchange traders buy and sell foreign currencies in order to
    secure a profit on fluctuations in foreign exchange rates. They undertake technical
    analysis of economic information (market liquidity and volatility ) to predict
    the future rates of currencies on the foreign exchange market. They trade on their
    own name or for their employers.
- uri: http://data.europa.eu/esco/occupation/1f305576-f57c-42c7-a139-728c72393cd4
  preferred_label: energy trader
  isco_code: '3311'
  code: 3311.3.1
  description: Energy traders sell or buy shares of energy, sometimes from different
    sources. They analyse the energy market and investigate trends in prices to decide
    when to buy or sell shares and ensure the most profit. They make calculations,
    and write reports on energy trades procedures, and make predictions on the development
    of the market.
- uri: http://data.europa.eu/esco/occupation/3b6d4443-4518-4fb3-ae44-188a958e328d
  preferred_label: stock trader
  isco_code: '3311'
  code: 3311.3.5
  description: Stock traders use their technical expertise of financial markets performance
    to advise and make recommendations to asset managers or shareholders for a profitable
    investment strategy, keeping in mind the company’s performance. They use stock
    market trading operations and deal with a wide array of taxes, commissions and
    fiscal obligations. Stock traders buy and sell bonds, stocks, futures and shares
    in hedge funds. They perform detailed micro- and macroeconomic and industry specific
    technical analysis.
- uri: http://data.europa.eu/esco/occupation/4bc4170d-f4df-44e4-a3be-394242ae3017
  preferred_label: securities trader
  isco_code: '3311'
  code: 3311.3.4
  description: Securities traders purchase and sell securities such as stocks, bonds
    and shares on their own account or on their employers account based on their expertise
    in the financial markets. They monitor the performance of the securities traded,
    assessing their stability or speculative tendencies. They record and file all
    securities transactions and take care of their financial documents.
- uri: http://data.europa.eu/esco/occupation/60bc7374-9fa1-4bbd-b936-2676fca0bfb6
  preferred_label: financial trader
  isco_code: '3311'
  code: '3311.3'
  description: Financial traders buy and sell financial products such as assets, shares
    and bonds for private clients, banks or companies. They monitor the financial
    markets closely and aim to maximise profit and to minimise risk through their
    transactions.
- uri: http://data.europa.eu/esco/occupation/8a3498c7-470a-4067-b48e-f330d9b702e8
  preferred_label: securities underwriter
  isco_code: '3311'
  code: 3311.2.4.1
  description: Securities underwriters administer the distribution activities of new
    securities from a business company. They work in close connection with the issuing
    body of the securities in order to establish the price and buys and sells them
    to other investors. They receive underwriting fees from their issuing clients.
- uri: http://data.europa.eu/esco/occupation/8ec6b513-3d44-4e94-b187-d55734a587a4
  preferred_label: stock broker
  isco_code: '3311'
  code: 3311.2.5
  description: Stock brokers act on behalf of their individual or institutional clients
    in order to buy and sell stocks and other securities. They are in close contact
    with their clients and ensure that what they buy or sell through the stock exchange
    market is according to their clients' wishes. Stock brokers undertake analyst
    research to make recommendations to their clients and expand their client base
    through various methods.
- uri: http://data.europa.eu/esco/occupation/c01cdf85-3ce0-4d12-ae86-e4e63493fafa
  preferred_label: financial broker
  isco_code: '3311'
  code: '3311.2'
  description: Financial brokers undertake financial market activities on behalf of
    their clients. They monitor securities, financial documentation of their clients,
    market trends and conditions and other legal requirements. They plan buying and
    selling activities and calculate transactions costs.
- uri: http://data.europa.eu/esco/occupation/c0463fbe-7914-48ac-84ec-abaee1a7f292
  preferred_label: securities broker
  isco_code: '3311'
  code: 3311.2.4
  description: Securities brokers create the connection between the investors and
    the available investment opportunities. They purchase and sell securities on their
    clients' behalf, based on their expertise in the financial markets. They monitor
    the performance of their clients' securities, assessing their stability or speculative
    tendencies. Securities brokers calculate the securities' price and place orders.
- uri: http://data.europa.eu/esco/occupation/c9839843-6cac-4564-8aa7-de4a5b9b62e1
  preferred_label: mutual fund broker
  isco_code: '3311'
  code: 3311.2.3
  description: Mutual fund brokers handle and raise cash from shareholders in order
    to invest them in stocks, bonds and money-market securities. They engage with
    investors by making inquiries about the client's mutual funds account status and
    transaction procedures. Mutual fund brokers make use of their expertise in investment
    theory, market experience, and research to pick the most approapriate investments
    for their fund portfolio. They ensure that the mutual fund's operations are in
    compliance with legal requirements.
- uri: http://data.europa.eu/esco/occupation/e20eee17-4876-4f21-a0cb-5d7f40c63cd8
  preferred_label: asset manager
  isco_code: '3311'
  code: '3311.1'
  description: Asset managers invest the money of a client into financial assets,
    through vehicles such as investment funds or management of individual clients’
    portfolios. This includes the management of the financial assets, within a given
    investment policy and risk framework, the provision of information, and the assessment
    and monitoring of risks.
- uri: http://data.europa.eu/esco/occupation/fadb09c5-db84-4240-9fd6-68b4c0abeed5
  preferred_label: foreign exchange broker
  isco_code: '3311'
  code: 3311.2.1
  description: Foreign exchange brokers buy and sell foreign currencies on behalf
    of their clients in order to secure a profit on fluctuations in foreign exchange
    rates. They undertake technical analysis of economic information such as market
    liquidity and volatility, to predict the future rates of currencies on the foreign
    exchange market.
- uri: http://data.europa.eu/esco/occupation/fc81b573-e0ea-4466-8560-c2bb278c314a
  preferred_label: futures trader
  isco_code: '3311'
  code: 3311.3.3
  description: Futures traders undertake daily trading activities in the futures trading
    market by buying and selling futures contracts. They speculate on the futures
    contracts' direction, trying to make a profit by buying futures contracts they
    foresee to rise in price and sell contracts they foresee to fall in price.
- uri: http://data.europa.eu/esco/occupation/075e4d25-74b3-46fb-9b6e-6b53cdb196e7
  preferred_label: credit analyst
  isco_code: '3312'
  code: 3312.2.1
  description: Credit analysts investigate credit applications from customers and
    evaluate if the applications comply with regulations and guidelines of the financial
    loan-granting institution. On the basis of credit analyses they advise financial
    institutions whether customers are loan worthy. They perform tasks such as collecting
    data on the loan applicant, aquire additional information from other departments
    or institutions and indicating what sort of agreements the financial institution
    should reach with the credit applicant. Credit analysts also follow up on the
    development of the credit portfolio of clients.
- uri: http://data.europa.eu/esco/occupation/1a87e487-6761-4374-b6db-100ac5a9ad5a
  preferred_label: credit adviser
  isco_code: '3312'
  code: '3312.2'
  description: Credit advisers offer guidance to customers related to credit services.
    They assess the customer's financial situation and debt issues arisen from credit
    cards, medical bills and car loans in order to identify optimal credit solutions
    for customers and also provide debt elimination plans to adjust their finances
    if needed. They prepare qualitative credit analyses and decision-making material
    in respect of defined customers in conformity with the bank's strategy on credit
    policy, ensure the credit quality and follow up on the performance of the credit
    portfolio. Credit advisers also have expertise in debt management and credit consolidation.
- uri: http://data.europa.eu/esco/occupation/32fafe2c-0099-4852-889e-46614ce9a9ae
  preferred_label: credit manager
  isco_code: '3312'
  code: '3312.3'
  description: Credit managers oversee the application of credit policy in the bank.
    They decide the credit limits to be imposed, the reasonable levels of risk accepted
    and the conditions and terms of payment made to the customers. They control the
    collection of payments from their customers and manage the credit department of
    a bank.
- uri: http://data.europa.eu/esco/occupation/3f277813-3cab-4c5d-bfeb-613e449b31c5
  preferred_label: mortgage broker
  isco_code: '3312'
  code: '3312.8'
  description: Mortgage brokers handle mortgage loan applications from clients, collect
    loan documentation and search for new mortgage lending opportunities. They complete
    and close mortgage loan processes for their clients.
- uri: http://data.europa.eu/esco/occupation/5e4d156a-1f05-4b2c-b0f0-5abb82d52ed6
  preferred_label: bank account manager
  isco_code: '3312'
  code: '3312.1'
  description: Bank account managers advise prospective clients on the type of banking
    accounts suitable for their needs. They work with clients to set up the bank account
    and remain their primary point of contact in the bank, assisting with all necessary
    documentation. Bank account managers may recommend their clients to contact other
    departments in the bank for other specific needs.
- uri: http://data.europa.eu/esco/occupation/8e185c49-704e-49c0-8584-a7e0b618f628
  preferred_label: loan officer
  isco_code: '3312'
  code: '3312.5'
  description: Loan officers assess and authorise the approval of loan applications
    for individuals and businesses. They ensure complete transactions between loan
    organisations, borrowers, and sellers. Loan officers are specialists in consumer,
    mortgage, or commercial lending.
- uri: http://data.europa.eu/esco/occupation/ab5a5073-453c-4a93-aff7-345a19f8b954
  preferred_label: mortgage loan underwriter
  isco_code: '3312'
  code: '3312.6'
  description: Mortgage loan underwriters ensure compliance with underwriting guidelines.
    They participate in the implementation of new underwriting guidelines. They also
    review closed and denied loans.
- uri: http://data.europa.eu/esco/occupation/b3ce981c-5b32-4de2-8e53-502a6357b2bc
  preferred_label: credit risk analyst
  isco_code: '3312'
  code: '3312.4'
  description: Credit risk analysts manage individual credit risk and care for fraud
    prevention, business deal analysis, legal documents analysis and recommendations
    on the level of the risk.
- uri: http://data.europa.eu/esco/occupation/c227dcff-dd84-487e-a171-da3d919129bb
  preferred_label: student financial support coordinator
  isco_code: '3312'
  code: '3312.7'
  description: Student financial support coordinators assist students and education
    administrators in the management of tuition fees and student loans. They advise
    on and determine the amounts and the eligibility of student loans, advise students
    on available, suitable loans and liaise with outside loans sources, such as banks,
    to facilitate the student loan process. They make professional judgement decisions
    concerning students' eligibility for financial aid and may set up counsel meetings
    including the student's parents to discuss financial support issues and solutions.
- uri: http://data.europa.eu/esco/occupation/bb4ca5c1-879d-44e8-840d-24f320206bff
  preferred_label: grants administrator
  isco_code: '3313'
  code: '3313.3'
  description: Grants administrators handle the pass-through track of grants, often
    given out by the government to the grant recipient. They prepare the paperwork
    such as the grant applications and give out the grants. They are also responsible
    to make sure that the grant recipient spends the money correctly according to
    the terms laid out.
- uri: http://data.europa.eu/esco/occupation/bfe142b9-a049-4d41-89c4-fd2f34ac56b6
  preferred_label: accounting assistant
  isco_code: '3313'
  code: '3313.1'
  description: Accounting assistants record and report ticketing accounting situations
    to the accountant they work with, verify deposits and prepare daily reports and
    income. They arrange authorised refund vouchers, maintain the returned check accounts
    and communicate with ticketing managers concerning about any issues with ticketing
    systems.
- uri: http://data.europa.eu/esco/occupation/c3aae59e-1441-4b3e-bdd1-6da50dc7cf42
  preferred_label: bookkeeper
  isco_code: '3313'
  code: '3313.2'
  description: Bookkeepers record and assemble the day-to-day financial transactions
    of an organisation or company, consisting usually of sales, purchases, payments
    and receipts. They ensure all financial transactions are documented in the appropriate
    (day) book and general ledger, and that they are balanced out. Bookkeepers prepare
    the recorded books and ledgers with financial transactions for an accountant to
    then analyse balance sheets and income statements.
- uri: http://data.europa.eu/esco/occupation/160c1469-bbb6-48d3-b2a7-db8b30d724b5
  preferred_label: actuarial assistant
  isco_code: '3314'
  code: '3314.1'
  description: Actuarial assistants perform statistical data research in order to
    set premium rates and insurance policies. They review the possibility of accidents,
    injuries and property damage by using statistical formulas and models.
- uri: http://data.europa.eu/esco/occupation/d2e63d7e-2605-4af1-bb7d-b1ed9ad08825
  preferred_label: statistical assistant
  isco_code: '3314'
  code: '3314.2'
  description: Statistical assistants collect data and use statistical formulas to
    execute statistical studies and create reports. They create charts, graphs and
    surveys.
- uri: http://data.europa.eu/esco/occupation/01a83071-6533-4675-b2da-f0c6d02669f5
  preferred_label: insurance claims handler
  isco_code: '3315'
  code: '3315.3'
  description: Insurance claims handlers ensure that all insurance claims are handled
    accurately and that payment for valid claims is made to the policyholders. They
    use statistical data and reporting to calculate and adjust claims as needed, communicate
    with and guide policyholders and monitor the progress of a claim.
- uri: http://data.europa.eu/esco/occupation/2339733d-5a37-4031-b587-db28848e4958
  preferred_label: foreclosure specialist
  isco_code: '3315'
  code: '3315.1'
  description: Foreclosure specialists revise documentation related to properties
    that are under foreclosure. They assist clients whose property has been reclaimed
    by banks due to non-payment of their mortgage by assessing the owner's possibilities
    for saving the property.
- uri: http://data.europa.eu/esco/occupation/a2b81132-2147-4c8e-b250-e6290ed906ea
  preferred_label: insurance fraud investigator
  isco_code: '3315'
  code: '3315.4'
  description: Insurance fraud investigators combat fraudulent activities by investigating
    the circumstances of certain suspicious claims, activities related to new customers,
    buying insurance products and premium calculations. Insurance fraud investigators
    refer potential fraud claims to insurance investigators who then undertake research
    and investigations to support or deny a claimant's case.
- uri: http://data.europa.eu/esco/occupation/afc5a0f4-42e5-4bfb-910c-2b54b44f99c5
  preferred_label: property appraiser
  isco_code: '3315'
  code: '3315.7'
  description: Property appraisers undertake detailed analysis and investigation of
    properties in order to determine their value for sales, mortgage and insurance
    purposes. They compare the value of properties taking into account the age, actual
    state of property, its quality, repairs needed and overall sustainability. Property
    appraisers make an inventory of fixtures, compose a schedule of condition of property
    and prepare appraisal reports for both commercial and residential properties.
- uri: http://data.europa.eu/esco/occupation/bbefa1b2-521e-4d87-a7ad-9bbd0b32e271
  preferred_label: real estate surveyor
  isco_code: '3315'
  code: '3315.8'
  description: Real estate surveyors undertake research in order to assess the value
    of property for tax purposes. They investigate multiple properties at once, using
    accurate appraisal techniques. They provide their services usually to local and
    governmental bodies for taxation reasons.
- uri: http://data.europa.eu/esco/occupation/e91bc34c-0c4f-4ac9-8e2f-8f337d75f9ca
  preferred_label: loss adjuster
  isco_code: '3315'
  code: '3315.5'
  description: Loss adjusters treat and evaluate insurance claims by investigating
    the cases and determining liability and damage, in accordance with the policies
    of the insurance company. They interview the claimant and witnesses and write
    reports for the insurer where appropriate recommendations for the settlement are
    made. Loss adjusters' tasks include making payments to the insured following his
    claim, consulting damage experts and providing information via telephone to the
    clients.
- uri: http://data.europa.eu/esco/occupation/e93b3b49-12e1-4b47-991c-dd4b0aec17d8
  preferred_label: personal property appraiser
  isco_code: '3315'
  code: '3315.6'
  description: Personal property appraisers undertake detailed analysis and investigation
    of personal items such as books, wine, arts and antiques in order to determine
    their value for sales and insurance purposes. They assess the value of the items,
    taking into account the age, current condition, quality and if any repairs are
    required. Personal property appraisers prepare appraisal reports.
- uri: http://data.europa.eu/esco/occupation/f87779ae-7389-44e7-b155-16e87904857e
  preferred_label: gemmologist
  isco_code: '3315'
  code: '3315.2'
  description: Gemmologists value precious stones by analysing their characteristics,
    cut, and provenience either for trading or for further polishing efforts. They
    assess stones and gems to give them a market value.
- uri: http://data.europa.eu/esco/occupation/4975c4cc-a89f-4ea8-82aa-501258dfb2f9
  preferred_label: property insurance underwriter
  isco_code: '3321'
  code: 3321.3.1
  description: Property insurance underwriters assess and determine the risk and coverage
    of a client's property insurance. They analyse and review underwriting policies
    according to legal regulations.
- uri: http://data.europa.eu/esco/occupation/7bcafcd7-3f35-4a72-849c-c92b334927fd
  preferred_label: insurance risk consultant
  isco_code: '3321'
  code: '3321.2'
  description: Insurance risk consultants prepare reports for insurance underwriters.
    For this purpose, they undertake surveys in order to determine the potential financial
    risk for personal products, properties or sites.
- uri: http://data.europa.eu/esco/occupation/a198de8c-24b1-4002-982f-a57ae6d6c19c
  preferred_label: insurance broker
  isco_code: '3321'
  code: '3321.1'
  description: Insurance brokers promote, sell and provide advice on various insurance
    policies such as life insurance, health insurance, accident insurance and fire
    insurance to individuals and organisations. They also work as intermediaries between
    individuals or organisations and insurance companies, and negotiate the best insurance
    policies for their clients, arranging insurance cover where needed. Insurance
    brokers engage with new prospective clients, provide them with quotes for their
    policy needs, assist them in the signing of new insurance contracts and propose
    specific solutions to their specific problems.
- uri: http://data.europa.eu/esco/occupation/e937449a-d9e0-4ab7-9ea5-4d3ac673be6d
  preferred_label: insurance underwriter
  isco_code: '3321'
  code: '3321.3'
  description: Insurance underwriters assess business risks and liability policies
    and make decisions about commercial property. They inspect the conditions of businesses’
    properties, analyse inspection policies, assist with real estate and rent issues,
    prepare loan contracts and handle commercial risks in order to align them with
    business practices. Insurance underwriters analyse various information from prospective
    customers in order to assess the likelihood that they will report a claim. They
    work to minimise risk for the insurance company and make sure that the insurance
    premium aligns with the associated risks. They can be specialists in life insurance,
    health insurance, reinsurance, commercial insurance, mortgage insurance.
- uri: http://data.europa.eu/esco/occupation/14031d4a-6e99-442f-b4fe-18262b6432b2
  preferred_label: commercial sales representative
  isco_code: '3322'
  code: '3322.1'
  description: Commercial sales representatives represent a company in selling and
    providing information on goods and services to businesses and organisations.
- uri: http://data.europa.eu/esco/occupation/4c6b3657-316e-43b5-872a-ea763411190d
  preferred_label: electricity sales representative
  isco_code: '3322'
  code: 3322.1.1
  description: Electricity sales representatives assess clients' energy needs, and
    recommend the purchase of electricity supply from their corporation. They promote
    their corporation's services, and negotiate terms of sale with clients.
- uri: http://data.europa.eu/esco/occupation/ff3a164d-4045-4511-a472-49093dabf9fc
  preferred_label: renewable energy sales representative
  isco_code: '3322'
  code: 3322.1.2
  description: Renewable energy sales representatives assess clients' energy supply
    needs, and attempt to secure sales of renewable energy methods. They promote renewable
    energy suppliers and the use of renewable energy products, and liaise with consumers
    to increase sales.
- uri: http://data.europa.eu/esco/occupation/095169ac-feee-4fcf-bff7-222ab6d84bc4
  preferred_label: green coffee buyer
  isco_code: '3323'
  code: 3323.2.1
  description: Green coffee buyers purchase green coffee beans from producers all
    around the world commissioned by coffee roasters. They have a deep knowledge of
    the process of coffee from the fruit to the cup.
- uri: http://data.europa.eu/esco/occupation/29fa406d-de89-4515-be8d-0fe7bda993f1
  preferred_label: purchaser
  isco_code: '3323'
  code: '3323.2'
  description: Purchasers select and purchase stock, materials, services or goods.
    They organise tender procedures and select suppliers.
- uri: http://data.europa.eu/esco/occupation/9b3c6dd8-4d3b-4a12-8bb8-55bb2e92c3a6
  preferred_label: set buyer
  isco_code: '3323'
  code: '3323.3'
  description: Set buyers analyse the script in order to identify the set dressing
    and the props needed for all individual scenes. They also consult with the production
    designer and the prop and set making team. Set buyers buy, rent or commission
    the making of the props. Set buyers make sure sets are authentic and believable.
- uri: http://data.europa.eu/esco/occupation/bb95ef58-9139-4967-bfc1-da8386a4e672
  preferred_label: ICT buyer
  isco_code: '3323'
  code: 3323.2.2
  description: ICT buyers create and place purchase orders for ICT products and services,
    handle receiving and invoice issues, assess current procurement practices and
    effectively apply strategic sourcing methodologies. They build relationships with
    strategic vendors and negotiate price, quality, service levels and delivery terms.
- uri: http://data.europa.eu/esco/occupation/c3dc576e-2a58-4481-9b6f-9853067af8ea
  preferred_label: timber trader
  isco_code: '3323'
  code: '3323.5'
  description: Timber traders assess the quality, quantity and market value of timber
    and timber products for trade. They organise the selling process of new timber
    and purchase stocks of timber.
- uri: http://data.europa.eu/esco/occupation/cc844eb8-c81d-40ff-af3d-119700e60f23
  preferred_label: costume buyer
  isco_code: '3323'
  code: '3323.1'
  description: Costume buyers work with the costume designer in order to identify
    the materials for the costumes. They buy and rent fabric, thread, accessories
    and other items needed to finish the wardrobe. Costume buyers may also purchase
    ready-made clothing items They base their purchases on the sketches of the costume
    designer.
- uri: http://data.europa.eu/esco/occupation/d08b4700-758c-467d-ab77-d5a8029c4070
  preferred_label: standalone public buyer
  isco_code: '3323'
  code: '3323.4'
  description: Standalone public buyers manage the procurement process and cover all
    of the procurement needs for a small contracting authority. They are involved
    in each stage of the procurement process and collaborate with professionals from
    other departments of the organisation to find the kinds of specialised knowledge
    that may not be available.
- uri: http://data.europa.eu/esco/occupation/dbdc9f7b-31c6-4f21-a9c5-48253bb69c08
  preferred_label: purchase planner
  isco_code: '3323'
  code: 3323.2.3
  description: Purchase planners organise the continuous supply with goods out of
    existing contracts.
- uri: http://data.europa.eu/esco/occupation/fd1c4e94-25aa-4020-b0ef-0cf5aaf2e4d2
  preferred_label: textile sourcing merchandiser
  isco_code: '3323'
  code: 3323.2.4
  description: Textile sourcing merchandisers organise efforts for textile producers
    from fibre to final products. Sourcing involves the process of researching, evaluating
    and locating textile suppliers through a careful prospection.
- uri: http://data.europa.eu/esco/occupation/0a7b874b-e5c0-4dea-8b88-dadba9efee1d
