- uri: http://data.europa.eu/esco/occupation/3a55ef85-5abf-48e2-884b-5efaf881bfb1
  preferred_label: social work practice educator
  isco_code: '2310'
  code: '2310.2'
  description: Social work practice educators teach, supervise and assess social work
    students prior, during and after they have obtained their degree. They contribute
    to their placement and have the authority to recommend students on the basis of
    appropriate evidence.
- uri: http://data.europa.eu/esco/occupation/3c305542-a51b-4b96-8d45-af11ca05eaa2
  preferred_label: veterinary medicine lecturer
  isco_code: '2310'
