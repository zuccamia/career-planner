  - head of post-production
  isco_code: '2654'
  code: '2654.2'
  description: Post-production supervisors oversee the whole post-production process.
    They work together with the music editor and video and motion picture editor.
    Post production supervisors help plan the production workflow to make sure the
    post production phase is included and budgeted for. They ensure that the final
    product is delivered and distributed.
- uri: http://data.europa.eu/esco/occupation/5ff7a990-a306-40c2-9224-b2bf7f15b2f9
