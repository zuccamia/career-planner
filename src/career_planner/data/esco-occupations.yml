- uri: http://data.europa.eu/esco/occupation/5ac65daa-0896-4193-9f0e-8b00746b78a1
  preferred_label: university research assistant
  isco_code: '2310'
  code: 2310.1.41
  description: University research assistants conduct academic research for the university
    or college they are employed in. They may assist professors they are affiliated
    with, their supervisor, in their research or develop their own in the related
    field of that professor.
- uri: http://data.europa.eu/esco/occupation/5fdfa822-c1ba-477e-87cc-3d742e59310d
  preferred_label: biology lecturer
  isco_code: '2310'
  code: 2310.1.6
