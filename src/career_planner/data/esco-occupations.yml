- uri: http://data.europa.eu/esco/occupation/54361270-bc5e-40fb-8f84-a0023a85cdf7
  preferred_label: fine arts instructor
  isco_code: '2310'
  code: 2310.1.17
  description: Fine arts instructors educate students in specific theory and, primarily,
    practice-based fine arts courses at a specialised fine arts school or conservatory
    at a higher education level, including drawing, painting and sculpturing. They
    provide theoretical instruction in service of the practical skills and techniques
    the students must subsequently master in the fine arts. Fine arts instructors
    monitor the students' progress, assist individually when necessary, and evaluate
    their knowledge and performance on the fine arts through, often practical, assignments,
    tests and examinations.
- uri: http://data.europa.eu/esco/occupation/55a785db-0636-41b8-950f-0b65abe5e81b
  preferred_label: pharmacy lecturer
  isco_code: '2310'
  code: 2310.1.31
  description: Pharmacy lecturers are subject professors, teachers, or lecturers who
