  - animal record keeper
  isco_code: '2621'
  code: '2621.9'
  description: Zoo registrars are responsible for the maintenance of a wide variety
    of records relating to animals and their care in zoological collections. This
    includes both historic and current records. They have the responsibiltity to collate
    records into an organised and recognised records keeping system. In most cases
    this also involves submitting regular reports to regional or international species
    information systems and/or as part of managed breeding programmes i.e. zoo registrars
    are usually responsible for both internal and external management if institutional
    records . Zoo registrars also often coordinate animal transportation for the zoological
    collection.
