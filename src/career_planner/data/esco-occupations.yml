  isco_code: '1431'
  code: '1431.2'
  description: Recreational facilities managers direct the operations of facilities
    that provide recreational services such as gardens, spas, zoos, gambling and lottery
    facilities. They plan and organise the daily operations of the related staff and
    facilities and ensure the organisation follows the latest developments in its
    field. They coordinate the different departments of the facility and manage the
    correct use of rescources and budgets.
- uri: http://data.europa.eu/esco/occupation/825ab049-2f0c-4acf-b402-9c6bb51acca2
