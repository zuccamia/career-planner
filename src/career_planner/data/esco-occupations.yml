    in order to provide various forms of therapy and counselling, group work, and
    community work. Social workers guide people to use services to claim benefits,
    access community resources, find jobs and training, obtain legal advice or deal
    with other local authority departments.
- uri: http://data.europa.eu/esco/occupation/4bdc4e52-1c9c-4d80-898a-18522d905fee
