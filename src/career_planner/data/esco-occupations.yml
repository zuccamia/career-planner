    and exams and leading review and feedback sessions for the students. They also
    conduct academic research in their field of sociology, publish their findings
    and liaise with other university colleagues.
- uri: http://data.europa.eu/esco/occupation/1bbaf82c-67ae-4beb-9a55-7298acf5b2af
  preferred_label: nursing lecturer
  isco_code: '2310'
  code: 2310.1.28
