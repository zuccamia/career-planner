  isco_code: '1431'
  code: 1431.1.2
  description: Performance production managers take care of a range of practical issues
    concerning the production of a performance or entertainment event. They deal with
    matters ranging from the recruitment of staff, procurement of materials and services,
    to freight, customs coordination, telecommunications, labor relations, logistics,
    information technology, government liaison, venue booking, scheduling, operations
    management, mending delay problems and workplace safety.
- uri: http://data.europa.eu/esco/occupation/080fc550-b7ca-4576-aaf5-06fffbede994
  preferred_label: spa manager
  isco_code: '1431'
  code: 1431.2.5
  description: Spa managers coordinate the day-to-day operations of the spa establishment
    in order to provide guests with the best customer experiences. They oversee the
    activities and performance of staff, manage the financial aspects of the Spa,
    deal with suppliers and run advertising campaigns for the spa in order to attract
    more customers.
- uri: http://data.europa.eu/esco/occupation/146f2c99-3f8b-4856-95ba-3ecfea681809
  preferred_label: gambling manager
  isco_code: '1431'
  code: 1431.2.3
  description: Gambling managers organise and coordinate the activities of a gambling
    facility. They oversee daily operations and facilitate communications between
    staff and customers. They manage and train staff and strive to improve the profitability
    of their business. They take responsibility for all gambling activities and ensure
    that relevant gambling rules and regulations are followed.
- uri: http://data.europa.eu/esco/occupation/1c948509-4015-40b0-b380-105fc85782a5
  preferred_label: zoo curator
  isco_code: '1431'
  code: 1431.2.6
  description: Zoo curators are usually the position of middle-management within an
    institution. Much of their work involves oversight, management and development
    of the animal collection. Often this is related to animal husbandry and welfare
    policy, the acquisition and disposition of zoo animals, and development of new
    exhibits. Zoos normally acquire animals through captive breeding programs. The
    zoo collection, trade, and transport of the animals is regulated by government
    agencies as well as guided by zoo membership organisations. Consequently, zoo
    curators act as a liaison between these agencies and the zoo itself. Additionally,
    they play an active role in the administration of zoo functions and all kinds
    of captive breeding programs.
- uri: http://data.europa.eu/esco/occupation/33e3a746-f209-4a1a-96df-301505531cb2
  preferred_label: beauty salon manager
  isco_code: '1431'
  code: 1431.2.1
  description: Beauty salon managers oversee the daily operations and staff management
    in a beauty salon. They ensure customer satisfaction, budget control and inventory
    management. Beauty salon managers set up and enforce salon rules and cleanliness
    guidelines. They are also in charge of promoting the salon to attract new clients.
- uri: http://data.europa.eu/esco/occupation/49ca9fe4-4513-4657-b27f-eaad11e6158a
  preferred_label: lottery manager
  isco_code: '1431'
  code: 1431.2.4
  description: Lottery managers organise and coordinate the activities of a lottery
    organisation. They oversee daily operations and facilitate communications between
    staff and customers. They review lottery procedures, arrange prices, train staff
    and strive to improve the profitability of their business. They take responsibility
    for all lottery activities and ensure that relevant lottery rules and regulations
    are followed.
- uri: http://data.europa.eu/esco/occupation/6066ed14-ace3-4352-b656-2b621fd7bc88
  preferred_label: cultural facilities manager
  isco_code: '1431'
  code: '1431.1'
  description: Cultural facilities managers direct the operations of facilities that
    provide cultural services such as theatre, museums and concert halls. They plan
    and organise the daily operations of the related staff and facilities and ensure
    the organisation follows the latest developments in its field. They coordinate
    the different departments of the facility and manage the correct use of resources,
    policies and budgets.
- uri: http://data.europa.eu/esco/occupation/771955d9-e988-47f3-b60f-207adb2cd571
