{{define "company_new.html"}}{{template "base" .}}{{end}}

{{define "content"}}
<section class="space-y-2">
  <p><a class="text-sm text-slate-500 transition hover:text-slate-900" href="/companies">← Back to companies</a></p>
  <p class="text-sm font-semibold uppercase tracking-[0.14em] text-blue-700">Add a company</p>
</section>

<section class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  {{if .Error}}
  <p class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">{{.Error}}</p>
  {{end}}

  <form method="post" action="/companies/new" class="space-y-4">
    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="company_name">Company name</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="company_name" name="company_name" type="text" placeholder="e.g. Stripe" required>
    </div>
    <div class="flex items-center gap-3">
      <button class="inline-flex items-center justify-center rounded-full bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700" type="submit">Continue</button>
    </div>
  </form>
</section>
{{end}}
