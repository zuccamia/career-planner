{{define "company_new.html"}}{{template "base" .}}{{end}}

{{define "content"}}
<h1>Add a company</h1>
<p>Enter a company name to start building a dossier.</p>

{{if .Error}}
<p style="color: #b91c1c;">{{.Error}}</p>
{{end}}

<form method="post" action="/companies/new">
  <label for="company_name">Company name</label>
  <input id="company_name" name="company_name" type="text" placeholder="e.g. Stripe" required>
  <button type="submit">Continue</button>
</form>
{{end}}
