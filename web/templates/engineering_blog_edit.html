{{define "engineering_blog_edit.html"}}{{template "base" .}}{{end}}

{{define "content"}}
<section class="space-y-2">
  <p><a class="text-sm text-slate-500 transition hover:text-slate-900" href="/companies/{{.Company.ID}}/engineering-blogs">← Back to engineering blog collection</a></p>
  <p class="text-sm font-semibold uppercase tracking-[0.14em] text-blue-700">Edit engineering blog note</p>
  <h1>{{.Company.OfficialName}}</h1>
</section>

<section class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  {{if .EngineeringBlogError}}
  <p class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">{{.EngineeringBlogError}}</p>
  {{end}}

  <form method="post" action="/engineering-blogs/{{.Note.ID}}/edit" class="space-y-4">
    <input name="company_id" type="hidden" value="{{.Company.ID}}">
    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="engineering-note-url">Article URL</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="engineering-note-url" name="url" type="url" value="{{.EngineeringBlogURL}}" placeholder="https://..." required>
    </div>
    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="engineering-note-notes">Your notes</label>
      <textarea class="min-h-28 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="engineering-note-notes" name="notes" required>{{.EngineeringBlogNotes}}</textarea>
    </div>
    <div class="flex items-center gap-3">
      <button class="inline-flex items-center justify-center rounded-full bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700" type="submit">Save</button>
    </div>
  </form>
</section>
{{end}}
