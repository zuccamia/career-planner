{{define "company_edit.html"}}{{template "base" .}}{{end}}

{{define "content"}}
<section class="space-y-2">
  <p><a class="text-sm text-slate-500 transition hover:text-slate-900" href="/companies/{{.Company.ID}}">← Back to company</a></p>
  <p class="text-sm font-semibold uppercase tracking-[0.14em] text-blue-700">Edit company</p>
</section>

<section class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  {{if .Error}}
  {{template "partials/alert" dict "Variant" "error" "Message" .Error}}
  {{end}}

  <form method="post" action="/companies/{{.Company.ID}}/edit" class="space-y-4">
    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="official_name">Official name</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="official_name" name="official_name" type="text" value="{{.OfficialName}}" required>
    </div>

    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="website">Website</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="website" name="website" type="url" value="{{.Website}}" placeholder="https://example.com">
    </div>

    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="tech_blog_url">Tech blog URL</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="tech_blog_url" name="tech_blog_url" type="url" value="{{.TechBlogURL}}" placeholder="https://example.com/engineering">
    </div>

    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="ats_url">ATS URL</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="ats_url" name="ats_url" type="url" value="{{.ATSURL}}" placeholder="https://jobs.example.com">
    </div>

    <div class="grid gap-2">
      <label class="text-sm font-medium text-slate-900" for="ats_provider">ATS provider</label>
      <input class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" id="ats_provider" name="ats_provider" type="text" value="{{.ATSProvider}}" placeholder="Greenhouse">
    </div>

    <div class="flex items-center gap-3">
      <button class="inline-flex items-center justify-center rounded-full bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700" type="submit">Save</button>
    </div>
  </form>
</section>
{{end}}
