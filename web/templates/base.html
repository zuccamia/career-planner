{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <header class="sticky top-0 z-10 border-b border-slate-200/80 bg-slate-50/90 backdrop-blur">
    <div class="mx-auto flex min-h-16 w-full max-w-5xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
      <a class="text-base font-semibold text-slate-900" href="/">Career Planner</a>
      <nav class="flex items-center gap-4 text-sm font-medium text-slate-500">
        <a class="transition hover:text-slate-900" href="/">Home</a>
        <a class="transition hover:text-slate-900" href="/companies/new">Add company</a>
      </nav>
    </div>
  </header>

  <main class="py-12 sm:py-16">
    <div class="mx-auto flex w-full max-w-5xl flex-col gap-8 px-4 sm:px-6 lg:px-8">
      {{template "content" .}}
    </div>
  </main>
</body>
</html>
{{end}}
