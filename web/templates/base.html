{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div class="mx-auto flex min-h-screen w-full max-w-7xl flex-col lg:flex-row">
    <aside class="border-b border-slate-200 bg-white lg:sticky lg:top-0 lg:h-screen lg:w-72 lg:border-b-0 lg:border-r">
      <div class="flex h-full flex-col gap-8 px-4 py-6 sm:px-6 lg:px-8">
        <div class="space-y-2">
          <a class="inline-flex text-base font-semibold text-slate-900" href="/">Career Planner</a>
        </div>

        <nav class="flex flex-col gap-2">
          <a class="rounded-2xl px-4 py-3 text-sm font-semibold transition {{if eq .ActiveNav "home"}}bg-blue-50 text-blue-700{{else}}text-slate-600 hover:bg-slate-100 hover:text-slate-900{{end}}" href="/">Home</a>
          <a class="flex items-center justify-between rounded-2xl px-4 py-3 text-sm font-semibold transition {{if eq .ActiveNav "companies"}}bg-blue-50 text-blue-700{{else}}text-slate-600 hover:bg-slate-100 hover:text-slate-900{{end}}" href="/companies">
            <span>Companies</span>
            <span class="inline-flex min-w-6 items-center justify-center rounded-full bg-white px-2 py-0.5 text-xs font-semibold {{if eq .ActiveNav "companies"}}text-blue-700{{else}}text-slate-500{{end}}">{{.CompaniesCount}}</span>
          </a>
          <a class="flex items-center justify-between rounded-2xl px-4 py-3 text-sm font-semibold transition {{if eq .ActiveNav "people"}}bg-blue-50 text-blue-700{{else}}text-slate-600 hover:bg-slate-100 hover:text-slate-900{{end}}" href="/people">
            <span>People</span>
            <span class="inline-flex min-w-6 items-center justify-center rounded-full bg-white px-2 py-0.5 text-xs font-semibold {{if eq .ActiveNav "people"}}text-blue-700{{else}}text-slate-500{{end}}">{{.PeopleCount}}</span>
          </a>
        </nav>

        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm font-semibold text-slate-900">Quick start</p>
          <p class="mt-1 text-sm text-slate-500">Start by adding a company.</p>
          <a class="mt-4 inline-flex items-center justify-center rounded-full bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700" href="/companies/new">Add company</a>
        </div>
      </div>
    </aside>

    <main class="flex-1 py-8 sm:py-10 lg:py-12">
      <div class="mx-auto flex w-full max-w-5xl flex-col gap-8 px-4 sm:px-6 lg:px-8">
        {{template "content" .}}
      </div>
    </main>
  </div>
</body>
</html>
{{end}}
